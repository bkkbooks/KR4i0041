body:
  text: 竹莊詩話詩文評類提要臣等謹案竹莊詩話二十四卷舊本不著撰人名氏錢曽讀書敏求記曰竹莊居士不知何時人遍搜古今詩評雜録其説於前而以全首附於後乃詩話中之絶佳者考宋藝文志有何溪汶竹莊詩話二十七卷蓋即此書惟今本二十四卷其數少異或傳寫佚其三卷或後人有所合併或宋史誤四為七均未可知然出自宋人則無疑也是書與蔡正孫詩林廣記體例略同皆名為詩評實如總集使觀者即其所評與原詩互相考證可以見作者之意旨併可以見論者之是非視他家詩話但拈一句一聫而不睹其詩之首尾或渾稱某人某篇而不知其語云何者固為勝之惟正孫書以評列詩後此以評列詩前為小變耳其所引證如五經詩事歐公餘話洪駒父詩話潘子真詩話桐江詩話筆墨間録劉次莊樂府集邵公序樂府後録之類今皆未見傳本而吕氏童蒙訓論詩之語今世所行重刻本皆削去不載此書所録尚見其梗概又此書作于宋末所見詩集猶皆古本如焦仲卿妻詩明人活字板玉臺新詠妄增賤妾留空房相見嘗日稀二句謬傳至今實則郭茂倩左克明兩家樂府及舊本玉臺新詠皆無之此書亦無此二句足相證明即其所載習見之詩亦有資考校也乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
