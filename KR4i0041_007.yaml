body:
  text: 竹莊詩話卷七韓退之上秋懷詩十一首樊汝霖云秋懷詩十一首文選體也唐人最重文選學公以六經之文為諸儒倡文選弗論也而公詩如自許連城價傍砌看紅藥眼穿長訝雙魚斷之句皆取諸文選此詩亦往往有其體窗前兩好樹衆葉光薿薿秋風一披拂策策鳴不巳微燈照空床夜半偏入耳秋憂無端來感歎成坐起天明視顔色與故不相似羲和驅日月一作白日疾急不可恃浮生雖多途雖或作每趨死惟一軌胡為浪自苦得酒且歡喜白露下百草蕭蘭共雕悴青青四牆下巳復生滿地寒蟬暫寂寞蟋蟀鳴自恣運行無窮期稟受氣苦異適時各得所松柏不必貴彼時何卒卒我志何曼曼犀首空好飲廉頗尚能飰學堂日無事驅馬適所願茫茫出門路欲去聊自勸歸還閲書史文字浩千萬塵迹竟誰尋賤嗜非貴獻丈夫意有在女子乃多怨秋氣日惻惻秋空日凌凌上無枝上蜩下無盤中蠅豈不感時節耳目去所憎清曉卷書坐南山見高稜其下澄湫水有蛟寒可罾惜哉不得往豈謂吾無能離離挂空悲戚戚抱虛警露泫秋樹高蟲弔寒夜永斂退就新懦趨營悼前猛歸愚識夷途汲古得修綆名浮猶有恥味薄真自幸庶幾遺悔尤即此是幽屏露泫一作露滴今晨不成起端坐盡日景蟲鳴室幽幽月吐窗同同喪懷若迷方浮念劇含梗塵埃慵伺候文字浪馳騁尚須勉其頑王事有朝請秋夜不可晨秋日苦易暗我無汲汲志何以有此憾寒雞空在棲缺月煩屢瞰有琴具徽絃再鼓聽愈淡古聲久埋滅無由見真濫低心逐時趣苦勉祗能暫有如乘風船一縱不可纜不如覻文字丹鉛事點勘豈必求嬴餘所要石與甔卷卷落地葉隨風走前軒鳴聲若有意顛倒相追奔空堂黃昏暮我坐默不言童子自外至吹燈當我前問我我不應饋我我不餐退坐西壁下讀詩一作書盡數篇作者非今士相去時巳千其言有感激使我復悽酸顧謂汝童子置書且安眠丈夫屬有念事業無窮年霜風侵梧桐衆葉著樹乾空階一片下琤若摧琅玕謂是夜氣滅望舒霣其團青冥無依倚飛轍危難安驚起出戶視倚楹久汍瀾憂愁費晷景日月如跳丸迷復不計逺為君駐塵鞍暮暗來客去羣囂各收聲悠悠偃宵寂舋舋抱秋明世纍忽進慮外憂遂侵誠強懷張不滿弱念缺易一作巳盈詰屈避語穽冥茫觸心兵敗虞千金棄得比寸草榮知恥足為勇晏然誰汝令鮮鮮霜中菊既晚何用好揚揚弄芳蝶爾生還不早運窮兩值遇婉孌死相保西風蟄龍蛇衆木日凋稿由來命分爾泯滅豈足道贈一有别字元十八協律六首知識久去眼吾行其既逺瞢瞢莫訾省一作毁默默但寢飯子兮何為者冠珮立憲憲何氏之從學蘭蕙巳滿畹於何玩其光以至嵗向晚時治一作治惟尚和同無俟於謇謇或師絶學賢不以藝自挽子兮獨如何能自媚婉娩一作婉金石出聲音宫室發關楗何人識章甫而知駿蹄踠惜乎吾無居不得留息偃臨當背面時裁詩示綣繾英英桂林伯實維文武特逺勞從事賢來弔逐臣色南裔多山海道里屢紆直風波無程期所憂動不測子往誠艱難一作險我去未窮極臨别且無言有淚不可拭吾友柳子厚其人藝且賢吾未識子時巳覽贈子篇寤寐想風彩於今已三年不意流竄路旬日同食眠所聞昔巳多所得今過前如何又須別使我抱悁悁勢要情所重排斥則埃塵骨肉未免然況又四海人嶷嶷桂林伯矯矯勇義身生平所未識待我逾交親遺我數幅書繼以藥物珍藥物防瘴癘書勸養形神不知四罪地豈有再起辰窮塗致感激肝膽還輪囷讀書患不多思義患不明患足已不學既學患不行子今四美具實大華亦榮王官不可闕未宜後諸生嗟我擯南海無由助飛鳴寄書龍城守君驥何時秣峽山逢颶風雷電助撞捽乘潮簸扶胥近岸指一髮兩岩雖云牢朩石互飛發屯門雖云高亦映波浪沒余罪不足惜子生未宜忽胡為不忍別感謝情至骨南溪始泛三首蔡寬夫詩云南溪始泛三首乃末年所作獨為間逺有淵明風氣王直方詩話云洪龜父言山谷於退之詩少所許可最愛南溪始泛以為有詩人句律之深意榜舟南溪上一作下上上不得反幽尋事隨去孰能量近逺隂沈過連樹藏昂抵橫坂石粗肆磨礪波惡厭牽挽或以偏岸漁竟就平洲飰點點暮雨飄稍稍新月偃餘年諒一作懍無幾休日愴巳晚自是病使然非由取高蹇南溪亦清駃而無楫與舟山農驚見之隨我觀不休不惟兒童輩或有杖白頭饋我籠中瓜勸我此淹留我云以病歸此巳頗自由幸有用餘俸一作今幸有餘俸置居在西疇囷倉米穀滿未有旦夕憂上去無得得下來亦悠悠但恐煩里閭時有緩急投願為同社人雞豚燕春秋足弱不能步自宜收朝迹嬴形可與一作輿致佳觀安可擲即此南坂下久聞有水石拖舟入其間溪流正清激隨波吾未能峻瀨乍可刺鷺起若道吾前飛數十尺亭亭柳帶沙團團冠松壁歸時還盡夜誰謂非事役此日足可惜贈張籍歐公詩話云退之才力無施不可以為為文章末事其詩曰多情懷酒伴餘事作詩人然其發談笑助諧謔敘人情狀物態一寓於詩而曲盡其妙此在雄文大手固不足言而余獨愛其工於用韻蓋得韻寬則波瀾橫溢泛入傍韻合離出入回合殆不可拘以常格如此日足可惜之類是也得韻窄則不復傍出而因見其巧愈嶮愈奇如病中贈張十八之類是也余嘗與聖俞語此以謂譬諸善馭良馬者通衢廣陌縱橫馳逐惟意所之至於曲水蟻封疾徐中節而不蹉跌乃天下之至工也聖俞戲曰前史言退之為人木強若覺韻可自足而輒傍出窄韻難獨用而拗反不出非強而然歟坐客笑此日足可惜此酒不足嘗捨酒去一作須相語共分一日光念昔未知子孟君自南方自矜有所得言子有文章我名屬相府欲往不得驤一作行思之不可見百端在中腸維時月魄死冬日朝在房驅馳公事退聞子適及城一作隍命車載之至引坐於中堂開懷聽其説往往副所望孔丘殁巳逺仁義路久荒紛紛百家起詭怪相披猖長老守所聞後生習為常少知誠難得純粹古巳亡譬彼植園朩有根易為長留之不遣去館置城西旁嵗時來一作未云幾浩浩觀湖湘一作江湘衆夫指之笑謂我知不明兒童畏雷電魚鱉驚夜光州家舉進士選試繆所當馳辭對我策章句何煒一作煌煌相公朝服立工席歌鹿鳴禮終樂巳闋相拜送於庭之子去須臾赫赫流盛名切喜復竊歎一作慷慨仍竊歎諒知有所成人事安可恆奄忽令我傷聞子高第日正從相公喪哀情逢吉語惝恍難為雙暮宿偃師西展轉在空牀夜聞汴州亂繞壁行倣徨我時留妻子倉卒不及將相見不復期零落甘所丁驕女未絶乳念之不能忘忽如在我前一作其側耳若聞啼聲中途安得返一日不可更俄有東來説我家免罹殃乘船下汴水東去趨彭城從喪朝至洛一作從喪至洛陽旋一作遝走不及停假道經盟津出入行澗岡日西入軍門羸馬顛且僵主人願少留延入陳壺觴卑賤不敢辭忽忽心如狂飲食豈知味絲竹徒轟轟平明脫身去決若驚鳬翔黃昏次汜水欲濟一作過無舟航號呼久乃至夜濟十里黃中流上灘灘一作汝灘沙水不可詳驚波暗合沓星宿爭翻芒馬乏復悲鳴一作馬躑躅悲鳴趙作轅馬踏軸鳴左右泣僕童甲午憩時門臨泉窺鬭龍東南出陳許陂澤平一作何一又作路茫茫道邊草朩花紅紫相低昂百里不逢人角角雉雊鳴一作雄雉鳴行行二月暮乃及徐南疆下馬步隄岸上船拜吾兄誰云經艱一作險難百口無夭殤一作橫僕射南陽公宅我睢水陽篋中有餘衣盎中有餘糧閉門讀書史風清窗戶涼一作窗戶清風涼一作忽巳涼一作風巳涼日念子來遊子豈知我情別離未為久辛苦多所經對食每不飽共言無倦聽連延三十日晨坐達五更我友一作有二三子宦遊在西京東野窺禹穴李翺觀濤江蕭條千萬里會合安可逢淮之水舒舒楚山直叢叢子又捨我去我懷焉所窮男兒不再壯百嵗如風狂高爵尚可求無為守一鄉病中贈張十八中虛得暴下避冷臥北窗不踏曉鼓朝安眠聽逄逄籍也處閭里抱能未施邦文章自娛戲金石日擊撞龍文百斛鼎筆力可獨扛談舌久不掉非君亮誰雙扶几導之言曲節初樅樅半途喜開鑿派別失大江吾欲盈其氣不令見麾幢牛羊滿田野解斾束空杠傾樽與斟酌四壁堆罌缸玄帷隔雪風照爐釘明缸夜闌一作話縱捭闔哆口疏眉厖勢侔高陽翁坐約齊橫降連日挾所有形軀頓胮肛將歸乃徐謂子言得無哤回君一作軍與角逐斫樹收窮龎雌聲吐欵要酒壺綴羊腔君乃崑崙渠籍乃嶺頭瀧譬如蟻蛭微詎可陵崆㟅幸願終賜之斬拔枿與樁從此識歸處東流水淙淙聽穎師彈琴西清詩話云三吳僧義海以琴名世六一居士嘗問東坡琴詩孰優東坡答以退之聽頴師琴公曰此祗是聽琵琶耳或以問海海曰歐陽公一代英偉然斯語誤矣昵昵兒女語恩怨相爾汝言輕柔細屑真情出見也畫然變軒昂勇士赴敵場精神餘溢竦觀聽也浮雲栁絮無根蒂天地濶逺隨飛揚縱橫變態浩乎不失自然也喧啾百鳥羣忽見孤鳯凰又見頴孤絶不同流俗下俚聲也躋攀分寸不可上失勢一落千丈強起伏抑揚不主故常也皆指下絲聲妙處惟琴為然琵琶格上聲烏能耳邪退之深得其趣未易譏評也許彥周詩話云退之聽頴師彈琴詩云浮雲栁絮無根蒂天地濶逺隨飛揚此泛聲也謂輕非絲重非朩也喧啾百鳥羣忽見孤鳯凰泛聲中寄指聲也躋攀分寸不可上吟繹聲也失勢一落千丈強順下聲也僕不曉琴聞之善琴者云此數聲最難工自文忠公與東坡論此詩作聽琵琶詩之後後生隨例云云栁下惠則可吾則不可故特論之少為退之雪寃昵昵兒女語恩怨相爾汝畫然變軒昂勇士赴敵場浮雲栁絮無根蒂天地濶逺隨飛揚喧啾百鳥羣忽見孤鳯凰躋攀分寸不可上失勢一落千丈強嗟余有兩耳未省聽絲篁自聞穎師彈起坐在一牀一作旁推手遽止之濕衣淚滂滂穎乎一作師爾誠能無以冰炭置我腸盧郎中雲夫寄示送盤谷子詩歌以和之東坡云退之尋常自謂不逮李杜至於昔尋李願向盤谷一篇獨不減子美昔尋李願向盤谷正見高崕巨壁爭開張是時新晴天井溢誰把長劍倚太行衝風吹破落天外飛雨白日灑洛陽東蹈燕川食曠野有饋朩蕨芽滿筐馬頭溪深不可厲借車載過水入箱平沙緑浪榜方口鴈鴨飛起穿垂楊窮探極覽頗恣橫物外日月本不忙歸來辛苦欲誰為坐令再往之計墮眇茫一作渺茫一作渺芒閉門長安三日雪推書撲筆歌慨慷旁無壯士遣屬和逺憶盧老詩顛狂開緘忽覩送歸作字向紙上皆軒昂又知李侯竟不顧方冬獨入崔嵬藏我今進退幾時決十年蠢蠢隨朝行家請官供不報答無異雀鼠偷太倉行抽手版付丞相不待彈劾還耕桑同張籍遊曲江蒼梧雜志云退之盡是直道更無斧鑿䀶人多嫌退之律詩不工使魯直為之未必能得如是氣象唐人謂此四句可敵一部長慶集誠然漠漠輕隂曉自開青春白日映樓臺曲江水滿花千樹有底忙時不肯來答張徹筆墨間録云劉僴云答張徹一詩尤奇麗梅花灞水一對極有風味辱贈不知報我歌爾其聆首敘始識面次言後分形道路綿萬里日月垂十齡浚郊避兵亂睢岸連門停肝膽一古劍波濤兩浮萍漬墨竄舊史磨丹注前經義苑手祕寶文堂耳驚霆暄晨躡露舄暑夕眠風櫺結友子讓抗請師我慙丁初味猶噉蔗逐通斯建瓴搜奇日有富嗜善心無寧石梁平侹侹沙水光泠泠乘枯摘野豔沈細抽潛腥遊寺去陟一作登巘尋徑一作幽返穿汀緣雲竹竦竦失路麻冥冥淫潦忽翻野平蕪眇開溟防泄塹夜塞懼衝城晝扃及去事戎轡相逢且軍伶觥秋縱兀兀獵晏馳駉駉從賦始分手一作首朝京忽同舲急時促暗棹戀月留虛亭畢事驅傳馬安居守窗螢梅花灞水別宫一作官燭驪山醒省選逮投足鄉賓尚推翎塵祛又一摻淚眥還雙熒洛邑得休告華山窮絶陘倚嵓睨海浪引袖拂天星日駕此回轄金神所司刑泉紳拖修白石劒攢高青磴蘚澾拳局梯飈颭伶俜悔狂一作往巳咋指垂誡仍鐫銘峨豸忝備列伏滿愧分涇微誠慕橫草瑣力摧撞莛疊雪走商嶺飛波航洞庭下險疑墮井守官類拘囹荒餐茹獠蠱幽夢感湘靈刺史肅蓍蔡吏人沸蝗螟點綴簿上字趨蹌閣前鈴賴其飽山水得以娛瞻聽紫樹雕斐亹碧流滴玲瓏映波鋪逺錦插地列長屏愁狖酸骨死怪花醉魂馨潛苞絳實拆幽乳一作孔翠毛零赦行五百里月變三十蓂漸階羣振鷺入學誨螟蛉蘋甘謝鳴鹿罍滿暫罄瓶坰坰抱瑚璉飛飛聨鶺鴒魚鬛欲脫背虬精光照硎一作虬光先照硎豈獨出醜類方當動朝廷勤來得晤語勿憚宿寒廳山石集注云蘇內翰嘗與客遊南溪醉後相與解衣濯足因詠公此篇慨然知其所以樂而忘其在數百年之外因次其韻見東坡集山石犖確行徑微黃昏到寺蝙蝠飛升堂坐階新雨足葩蕉葉大梔子肥僧言古壁佛畫好以火來照所見稀鋪床拂席置美飯疏糲亦足飽我飢夜深靜臥百蟲絶清月出嶺光入扉天明獨去無道路出入高下窮煙霏山紅澗碧紛爛漫時見松櫪皆十圍當流赤足踏澗石水聲激激風吹衣人生如此自可樂豈必局束為人鞿嗟哉吾黨二三子安得至老不更歸八月十五夜贈張功曹集注云公與張署以貞元二十一年二月赦自南方俱徙掾江陵至是俟命於郴而作是詩怨而不亂有小雅之風纎雲四卷天無河清風吹空月舒波沙平水息聲影絶一杯相屬君當歌君歌聲酸辭且苦不能聽終淚如雨洞庭連天九疑高蛟龍出沒狸鼯號十生九死到官所幽居默默如藏逃下牀畏蛇食畏藥海氣濕蟄熏腥臊昨者州前捶大鼓嗣皇繼聖登夔臯赦書一日行萬里罪從大辟皆除死遷者追回流者還滌瑕蕩垢清朝班州家申名使家抑坎軻秪得移荆蠻判司官卑不堪説未免捶楚塵埃間同時輩流多上道天路幽險難追攀君歌且休聽我歌我今與君豈殊科一年明月今宵多人生由命非由他有酒不飲奈明何苦寒集注云此詩意蓋有所諷猶訟風伯之吹雲而雨不得作也謂隆寒奪春序而肆其寒猶權臣之用事太昊之畏避則猶當國者畏權臣取充位而巳其下反覆所言無易此意其末謂天子哀無辜則望人主進賢退不肖使恩澤下流施及草木其愛君憂民之意具見于此四時各平分一氣不可兼隆寒奪春序顓頊固不廉太昊施維綱畏避但守謙遂令黃泉下萌芽夭句尖草朩不復抽百味失苦甜凶飈攪宇宙鋩刃甚割砭日月雖云尊不能活烏蟾義和送日出愜怯頻窺覘炎帝持祝融呵噓不相炎而我當此時恩光何由沾肌膚生鱗甲衣被如刀鐮氣寒鼻莫嗅血凍指不拈濁醪沸入喉口角如銜箝將持匕箸食觸指如排籖侵爐不覺暖熾炭屢巳添探湯無所益何況纊無縑虎豹僵穴中蛟螭死幽潛熒惑喪躔次六龍冰脫髯芒碭大包內生類恐盡殱啾啾窗間雀不知巳微纖舉頭仰天鳴所願晷刻淹不如彈射死却得親炮燖鸞凰茍不存爾因不在占其餘蠢動儔俱死誰恩嫌伊我稱最靈不能女覆苫悲哀激憤嘆五藏難安恬中宵倚牆立淫淚何漸漸天王哀無辜惠我不顧瞻褰旒去耳纊調和進梅鹽賢能日登御黜彼傲與憸生風吹死氣豁達如褰簾懸乳零落墮晨光入前簷雪霜頓銷釋土脈膏且黏豈徒蘭蕙榮施及艾與蒹日萼行鑠鑠風條坐襜襜天乎茍其能吾死意亦厭李花集注云此詩自夜領張徹投盧同而下其所以狀李花之妙者至矣平旦入西園梨花數株若矜夸旁有一株李顔色慘慘似含嗟問之不肯道所以獨繞百匝至日斜忽憶前時經此樹正見芳意初萌芽奈何趂酒不省録不見玉枝攢霜葩泫然為汝下雨淚無由返斾羲和車東風來吹不解顔蒼茫夜氣生相遮冰盤夏薦碧實脆斥去不御慙其花當春天地爭奢華洛陽園死尤紛拿誰堆平地萬堆雪剪刻作此連天花日花赤色照未好明月暫入都交加夜領張徹投盧同乘雲共至玉皇家長姬香御四羅列縞裙練帨無等差靜濯明粧有所奉顧我未肯置齒牙清寒瑩骨肝膽醒一生思慮無由邪詠燈花集注云此詩極似少陵今夕知何夕花然錦帳中自能當雪暖那肯待春紅囊裏排金粟叉頭綴玉蟲更煩將喜事來報主人公竹莊詩話卷七
