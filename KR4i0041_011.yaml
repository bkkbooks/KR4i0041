body:
  text: 竹莊詩話卷十一雜編一醉歌行别從姪勤落第歸杜甫漫齊詩話云送别情景於後幅突然接入開後人無限法門醉歌意只用一㸃前後文勢倍覺生色陸機二十作文賦汝更小年能綴文總角草書又神速世上兒子徒紛紛驊騮作駒已汗血鷙鳥舉翮連青雲詞源倒流三峽水筆陳獨掃千人軍只今年才十六七射䇿君門期第一舊穿楊葉真自知暫蹶霜蹄未為失偶然擢秀非難取㑹是排風有毛質汝身已見唾成珠汝伯何由髮如漆春光淡沱秦東亭渚蒲牙白水荇青風吹客衣日杲杲樹攪離思花冥冥酒盡沙頭雙玉瓶衆賓皆醉我獨醒乃知貧賤别更苦吞聲躑躅涕淚零贈衛八處士人生不相見動如參商今夕復何夕共此燈燭光少壯能幾時鬚髮各已蒼訪舊半為鬼驚一作嗚呼熱中腸焉知二十載重上君子堂昔别君未婚兒女忽成行怡然敬父執問我來何方問答乃未已一作未及已兒女羅酒漿夜雨剪春韭新炊間一作聞黃粱主稱㑹面難一舉纍十觴十觴亦不醉感子故意長明日隔山嶽世事兩茫茫新安吏客行新安道喧呼聞㸃兵借問新安吏縣小更無丁府帖昨夜下次選中男行中男絶短小何以守王城肥男有母送瘦男獨伶俜白水暮東流青山猶哭聲莫自使眼枯收汝淚縱橫眼枯却見骨天地終無情我軍取相州日夕望其平豈意賊難料歸軍星散營就糧近故壘練卒依舊京掘壕不到水牧馬役亦輕況乃王師順撫養甚分明送行勿泣血僕射如父兄石壕吏暮投石壕村有吏夜捉人老翁踰墻走老婦出門看吏呼一何怒婦啼一何苦聽婦前致詞三男鄴城戍一男附書至二男新戰死存者且偷生死者長巳矣室中更無人所有乳下孫孫有母未去出入無完裙老嫗力雖衰請從吏夜歸急應河陽役猶得備晨炊夜久語聲絶如聞泣幽咽天明登前途獨與老翁别新婚别師氏詩說云詩采緑刺怨曠也觀甫此詩怨别又甚於采緑者矣王深父云先王之政新有婚者茍不使政出於刑名則一切使衆而已此詩必所怨盡其常分而能不忘禮義余是以録之蒼梧雜識云新婚别一篇甚得古詩人之意勿為新婚念努力事戎行所以勉其夫羅襦不復施對君洗紅粧所謂豈無膏沐誰適為容者也兔絲附蓬麻引蔓故不長嫁女與征夫不如棄路傍結髮為君妻席不暖君牀暮昏晨告别無乃大匆忙君行雖不逺守邊赴河陽妾身未分明何以拜姑嫜父母養我時日夜令我藏生女有所歸雞狗亦得將君今往死地沉痛迫中腸誓欲隨君去形勢反蒼黃勿為新昏念努力事戎行婦人在軍中兵氣恐不揚自嘆貧家女久致羅襦裳羅襦不復施對君洗紅妝仰視百鳥飛大小必雙翔人事多錯忤與君永相望埀老别師氏詩說云痛念國家急難征戍烽火何鄊不有吾豈能獨安不慮哉不敢盤桓義也塌然傷别者仁也不忘仁義此甫幾乎風雅之作也四方未寧靜埀老不得安子孫陳亡盡焉用身獨完投杖出門去同行為辛酸幸有牙齒存所悲骨髓乾男兒既介胄長揖别上官老妻卧路啼嵗暮衣裳單孰知是死别且復傷其寒此去必不歸還聞勸加餐土門壁甚堅杏園度亦難勢異鄴城下縱死時猶寬人生有離合豈擇衰老端憶昔少壯日遲廽竟長歎萬國盡征戍烽火被岡巒積尸草木腥流血川原丹何鄉為樂土安敢尚盤桓棄絶蓬室居塌然摧肺肝無家别師氏詩說云在昔先王中興勞來還定安集之而鴻雁之民獲安其居今肅宗中興使民無家而至於生無以養死無以葬其視周宣之民不亦厚顔也哉觀甫詩時政之美惡皆可得而知也王深父云先王子惠困窮則天下無敗亂之兆矣此詩何為作乎寂寞天寶後園廬但蒿藜我里百餘家世亂各東西存者無消息死者為塵泥賤子因陳敗歸來尋舊蹊久行見空巷日瘦氣慘悽但對狐與狸豎毛怒我啼四鄰何所有一二老寡妻宿鳥戀本枝安辭且窮棲方春獨荷鋤日暮還灌畦縣吏知我至召令習鼓鞞雖從本州役內顧無所擕近行止一身逺去終轉迷家鄉既蕩盡逺近理亦齊永痛長病母五年委溝溪生我不得力終身兩酸嘶人生無家别何以為蒸黎夏日歎夏日出東北陵天經中街朱光徹厚地鬱蒸何由開上蒼久無雷無乃號令乖雨降不濡物良田起黃埃飛鳥苦熱死池魚涸其泥萬人向流冗舉目唯蒿萊至今大河北盡作虎與豺浩蕩想幽薊王師安在哉對食不能餐我心殊未諧眇然貞觀初難與數子偕夏夜歎䂬溪詩話云夏夜歎曰念我荷戈士窮年守邊疆此仁人君子之用心終不可忘也永日不可暮炎熱毒我腸安得萬里風飄颻吹我裳昊天出華月茂林延踈光仲夏苦夜短開軒納微涼虛明見纎豪羽蟲亦飛揚物情無巨細自適固其常念彼荷戈士窮年守邊疆何由一洗濯執熱互相望竟夕擊刁斗喧聲連萬方青紫雖被體不如早還鄉北地悲笳發鸛鶴號且翺況復煩促倦激烈思時康赴江陵塗中寄三翰林韓愈孤臣昔放逐泣血追愆尤汗漫不省識恍如乘桴浮或自疑上疏上疏豈其由是年京師旱田畝少所收上憐民無食兵一作征賦半已休有司恤經費未免煩徴求富者既云急貧者固巳流傳聞閭里間赤子轉渠溝持男易斗粟掉臂莫肯酬我時出衢路餓者何其稠親逢道死者佇立一作停馬久咿嚘歸者不能食有如魚掛鈎適㑹除御史誠當得言秋拜疏移閣門為忠寧自謀上陳人疾苦無令絶其喉下言一作令畿甸內根本理冝優積雪驗豐熟幸寬待蠶牟天子惻然感司空歎綢繆謂言即施設乃返遷炎州同官盡才俊偏善柳與劉或慮語言泄傳之落寃讐二子不冝爾將疑斷還不中使臨門遣頃刻不得留病妹卧床褥分知隔明幽悲啼乞就别百請不頷頭弱妻抱稚子出拜忘慚羞僶俯不廽顧行行詣連州朝為青雲士暮作白首囚商山季冬月冰凍絶行輈春風洞庭浪出沒驚孤舟逾嶺到所任低顔奉君侯酸寒何足道隨事生瘡疣逺地觸塗異吏民似猿猴生獰多忿狠辭舌紛嘲啁白日屋簷下雙鳴鬭鵂鶹有蛇類兩首有蟲一作蠱羣飛游窮冬或搖扇盛下或重裘颶起最可畏訇哮簸陵邱雷霆助光怪氣象難比侔癘疫忽潛遘十家無一瘳猜嫌動置毒對桉輒懷愁前日遇恩赦私心喜還憂果然又羈縶不得歸鋤耰此府雄且大騰陵盡戈矛棲棲法曹掾何處事卑陬生平企仁義所學皆孔周臯知大理官不列三后儔何況親犴獄敲搒發奸偷懸知失事勢一云事勢乖恐自罹罝罘湘水清且急涼風日修修胡為首歸路旅泊尚夷猶昨者京使至嗣皇傳冕旒赫然下明詔首罪誅共兜復聞顛夭輩峨冠進鴻疇班行再肅穆璜珮鳴琅璆佇繼貞觀烈邊封脫兜鍪三賢推侍從卓犖傾枚鄒髙議參造化清文煥皇猷協心輔齊聖致理同毛輶小雅詠鳴鹿食蘋貴呦呦遺風邈不嗣豈憶常同禱一作儔失志早衰換前期擬蜉蝣自從齒牙缺始慕舌為柔因疾鼻又塞漸能等薰蕕深思罷官去畢命依松楸空懷焉能果但見嵗巳遒殷湯閔禽獸解網祝蛛蝥雷煥掘寶劒寃氣銷斗牛兹道誠可尚誰能借前籌殷勤謝友朋明月非暗投暮行河堤上暮行河堤上四顧不見人衰草際黃雲感歎愁我神夜歸孤舟卧展轉空及晨謀計竟何就嗟嗟世與身重雲一首李觀疾贈之天行失其度隂氣來干陽重雲閉日夜炎燠成寒涼小人但咨怨君子惟憂傷飲食為减少身體豈寧康此志成足貴懼非職所當藜羮尚如此肉食安可嘗窮冬百草死幽桂乃芬芳且況天地間大運自有常勸君善飲食鸞鳯本髙翔江漢答孟郊江漢雖云廣乘舟渡無艱流沙信難行馬足常往還凄風結衝波狐裘能禦寒終宵處幽室華燭光爛爛茍能行忠信可以居夷蠻嗟余與夫子此義每所敦何為復見贈繾綣在不諼歸彭城天下兵又動太平竟何時訏謨者誰子無乃失所宜前年關中旱閭井多死饑去嵗東郡水生民為流尸上天不虛應禍福各有隨我欲進短䇿無由至丹墀刳肝以為紙瀝血為書辭上言陳堯舜下言引龍䕫言詞多感激文字少萎㽔一讀巳自怪再尋良自疑食芹雖云美獻御固巳癡緘封在骨髓耿耿空自竒昨者到京城屢陪髙車馳周行多俊異議論無瑕疵見待頗異禮未能去毛皮到口不敢吐徐徐俟其巇歸來戎馬間驚顧似羈雌連日或不語終朝見相一作我欺乘間輒騎馬茫茫詣空陂遇酒即酩酊君知我為誰醉贈張祕書人皆勸我酒我若耳不聞今日到君家呼酒持勸君為此座上客一作士及余各能文君詩多態度藹藹春空雲東野動驚俗天葩吐竒芬張籍學古淡軒昻避雞羣阿買不識字頗知書八分詩成使之寫亦足張吾軍所以欲得酒為文俟其醺酒味既冷洌酒氣又氤氲性情漸浩浩諧笑方云云此誠得酒意餘外徒繽紛長安衆富兒盤饌羅羶葷不解文字飲惟能醉紅裙雖得一餉樂有如聚飛蚊今我及數子固無蕕與薰險語破鬼膽髙詞嫓一作動皇墳至寶不雕琢神功謝鋤耘方今向太平元凱承華勛吾徒幸無事庶以窮朝曛送靈師佛法入中國爾來六百年齊民逃賦役髙士著幽禪官吏不之制紛紛聽其然耕桑日失𨽻朝署時遺賢靈師皇甫姓𦙍胄本蟬聮少小涉書史早能綴文篇中間不得意失迹成延遷逸志不拘教軒騰斷牽攣圍碁鬭白黑生死隨機權六博在一擲梟盧叱廽旋爭一作文戰誰與敵浩汗橫戈鋋飲酒盡百􅊦嘲諧思愈鮮有時醉花月清唱髙且綿四座咸寂默香如奏湘絃尋勝不憚險黔江屢洄㳂瞿塘五六月驚電讓歸船怒水忽中裂千尋墮幽泉環廽勢益急仰見團團天投身豈得計性命甘徒捐浪沫蹙翻涌漂浮再生全同行二十人魂骨俱坑填靈師不掛懷冒涉道轉延開忠二州牧詩賦時作世多傳失職不把筆珠璣為君編强留費日月密席羅嬋娟昨者至林邑使君數開筵一作數數為開筵逐客三四公盈懷贈蘭荃湘一作湖游泛漭沆溪宴駐潺湲别語不許出行裾動遭牽鄰州競招請書札何翩翩十月下桂嶺乘寒恣窺緣落落王員外爭迎獲其先自從入賓館占吝久能専吾徒頗擕之一作吾徒或擕被接宿窮歡妍聽說兩京事分明皆眼前縱橫雜謠俗瑣屑咸羅穿材調真可惜朱丹在磨研方將斂之道且欲冠其顛韶陽季一作李太守髙步凌雲煙得客輒忘食開囊乞繒一作緡錢手持南曹叙字重青瑤鐫古氣參彖繫一作象髙摽摧太𤣥維舟事干謁披讀頭風痊還如舊相識一作頗似舊相識傾壺暢幽悁以此復留滯歸驂幾時鞭送惠師惠師浮屠者乃是不羈人十五愛山水超然謝朋親一作超然同隱倫脫冠剪頭髮飛一作孤步遺蹤塵發跡入四明梯空上秋旻遂登天台望衆壑皆嶙峋夜宿最髙頂舉頭看星辰光芒相照燭南北爭羅陳兹地絶翔走自然嚴且神微風吹木石澎湃聞韶鈞半夜起下視溟波御日輪魚龍驚湧躍呌笑成悲辛怪氣或紫赤敲磨共輪囷金鴉既騰翥六合俄清新常聞禹穴竒東去窺甌閩越俗不好古流傳失其真幽蹤邈難得聖路嗟長湮回臨浙江濤屹立髙峨岷壯志死不息千年如隔晨是非竟何益棄去非吾倫凌江詣盧嶽浩蕩極游巡崔崒沒雲表陂陀浸湖淪是時雨初霽懸瀑埀大一作天紳前年往羅浮步戞南海漘大哉歸德盛榮茂恆留春鵬鶱墮長翮鯨戲側修鱗自來連州寺曽未造城闉日擕青雲客探勝窮崖濱太守邀不往一作得羣官請徒頻一作其志信不羣囊無一金資翻為一作謂富者貧昨日忽不見我令一作今訪其鄰奔波一作走相追及把手問所因顧我却興歎君寧異於民離合自古然辭别安足珍吾聞九疑好夙志今欲伸班竹啼舜婦清湘沉楚臣衡山與洞庭此固道所循尋嵩方抵洛歷華遂之秦浮游靡定處偶往即通津吾言子當去子道非吾遵江魚不池活野鳥難籠馴吾非西方教憐子狂且醇吾嫉惰遊者憐子愚且諄去矣各異趣河為浪一作淚沾巾華清宫三十韻杜牧倦游録云臨潼縣靈泉觀唐華清宫也自唐迄今題詠不可勝紀小杜五言長詠并三絶洎鄭嵎津陽門詩外唯陳文惠張文定及進士楊正倫詩最佳又鄭文寶詩云但見太平無事久不知貞觀用功深皆為知者所賞竹坡詩話云杜牧之華清宫三十韻無一字不可人意其叙開元一事意直而詞隱有騷雅之風至一千年際㑹三萬里農桑之語置此詩中如伶優與嵇阮並席而談豈不敗人意哉繡嶺明珠殿層巒下繚牆仰窺雕檻影猶想赭袍光昔帝登封後中原自古强一千年際㑹三萬里農桑几席延堯舜軒墀立禹湯雷霆馳號令星斗煥文章釣築乘時用芝蘭在處芳北扉間朩索南面富循良至道思𤣥圃平居厭未央鈎陳裹巖谷文陛壓青蒼歌吹千秋節樓臺八月涼神仙髙縹眇環珮碎丁當泉暖涵窗鏡雲嬌惹粉囊嫩嵐滋翠葆清渭照紅粧帖泰生靈夀歡娛嵗序長月聞仙曲調霓作舞衣裳雨露偏金穴乾坤入醉鄉玩兵師漢武廽手倒干將鯨鬛掀東海胡牙揭上陽喧呼馬嵬血零落羽林槍傾國留無路還魂怨有香蜀峯橫慘淡秦樹逺微茫鼎重山難轉天扶業更昌望賢餘故老花萼舊池塘往事人誰問幽襟淚獨傷碧簷斜送日殷葉半凋霜迸水傾瑤砌疏風玉房塵埃羯鼓索片假荔枝筐鳥啄摧寒朩蝸蜒蠧畫梁孤烟知客恨遙起泰陵傍過華清宫絶句三首遁齊閒覽云華清宫詩云云首作尤膾炙人口長安廽望繡成堆山頂千門次第開一騎紅塵妃子笑無人知是荔枝來新豐緑樹起黃埃數騎漁陽探使廽帝使中使輔璆琳探祿山反否璆琳受祿山金回言不反霓裳一曲千峯上舞破中原始下來萬國笙歌醉太平倚天樓殿月分明雲中亂拍祿山舞風過重巒下笑聲津陽門詩鄭嵎津陽門北臨通逵雪風獵獵飄酒旗泥寒欵段蹶不進疲童退問前何為酒家顧客催解裝案前羅列樽與巵青錢瑣屑安足數白醪軟美甘如飴開壚引滿相獻酬枯腸渴肺忘朝飢愁憂似見出門去漸覺春色入四肢主翁移客挑華燈雙肩隱膝烏帽欹笑云鮐老不為禮飄蕭雪鬢雙垂頤問余何往凌寒曦顧翁枯朽郎豈知翁曽豪盛客不見我自為君陳昔時時平親衛號羽林我才十五為孤兒射熊搏虎衆莫敵彎弧出入隨佽飛此時初創觀風樓簷髙百尺堆華榱樓南更起鬭雞殿晨光山影相參差其年十月移禁仗山下櫛比羅百司朝元閣成老君見㑹昌縣以新豐移幽州曉進供奉馬玉珂寶勒黃金羈五王扈駕夾城路傳聲校獵渭水湄羽林六軍各出射籠山絡野張罝維雕弓繡䩨不知數翻身滅沒皆蛾眉赤鷹黃鶻雲中來妖狐野雉亡所依人煩馬殆禽獸盡百里腥膻禾黍稀驪山按樂東風暖宫娃賜浴長湯池刻成玉蓮噴香水潄回煙浪深逶迤犀屏象薦雜羅列錦鳬繡鴈相追隨破簮碎鈿不足拾金溝殘溜和纓緌上皇寬容易承事十家三國生光輝繞床呼盧恣樗博張燈達旦相謾期相君侈擬連貴戚日從秦虢多游嬉朱衫馬前未滿足更驅武卒羅旌旗畫輪寶軸從天來雲間笑語聲融怡鳴騶前騎作躞蹀宫粧襟袖皆天姿青門紫陌多春風風中數月殘香遺驪駒吐沫一奮迅路人擁篲爭珠璣八姨新起合歡堂翔鵾賀燕無由窺萬金酬工不肯去矜能恃巧尤嗟咨四方節制傾附媚窮奢極侈沽恩私堂中特設夜明枕銀燭不施光鑒帷瑶光樓南皆紫禁梨園仙宴臨花枝迎娘歌喉玉䆗窱蠻兒舞帶金葳蕤三郎玉笛弄煙月怨如别鶴呼羈雌玉奴琵琶龍香撥倚歌促酒聲嬌悲飲鹿泉邊春路晞粉梅檀杏飄朱墀金沙洞口長生殿玉蘃峯頭王母祠禁庭術士多幻化上前校勝紛相持羅公如意奪顔色三藏袈娑成散絲蓬萊池上望秋月無雲萬里懸清輝上皇夜半月中去三十六宫愁不歸月中祕樂天半聞丁當玉石和塤箎宸聰聽覽未終曲却到人間迷是非千秋御節在八月㑹同萬國朝華夷花蕚樓南大合樂八音九奏鸞來儀都盧尋橦誠齷齪公孫劒伎多神竒馬知舞徹下珠榻人惜曲終更羽衣祿山此時侍御側金雞畫障當罘罳繡棚文褓日屓贔甘言狡計愈嬌癡詔令上路建甲第樓通走馬如翬飛大開內府恣供給玉缶金筐銀簸箕異謀潛熾促歸去臨軒賜紫盈十圍忠臣張公識逆狀白日切諌上不疑湯成召浴果不至潼關巳溢漁陽師御街一夕無禁鼓玉輅順勤西南馳九門回望塵坌多六龍夜馭兵衛疲縣官無人具軍頓行宫徹屋屠雲螭馬嵬驛前駕不發宰相射殺寃者誰長眉鬒髮作凝血獨有君王潛涕洟青泥坂上到三蜀金堤城邊頓九旗移文泣祭昔臣墓度曲悲歌秋雁辭明年尚父捷書至洗清觀闕收封畿兩宫相見望賢頓君臣鼓舞皆歔欷宫中親呼髙驃騎潛令改葬楊真妃花膚雪態不復見空有香囊和淚滋鑾輿却入華清宫滿山紅實垂相思飛霜殿前月悄悄迎春亭上風颸颸雪衣女失玉籠在長生鹿瘦銅牌垂象床塵凝罨颯被畫簷蟲網頗梨碑碧菱花覆雲母陵風篁兩菊低離披真人影帳偏生草果老藥堂空掩扉鼎湖一日失弓劒橋山煙草俄霏霏空聞玉碗入金市但見銅壺飄翠帷開元到今踰十紀當時事迹皆殘隳竹花惟養棲梧鳳水藻空游巢葉龜㑹昌御宇斥內典去留二教分黃緇慶山汙瀦石甕毁紅樓緑閣皆支離竒松怪柏為樵蘇童山眢谷亡險嶇煙中壁碎右丞畫雲間字失𤣥宗詩石魚巗底百尋井銀牀下卷紅綆遲當時清影䕃紅葉一旦飛埃埋素規韓家燭樹倚林杪千枝燦若山霞摛昔年光彩奪明月今日銷鎔當路岐龍宫御榜髙可惜火焚牛挽臨﨑峗孔雀松殘赤琥珀鴛鴦瓦碎青琉璃我今前程能幾許徒有餘息筯力羸逢君話此空灑涕却憶歡娛無見期主翁莫泣聽我語寧勞感舊休吁嘻河清海晏不難睹我皇巳立升平基湟中土地昔湮沒昨者收復無瘡痍戎王北走棄青塜虜馬西奔空月支兩逢元年豈易偶願翁頥養豐膚肌平明酒醒各分手今夕一樽翁莫遲華清宫絶句陳文惠百首新詩百意精不尤妃子即尤兵爭如一句傷時事只為明皇恃太平又張文定當時不是不窮奢民樂升平少嘆嗟姚宋未亡妃子在塵埃那得到中華又楊正倫休罪明皇與貴妃大都衰盛兩相隨惟憐一𣲖溫泉水不逐人心冷暖移長恨歌白居易容齊隨筆云白樂天長恨歌上陽人歌元微之連昌宫詞道開元間宫禁事最為深切矣然微之有行宫一絶句云云語少意足有無窮之味懶真子云詩人之言為用固寡然大有益於世者若長恨歌是也明皇太真之事本有新臺之惡而歌云楊家有女初長成養在深閨人未識故世人罕知為壽王瑁之妃也春秋為尊者諱此歌真得之漢皇重色思傾國御宇多年求不得楊家有女初長成養在深閨人未識天生麗質難自棄一朝選在君王側回頭一笑百媚生六宫粉黛無顔色春寒賜浴華清池溫泉水滑洗凝脂侍兒扶起嬌無力始是新承恩澤時雲鬢花顔金步搖芙蓉帳暖度春宵春宵苦短日髙起從此君王不早朝承歡侍宴無閒暇春從春遊夜専夜後宫佳麗三千人三千寵愛在一身金屋粧成嬌侍夜玉樓宴罷醉和春姊妹弟兄皆列土可憐光彩生門户遂令天下父母心不重生男重生女驪宫髙處入青雲仙樂風飄處處聞緩歌慢舞凝絲竹盡日君王看不足漁陽鞞鼓動地來驚破霓裳羽衣曲九重城闕煙塵生千乘萬騎西南行翠華搖搖行復止西出都門百餘里六軍不發無奈何宛轉蛾眉馬前死花鈿委地無人收翠翹金雀玉搔頭君王掩面救不得回頭血淚相和流黃埃散漫風蕭索雲棧縈紆登劔閣蛾眉山下少人行旌旗無光日色薄蜀江水碧蜀山青聖主朝朝暮暮情行宫見月傷心色夜雨聞鈴腸斷聲天旋日轉回龍馭到此躊踷不能去馬嵬坡下泥土中不見玉顔空死處君臣相顧盡沾衣東望都門信馬歸歸來池苑皆依舊大液芙蓉未央桞芙蓉如面桞如眉對此如何不泪垂春風桃李花開夜秋雨梧桐葉落時西宫南內多秋草宫葉滿階紅不掃梨園弟子白髮新椒房阿監青蛾老夕殿螢飛思悄然孤燈挑盡未成眠遲遲鐘鼓初長夜耿耿星河欲曙天鴛鴦瓦冷霜華重翡翠衾寒誰與共悠悠生死别經年魂魄不曽來入夢臨邛道士鴻都客能以精誠致魂魄為感君王展轉思遂教方士殷勤覔排空馭氣奔如電升天入地求之遍上窮碧落下黃泉兩處茫茫皆不見忽聞海上有仙山山在虛無縹眇間樓殿玲瓏五雲起其中綽約多仙子中有一人字玉真雪膚花貌參差是金闕西廂叩玉扄轉教小玉報雙成聞道漢家天子使九華帳裏夢魂驚攬衣推桃起徘徊珠箔銀屏邐迤開雲鬢半偏新睡覺花冠不整下堂來風吹仙袂飄颻舉猶似霓裳羽衣舞玉容寂寞泪欄干梨花一枝春帶雨含情凝睇謝君王一别音容兩渺茫昭陽殿裏恩愛絶蓬萊宫中日月長回頭下望人寰處不見長安見塵霧唯將舊物表深情鈿合金叉寄將去叉留一股合一扇叉擘黃金合分鈿但令心似金鈿堅天上人間㑹相見臨别殷勤重寄詞詞中有誓兩相知七月七日長生殿夜半無人私語時在天願作比翼鳥在地願為連理枝天長地久有時盡此恨綿綿無絶期上陽白髮人天寶五載巳後楊貴妃專寵後宫人無復進幸矣六宫有美色者輒置别所上陽是其一也貞元中尚存焉上陽人紅顔暗老白髮新緑衣監使守宫門一閉上陽多少春𤣥宗末嵗初選入入時十六今六十同時采擇百餘人零落年深殘此身憶昔吞悲别親屬扶入車中不教哭皆云入內便承恩臉似芙蓉胸似玉未容君王得見面已被楊妃遙側目妬令潛配上陽宫一生遂向空房宿秋夜長夜長無寐天不明耿耿殘燈背壁影瀟瀟暗雨打窗聲春日遲日遲獨坐天難暮宫鶯百囀愁厭聞梁燕雙栖老休妬鶯歸燕去長悄然春往秋來不記年唯向深宫望明月東西四五百廽圓今日宫中年最老大家遙賜尚書號小頭鞋履窄衣裳青黛㸃眉眉細長外人不見見應笑天寶末年時世粧上陽人苦最多少亦苦老亦苦少苦老苦兩如何君不見昔時吕向美人賦天寶末有密采艷色者當時號花鳥使吕向獻美人賦以諷之君不見今日上陽白髮歌連昌宫詞元稹潘子真詩話云津陽門詩長恨歌連昌宫詞俱載開元天寶間事微之詞不獨富艷至長官清平太守好揀選皆言由相公委任責成治之興也祿山宫裏養作兒虢國門前閙如市險詖私謁無所不至安得不亂稹之叙事遂過二子容齊隨筆云元微之白樂天在唐元和長慶間齊名其賦詠天寶時事連昌宫詞長恨歌皆膾炙人口使讀書者情性蕩搖如身生其時親見其事殆未易以優劣論也然長恨歌不過述明皇追愴貴妃始末無他激揚不若連昌詞有監戒規諷之意如云姚崇宋璟作相公勸諌上皇言語切長官清平太守好揀選皆言由相公開元之末姚宋死朝廷漸漸由妃子祿山宫裏養作兒虢國門前閙如市弄權宰相不記名依稀憶得楊與李廟謨顛倒四海搖五十年來作瘡痏其末章及官軍討淮西乞廟謀休用兵之語蓋元和十一二年作殊得風人之㫖非長恨比云連昌宫中滿宫竹嵗久無人森似束又有牆頭千葉桃風動落花紅簌簌宫邊老人為余泣少年選進因曽入上皇正在望仙樓太真同憑欄干立樓上樓前盡珠翠炫轉熒煌照天地歸來如夢復如癡何暇偹言宫裏事初過寒食一百六店舍無煙宫樹緑夜半月髙絃索鳴賀老琵琶定場屋力士傳呼覔念奴念奴潛伴諸郎宿須臾覔得又連催特敕街中許燃燭春紅滿眼睡紅銷掠削雲鬟旋裝束飛上九天歌一聲二十五郎吹管逐逡巡大偏梁州徹色色龜兹轟録續李謨擪笛傍宫牆偷得新翻數般曲平明大駕發行宫萬人鼓舞途路中百官隊仗避岐薛楊氏諸姨車鬭風明年十月東都破御路猶存祿山過驅令供頓不敢藏萬姓無聲淚潛墮兩宫定後六七年却尋家舍行宫前莊園燒盡有枯井行宫門闥樹宛然爾後相傳六皇帝不到離宫門久閉往來年少說長安𤣥武樓前花萼廢去年敕使因斫竹偶值門開暫相逐荆榛櫛比塞池塘狐兔嬌癡緣樹朩舞榭欹傾基尚存文窗窈窕紗猶緑塵埋粉壁舊花鈿鳥啄風筝碎珠玉上皇偏愛臨砌花依然御榻臨階斜蛇出燕窠盤鬭拱菌生香案正當衙寢殿相連端正樓太直梳洗樓上頭晨光未出簾影黑至今反掛珊瑚鈎指似傍人因慟哭却出宫門淚相續自從此後還閉門夜夜狐狸上門屋我聞此語心骨悲太平誰致亂者誰翁言野父何分别耳聞目見為君說姚崇宋璟作相公勸諌上皇言語切燮理隂陽禾黍豐調和中外無兵戎長官清平太守好揀選皆言由相公開元之末姚宋死朝廷漸漸由妃子祿山宫裏養作兒虢國門前閙如市弄權宰相不記名依稀憶得楊與李廟謨顛倒四海搖五十年來作瘡痏今皇神聖丞相明詔書才下吳蜀平官軍又取淮西賊此賊亦除天下寧年年耕種宫前道今年不遣子孫耕老翁此意深望幸努力廟謨休用兵行宫絶句寥落古行宫宫花寂寞紅白頭宫女在閒坐說𤣥宗杜秋娘詩杜秋金陵女也年十五為李錡妾後錡叛滅籍之入宫有寵於景陵穆宗即位命秋為皇子傅姆皇子壯封漳王鄭注用事誣丞相欲去背已者指王為根王被罪廢削秋因廢歸故鄉豫過金陵感其窮且老而為之賦詩杜牧南部新書云杜仲陽即杜秋也為漳王養母太和中漳王黜放歸浙西續詔令觀院安置兼加存恤故杜牧有杜秋詩稱於時京江水清滑生女白如脂其間杜秋者不勞朱粉施老濞即山鑄後庭千蛾眉秋持玉斝飲與唱金縷衣濞既白首叛秋亦紅淚滋吳江落日渡灞岸緑楊埀聮裾見天子盼盼獨依依椒壁懸錦幕鏡奩蟠蛟螭低鬟認新寵窈窕復融怡月上白壁門桂影涼參差金階露新重閒捻紫簫吹莓苔夾城路南苑鴈初飛紅粉羽林仗獨賜辟邪旗歸來煮豹胎饜飫不能飴咸池升日慶銅雀分香悲雷音後車逺事往落花時燕禖待皇子壯髮緑緌緌畫堂授傅姆天人親捧持虎晴珠絡褓金盤犀鎮帷長楊射熊羆武帳弄啞咿漸拋竹馬戲稍出舞雞竒嶄然整冠佩侍晏坐瑤池眉宇儼圖畫神秀射朝暉一尺桐偶人江充知自欺王幽茅土削秋放故鄉歸觚稜拂斗極回首尚遲遲四朝三十載似夢復疑非潼關識舊吏吏髮已如絲却喚吳船渡舟人爭得知歸來四鄰改茂苑草菲菲清血灑不盡仰天知問誰寒衣一匹素夜借鄰人機我昨金陵過聞之為歔欷自古皆一貫變化安能推夏姬滅兩國逃作巫臣妻西子下姑蘇一舸逐鴟夷織室魏豹俘作漢太平基誤置代籍中兩朝尊母儀光武紹髙祖本係生唐兒珊瑚破髙齊作婢舂黃麋蕭后去揚州突厥為閼氏女子固不定士林亦難期射鉤後呼父釣翁王者師無國要孟子有人毁仲尼秦因逐客令柄歸丞相斯安知魏齊首見斷簀中尸給喪蹶張輩廊廟冠峨危珥貂七葉貴何妨戎虜支蘇武却生還鄧通終死饑主張既難測翻覆亦其宜地盡有何物天髙復何之指何為而捉足何為而馳耳何為而聽目何為而窺已身不自曉此外何思惟因傾一樽酒題作杜秋詩愁來獨長詠聊可以自怡竹莊詩話卷十一
