body:
  text: 竹莊詩話卷十六雜編六黃魯直傳贊云自李杜沒而詩律衰唐末以及五李雖有比興自名者然格下氣弱無以議為也宋興楊文公始以文章蒞盟然至為詩專以李義山為宗以漁獵掇拾為慱以儷花鬪葉為工號稱西崑體嫣然華靡而氣骨安存嘉祐以來歐陽公稱太白為絶唱王文公推少陵為髙作而詩格大變髙風之所扇作者間出班班可述矣蔡寬夫詩話云國初沿襲五代之餘士大夫皆宗白樂天詩故王黃州主盟一時祥符天禧之間楊文公劉中山錢思公專喜李義山故崑體之作翕然一變而文公尤酷嗜唐彥謙詩至親書以自隨景祐慶厯後天下始尚古文於是李太白韋蘇州諸人乃雜見於世杜子美最為晚出三十年來學詩者非子美不道雖武夫女子皆知尊異之廬山髙贈同年劉凝之歸南康歐陽修王直方詩話云郭功甫少時喜誦文忠公詩一日過梅聖俞曰近得永叔書方作廬山髙詩贈劉同年自以為得意恨未見此詩功甫為誦之聖俞擊節嘆賞曰使吾更作詩三十年亦不能道其中一句功甫再誦不覺心醉遂置酒又再誦酒數行凡誦十數遍不交一談而罷明日聖俞贈功甫詩其略曰一誦廬山髙萬景不得藏設令古畫師極意未能詳石林詩話云毗陵正素處士張子厚善書余嘗於其家見歐公子棐以烏絲欄絹一軸求子厚書文忠公明妃曲兩篇廬山髙一篇略云先公平生未嘗矜大所為文一日被酒語棐廬山髙今人不能為惟李太白能之明妃曲後篇太白不能為惟杜子美能之至於前章則子美亦不能為惟吾能之也因欲别録此三篇藏之以志公意廬山髙哉幾千仭兮盤根幾百里嶻然屹立乎長江長江西來走其下是為揚瀾左蠡兮洪濤巨浪日夕相舂撞雲銷風止水鏡淨泊舟登岸而逺望兮上摩蒼穹之暗靄下壓后土之鴻龎試往造乎其間兮攀緣石磴窺空硿千巖萬壑響松檜懸崖巨石飛流淙水聲聒聒亂人語六月飛雪灑石矼仙翁釋子往往而逄兮吾嘗惡其學幻而言哤但見丹霞翠碧逺近映樓閣晨鐘暮鼓杳靄羅幡幢幽花野草不知其名兮風吹露濕香澗谷時有白鶴飛來雙幽尋逺去不可極便欲絶世遺紛痝羡君買田築室老其下插秧盈疇兮釀酒盈缸欲令浮嵐暖翠千萬狀坐卧常對乎軒窗君懷磊砢有至寶世俗不辨珉與玒䇿名為吏二十載青衫白首困一邦寵榮聲利不可以茍屈兮自非青雲白石有深趣其氣兀硉何由降丈夫壯節似君少嗟我欲説安得巨筆如長杠明妃曲和王介甫作胡人以鞍馬為家射獵為俗泉甘草美無常處鳥驚獸駭爭馳逐誰將漢女嫁胡兒風沙無情面如玉身行不遇中國人馬上自作相思曲推手為琵却手琶胡人共聽亦咨嗟紅顔流落死天涯琵琶却傳來漢家漢宫爭按新聲譜遺恨已深聲更苦纎纎女手生洞房學得琵琶不下堂不識黃雲出寒路豈知此聲能斷腸再和明妃曲漢宫有佳人天子初未識一朝隨漢使逺嫁單于國絶色天下無一失難再得雖能殺畫工於事竟何益耳目所及尚如此萬里安能制夷狄漢計誠已拙女色難自夸明妃去時淚灑向枝上花狂風日暮起飄泊落誰家紅顔勝人多薄命莫怨春風當自嗟明妃曲王安石漁隱叢話云介甫明妃曲二首辭格超逸誠不下永叔明妃初出漢宫時淚濕春風鬢腳垂低回顧影無顏色尚得君王不自持歸來却怪丹青手入眼平生未曽有意態由來畫不成當時枉殺毛延壽一去心知更不歸可憐著盡漢宫衣寄聲欲問塞南事只有年年鴻雁飛家人萬里傳消息好在氈城莫相憶君不見咫尺長安閉阿嬌人生失意無南北同前明妃出嫁與胡兒氈車百兩皆胡姬含情欲語獨無處傳與琵琶心自知黃金桿撥春風手彈看飛鴻勸胡酒漢宫侍女暗垂淚沙上行人却回首漢恩自淺胡自深人生樂在相知心可憐青冡已蕪沒尚有哀弦留至今題叢臺杜儼呂忠穆公燕魏録云磁州邯鄲縣二里許有叢臺趙國逰覽之地氣象雄古本朝過客題詩亦多惟杜儼一詩尤佳嫦娥拂明月照我登叢臺叢臺幾回經月照粉黛綺羅安在哉此月常皎潔此臺永崔嵬臺前楊花春思靜臺上雁影秋風回春來秋往如過隙寂寞前朝不堪憶如今明月射莓苔在昔層雲照金碧可憐金碧已成塵鸞馭翩翩歸未得荒榛敗棘連郊野耕夫時得鴛鴦瓦千古興亡一夢中臺下漳波遺恨寫君不見長安年少挂輕裘夕飲朝歌不識愁月明試向叢臺逰垓下陳彥升燕魏録云陳彥升資政篇什尤髙嘗為彭門八詠士大夫傳誦彭門今徐州也南通垓下北連豐沛有范增墓又唐張封建嘗為徐泗節度使有燕子樓白樂天長慶集載之甚詳此不具述八詠兵火以來失之惟記三篇九里山南楚漢爭風波翻覆走長鯨霸圖欲斷中宵失帝業時來一戰成懶渡滄江慚父老更無勍敵壓韓彭農人不識當時意秖得春霖事耦耕范增墓藏名羞立虎狼朝乘鶴東依項藉豪憤失壯圖撞玉斗不知天命與金刀還家落日埋英氣回首浮雲委舊勞百步西連陵母塜峩峩先識泰山髙燕子樓西清詩話云彥升燕子樓詩辭致清絶東坡守徐移書彥升曰彭城八詠如燕子樓篇直使鮑謝斂手溫李變色也僕射松楸狐遊侍兒猶住水邊樓風清玉簟愁欹枕月滿珠簾懶上鈎舊事欲論鄉夢斷新詩吟就海潭秋樂天才似春深雨斷送殘花一夕休子房廟洞江詩話云彥升彭門八詠為人所稱多以燕子樓為絶唱殊不知子房廟詩最為警絶博浪沙頭觸副車潛遊東夏識真符風雲智略移秦鼎星斗功名啓漢圖商老已來寧少海赤松還約訪仙都雍容進退全天道凛烈髙風萬古無絶句鄭文寶蔡寬夫詩話云鄭文寶情緻深婉比當時流輩能不專使事而猶長於絶句如云云等類須在王摩詰伯仲之間劉禹錫杜牧之不足多也一夜西風旅雁秋背身調鏃索征裘關山落盡黃榆葉駐馬誰家唱石州同前前人江雲薄薄日斜暉江館蕭條獨掩扉梁燕不知人事改雨中猶作一雙飛題王子晉祠前人西清詩話云緱氏王子晉升仙之地有祠在焉鄭文寶嘗題一絶後晏元獻見之取白樂天語書其後云此詩在在處處有神物護持秋雲漠漠秋雲輕緱氏山頭月正明帝子西飛仙馭逺不知何處夜吹笙爽約前人詩事載歐公云文寶詩如王維杜甫而僧文瑩作湘山野録猶恨歐公不多見鄭詩豫家有鄭集二十卷兵火散亡每惜之今記其一二絶句云云吟繞虛廊更向闌繡窗燈影背欄干燕棲鶯宿無人語一夜蕭蕭細雨寒題松滋東禪院百花深處小危樓千步蒼苔到葉舟一夜楚江寒食雨離人白盡未歸頭送唐子方之貶所李師中燕魏録云李誠之文章外詩什尤髙嘉祐間唐介子方以言切直忤仁廟被責誠之以詩送行士大夫莫不傳誦久在嶺南嘗為唐州太守詩該名教尤可重湘素雜記云鄭谷與僧齊已黃損等共定今體詩格云凡詩用韻有數格一曰葫蘆一曰轆轤一曰進退葫蘆韻者先二後四轆轤韻者雙出雙入進退韻者一進一退失此則繆矣余按倦遊録載唐介為臺官廷疏宰相之失仁廟怒謫英州别駕朝中士大夫以詩送行者頗衆獨李師中待制一篇為人傳誦云云此正所謂進退韻格也按韻略難字第二十五山字第二十七寒字又在二十五而還字又在二十七一進一退試合體格豈率爾而為之哉近閲冷齋夜話載當時唐李對答語言乃以此為落韻詩蓋渠但不見鄭谷所定詩格有進退之説而妄為云云也孤忠自許衆不與獨立敢言人所難去國一身輕似葉髙名千載重於山並逰英俊顏何厚已死姦諛骨尚寒天為吾皇宗社計肯教夫子不生還唐州太守時屬艱危應有繫天於名教豈無心大都狂賊終須滅未殺忠臣禍不深太尉有靈朱泚敗中丞傳旨祿山擒曽誰鼓舞康州事兒女常情淚滿襟書磨崖碑後黃庭堅苕溪漁隱云余頃嵗往來湘中屢遊浯溪徘徊磨崖碑下讀諸賢留題惟魯直文潛二詩傑句偉論殆為絶唱後來難措詞矣春風吹船著音斫浯溪扶藜上讀中興碑平生半世看墨本摩挲石刻鬢成絲明皇不作包柔計顛倒四海由祿兒九廟不守乘輿西萬官已作鳥擇栖撫軍監國太子事何乃趨取大物為事有至難天幸耳上皇局蹐還京師內間張后色可否外間李父頥指揮南內淒涼幾茍活髙將軍去事尤危臣結舂陵二三䇿臣甫杜鵑再拜詩安知忠臣痛至骨後世但賞瓊琚詞同來野僧六七輩亦有文士相追隨斷崖蒼蘚對立久疏雨為洗前朝悲讀中興頌張耒復齋謾録云張文潛集中載中興頌詩此詩號傑出竹坡詩話云中興碑詩可謂妙絶今古玉環妖血無人掃漁陽馬厭長安草潼關戰骨髙於山萬里君王蜀中老金戈鐡馬從西來郭公凛凛英雄才舉旗為風偃為雨灑掃九廟無塵埃元功髙名誰與紀風雅不繼騷人死水部胸中星斗文太史筆下蛟龍字天遣二子傳將來髙山十丈磨蒼崖手持此碑入我室使我一見昏眸開百年廢興增歎慨當時數子今安在君不見荒涼浯水棄不收時有遊人打碑賣行色司馬池溫公詩話云先公監安豐酒稅赴官有行色詩云云豈非狀難寫之景也梅聖俞云詩之工者寫難狀之景如在目前含不盡之意見於言外此詩有焉冷於陂水淡於秋逺陌初窮到渡頭賴是丹青不能畫畫成應遣一生愁久旱微雨復齋謾録云江公著初任洛陽尉久旱微雨詩作云云溫公於士人家見之借紙筆修刺謁江且為稱薦由此知名雲葉紛紛雨腳勻亂花柔草長精神雷車却碾山前過不灑原頭陌上塵題傳舍珊瑚鈎詩話云盧秉侍郎嘗作江南郡緣於傳舍中題詩云云王荆公見而稱之立薦於朝不數年登載二卿西溪叢語云此詩膾炙人口乃德清人盧政議詩更有一絶云云青衫白髮病參軍旋糴黃梁置酒樽但得有錢留客醉也勝騎馬傍人門絶句十日都門風薄衣搗砧聲重雁南飛野人不識長安樂且趂鱸魚一棹肥題老柏院張在湘山野録云青州布衣張在少能文尤精於詩題興龍寺老柏院詩云云為人所傳誦皇祐中文潞公鎮青州詣老柏院訪在所題處字已漫滅公惜其不傳為大字書於西廡之壁後三十餘年東平畢仲甫見公於洛下公誦其詩囑畢往觀至青訪其故處壁已圯毁不可復得為刻於天宫石柱南鄰北舍牡丹開年少尋芳去又回唯有君家老柏樹春風恰似不曽來御溝桞陳執中兩朝寶訓云真宗賦御溝柳詩令宰相兩省和陳執中詩云云其詩最尤者一度春來一度新翠光先得照龍津君王自愛天然態恨殺昭陽學舞人海棠陳去非復齋謾録云鄭谷蜀中海棠詩二首前一云濃麗最佳新著雨妖嬈全在欲開時後一云浣花溪上堪惆悵子美無情為發揚故錢希白海棠詩云子美無情甚郎官屬意頻然歐公以鄭詩為格卑近世陳去非嘗用鄭意賦海棠云云雖本鄭意便覺才力相去不侔矣海棠默默要詩催日暮紫綿無數開欲識此花竒絶處明朝有雨試重來田間鄭獬復齋謾録論二詩云第二句相類然皆清絶可愛田家汩汩流水渾一樹髙花明逺村雲意不知殘照好却將微雨送黃昏淮中晚泊瀆頭蘇軾王直方詩話云山谷愛子美絶句云云纍書此詩或真字與大字春隂垂野草青青時有幽花一樹明晚泊孤舟古祠下滿川風雨看潮生題滕王閣王安國復齋謾録云王平甫年十三登滕王閣賦詩郡守張侯見而異之為啓宴張樂於其上其後建中靖國元年其女識之于石云滕王平日好追逰髙閣依然枕碧流勝地幾經興廢事夕陽偏照古今愁城中樹密千家市天際人歸一葉舟極目煙波吟不盡西山重疊亂雲浮竹莊詩話卷十六
