body:
  text: 竹莊詩話卷十三雜編三寄杜光庭張令問蜀檮杌云張令問字博夫幼有巢許之節放意林泉長於詩什與杜光庭詩云云其標致如此試問中朝為宰相何如林下作神仙一壺美酒一爐藥飽聽松風白晝眠安貧韓偓潘子真詩話云山谷嘗謂豫言老杜雖在流落顛沛未嘗一日不在本朝故善陳時事句律精深超古作者忠義之氣激發而然韓偓貶逐後依王審知其集中所載云云其詞悽楚切而不迫不忘其君也手風慵展八行書眼暗休尋九局圖窗裏日光飛野馬案頭筠管長蒲盧謀身拙為安蛇足報國危曽捋虎鬚舉世可能無默識未知誰擬試齊竽醉著絶句漁隱叢話云葛亞卿集句云萬里清江萬里天一村桑柘一村煙漁翁醉睡又醒睡髙唱夕陽孤島邊前輩集句詩每一句取一家詩今亞卿全用致堯前兩句極為無工又後二句不稱前兩句豈若致堯之渾成也杜荀鶴亦有溪興絶句云山雨溪風卷釣絲瓦甌蓬底獨斟時睡來睡著無人喚流下前溪也不知語句俱弱亦不若致堯之雅健也萬里清江萬里天一村桑柘一村煙漁翁醉著無人喚過午醒來雪滿船贈韓思彥賀遂亮蔡寬夫詩話云國史補載賀遂亮贈韓思彥詩世多傳誦之豫讀大唐新語乃併得思彥答詩其辭亦自間雅可喜大抵唐之文盛於開元以前故二人雖不以詩稱而終不凡也意氣百年內平生一寸心欲交天下士未面已虛襟君子重名義直道冠衣簮風雲行可託懷抱自然深落霞靜霜景墜葉下疏林若上南山岸希訪北山岑答賀遂亮韓思彥古人一言重嘗謂百年輕今日投歡會顧盼盡平生簮裾非所託琴酒冀相并纍日同逰處良霄欵素誠霜飄知柳脆雪冒覺松貞願言何所道幸保嵗寒名寄邊衣裴説山谷跋裴説寄邊衣詩云説詩句甚麗喜作卓爾竒怪零陵總記敘述僧懷素草書載説詩一篇尤詼詭也深閨乍冷開香篋玉筯微微濕紅頰一陳霜風殺栁條濃煙半夜成黃葉重重白練明如雪獨下間階轉凄切祇知抱杵搗秋砧不覺髙樓已無月時聞塞堆聲相喚紗窗只有燈相伴幾度齊紈又懶裁離腸恐逐金刀斷細想儀形執牙尺回刀剪破澄江色愁捻銀針信手縫惆悵無人試寬窄時時舉袖勻殘淚紅箋謾有千行字書中不盡心中事一半殷勤託邊使懷素臺歌零陵揔記云唐開元中有僧懷素居是臺學者因為之懷素臺今有墨池筆塜存焉裴説有歌云云我呼古人名鬼神側耳聽杜甫李白與懷素文星酒星草書星永州東郭有竒怪筆塜墨池遺迹在筆塜低低髙似山墨池淺淺深如海我來恨不已怎得青天化為一張紙髙聲喚起懷素書搦管研硃點湘水欲歸家重嘆嗟眼前有三箇字枯樹櫖烏梢蛇墨老鴉巫山神女祠沈佺期郡閣雅談云繁知聞樂天將過巫山先於神女祠粉壁大書曰蘇州太守真才子行到巫山必有詩為報髙唐神女道逺排雲雨待清詞白公見詩邀知一曰劉夢得禮白帝欲留一詩於此怯而不敢罷郡經過悉去詩千餘首只留四篇巫山髙不極合沓狀竒新暗谷疑風雨幽崖若鬼神月明三峽曉潮落九江春為問陽臺客應知入夢人前同王無競神女向髙唐巫山下夕陽徘徊作行雨婉孌逐荆王電影江前落雷聲峽外長霽雲無處所臺館曉蒼蒼前同李端白巫山十二峯皆在碧虛中回合雲藏日霏微雨帶風猿聲寒渡水樹色逺連空愁向髙唐去千秋見楚宫前同失名巫峽見巴東迢迢出半空雲藏神女館雨到楚王宫朝暮泉聲落寒暄樹色同清猿不可聽偏在九秋中慈恩寺浮圖章八元鑑誡録云長安慈恩寺浮圖前後題詩多矣唐文宗朝元微之白樂天到塔下見章八元所留詩命僧拂去塵埃二公吟咏盡日不厭悉令除去諸家牌惟留章詩十層突兀在虛空四十門開面面同却怪鳥飛平地上自驚人語半天中回梯暗踏如穿洞絶頂初攀似出籠落日鳳城佳氣合滿城香樹雨濛濛華清宫詩張祐雅言雜載云張佑素以詩名而華清宫詩尤為世所稱龍虎旌旗雨露飄鳳池歌斷玉山遙明皇上馬太真去紅杏滿園香自銷宫詞杜牧之苕溪漁隱云余閲王建宫詞選其佳者亦自少得只世所膾炙者數詞而已其間雜以他人之詞如云云此杜牧之也云云此白樂天也云云此王昌齡也竹坡詩話此一首杜牧之王建詩中皆有之不知誰作也以余觀之當是建詩耳蓋二子之詩其清婉大略相似而牧之多險側建多平麗此詩蓋清而平者也冷齋夜話云詩有意含蓄者如宫詞云云是也銀燭秋光冷畫屏輕羅小扇撲流螢天階夜色涼如水卧看牽牛織女星前同白居易淚滿羅巾夢不成夜深前殿按歌聲紅顔未老恩先斷斜倚薰籠坐到明宫怨王昌齡冷齋夜話云詩有句意俱含蓄者如宫怨云云是也奉帚平明金殿開且將團扇暫徘徊玉顔不及寒鴉色猶帶昭陽日影來宫妓李商隱談苑云余知制誥日與余恕同考試因出義山詩共讀酷愛一絶擊節稱嘆曰古人措辭寓意如此之深妙令人感慨不已珠箔輕明拂玉墀披香新殿鬬腰支不須看盡魚龍戲終遣君王怒偃師桃花夫人廟即息夫人杜牧許彥周詩話云僕嘗謂此詩為二十八字史論細腰宫裏露桃新脈脈無言度幾春至竟息亡緣底事可憐金谷墜樓人宫詞杜牧漁隱叢話載此詞云斷句極佳意在言外而幽怨之情自見詩貴如此若使一覽而意盡亦何足道哉監宫引出暫開門隨例須朝不是恩銀鑰却收金鎖合月明花落又黃昏宫詞王建陳輔詩話云王建宫詞荆公獨愛其云云樹頭樹底覔殘紅一片西飛一片東自是桃花貪結子錯教人恨五更風宫詞徐仲雅西清詩話云余嘗愛長沙徐仲雅宫詞云云其富貴瀟灑可謂兩得矣內人曉起怯春寒輕揭珠簾看牡丹一把桞絲收不得和風搭在玉欄干傷田家聶夷中詩史云聶夷中河南人有詩云云孫光憲謂有三百篇之旨二月賣新絲五月糶新榖醫得眼前瘡剜却心頭肉我願君王心化作光明燭不照綺羅筵遍照逃亡屋入山寄城中故人王維後湖集云此詩造意之妙至與造化相表裏知其蟬蛻塵埃之中浮遊萬物之表者也山谷云頃年登山臨水未嘗不讀摩詰詩固知此老胸次定有泉石膏盲之疾中嵗頗好道晚家南山陲興來每獨往勝事空自知行到水窮處坐看雲起時偶然值林叟談笑無回期六言王維漁隱叢話云每哦此句令人坐想輞川春日之勝此老傲睨間適於其間也桃紅復含宿雨柳緑更帶朝煙花落家僮未掃鳥啼山客猶眠贈丘丹裴迪蔡寬夫詩話云王摩詰韋蘇州集載裴迪丘丹唱和詩其語皆清麗髙勝常恨不多見如迪云云其氣格殆不減二人非唐中葉以來嘐嘐以詩名者可比乃知古今文士湮滅不得傳於子孫者不可勝數然士各言其志其隱顯亦何足多較觀兩詩趣向其胸中殆非汲汲於世者正爾無聞亦何所恨其姓名偶見二人集亦未必不為幸也安禪一室內左右竹亭幽有法知不染無言誰敢酬鳥飛爭向夕蟬蛻意先秋煩暑自兹退清涼何處求和裴迪丘丹賣藥有時至自知來往踈遽辭池上酌新得山中書步出芙蓉府歸乘觳觫車猥蒙招隱作豈愧班生廬寄逺張逈郡閣雅談云張逈少年苦吟未有所得夢五色雲自天而下取一團吞之遂精雅所作有寄逺詩携謁齊已點頭吟諷無斁為改虬髯黑在無逈遂拜為一字師錦字慿誰達間庭草又枯夜長燈影滅天逺雁聲孤蟬鬢凋將盡虬髯白也無幾回愁不與因看朔方圖尋山家長孫佐輔苕溪漁隱云尋山家云云余嘗居村落間食飽杖䇿縱步欵鄰家之扉小立待之眼前景物悉如詩中之語然後知其工也獨訪山家歇還涉茅屋斜連隔松葉主人聞語未開門繞籬野菊飛黃蝶白牡丹裴璘秦中嵗時記云長安三月五日兩街看牡丹奔走車馬慈恩寺元果院牡丹先於諸牡丹半月開太貞院牡丹後於諸牡丹半月開故裴兵部璘白牡丹詩自題於慈恩佛殿東壁上太和中車駕幸此寺見所題詩吟咏久之因令宫嬪諷念及暮歸大內此詩滿六宫矣長安豪貴惜春殘爭賞先開紫牡丹别有玉枝擎露冷無人肯就月中看牡丹羅鄴古今詩話云詠牡丹詩甚多羅鄴云落盡春紅始見花花時比屋事豪奢買栽池館恐無地看到子孫能幾家此詩中虎也落盡春紅始著花花時比屋事豪奢買栽池館恐無地看到子孫能幾家門倚長衢攢繡轂幄籠輕日護香霞歌鍾滿座爭歡賞肯信流年鬢有華早朝大明宫賈至苕溪漁隱曰老杜和早朝大明宫詩賈至為唱首王維岑參皆有之四詩皆佳絶文昌雜録云禮部王員外因言和詩最為難唯唐賢尤工於此賈至早朝大明宫云云王維和云云杜甫和云云三篇皆用鳳池事唯工部尤出於二公上建三省待漏院書此為屏風焉銀燭朝天紫陌長禁城春色曉蒼蒼千條弱栁垂青瑣百囀流鶯繞建章劍佩聲隨玉墀步衣冠身惹御爐香共沐恩波鳳池裏朝朝染翰侍君王同前杜甫五夜漏聲催曉箭九重春色醉仙桃旌旗日暖龍蛇動宫殿風微燕雀髙朝罷香煙携滿袖詩成珠玉在揮毫欲知世掌絲綸美池上于今有鳳毛同前王維絳幘雞人報曉籌尚衣方進翠雲裘九天閶闔開宫殿萬國衣冠拜冕旒日色才臨仙掌動香煙欲傍衮龍浮朝罷須裁五色詔佩聲歸到鳳池頭同前岑參雞鳴紫陌曙光寒鶯囀皇州春色闌金闕曉鐘開萬戶玉階仙仗擁千官花迎劍珮星初落柳拂旌旗露未乾獨有鳳凰池上客陽春一曲和皆難江行無題四首錢起詩史云錢起多佳篇人收起詩不過百首有錢蒙仲得江行無題百絶皆人家藏本所無有云云四首霽雲疏有葉雨浪細無聲穩放扁舟去江天自有程又憔悴異靈均非才作逐臣如逢漁父問未是獨醒人又煙渚復煙渚畫屏非畫屏引愁天末去數點暮山青又隄壞漏江水地坳成野塘晚荷從不折留取作秋香山中寒思鮑溶詩史云歐陽文忠公酷愛鮑溶山中寒思一篇最佳云云文忠晚得恨見之遲山深多悲風敗葉與林齊門遙非世路何人念窮棲哀風破山起夕雪誤鳴雞巢鳥侵早出飢猿無聲啼晨興動煙火開門伐氷溪老朩寒更瘦隂雲晴亦低我負自力求顔色常低迷時想靈臺下逰子正悽悽贈琴棋僧張碧雅言系述云張瀛碧之父也官至郎曹嘗為歌贈琴棋僧同列見之曰非其父不生其子我嘗聽師法一説波上蓮花水中月不垢不淨是色空無法無空亦無滅我嘗聽師禪一觀浪溢鼇頭蟾魄滿沙河世界盡空空一寸寒灰冷燈畔我又聽師琴一撫長松喚住秋山雨弦中雅弄若鏗金指下寒泉流太古我又聽師碁一著山頂坐沉紅日腳阿誰稱是國手人羅浮道士賭却鶴輸却藥法懷斟下紅霞束手不敢爭頭角夜坐路洵美雅言系述云路洵美唐相巖之元孫有夜坐詩云云競傳於湖南簾捲竹軒清四鄰無語聲漏從吟裏轉月自坐來明草朩露華濕衣裳寒氣生難逢知鑒者空悅此時情宫詞杜荀鶴幕府燕間録云杜荀鶴詩惟宫詞為唐第一故諺云杜詩三百首妙在一聮中風暖鳥聲碎日髙花影重是也早被嬋娟誤欲粧臨鏡慵承恩不在貌教妾若為容風暖鳥聲碎日髙花影重年年越溪女相憶採芙蓉玉樹曲王轂百斛明珠云唐末有冝春人王轂者以能詩擅名於時嘗作玉樹曲云云此詩大播於人口轂未第時嘗於市㕓中忽見同人被無賴輩毆打轂前救之揚聲曰莫無禮識吾否吾便是解道君臣猶在醉鄉中面上已無陳日月者無賴輩聞之斂手慙謝而退璧月夜瓊樹春蓮舌冷冷詞調新當時狎客盡豐祿直諫犯顔無一人歌未闋晉王劍上粘腥血君臣猶在醉鄉中面上已無陳日月巡內至上陽宫竇庠韻語陽秋云竇庠一絶云云造語可謂秀整矣愁雲漠漠草離離太液鈎陳處處疑薄暮毁垣春雨裏殘花猶發萬年枝宫詞張祐古今詩話云張祐有觀獵詩并宫詞白傅稱之小杜雲溪友議云杜牧之與祐為詩酒之交酷吟祐宫詞為詩曰如何故國三千里虛唱宫詞滿六宫此詩宫娥諷念思鄉起長門之愁故國三千里深宫二十年一聲河滿子雙淚落君前觀獵張祐雲溪友議云張三作觀獵詩比王右丞豫則未敢優劣曉出禁城東分圍淺草中紅旗開向日白馬驟迎風背手抽金鏃翻身控角弓萬人齊指處一雁落寒空同前王維風徑角弓鳴將軍獵渭城草枯鷹眼疾雪盡馬蹄輕忽過新豐市還歸細柳營回看落雕處千里暮雲平題三閭大夫廟武士青瑣後集屈平廟唐末有洪州衙前軍將忘其姓名題一絶云云自後能詩者不敢措手蒼藤古朩幾經春舊祀祠堂小水濵行客謾陳三酹酒大夫元是獨醒人效陶體韋應物竹坡詩話云古今詩人多喜效淵明體者如和陶詩非不多但使淵明愧其雄麗耳韋蘇州云云非惟語似而意亦大似蓋意到而語隨之也霜露悴百草而菊獨好華物性有如此寒暑其奈何掇英泛酒醪日入會田家盡醉茅􅉉下一生豈在多三月三日寄諸弟兼懷崔水部暮節看已謝兹晨愈可惜風淡意傷春池寒花斂夕對酒始依依懷人還的的誰當曲水行相思尋舊迹效何水部二首玉宇含清露香籠散輕煙應當結塵抱難從兹夕眠又夕露起遙怨蟲響亂秋隂反覆相思字中有故人心竹莊詩話卷十三
