body:
  text: 竹莊詩話卷十八雜編八孔北海堂李方叔東臯雜録云李方叔氣韻豪邁東坡謂其詩賦詞卓越意趣不凡者是也東坡知貢舉方叔不在選中東坡贈詩曰與君相從非一日筆勢翩翩疑可識平時漫説古戰場過眼終迷日五色李華李程皆當家事最為妙絶方叔詩文甚工偶記其北海文舉堂詩云云卯金自中葉已若子南周阿瞞制威福九鼎若綴旒餘子不復忌多士例為仇嶄然見芒角已坐錮與鈎誰知英雄彀翻令作罝罘假手陷正平謔玩戮楊修小慧尚必除偉人那得留凛凛孔北海胸次包九州倘令坐廟堂大盜當寢謀專誅及斯人遂負壑與舟當時同朝士茍生盍包羞身死名亦滅白骨委山邱先生雖千載生氣尚橫秋當時眼中意付與一醉休文人具文行來作東諸侯尚友天下士復于古人求作亭俯層城持杯想風流壁間妙著述騰光昏斗牛文存人亦亡應從文舉遊我生真碌碌與世甘沉浮思為坐上客揚觶和南謳無成老岩谷哀哉空白頭題大明寺王琪復齋謾録云晏元獻赴杭州道過維揚憩大明寺暝目徐行使侍史讀壁間詩板戒其勿言爵里姓名終篇者無幾又俾誦一詩云云徐問之江都尉王琪詩也召至同館自此辟置館職遂躋侍從山谷南遷亦令侍史讀詩板有一絶云云稱歎不已徐視姓名曰果吾學子葛敏修也水調隋宫曲當年亦九成哀音已亡國廢詔尚留名儀鳯終沉迹鳴蛙祗沸聲淒涼不可問落日下蕪城題南華竹軒葛敏修不用山僧供帳迎世間無此竹風清獨拳一手支頥卧間看嶺雲生未生題李伯時畫黃知命騎驢圗邢居實王直方詩話云雙井黃叔達字知命初自江南來與彭城陳履常俱謁法雲禪師于城南夜歸過龍眠李伯時知命衣白衫騎驢緣道搖頭而歌履常負杖挾囊于後一市大驚以為異人伯時因畫為圖而邢敦夫長歌云云敦夫時年未二十也長安城頭烏欲棲長安道上行人稀浮雲卷盡暮天碧但有明月流清輝君獨騎驢向何處頭上倒著白接㒿長吟搔首望明月不學山翁醉似泥到得城中燈火閙小兒拍手欄街笑道傍觀者那得知相逢疑是南山皓龍眼居士畫無此搖毫㺯筆長風起酒酣閉目望窮途紙上軒昻無乃似君不學長安遊俠誇年少臂鷹挾彈章臺道君不能提擕長劒取靈武指揮猛士驅貔虎胡為腳蹈梁宋塵終日飄飄無定所武陵桃源春欲暮白水青山起煙霧竹杖芒鞋歸去來頭巾好挂三花樹正月十八夜晏殊詩事云晏元獻文集詩最多幾萬餘篇宋元獻尤喜樓臺冷落收燈夜門巷蕭條掃雪天梨花院落溶溶月栁絮池塘淡淡風今記其全首于此槿戶茅齋雅自便京華風味入新年樓臺冷落收燈夜門巷蕭條掃雪天病酒不聞花外漏放朝仍得日高眠何妨靜習間中趣欲問林僧結淨緣寄逺寶轂香輪不再逢峽雲巫雨杳無蹤梨花院落溶溶月栁絮池塘淡淡風幾日寂寥傷酒後一畨蕭索禁煙中魚書欲寄無由達水逺山長處處同上荆公生辰陳輔詩事云丹陽陳輔字輔之自號南郭子以詩名世能盡其妙少為荆公所知嘗獻公生日詩云云獻詩中公獨喜之十月江南已得霜相君門客小山房冬深柏子和香掃準備生辰作好香牡丹楊軒雲齋廣録云淇川楊軒詠牡丹云云羅隱曰若教解語應傾國任是無情也動人二人用意不同如此軒詩雖挫風花而有警誡楊妃歌舞態西子巧讒魂利劒斫不斷餘妖鍾此根光華日已盛欄檻豈長存寄語尋芳者須知松柏尊一日曲許彥周詩話云楊軒詩句句精練如焚香露蓮泣聞磬清鷗間之類宜乎為歐陽文忠公所稱其他古體如朱絃疏越一唱三嘆讀者當以意求之寵嬖曹氏作一日曲為曹氏也妾家鄧侯國肯愧邯鄲姝世本富繒綺嬌愛比明珠十五學組紃未嘗開戶樞十六失所適姓名傾里閭十七善歌舞使君邀宴娛自兹著樂府不得同羅敷涼溫忽荏苒屢接朝大夫相權不及情何異逢路衢昨日一見郎目色曽不渝結愛從此篤暫隔猶恐疏如何遂從官去涉千里途郎跨青驄馬妾乘白雪駒送郎郎未逺别妾妾仍孤不如水中鱗雙雙依緑蒲不如雲間鵠兩兩下平湖魚鳥尚可託妾今誰與俱去去約春華終朝怨日賒一心思君子便擬見梅花梅花幾時吐頻搯闌干數東風若見郎重為歌金縷遊俠曲王觀竹坡詩話云唐人作樂府者甚多當以張文昌為第一近時高郵王觀亦可稱而人不甚知觀嘗作遊俠曲云云此篇詞意大似李太白恨未入文昌之室耳至莫惱翁篇云云遂與文昌爭衡矣雪擁燕南道酒闌中夜行千里不見讐怒鬚如立釘出門氣吹霧南山雞未啼腰間解下聶政刀袖中擲去朱亥椎冷笑邯鄲乳口兒莫惱翁王觀榖垂乾穗豆垂角雨足年登不勝樂烏巾紫領銀鬚長白酒滿杯翁自酌翁醉不知秋色涼兒將翁鬚孫撼床莫惱翁翁年已高萬事慵輸麥行張耒竹坡詩話云本朝樂府當以張文潛為第一文潛樂府刻意文昌往往過之頃在南都見倉前村民輸麥行余嘗見其親藁其後題云此篇效張文昌而語差繁乃知其喜文昌如此場頭雨乾場地白老稚相呼打新麥半歸倉廪半輸官免教縣吏相催迫羊頭車子毛布囊淺泥易涉登前岡倉前買劵槐隂涼清嚴官吏兩平量出倉掉臂呼同伴旗亭酒美解衣換半醉扶車歸路涼月出到家妻具飯一年從此皆間日風雨閉門公事畢射狐罝兔歲蹉跎百壺社酒相輕過長夜吟許彥國漫齋語録云王融作古樂府長夜吟但道長夜而已近世許表民出新意擬此作南鄰燈火冷三起愁夜永北鄰歌未終已驚初日紅不知晝夜誰主管一種春宵有長短小盡行朱敦儒竹坡詩話云頃歲朝廷多事郡縣不頒厯所至晦朔不同朱希真避地廣中作小盡行一詩云云與夫山中無厯日寒盡不知年無間然矣藤州三月作小盡梧州三月作大盡哀哉官厯今不頒憶昔升平泪成陳我今何異桃源人落葉為秋花作春但恨未能與世隔時聞喪亂空傷神揚雄陳去非竹坡詩話云揚子雲好著書固已見誚於當世後之議者紛然往往詞費而意殊不盡唯陳去非一詩有譏有評而不出四十字後之議雄者雖纍千萬言未必能出諸此也揚雄平生書肝腎間雕鐫晚於玄有得始悔賦甘泉使雄早大悟亦何事於玄賴有一言善酒針真可傳寄沂水宰許彥國夷堅庚志云許彥國字表民青州人進士高第工為詩客遊河朔嘗撰燕薊餘民思漢歌首敘石敬瑭割燕地以賂契丹次敘耶律德光犯汴京次虜去嚴峻燕人思漢之意詞情悽楚近千言卒意云燕薊餘民宜自省百年陷虜直愁人勿怨眉輿事洪靖蓋用唐張洪靖初入燕肩輿而行燕人駭異不悅遂有朱克融之變其旨深矣吕忠穆之父為沂州沂水宰縣境有穆陵關即左傳所謂南至于穆陵是也彥國過其地寄以詩云云詠項籍廟兩絶句云云漁翁詩云溪鷗散後夜無伴荷葉老時秋有衣瑞香詩云北方野客不慣見明月滿衣猶倚欄皆為北方學所稱道惜其官不顯楚甸齊封自此分穆陵遺俗久猶存豈知今日鳴琴宰即是當年賜履孫且有清風消酷暑更無驚犬吠黃昏畏人客子成安枕獨宿荒村不閉門項籍廟二首前人燕魏録云許表民工詩嘗為項籍廟詩云云時膾炙人口曽被秦人笑沐猴錦衣東去更何求可憐瞭瞭重瞳子不見山河繞雍州千古興亡莫浪愁漢家功業亦荒邱空餘原上虞姬草舞盡春風未肯休宿蔣山棲霞寺俞紫芝詩事云秀老放逹不娶能詩宿蔣山棲霞寺云云山中琴興云云又無題云云石林詩話云俞紫芝揚州人少有髙行不娶得浮屠心法所至翛然而工于詩嘗有云云前一首之句尤為荆公所賞和云新詩比舊更增峭若許追攀莫太髙秀老卒於元祐初惜無發名者不得與林和靖一流槩見於隱逸䂬溪詩話云隱居風景義山憶正一云煙爐銷盡寒爐晦童子開門雪滿松子原云日午獨眠無餘聲山童隔竹敲茶臼秀老云夜深童子喚不醒猛虎一聲山月高間棄山間纍年頗得此數詩氣味獨坐清談久亦勞碧松燃火暖衾袍夜深童子喚不起猛虎一聲山月高山中琴興前人野客調琴玉一枝薰風滋味自家知夜深斷送鶴先睡彈到山空月落時無題前人深深畫陌倚朱門腮粉輕紅濕淚痕寂寞繡屏人未見杏花疏雨立黃昏題溧陽郵亭庚溪詩話云紹興初余之官建康艤舟溧陽郵亭見壁間題云云不著姓氏不知何人所作觀其言淡而旨逺決非汩沒名利而不知返者也十年棄微官歸來事却掃扁舟訪安期要覓如瓜棗不知膏粱珍惡食詩自好田園吾無多生理但草草濁酒時一尊孤斟從醉倒題斗野亭劉無言又云昔年過邵伯埭登斗野亭見梁間題云此劉燾無言詩蓋盡得斗野之景物也地勢如板掌天形似覆盤三星羅戶牖北斗挂闌干晚色芙蕖靜秋香䆉稏寒更無山礙眼剩覺水雲寬即事何搢之又云何搢之大圭廣德人早年有俊聲宣和間為館職其人落拓不羈不能自重仕宦晚亦不偶其詩殊有可喜者嘗記其一聨云蜂垂倒世界蚊聚小雷霆又嘗為姓韓貴人作樂語乃以韓吏部漢將軍為對亦有功也茅屋松窗小隱家茶煙漠漠水斜斜簷間乳燕未成語庭下石榴爭放花賴有詩書銷白日倦隨車馬走黃沙林泉舊約好歸去風雨滿江垂釣車題碧雲亭失名又云昔過陽羡艤舟溪寺一亭壁間題云云碧雲亭未知在何地詩亦未知何人作其詞意清絶因筆之碧雲亭上碧雲飛竟日回環靣翠微梅蕚破香知臘盡栁梢含緑認春歸風前古澗琴三疊雪後羣峯玉一圍遙想一人清太甚太清宫裏説禪機送虞少催林懿成又云林懿成季仲嘗為太常少卿永嘉人頗喜為詩嘗與會稽虞仲琳少催相好虞頗通性理之學林以詩送其行云云又嘗為婺州題赤松山黃初平祠二首云云皆語佳而意新也男兒何苦弊羣書學到根源物物無曽子當年多一唯顔淵終日只如愚水流萬折心無競月落千山影自孤執手沙頭休話别與君原不隔江湖題黃初平祠二首前人路轉溪西草木香有人荷笠山之陽定知我是金華守笑道牧民如牧羊羽仗霓旗去不還空餘掬水落人間至今山下無根草便是田家九轉丹題關中驛舍失名又云靖康之變中原為金所據當時文人勝士陷於彼者不少如庚申辛酉年河南關陜之地暫復有自關中驛舍壁間得二絶云云鼙鼓轟轟聲徹天中原廬井半蕭然鶯花不管興亡事粧點春光似昔年渭平沙淺雁來棲渭漲沙移雁不歸江海一身多少事清風明月我霑衣題夢筆姚宏又云夢筆驛中江淹舊居姚宏令聲一絶云云可警後學者一宵短夢驚流俗千古髙名挂里閭遂使晚生矜此意癡眠不讀一行書題臨安旅邸失名庚溪詩話云所至驛留題壁間亦多有可取者見李仲南丙言臨安旅邸壁間一絶云云又建州崇安分水驛中一絶云云又吕叔潛大虬言鎮江丹陽玉乳泉壁間一絶云云三詩皆可喜然皆不著名氏也西溪叢話云此仵盤艮翁詩前一首父信本軍職終文恩副使以蔭補借職元豐中監青州臨淄酒稅或以此詩題酒樓皆云神仙作也太一峯前是我家滿床書籍舊生涯春城戀酒不歸去老却碧桃無限花題分水驛失名江南三月已聞蟬麥熟梅黃繭作綿料得故園煙雨裏輕寒猶作養花天題玉乳泉騎馬出門三月暮楊花故作雪漫天客情惟有夜難度宿處先尋無杜鵑奉送永興安撫劉侍讀歐陽修漁隱叢話云永叔送原父出守永興詩云云黃魯直送王郎詩云云近時學者以為此格獨魯直為之殊不知永叔已先有也酌君以荆州魚枕之蕉贈君以宣城鼠鬚之管酒如長虹飲滄海筆若駿馬馳平坂愛君少年方英豪嗟我久衰歡漸鮮文章驚世聞名早意氣論交相得晚魚枕蕉一舉十分當覆盞鼠鬚管為物雖微用不淺新詩醉墨時一揮别後寄我無辭逺送王郎黃庭堅酌君以蒲城桑落之酒泛君以湘纍秋菊之英贈君以黟川點漆之墨送君以陽關垂泪之聲酒澆胸中之磊塊菊制短世之頽齡墨以傳千古文章之印歌以寫從來兄弟之情江山萬里將頭白骨肉十年終眼青連牀夜語雞戒曉書囊無底談未了有功翰墨乃如此何恨逺别音書少炊沙作糜終不飽鏤氷文字費工巧要須心地收汗馬孔孟行世日杲杲有弟有弟力持家婦能養姑供珍鮭兒大詩禮女桑麻公但讀書遮眼花行路難朝補之又云余觀無咎古樂府是其所長辭格俊逸可喜如行路難云云贈君珊瑚夜光之角枕玳瑁明月之雕床一繭秋禪之麗縠百和更生之寶香穠華紛紛白日暮紅顔寂寂無留芳人生失意十八九君心美惡誰能量願君虛懷廣末照聽我一曲關山長不見班姬與陳后寧聞衰落尚專房謝章子厚劉子先高齋詩話云章子厚嘗與劉子先定有場屋之舊又頗相善子厚居京口子先守姑蘇以新醖洞庭春寄之子厚答詩云洞霄宫裏一間人東府西樞老舊臣多謝姑蘇賢太守殷勤分送洞庭春其後隔濶十年子厚拜相亦不通問寄書誚其相忘逺引之意子先以詩謝云云公得詩大喜即召為宰屬遂遷戶部侍郎故人天上有書來責我疏愚喚不回兩處共瞻千里月十年不寄一枝梅塵泥自與雲霄隔駑馬難追德驥才莫謂無心向門下也曽終夕望三台塗中張公庠侯鯖録云張公庠自少能詩一絶云云苕溪漁隱云雲霄廣録只載此詩後兩句云是李元膺遊春詩未知孰是鄭毅夫代探花郎一絶與前詩格調殊相類今附于此一年春事又成空擁鼻微吟半醉中來到桃花新雨過馬蹄無處避殘紅代探花郎絶句鄭獬嫩緑輕紅相間開一畨走馬探春回青衫不管露痕濕直入亂花深處來宫詞盧秉西溪詩話云盧秉元豐間有能詩聲嘗夢入古祠祠有大池島嶼森列錦衣繡幘者車馬繽紛數十百人問之曰未央宫也頃一緑衣中使亟召盧過池至大殿坐土朩偶數十率丈餘丹緑陳落而梵語高徹旁一人引盧就席給筆札命賦宫詞既寤記其半是日向午復昏絶又續其夢中夜而興乃盡得其詩云云凡十首余觀前人詞章不正者類託之夢兆此特明白怪奇如是殆不可理推也絮撲芙蓉苑華開太液波黃頭吹月笛擢影落天河其二草淺天邊碧花勻日腳紅須知親帝澤不必藉春工其三花蕚蜂兒影簾旗燕子風遊絲避金葆吹過紫垣東其四翠環雙鳯帶小隊五花蹄十二龍鈎卷梨花爛漫時其五花蒂流金水知從祕苑來春風如解意不敢起纎埃其六粉蝶非仙骨隨風過苑墻穿花不敢採應怯內家香其七沉沉雨過宫槐緑寂寂春殘輦路香細想人間無此景夜來魂夢到昭陽其八迎春新燕尾纎纎拂栁穿花掠翠簷問道蘃宫三十六美人爭為卷珠簾其九蓬萊風蹙水紋班月甃風廊四百間雲外蹕聲穿嶺去行宫簇馬望驪山其十落絮濛濛立夏天樓前槐影葉初圓傳聞紫殿深深處便有薰風入舜絃開元樂詞沈括侯鯖録云沈括為翰林學士有開元樂詞四首裕陵愛之鸛鵲樓頭日暖蓬萊殿裏花香草緑煙迷步輦天高日近龍床其二樓上正臨宫苑外間不見人家寒食輕籠薄霧滿城明月梨花其三按舞驪山影裏回鑾渭水光中玉笛一天明月翠華滿陌春風其四殿後春旗簇仗樓前御隊穿花一片紅雲閙處外人遙認官家結客滕元發侯鯖録云滕達道長于五言有省試詩云寒日邊聲斷春風塞草長又結客詩云云結客結英豪莫問兒女曹黃金裝劒佩猛獸畫旗旄北極狼星落中原旺氣高終令賀蘭賊不著赭黃袍安樂窩邵雍邵氏聞見録云康節有安樂窩中詩溫公愛之請書紙簾上字畫奇古某家世寶之半記不記夢覺後似愁無愁情倦時擁衾側卧未收起簾外落花撩亂飛竹莊詩話卷十八
