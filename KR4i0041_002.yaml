body:
  text: 竹莊詩話卷二兩漢吕氏童蒙訓云大槩學詩須以三百篇楚詞及漢魏間人詩為主方見古人好處自無齊梁間綺靡氣味也珊瑚鈎詩話云斯文盛於漢魏之前而衰於齊梁之後杜老云縱使王楊操翰墨劣於漢魏近風騷又云竊攀屈宋宜方駕恐與齊梁作後塵意謂是耳古詩十九首鍾嶸詩品云古詩眇邈人代難詳推其文體固是炎漢之制非衰周之唱吕氏童蒙訓云讀古詩十九首及曹子建詩如明月照髙樓流光正徘徊之類曹詩見後皆詩思深逺而有餘意言有盡而意無窮也學者當以此等詩常自涵養自然筆下高妙行行重行行與君生别離相去萬餘里各在天一涯道路阻且長會面安可知胡馬依北風越鳥巢南枝相去日已逺衣帶日已緩浮雲蔽白日遊子不顧返思君令人老嵗月忽已晚棄捐勿復道努力加餐飯青青河畔草鬱鬱園中栁盈盈樓上女皎皎當窗牖娥娥紅粉粧纎纎出素手昔為倡家女今為蕩子婦蕩子行不歸空床難獨守青青陵上柏磊磊澗中石人生天地間忽如逺行客斗酒相娛樂聊厚不為薄驅車䇿駑馬遊戲宛與洛洛中何鬱鬱冠帶自相索長衢羅夾巷王侯多第宅兩宫遙相望雙闕百餘尺極宴娛心意戚戚何所迫今日良宴會歡樂難具陳彈筝奮逸響新聲妙入神令德唱髙言識曲聽其真齊心同所願含意俱未申人生寄一世奄忽若飇塵何不策髙足先據要路津無為守窮賤轗軻長苦辛西北有髙樓上與浮雲齊交疏結綺窗阿閣三重階上有絃歌聲音響一何悲誰能為此曲無乃杞梁妻清商隨風發中曲正徘徊一彈再三歎慷慨有餘哀不惜歌者苦但傷知音稀願為雙鴻鵠奮趐起髙飛涉江采芙蓉蘭澤多芳草采之欲遺誰所思在逺道還顧望舊鄉長路漫浩浩同心而離居憂傷以終老明月皎夜光促織鳴東壁玉衡指孟冬衆星何厯厯白露沾野草時節忽復易秋蟬鳴樹間玄鳥逝安適昔我同門友髙舉振六翮不念擕手好棄我如遺迹南箕兆有斗牽牛不負軛良無磐石固虛名復何益冉冉孤生竹結根太山阿與君為新婚兔絲附女蘿兔絲生有時夫婦會有宜千里逺結婚悠悠隔山陂思君令人老軒車來何遲傷彼蕙蘭花含英揚光輝過時而不采將隨秋草萎君亮執髙節賤妾亦何為庭前有竒樹緑葉發華滋攀條折其榮將以遺所思馨香盈懷袖路逺莫致之此物何足貴但感别經時迢迢牽牛星皎皎河漢女纎纎擢素手札札弄機杼終日不成章泣涕零如雨河漢清且淺相去復幾許盈盈一水間􅍺􅍺不得語回車駕言邁悠悠涉長道四顧何茫茫東風搖百草所遇無故物焉得不速老盛衰各有時立身苦不早人生非金石豈能長夀考奄忽隨物化榮名以為寶東城髙且長逶迤自相屬回風動地起秋草萋已緑四時更變化嵗暮一何速晨風懷苦心蟋蟀傷局促蕩滌放情志何為自結束燕趙多佳人美者顔如玉被服羅裳衣當户理清曲音響一何悲絃急知柱促馳情整巾帶沉吟聊躑躅思為雙飛燕銜泥巢君屋驅車上東門遙望郭北墓白楊何蕭蕭松柏夾廣路下有陳死人杳杳即長暮潛寐黃泉下千載永不寤浩浩隂陽移年命如朝露人生忽如寄夀無金石固萬嵗更相送聖賢莫能度服食求神仙多為藥所誤不如飲美酒被服紈與素去者日以疏來者日以親出郭門直視但見丘與墳古墓犂為田松柏催為薪白楊多悲風蕭蕭愁殺人思還故里閭欲歸道無因生年不滿百常懷千嵗憂晝短苦夜長何不秉燭遊為樂當及時何能待來兹愚者愛惜費但為後世嗤仙人王子喬難可與等期凜凛嵗云暮螻蛄夕鳴悲涼風率已厲遊子寒無衣錦衾遺洛浦同袍與我違獨宿纍長夜夢想見容輝良人惟昔歡枉駕惠前綏願得常巧笑攜手同車歸既來不須臾又不處重闈亮無晨風翼焉能淩風飛眄睞以適意引領遙相睎徙倚懷感傷垂涕霑雙扉孟冬寒氣至北風何慘栗愁多知夜長仰觀衆星列三五明月滿四五蟾兔缺客從逺方來遺我一書札上言長相思下言久離别置書懷袖中三嵗字不滅一心抱區區懼君不識察客從逺方來遺我一端綺相去萬餘里故人心尚爾文綵雙鴛鴦裁為合歡被著以長相思緣以結不解以膠投漆中誰能别離此明月何皎皎照我羅牀帷憂愁不能寐攬衣起徘徊客行雖云樂不如早旋歸出戶獨倣徨愁思當告誰引領還入房淚下沾裳衣李少卿與蘇子卿詩三首唐元稹撰子美墓志銘云漢蘇子卿李少卿之徒尤工為五言雖句讀文律各異雅鄭之音亦雜而詞意簡逺指事言情自非有為而為則文不妄作鍾嶸詩品云漢李少卿詩其源出於楚辭文多悽斷怨者之流陵名家之子有殊才生命不諧聲頽身喪使陵不遇苦辛其文何能至此秦少遊云蘇李之詩長於髙妙良時不再至離别在須臾屏營衢路側執手野踟蹰仰視浮雲馳奄忽互相踰風波一失所各在天一隅長當從此别且復立斯須欲因晨風發送子以賤軀嘉會難再遇三載為千秋臨河濯長纓念子悵悠悠逺望悲風至對酒不能酬行人懷往路何以慰我愁獨有盈觴酒與子結綢繆攜手上河梁遊子暮何之徘徊蹊路側悢悢不得辭行人難久留各言長相思安知非日月弦望自有時努力崇明德皓首以為期蘇子卿詩四首骨肉緣枝葉結交亦相因四海皆兄弟誰為行路人況我連枝樹與子同一身昔為鴛與鴦今為參與辰昔者常相近邈若胡與秦惟念當離别恩情日以新鹿鳴思野草可以喻嘉賓我有一樽酒欲以贈逺人願此留斟酌敘此平生親黃鵠一逺别千里顧徘徊胡馬失其羣思心常依依何況雙飛龍羽翼臨當乖幸有絃歌曲可以喻中懷請為遊子吟泠泠一何悲絲竹厲清音慷慨有餘哀長歌正激烈中心愴以摧欲展清啇曲念子不能歸俯仰內傷心淚下不可揮願為雙黃鵠送子俱逺飛結髮為夫妻恩愛兩不疑歡娛在今夕嬿婉及良時征夫懷往路起視夜何其參辰皆已沒去去從此辭行役在戰場相見未有期握手一長歎淚為生别滋努力愛春華莫忘歡樂時生當復來歸死當長相思燭燭晨明月馥馥我蘭芳芬馨良夜發隨風聞我堂征夫懷逺路遊子戀故鄉寒冬十二月晨起踐嚴霜俯觀江漢流仰視浮雲翔良友逺離别各在天一方山海隔中州相去悠且長嘉會難再遇歡樂殊未央願君崇令德隨時愛景光怨歌行詩品云漢班婕妤詩其源出於李陵團扇短章詞旨清捷怨深文綺得匹婦之致新裂齊紈素皎潔如霜雪裁成合歡扇團團似明月出入君懷袖動搖微風發常恐秋節至涼颷奪炎熱棄捐篋笥中恩情中道絶追懷詩東坡云讀烈女傳蔡琰二詩其詞明白感慨類世所傳木蘭詩東京無此格也建安七子猶含養圭角不盡發見況伯喈女乎漢季失權柄董卓亂天常志欲圖篡弒先害諸賢良逼迫遷舊邦擁主以自強海內興義師欲共討不祥卓衆來東下金甲耀日光平土人脆弱來兵皆胡羌獵野圍城邑所向悉破亡斬截無孑遺尸骸相撑拒馬邊懸男頭馬後載婦女長驅西入關迥路險且阻還顧邈冥冥肝脾為爛腐所略有萬計不得令屯聚或有骨肉俱欲言不敢語失意幾微間輒言斃降虜要當以亭刃我曹不活汝豈復惜性命不堪其詈罵或更加捶杖毒痛參並下旦則號泣行夜則悲吟坐欲死不能得欲生無一可彼蒼者何辜乃遭此厄禍邊荒與華異人俗少義理處所多霜雪胡風春夏起翩翩吹我衣肅肅入我耳感時念父母哀歎無窮已有客從外來聞之常歡喜迎問其消息輒復非鄉里邂逅徼時願骨肉來迎已巳得自解免當復棄兒子天屬綴人心念别無會期存亡永乖隔不忍與之辭兒前抱我頸問母欲何之人言母當去豈復有還時阿母常仁惻今何更不慈我尚未成人奈何不顧思見此崩五內恍惚生狂癡號泣手撫摩當發復回疑兼有同時輩相送告别離慕我獨得歸哀呌聲摧裂馬為立踟蹰車為不轉轍觀者皆歔欷行路亦嗚咽去去割情戀遄征日遐邁悠悠三千里何時復交會念我出腹子胸臆為摧敗既至家人盡又復無中外城郭為山林庭宇生荆艾白骨不知誰從橫莫覆蓋出門無人聲豺狼號且吠煢煢對孤景怛吒糜肝肺登髙逺眺望魂神忽飛逝奄若夀命盡旁人相寬大為復強視息雖生何聊賴託命於新人竭心自勗勵流離成鄙賤常恐復捐廢人生幾何時懷憂終年嵗其二嗟薄祜兮遭世患宗族殄兮門户單身執略兮入西關厯險阻兮之羌蠻山谷眇兮路漫漫眷東顧兮但悲歎冥當寢兮不能安飢當食兮不能餐常流涕兮眥不乾薄志節兮念死難雖茍活兮無形顔惟彼方兮逺陽精隂氣凝兮雪夏零沙漠壅兮塵冥冥有草朩兮春不榮人似禽兮食臭腥言兜離兮狀窈停嵗聿暮兮時邁征夜悠長兮禁門扃不能寐兮起屛營登朝殿兮臨廣庭玄雲合兮翳月星北風厲兮肅泠泠胡笳動兮邊馬鳴孤鴈歸兮聲嚶嚶樂人興兮彈琴筝音相和兮悲且清心吐思兮胸憤盈欲舒氣兮恐彼驚含哀咽兮涕沾頸家既迎兮當歸寧臨長路兮捐所生兒呼母兮啼失聲我掩耳兮不忍聽追持我兮走煢煢頓復起兮毁顔形還顧之兮破人情心怛絶兮死復生朩蘭古詞不知年代皆附於漢隱居詩話云古樂府中朩蘭詩焦仲卿詩皆有髙致蓋世傳朩蘭詩為曹子建作似矣然其中云可汗問所欲漢魏時夷狄未有可汗之名不知果誰之詞也樂府解題云朩蘭孝義女也勇不足以言之耳世之女子有所感激憤厲或果於殺身而不能成事者古蓋有之至於去就終始皆得其道如朩蘭者鮮矣作是詩者詞意高古殆與其人相當唧唧復唧唧朩蘭當户織不聞機杼聲唯聞女歎息問女何所思問女何所憶女亦無所思女亦無所憶昨夜見軍帖可汗大點兵軍書十二卷卷卷有爺名阿爺無大兒朩蘭無長兄願為市鞍馬從此替爺征東市買駿馬西市買鞍韉南市買轡頭北市買長鞭旦辭爺娘去暮宿黃河邊不聞爺娘喚女聲但聞黃河流水鳴濺濺旦辭黃河去暮至黑水頭不聞爺娘喚女聲但聞燕山胡騎聲啾啾萬里赴戎機關山度若飛朔氣傳金柝寒光照鐵衣將軍百戰死壯士十年歸歸來見天子天子坐明堂策勳十二轉賞賜百千強可汗問所欲朩蘭不用尚書郎願借明駝千里足送兒還故鄉爺娘聞女來出郭相扶將阿姊聞妹來當户理紅粧小弟聞姊來磨刀霍霍向豬羊開我東閣門坐我西閣床脫我戰時袍著我舊時裳當窗理雲鬢挂鏡帖花黃出門看火伴火伴皆驚惶同行十二年不知朩蘭是女郎雄兔腳撲朔雌兔眼迷離雙兔傍地走安能辨我是雄雌古詩為焦仲卿妻作漢末建安中廬江府小吏焦仲卿妻劉氏為仲卿母所遣自誓不嫁其家逼之乃投水而死仲卿聞之亦自縊於庭樹時人傷之為詩云爾孔雀東南飛五里一徘徊十三能織素十四學裁衣十五彈箜篌十六誦詩書十七為君婦心中常苦悲君既為府吏守節情不移雞鳴入機織夜夜不得息三日斷五匹大人故嫌遲非為織作遲君家婦難為妾不堪驅使徒留無所施便可白公姥及時相遣歸府吏得聞之堂上啓阿母兒已薄祿相幸復得此婦結髮同枕席黃泉共為友共事三二年始爾未為久女行無偏斜何意致不厚阿母謂府吏何乃太區區此婦無禮節舉動自専由吾意久懷忿汝豈得自由東家有賢女自名秦羅敷可憐體無比阿母為汝求便可速遣之遣去慎莫留府吏長跪告伏惟啓阿母今若遣此婦終老不復取阿母得聞之捶牀便大怒小子無所畏何敢助婦語吾已失恩義會不相從許府吏默無聲再拜還入户舉言謂新婦哽咽不能語我自不驅卿逼迫有阿母卿但暫還家吾今且報府不久當歸還還必相迎取以此下心意慎勿違我語新婦謂府吏勿復重紛紜往昔初陽嵗謝家來貴門奉事循公姥進止敢自専晝夜勤作息伶俜縈苦辛謂言無罪過供養卒大恩仍更被驅遣何言復來還妾有繡腰襦葳蕤自生光紅羅復斗帳四角垂香囊箱簾六七十緑碧青絲繩物物各自異種種在其中人賤物亦鄙不足迎後人留待作遺施於今無會因時時為安慰久久莫相忘雞鳴外欲曙新婦起嚴粧著我繡夾裙事事四五通足下躡絲履頭上玳瑁光腰若流紈素耳著明月璫指如削蔥根口如含朱丹纎纎作細步精妙世無雙堂上謝阿母母聽去不止昔作女兒時生小出野里本自無教訓兼愧貴家子受母錢帛多不堪母驅使今日還家去念母勞家裏却與小姑别淚落連珠子新婦初來時小姑始扶牀今日被驅遣小姑如我長勤心養公姥好自相扶將初七及下九嬉戲莫相忘出門登車去涕落百餘行府吏馬在前新婦車在後隱隱何甸甸俱會大道口下馬入車中低頭共耳語誓不相隔卿且暫還家去吾今且赴府不久當還歸誓天不相負新婦謂府吏感君區區懷君既若見録不久望君來君當作磐石妾當作蒲葦蒲葦紉如絲磐石無轉移我有親父兄性行暴如雷恐不任我意逆以煎我懷舉手長勞勞二情同依依入門上家堂進退無顔儀阿母大拊掌不圖子自歸十三教汝織十四能裁衣十五彈箜篌十六知禮儀十七遣汝嫁謂言無誓違汝今何罪過不迎而自歸蘭芝慙阿母兒實無罪過阿母大悲摧還家十餘日縣令遣媒來云有第三郎窈窕世無雙年始十八九便言多令才阿母謂阿女汝可去應之阿女含淚答蘭芝初還時府吏見叮嚀結誓不别離今日違情義恐此事非竒自可斷來信徐徐更謂之阿母白媒人貧賤有此女始適還家門不堪吏人婦豈合令郎君幸可廣問訊不得便相許媒人去數日尋遣丞請還説有蘭家女承籍有宦官云有第五郎嬌逸未有婚遣丞為媒人主簿通語言直説太守家有此令郎君既欲結大義故遣來貴門阿母謝媒人女子先有誓老姥豈敢言阿兄得聞之悵然心中煩舉言謂阿妹作計何不量先嫁得府吏後嫁得郎君否泰如天地足以榮汝身不嫁義郎體其往欲何云蘭芝仰頭答理實如兄言謝家事夫壻中道還兄門處分適兄意那得自任専雖與府吏要渠會永無緣登即相許和便可作婚姻媒人下床去諾諾復爾爾還部白府君下官奉使命言談大有緣府君得聞之心中大歡喜視厯復開書便利此月內六合正相應良吉三十日今已二十七卿可去成婚交語速裝束絡繹如浮雲青雀白鵠舫四角龍子幡婀娜隨風轉金車玉作輪躑躅青驄馬流蘇金縷鞍齎錢三百萬皆用青絲穿雜綵三百匹交廣市鮭珍從人四五百鬱鬱登郡門阿母謂阿女適得府君書明日來迎汝何不作衣裳莫令事不舉阿女默無聲手巾掩口啼淚落便如瀉移我琉璃榻出置前窗下左手持刀尺右手執綾羅朝成繡夾裙晚成單羅衫暗暗日欲暝愁思出門啼府吏聞此變因求假暫歸未至二三里摧藏馬悲哀新婦識馬聲躡履相逢迎悵然遙相望知是故人來舉手拍馬鞍嗟嘆使心傷自君别我後人事不可量果不如先願又非君所詳我有親父母逼迫兼弟兄以我應他人君還何所望府吏謂新婦賀卿得髙遷盤石方且厚可以卒千年蒲葦一時紉便作旦夕間卿當日勝貴吾獨向黃泉新婦謂府吏何意出此言同是被逼迫君爾妾亦然黃泉下相見勿違今日言執手分道去各各還家門生人作死别恨恨那可論念與世間辭千萬不復全府吏還家去上堂拜阿母今日大風寒寒風摧樹朩嚴霜結庭蘭兒今日冥冥令母在後單故作不良計勿復怨鬼神命如南山石四體康且直阿母得聞之零淚應聲落汝是大家子仕宦於臺閣慎勿為婦死貴賤情何薄東家有賢女窈窕艷城郭阿母為汝求便復在旦夕府吏再拜還長嘆空房中作計乃爾立轉頭向户裏漸見愁煎迫其日牛馬嘶新婦入青廬奄奄黃昏後寂寂人定初我命絶今日魂去尸長留攬裙脫絲履舉身赴清池府吏聞此事心知長别離徘徊顧樹下自挂東南枝兩家求合葬合葬華山傍東西植松柏左右種梧桐枝枝相覆蓋葉葉相交通中有雙飛鳥自名為鴛鴦仰頭相向鳴夜夜達五更行人駐足聽寡婦起傍徨多謝後世人戒之慎勿忘秦嘉贈妻西溪叢語云秦嘉字士會隴西人也為郡上計其妻徐淑寢疾還家不獲面别贈詩云云徐淑答詩云云嘉與妻書曰不能養志當給郡使隨俗順時僶俯當去知所苦故爾未有瘳損想念悒悒勞心無巳當涉逺路趨大風塵非志所慕慘慘少樂又計往還將彌時節念發同鴛意有遲遲欲暫相見有所屬託今遣車往想必自力淑答書曰知屈圭璋應奉嵗使䇿名王府觀國之光雖失髙素皓然之業亦是仲尼執鞭之操也自初承問心願東還迫疾惟宜抱歎而巳日月巳盡行有袢列想嚴裝巳辦發邁在近誰謂宋逺企豫望之室邇人遐我勞如何深谷逶迤而君是涉髙山巖巖而君是越斯亦難矣長路悠悠而君是踐氷霜慘烈而君是履身非形影何得動而輒俱體非比目何得同而不離於詠萱草之喻以消兩家之恩割今者之恨以待將來之歡今適樂土優遊京邑觀王都之壯麗察天下之珍妙得無目玩意移往而不能出耶嘉重報妻曰車還空反甚失於所望兼敘逺别恨恨之情顧悵然間得此鏡既明好形觀文彩世所希有意甚愛之故以相與并寶叉一雙好香四種素琴一張常所自彈也明鏡可以鑒形寶叉可以耀首芳香可以馥身素琴可以娛耳淑又報嘉書曰既惠音令兼賜諸物厚觀殷勤出於非望鏡有文彩之麗叉有殊異之觀芳香既珍素琴益好惠異物於鄙陋割所珍以相賜非豐恩之厚孰肯若斯覽鏡執叉情意髣佛操琴詠詩思心成結勑以芳香馥身喻以明鏡覽形似此言過矣未獲我心也昔詩人有飛蓬之感班婕妤有誰榮之歎素琴之作當須君歸明鏡之鑒當待君還未奉光儀則寶叉不列也未侍帳帷則芳香不發也梁鍾嶸詩品曰士會夫妻事既可傷文亦悽怨二漢為五言者不過數家而婦人居二徐淑敘别之作亞於團扇矣人生譬朝露居世多屯蹇憂艱常早至歡會常苦晚念當奉時役去爾日遙逺遣車迎子還空往復空返省書情悽愴臨食不能飯獨坐空房中誰與相勸勉長夜不能眠伏枕獨展轉憂來如循環匪席不可卷皇靈無私親為善荷天祿傷我與爾身少小罹煢獨既得結大義歡樂若一作苦不足念當逺離别思念敘欵曲河廣無舟梁道近隔丘陸臨路懷惆悵中駕正躑躅浮雲起髙山悲風激深谷良馬不回鞍輕車不轉轂針藥可屢進愁思難為數貞士篤終始恩義不可屬一作促肅肅僕夫征鏘鏘揚和鈴清晨當引邁束帶待雞鳴顧看空房中髣佛想姿形一别懷萬恨起坐為不寧何以敘我心遺思致欵誠寶叉好耀首明鏡可鑒形芳香去垢穢素琴有清聲詩人感朩瓜乃欲答瑶瓊愧彼持一作來贈厚慙此往物輕雖知未足報貴用敘我情徐淑答夫妾身兮不令嬰疾兮來歸沉滯兮家門厯時兮不差曠廢兮侍覲情敬兮有違君今兮奉命逺適兮京師悠悠兮離别無因兮敘懷瞻望兮踴躍佇立兮徘徊思君兮感結夢想兮容暉君發兮引邁去我兮日乖恨無兮羽翼髙飛兮相追長吟兮永歎淚下兮霑衣飛來雙白鵠樂府解題云飛來雙白鵠刺世俗薄偽失夫婦之道也流離困苦要與之終始中道棄去從新知之樂豈義也哉然而作是詩者怨思雖深而詞不迫切蓋盡所以為婦之理云飛來雙白鵠乃從西北來十十將五五羅列行不齊忽然卒疲病不能飛相隨五里一反顧六里一徘徊吾欲銜汝去口噤不能開吾欲負汝去羽毛日摧頽樂哉心相知憂來生别離踟蹰顧羣侣淚落縱橫垂今日樂相樂延年萬嵗期君子行歐公餘話云文選中有樂府古詞四首內一首君子行云云此篇最佳君子防未然不處嫌疑間瓜田不納履李下不正冠嫂叔不親授長幼不比肩勞謙得其柄和光甚獨難周公下白屋吐哺不及餐一沐三握髮後世稱聖賢建安詩品云漢自王揚枚馬之徒詞賦競爽而吟詠靡聞從李都尉訖班婕妤將百年間有婦人焉一人而已詩人之風頓已缺喪東京二百年中惟有班固詠史質朩無文降及建安曹公父子篤好斯文平原弟兄蔚為文棟劉楨王粲為其羽翼次有攀龍托鳳自致於屬車者蓋百許人彬彬之盛大備於時矣詩眼云建安詩辨而不華質而不俚風調髙雅格力遒壯其言直致而少對偶指事情而綺麗得風雅騷人之氣骨為近古者也魏文帝雜詩二首詩品云魏文詩其源出於李陵頗有仲宣之體則所計百許篇率皆鄙直如偶語惟西北有浮雲十餘首殊美贍可玩始見其工矣非然亦何以銓衡羣彥對揚厥弟者耶漫漫秋夜長烈烈北風涼展轉不能寐披衣起倣徨倣徨忽已久白露沾我裳俯視清水波仰看明月光天漢回西流三五正從橫草蟲鳴何悲孤鴈獨南翔鬱鬱多悲思綿綿思故鄉願飛安得翼欲濟河無梁向風長歎息斷絶我中腸西北有浮雲亭亭如車蓋惜哉時不遇適與飄風會吹我東南行行行至吳會吳會非我鄉安能久留滯棄置勿復陳客子常畏人曹子建箜篌引詩品云子建詩其源出於國風骨氣髙竒辭采華茂情兼雅怨體被文質粲溢今古卓爾不羣嗟乎陳思王之於文章譬如人倫之有周孔鱗羽之有龍鳯音樂之有琴笙女工之有黼黻俾爾懷鉛吮墨之士宜乎抱篇章而景慕映餘輝以自燭故孔氏之門如用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡間矣又云昔曹劉殆文章之聖陸謝為體二之才鋭精研思千百年中而未聞宫商之辨四聲之論或謂前達偶所不見豈其然乎嘗試言之自古詩頌皆被之金竹故非調五音無以諧會若置酒髙殿上明月照髙樓為入韻之首故三祖之辭文或不工而韻入歌唱此重音韻之義也與世之言宫商異矣今既不被於管絃亦何取於聲律耶齊有王元長者嘗語余曰宫商與二儀俱生自古詞人不知用之嘗欲造知音論未就而卒元長創其首謝朓沈約揚其波三賢咸貴公子孫有文辨於是士流景慕務為精密襞積細微轉相凌駕故文多拘忌傷其真美余謂文製本須風誦不可蹇礙但令清濁通流口吻調利斯為足矣至如平上去入則余病未能蜂腰鶴膝故閭里巳甚其陳思贈答仲宣七哀公幹思友皆五言之警䇿者也置酒髙殿上親友從我遊中厨辦豐膳烹羊宰肥牛秦筝何慷慨齊瑟和且柔陽阿奏竒舞京洛出名謳樂飲過三爵緩帶傾庶羞主稱千金夀賓奉萬年酬久要不可忘薄終義所尤謙謙君子德磬折欲何求驚風飄白日光景馳西流盛時不可再百年忽我遒生存華屋處零落歸山丘先民誰不死知命亦何憂七哀詩題注云贈答吕居仁云七哀之類宏大深逺非復作詩者所能及此蓋未始有意於言語之間也明月照髙樓流光正徘徊上有愁思婦悲歎有餘哀借問歎者誰言是客子妻君行踰十年孤妾常獨栖君若清路塵妾若濁水泥浮沉各異勢會合何時諧願為西南風長逝入君懷君懷良不開賤妾當何依公宴題注云贈答公子敬愛客終宴不知疲清夜遊西園飛蓋相追隨明月澄清景列宿正參差秋蘭被長坂朱華冒緑池潛魚躍清波好鳥鳴髙枝神颷接丹轂輕輦隨風移飄颻放志意千秋長若斯贈徐幹驚風飄白日忽然歸西山圓景光未滿衆星粲以繁志士營世業小人亦不間聊且夜行遊遊彼雙闕間文昌鬱雲興迎風髙中天春鳩鳴飛棟流猋激櫺軒顧念蓬室士貧賤誠足憐薇藿弗充虛被褐猶不全慷慨有悲心興文自成篇寶棄怨何人和氏有其愆彈冠俟知已知已誰不然良田無晚嵗膏澤多豐年亮懷璵璠美積久德愈宣親交義在敦申章復何言贈丁儀初秋涼氣發庭樹微銷落凝霜依玉除清風飄飛閣朝雲不歸山霖雨成川澤黍稷委疇隴農夫安所獲在貴多忘賤為恩誰能博狐白足禦冬焉念無衣客思慕延陵子寶劍非所惜子其寧爾心親交義不薄贈王粲端坐苦愁思攬衣起西遊樹朩發春華清池激長流中有孤鴛鴦哀鳴求匹儔我願執此鳥惜哉無輕舟欲歸忘故道顧望但懷愁悲風鳴我側羲和逝不留重隂潤萬物何懼澤不周誰令君多念自使懷百憂又贈丁儀王粲從軍度函谷驅馬過西京山岑髙無極涇渭揚濁清壯哉帝王居佳麗殊百城員闕出浮雲承露槩泰清皇佐揚天惠四海無交兵權家雖愛勝全國為令名君子在末位不能歌德聲丁生怨在朝王子歡自營歡怨非貞則中和誠可經贈白馬王彪謁帝承明廬逝將歸舊疆清晨發皇邑日夕過首陽伊洛廣且深欲濟川無梁泛舟越洪濤怨彼東路長顧瞻戀城闕引領情內傷太谷何寥廓山樹鬱蒼蒼霖雨泥我塗流潦浩從橫中逵絶無軌改轍登髙岡修坂造雲日我馬玄以黃玄黃猶能進我思鬱以紆鬱紆將何念親愛在離居本圖相與偕中更不克俱鴟梟鳴衡軛豺狼當路衢蒼蠅間白黑讒巧令親疏欲還絶無蹊攬轡止踟蹰踟蹰亦何留相思無終極秋風發微涼寒蟬鳴我側原野何蕭條白日忽西匿歸鳥赴喬林翩翩厲羽翼孤獸走索羣銜草不遑食感物傷我懷撫心長太息太息將何為天命與我違奈何念同生一往形不歸孤魂翔故域靈柩寄京師存者忽復過亡沒身自衰人生處一世去若朝露晞年在桑榆間影響不能追自顧非金石咄唶令心悲心悲動我神棄置莫復陳丈夫志四海萬里猶比鄰恩愛茍不虧在逺分日親何必同衾幬然後展殷勤憂思成疾疢無乃兒女仁倉卒骨肉情能不懷苦辛苦辛何慮思天命信可疑虛無求列仙松子久吾欺變故在斯須百年誰能持離别永無會執手將何時王其愛玉體俱享黃髮期收淚即長路援筆從此辭贈丁翼嘉賓填城闕豐膳出中廚吾與二三子曲宴此城隅秦筝發西氣齊瑟揚東謳肴來不虛歸觴至反無餘我豈狎異人朋友與我俱大國多良材譬海出明珠君子義休偫小人德無儲積善有餘慶榮枯立可須滔蕩固大節時俗多所拘君子通大道無願為世儒王仲宣七哀詩二首詩品云仲宣詩其源出於李陵若發愀愴之辭文秀而質羸在曹劉間别構一體方陳思不足比魏文有餘西京亂無象豺虎方遘患復棄中國去逺身適荆蠻親戚對我悲朋友相追攀出門無所見白骨蔽平原路有飢婦人抱子棄草間顧聞號泣聲揮涕獨不還未知身死處何能兩相完驅馬棄之去不忍聽此言南登霸陵岸回首望長安悟彼下泉人喟然傷心肝荆蠻非我鄉何為久滯淫方舟遡大江日暮愁我心山岡有餘映巖阿增重隂狐狸馳赴穴飛鳥翔故林流波激清響猿猴臨岸吟迅風拂裳袂白露沾衣襟獨夜不能寐攝衣起撫琴絲桐感人情為我發悲音羈旅無終極憂思壯難任劉公幹贈徐幹詩品云公幹詩其源出於古詩仗氣愛竒動多振絶貞骨陵霜髙風跨俗但氣過其文雕潤恨少然自陳思已下楨稱獨步誰謂相去逺隔此西掖垣拘限清切禁中情無由宣思子沉心曲長歎不能言起坐失次第一日三四遷步出北寺門遙望西苑園細栁夾道生方塘含清源輕葉隨風轉飛鳥何翻翻乖人易感動涕下與襟連仰視白日光皎皎且髙懸兼燭八紘內物類無頗偏我獨抱深感不得與比焉竹莊詩話卷二
