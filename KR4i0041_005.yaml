body:
  text: 竹莊詩話卷五李太白李陽冰云太白不讀非聖人之書恥為鄭衛之作故其言多似天仙之辭凡所著述言多諷興自三代以來風騷之後馳驅屈宋鞭撻揚馬千載獨步唯公一人故王公趨風列嶽結軌羣賢翕習如鳥歸鳳盧黃門云陳拾遺橫制頽波天下質文翕然一變至今朝詩體尚有梁陳宫掖之風至公大變掃地併盡今古文集道而不行唯公文章橫被六合可謂力敵造化歟山谷云余詳李白詩如黃帝張樂於洞庭之野無首無尾不王故常非墨工槧人所可擬議蜀道難古今詩話云李太白初自蜀到京師賀知章聞其名見之請為文出蜀道難示之知章曰公非人間人豈太白星精耶於是解金貂換酒醉而歸及見烏夜啼曰此詩可以哭鬼神噫吁戲危乎高哉蜀道之難難於上青天蠶叢及魚鳬開國何茫然爾來四萬八千嵗不與秦塞通人煙西當太白有鳥道可以橫絶峩眉巔地崩山摧壯士死然後天梯石棧相鈎連上有六龍回日之髙標下有衡波逆折之回川黃鶴之飛尚不得過猿猱欲度愁攀援青泥何盤盤百步九折縈巖巒捫參厯井仰脅息以手撫膺坐長嘆問君西遊何時還畏塗巉巖不可攀但見悲鳥號古朩雄飛雌從繞林間又聞子規啼夜月愁空山蜀道之難難於上青天使人聽此凋朱顔連峯去天不盈尺枯松倒挂倚絶壁飛湍瀑流爭喧豗砯崖轉石萬壑雷其嶮也若此嗟爾逺道之人胡為乎來哉劍閣峥嶸而崔嵬一夫當關萬夫莫開所守或匪親化為狼與豺朝避猛虎夕避長蛇磨牙吮血殺人如麻錦城雖云樂不如早還家蜀道之難難於上青天側身西望長咨嗟烏棲曲姑蘇臺上烏棲時吳王宫裏醉西施吳歌楚舞歡未畢青山欲銜半邊日金壺丁丁漏水多起看秋月墜江波東方漸明奈樂何烏夜啼黃雲城邊烏欲棲歸飛啞啞枝上啼機中織錦秦川女碧紗如煙隔窗語停梭向人問故夫欲説遼西淚如雨關山月吕氏童蒙訓云如曉月出天山蒼茫雲海間長風幾萬里吹度玉門關及沙墩至梁苑二十五長亭大舶夾雙櫓中流鵝鸛鳴之類皆氣蓋一世學者能熟味之自然不褊淺矣明月出天山蒼茫雲海間長風幾萬里吹度玉門關漢下白登道胡窺青海灣由來征戰地不見有人還戌客望邊色一作巴思歸多苦顔髙樓當此夜歎息未應間一作還淮陰書懷寄王宋城沙墩至梁苑二十五長亭大舶夾雙櫓中流鵝鸛鳴雲山掃空碧川嶽涵餘清飛鳬從西來適與佳興並眷言王喬舄婉孌故人情復此親懿會而增交道榮沿洄且不定飄忽悵徂征暝投淮隂宿欣得漂母迎斗酒烹黃雞一餐感素誠豫為楚壯士不是魯諸生有德必報之千金恥為輕緬書羈孤意逺寄棹歌聲襄陽歌六一居士云落日欲沒峴山西倒著接㒿花下迷襄陽小兒齊拍手大家齊唱白銅鞮此常言也至於清風明月不用一錢買玉山自倒非人推然後見太白之橫放所以驚動千古者固不在此乎落日欲沒峴山西倒著接㒿花下迷襄陽小兒齊拍手攔街爭唱白銅鞮傍人借問笑何事笑殺山公醉似泥鸕鷀杓鸚鵡杯百年三萬六千日一日須傾三百杯遙看漢水鴨頭緑恰似蒲萄初醱醅此江若變作春酒壘麴便築糟邱臺金鞍駿馬換少妾笑坐金鞍歌落梅車傍側挂一壺酒鳳笙龍管行相催咸陽市上歎黃犬何如月下傾金罍君不見晉朝羊公一片石龜頭剝落生莓苔淚亦不能為之墮心亦不能為之哀清風明月不用一錢買玉山自倒非人推舒州杓力士鐺李白與爾同死生襄王雲雨今安在江水東流猿夜聲望廬山瀑布泉苕溪漁隱詩太白望廬山絶句云云東坡美之有詩云帝遣銀河一𣲖垂古來唯有謫仙詞然余謂太白古詩云海風吹不斷江月照還空磊落清壯語簡而意盡優於絶句多矣日照香爐生紫煙遙看瀑布挂前川飛流直下三千尺疑是銀河落九天同前西登香爐峯南見瀑布水挂流三百丈噴壑數十里歘如飛電來隱若白虹起初驚河漢落半灑雲天裏仰觀勢轉雄壯哉造化功海風吹不斷江月照還空空中亂潨射左右洗青壁飛珠散輕霞流沫沸穹石而我遊名山對之心益間無論潄瓊液還得洗塵顔且諧宿所好永願辭人間長干行山谷云太白集中長干行二篇妾髮初覆額真太白作也憶妾深閨裏李益尚書作也所謂癡妬尚書李十郎者也詞意亦清麗可喜亂之太白詩中亦不甚逺大儒曾子固刋定亦不能别也太白豪放人中鳳凰麒麟譬如生富貴人雖醉夢暝暗啽囈中作無義語終不作寒乞聲耳妾髮初覆額折花門前劇郎騎竹馬來繞床弄青梅同居長千里兩小無嫌猜十四為君婦羞顔未嘗開低頭向暗壁千喚不一回十五始展眉願同塵與灰常存抱柱信豈上望夫臺十六君逺行瞿塘灩澦堆五月不可觸猿鳴天上哀門前舊行迹一一生蒼苔苔深不可掃落葉秋風早八月蝴蝶黃雙飛西園草感此傷妾心坐愁紅顔老早晚下三巴預將書報家相迎不道逺直至長風沙同前憶妾深閨裏煙塵不曾識嫁與長千人沙頭候風色五月南風興思君下巴陵八月西風起想君發揚子去來悲如何見少别離多湘潭幾日到妾夢越風波昨夜狂風度吹折江頭樹渺渺暗無邊行人在何處好乘浮雲驄佳期蘭渚東鴛鴦緑蒲上翡翠錦屛中自憐十五餘顔色桃花紅那作商人婦愁水復愁風金陵酒肆留别詩眼云山谷言學者苦不見古人用意處但得其皮毛所以去之更逺如風吹栁花滿店香若人復能為此句亦未是太白至于吳姬壓酒勸客嘗壓酒字他人亦難及金陵子弟來相送欲行不行各盡觴益不同請君試問東流水别意與之誰短長至此乃真太白妙處當潛心焉故學者先以識為主禪家所謂正法眼直須具此眼目方可入道風吹栁花滿店香吳姬壓酒勸客嘗金陵子弟來相送欲行不行各盡觴請君問取東流水别意與之誰短長逺别離樂府録云李白樂府有逺别離其言深哀而思切吳邁江文通之作皆不及也逺别離古有皇英之二女乃在洞庭之南瀟湘之浦海水直下萬里深誰人不言此離苦日慘慘兮雲冥冥猩猩啼煙兮鬼嘯雨我縱言之將何補皇穹竊恐不照余之忠誠雷憑憑兮欲吼怒堯舜當之亦禪禹君失臣兮龍為魚權歸臣兮鼠變虎或云堯幽囚舜野死九疑聨綿皆相似重瞳孤墳竟何是帝子泣兮緑雲間隨風波兮去無逺慟哭兮逺望見蒼梧之深山蒼梧山崩湘水絶竹上之淚乃可滅君馬黃樂府題解云君馬黃臣馬蒼二馬同逐君馬良終言美人歸以南歸以北駕車馳馬今我心傷李白擬遂有君馬黃我馬白馬色雖不同人心本無隔其末乃云相知在急難獨好亦何益白之能自馳騁不與古人同圈套非逺非近此可謂善學詩者歟君馬黃我馬白馬色雖不同人心本無隔共作遊冶盤雙行洛陽陌長劍既照曜髙冠何赩赫各有千金裘俱為五侯客猛虎落陷穽壯夫時屈厄相知在急難獨好亦何益臨江王節士歌樂府題解云李白亦有此擬而感激奮勵有古忠烈之意云洞庭白波朩葉稀燕鴻始入吳雲飛吳雲寒燕鴻苦風號沙宿瀟湘浦節士感秋淚如雨白日當天心照之可以事明主壯士憤雄風生安得倚天劍跨海斬長鯨杜子美上山谷云子美詩妙處乃在無意於文夫無意而意已至非廣之以風雅頌深之以離騷九歌安能咀嚼其味閴然入其門耶彼喜穿鑿者棄其大旨取其發興於所遇林泉人物草朩蟲魚以為物物皆有所託如世間商度隱語老則子美之詩委地矣秦少遊云蘇武李陵之詩長於髙妙曹植劉公幹之詩長於豪逸陶潛阮籍之詩長於沖淡謝靈運鮑照之詩長於峻潔徐陵庾信之詩長於藻麗子美者窮髙妙之格極豪益之氣包沖淡之趣兼峻潔之姿備藻麗之態而諸家所作不及焉王荆公云李白歌詩豪放飄逸人固莫及然具格止於此而已不知變也至於甫則悲歡窮泰發斂抑揚疾徐縱橫無施不可故其詩有平淡簡易者有綺麗精確者有麗重威武若三軍之帥者有奮迅馳驟若泛駕之馬者有淡泊間靜若山谷隱士者有風流藴藉若貴介公子者蓋其詩緒密而思深觀者茍不能臻其閫奧未易識其妙處唐子西語録云六經之後便有司馬遷三百五篇之後便有杜子美六經不可學亦不須學故作文當學司馬遷作詩當學杜子美二書亦須常讀所謂不可一日無此君也苕溪漁隱云近時學詩者率宗江西然殊不知江西本亦學少陵者也故陳無已曰豫章之學博矣而法於少陵故其詩近之今少陵之詩後生少年不復過目抑亦失江西之意乎江西平日語學者為詩旨趣亦獨宗少陵一人而已余為是説蓋欲學詩者師少陵友江西則兩得之矣奉贈韋左丞丈二十二韻詩眼云山谷言文章必謹布置每見後學多告以原道命意曲折後豫心此槩考古人法度如贈韋見素詩云紈袴不餓死儒冠多誤身此一篇立意故使人靜聽而具陳之自甫昔少年日早充觀國賔致君堯舜上再使風俗淳皆儒冠事業也自此意竟蕭條至蹭蹬無縱鱗言誤身如此也則意舉而文備故巳有是詩矣然必言其所以見韋者於是有厚愧真知之句所以真知者謂傳誦其詩也然宰相職在薦賢不當徒愛人而巳士故不能無望故曰竊效貢公喜難甘原憲貧果不能薦賢則去之可也故曰焉能心怏怏秪是走踆踆又將入海而去秦也然其去也必有遲遲不忍之意故曰尚憐終南山回首清渭濱則所知不可以不别故曰常擬報一飯況懷辭大臣夫如此是可以相忘於江湖之外雖見素亦不得而見矣故曰白鷗波浩蕩萬里誰能馴終焉此詩前賢録為壓卷蓋布置最得正體如官府甲第門堂房室各有定處不可亂也韓文公原道於書之堯典如此其它皆謂之變體可也又云詩有一篇命意有句中命意如老杜上韋見素詩布置如此是一篇命意也至其道遲遲不忍去之意則曰尚憐終南山回首清渭濵其道欲與見素别則曰常擬報一飯況懷辭大臣此句中命意也蓋如此然後頓挫髙雅紈袴不餓死儒冠多誤身丈人試靜聽賤子請具陳甫昔少年日早充觀國賓讀書破萬卷下筆如有神賦料楊雄敵詩看子建親李雍求識面王翰願卜鄰自謂頗挺出立登要路津致君堯舜上再使風俗淳此意竟蕭條行歌非隱淪騎驢三十載旅食京華春朝扣富兒門暮隨肥馬塵殘杯與冷炙到處潛悲辛主上頃見徴歘然欲求伸青冥却垂趐蹭蹬無縱鱗甚愧丈人厚甚知丈人真每於百寮上猥誦佳句新竊效貢公喜難甘原憲貧焉能心怏怏秪是走踆踆今欲東入海即將西去秦尚憐終南山回首清渭濱常擬報一飯況懷辭大臣白鷗沒浩蕩萬里誰能馴發秦州乾元三年自秦州赴同谷縣紀行十二首少陵詩縱目云云紀行詩發秦州至鳯凰臺發同谷縣至成都府合二十四首皆以紀行為先後無復差舛昔韓子蒼常論此詩筆力變化當與太史公諸贊方駕學者宜常諷誦之我衰更懶拙生事不自謀無食問樂土無衣思南州漢源十月交天氣如涼秋草朩未黃落況聞山水幽栗亭名更佳下有良田疇充腸多薯蕷崖密亦易求密竹復冬笋清池可方舟雖傷旅寓逺庶遂平生遊此邦俯要衝實恐人事稠應接非本性登臨未銷憂溪谷無異石塞田始徴收豈復慰老夫惘然難久留日色隱孤戌烏啼滿城頭中宵驅車去飲馬寒塘流磊落星月髙蒼茫雲霧浮大哉乾坤內吾道長悠悠赤谷天寒霜雪繁遊子有所之豈但嵗月暮重來未有期晨發赤谷亭險艱方自兹亂石無改轍我車已載脂山深苦多風落日童稚飢悄然村墟迥煙火何由追貧病轉零落故鄉不可思常恐死道路永為髙人嗤鐵堂峽山風吹遊子縹眇乘險絶硤形藏堂隍壁色立積鐵徑摩穹蒼蟠石與厚地裂修纎無垠竹嵌空太始雪威遲哀壑底徒旅慘不悅水寒長氷橫我馬骨正折生涯抵弧矢盜賊殊未滅飄蓬踰三年回首肝肺熱鹽井鹵中草朩白青者官鹽煙官作既有程煮鹽煙在川汲井嵗榾榾出車日連連自公斗三百轉致斛六千君子慎止足小人苦喧闐我何良嘆嗟物理固自然寒硤行邁日悄悄山谷勢多端雲門轉絶岸積阻霾天寒寒硤不可度我實衣裳單況當仲冬交泝沿增波瀾野人尋煙語行子旁水餐此生免荷殳未敢辭路難法鏡寺身危適他州勉強終勞苦神傷山行深愁破崖寺古嬋娟碧蘚淨蕭摵寒籜聚回回山根水冉冉松上雨泄雲蒙清晨初日翳復吐朱甍半光炯户牖燦可數拄䇿忘前期出蘿已亭午冥冥子規呌微徑不復取青陽峽塞外苦厭山南行道彌惡岡巒相經亘雲水氣參錯林迥硤角來天窄壁面削磎西五里石奮怒向我落仰看日車側俯恐坤軸弱魑魅嘯有風霜霰浩漠漠昨憶踰隴坂髙秋視吳嶽東笑蓮花卑北知崆洞薄超然侔壯觀已謂殷寥廓突兀猶趂人及兹嘆冥寞龍門鎮細泉兼輕氷沮洳棧道濕不辭辛苦行迫此短景急石門雲雪隘古鎮峯巒集旌竿暮慘淡風水白刃澀胡為屯成臯防虞此何及嗟爾逺戍人山寒夜中泣石龕熊羆咆我東虎豹號我西我後鬼長嘯我前狨又啼天寒昏無日山逺道路迷驅車石龕下仲冬見虹霓伐竹者誰子悲歌上雲梯為官采美箭五嵗供梁齊苦云直簳盡無以充提擕奈何漁陽騎颯颯驚蒸黎積草嶺連峯積長隂白日遞隱見颼颼林響交慘慘石狀變山分積草嶺路異明水縣旅泊吾道窮衰年嵗時倦卜居尚百里休駕役諸彥邑有佳主人情如已會面來書語絶妙逺客驚深眷食蕨不願餘茅茨眼中見泥功山朝行青泥上暮在青泥中泥濘非一時版築勞人功不畏道路永反將汩沒同白馬為鐵驪小兒成老翁哀猿透却墜死鹿力所窮寄語北來人後來莫匆匆鳯凰臺亭亭鳳凰臺北對西康州西伯今寂寞鳳聲亦悠悠山峻路絶蹤石林氣髙浮安得萬丈梯為君上上頭恐有無母雛飢寒日啾啾我能剖心血飲啄慰孤愁心以當竹實炯然無外求血以當醴泉豈徒比清流所重王者瑞敢辭微命休坐看綵翮長舉意八極周自天銜瑞圖飛下十二樓圖以奉至尊鳳以垂鴻猷再光中興業一洗蒼生憂深衷正為此羣盜何淹留發同谷縣賢有不黔突聖有不暖席況我飢愚人焉能尚安宅始來兹山中休駕喜地僻奈何迫物纍一嵗四行役忡忡去絶境杳杳更逺適停驂龍潭雲回首虎崖石臨岐别數子握手淚再滴交情無舊深窮老多慘戚平生懶拙意偶值棲遁迹去住與願違仰慙林間翮木皮嶺首路栗亭西尚想鳳凰村季冬擕童稚辛苦赴蜀門南登朩皮嶺艱險不易論汗流被我體祁寒為之暄逺岫爭輔佐千巖自崩奔始知五嶽外别有他山尊仰干塞天明俯入裂厚坤再聞虎豹鬭屢局風水昏髙有廢閣道摧折如斷轅下有冬青林石上走長根西崖特秀發煥若靈芝繁潤聚金碧氣清無沙土䀶憶觀崑崙圖目繫玄圃存對此欲何適默傷垂老魂白沙渡畏途隨長江渡口下絶岸差池上舟楫杳窕入雲漢天寒荒野外日暮中流半我馬向北嘶山猿飲相喚水清石礧礧沙白灘漫漫迥然洗愁卒多病一疏散髙壁抵嶔崟洪濤越凌亂臨風獨回首攬轡復三歎水會渡山行有常程中夜尚未安微月沒已久崖傾路何難大江動我前洶若溟渤寬篙師暗理楫歌笑輕波瀾霜濃朩石滑風急手足寒入舟已千憂陟巘仍萬盤回眺積水外始知衆星乾逺遊令人瘦衰病慙加餐飛仙閣土門山行窄微徑緣秋豪棧雲闌千峻梯石結構牢萬壑欹疏林積隂帶奔濤寒日外淡泊長風中怒號歇鞍在地底始覺所厯髙往來雜坐臥人馬同疲勞浮生有定分飢飽豈可逃歎息謂妻子我何隨汝曹五盤五盤雖云險山色佳有餘仰凌棧道細俯映江朩疏地僻無網罟水清反多魚好鳥不妄飛野人半巢居喜見淳朴俗坦然心神舒東郊尚格鬭巨猾何時除故鄉有弟妹流落隨邱墟成都萬事好豈若歸吾廬龍門閣清江下龍門絶壁無尺土長風駕髙浪浩浩自太古危途中縈盤仰望垂線縷滑石欹誰鑿浮梁裊相拄目眩隕雜花頭風吹過雨百年不敢料一墜那得取飽聞經瞿塘足見渡大庾終身厯艱險恐懼從此數石匱閣唐子西語云秦中紀行詩如江間饒竒石未為極勝至暝色帶逺客則不可及已季冬日已長山晚半天赤蜀道多草花江間饒竒石石匱曾波上臨虛蕩髙壁清暉回羣鷗暝色帶逺客羈栖負幽意感歎向絶迹信甘孱懦嬰不獨凍餒逼優遊謝康樂放波陶彭澤吾衰未自由謝爾性所適拮柏渡青冥寒江渡架竹為長橋竿濕煙漠漠江水風蕭蕭連笮動嫋娜征衣颯飄颻急流鴇鷁散絶岸黿鼉驕西轅自兹異東逝不可要髙通荆門路濶會滄海潮孤光隱顧盻遊子悵寂寥無以洗心胸前登但山椒劍門惟天有設險劍閣天下壯連山抱西南石角皆北向兩崖崇墉倚刻畫城郭狀一夫怒臨關百萬未可傍珠玉走中原岷峨氣悽愴三皇五帝前雞犬各相放後王尚柔逺職貢道已喪至今英雄人髙視見霸王並吞與割據極力不相讓吾將罪真宰意欲鏟疊嶂恐此復偶然臨風默惆悵鹿頭山鹿頭何亭亭是日慰飢渴連山西南斷俯見千里豁遊子出京華劍門不可越及兹阻險盡始喜原野濶殊方昔三分霸氣曾間發天下今一家雲端失雙闕悠然想揚馬斷起名硉兀有文令人傷何處埋爾骨紆餘脂膏地慘淡豪俠窟杖鉞非老臣宣風豈専達冀公柱石姿論道邦國活斯人亦何幸公鎮踰嵗月成都府翳翳桑榆日照我征衣裳我行山川異忽在天一方但逢新人民未卜見故鄉大江東流去遊子去日長曾城填華屋季冬樹朩蒼喧然名都會吹簫間笙簧信美無與適側身望川梁鳥雀夜各歸中原杳茫茫初月出不髙衆星尚爭光自古有羇旅我何苦哀傷病柏石林詩話云病柏病橘枯棕枯柟皆當時事病柏當為明皇作與杜鵑行意同枯棕皆民力之殘困其篇中自言矣枯柟云猶含棟梁具無復雲霄志當為房次律之徒作惟病橘始言惜哉結實小酸澀如棠梨未以比荔枝勞民疑若指佞幸之不得志者自漢魏以來詩人用意深逺不失古風惟此為然不但語之工也有柏生崇岡童童狀車一作青蓋偃蹙龍虎姿生當風雲會神明依正直故老多再拜豈知千年根中路顔色壞出非不得地蟠據亦髙大嵗寒忽無憑日夜柯葉改丹鳯領九雛哀鳴翔其外鴟梟志意滿養子穿穴內客從何鄉來佇立久吁怪靜求玄精理浩蕩難倚賴病橘羣一作枳橘少生意雖多亦奚為惜哉結實小酸澀如棠梨剖之盡蠧蟲彩掇爽其宜紛然不適口豈只存其皮蕭蕭半死葉未忍别故枝玄冬霜雪積況乃回風吹嘗聞蓬萊殿羅列瀟湘姿此物嵗不稔玉食失一作少光輝寇盜尚憑陵當君減膳時汝病是天意吾諗一作愁罪有司憶昔南海使奔騰獻荔枝百馬死山谷到今耆舊悲枯棕蜀門多棕櫚髙者十八九其皮割剝甚雖衆亦易朽徒布如雲葉青青嵗寒後交橫集斧斤凋喪先蒲栁傷時苦軍乏一物官盡取嗟爾江漢人生成復何有有同枯棕朩使我沉歎久死者即已休生者何自守啾啾黃雀啄側見寒蓬走念爾形影乾摧殘沒藜莠枯柟楩柟枯峥嶸鄉黨皆莫記不知幾百嵗慘慘無生意上枝摩皇天下根盤厚地巨圍雷霆坼萬孔螻蟻萃凍雨落流膠漁隱叢話云楚辭使凍雨兮灑塵注云江東呼夏月暴雨為凍雨音東衡風奪佳氣白鵠遂不來天雞為愁思猶含棟梁具無復霄漢志良工古昔少識者出涕淚種榆水中央成長何容易截承金露盤裊裊不自畏李潮八分小篆歌漁隱叢話云此詩敘書之顛末可謂詳盡後人筆力豈能到此而嶧山碑棗朩傳刻之語尤為人所取信倉頡鳥迹既茫昧字體變化如浮雲陳倉石鼓又已訛大小二篆生八分秦有李斯漢蔡雍中間作者寂不聞嶧山之碑野火焚棗朩傳刻肥失真苦縣光和尚骨立書貴瘦硬方通神惜哉李蔡不復得吾甥李潮下筆親尚書韓擇朩騎曹蔡有鄰開元以來數八分潮也掩有二子成三人況潮小篆逼秦相快劍長戟森相向八分一字直百金蛟龍盤拏肉屈強吳郡張顛誇草書草書非古空雄壯豈如吾甥不流宕丞相中郎丈人行巴東逢李潮逾月求我歌我今衰老才力薄潮乎潮乎奈汝何秋日夔府詠懷奉寄鄭監審李賓客之芳一百韻石林詩話云長篇最難晉魏以前無過十韻者蓋嘗使人以意道志初不以敘事傾側為工至詠懷北征見後諸篇窮極筆力如太史公紀此古今絶唱蔡寬夫詩話云子美詩善敘事故號詩史其律詩多至百韻本末貫穿如一詞前此蓋未有元稹云子美鋪陳終始排比聲韻大或千言次猶數百詞氣豪邁而風調清深屬對律切而脫棄凡近山谷云好作竒語自是文章一病但當以理為主理得而詞順自然出羣拔萃觀子美到夔州後詩不煩繩削而自合矣絶塞烏蠻北孤城白帝邉飄零仍百里消渴已三年雄劍鳴開匣羣書滿繫船亂離心不展衰謝日蕭然筋力妻孥問菁華歲月遷登臨多物色陶冶賴詩篇峽束滄江起巖排石樹圓拂雲霾楚氣潮海蹴吳天煮井為鹽速燒畬度地偏有時驚疊嶂何處覔平川鸂鶒雙雙舞獼猴壘壘懸碧羅長似帶錦石小如錢春草何曾歇寒花亦可憐獵人吹戍火野店引山泉喚起搔頭急扶行幾屐穿兩京猶薄産四海絶隨肩幕府初交辟郎官幸備員瓜時猶旅寓萍泛苦夤緣藥餌虛狼藉秋風灑靜便開襟驅瘴癘明目掃雲煙髙宴諸侯禮佳人上客前哀筝傷老大華屋豔神仙南內開元曲常時弟子傳法歌聲變轉滿坐涕潺湲弔影夔州僻回腸杜曲煎即今龍廏水莫帶犬戎羶耿賈扶王室蕭曹供御筵乘威滅蜂蠆戮力效鷹鸇舊物森猶在凶徒惡未悛國須行戰伐人憶止戈鋋奴僕何知禮恩榮錯與權胡星一彗孛黔首遂拘攣哀痛絲綸切煩苛法令蠲業成陳始王兆喜出于畋宫禁經綸密台階翊戴全熊羆載吕望鴻鴈美周宣側聽中興主長吟不世賢音徽一柱數道理下牢千鄭李光時論文章並我先隂何尚清省沈宋歘聨翩律比崑崙竹音知燥濕絃風流俱善價愜當久忘筌置驛常如此登龍蓋有焉雖云隔禮數不敢墜周旋髙視收人表虛心味道玄馬來皆汗血鶴唳必青田羽翼商山起蓬萊漢閣連管寧紗帽淨江令錦袍鮮東郡時題壁南湖日扣舷逺遊凌絶境佳句染華箋每欲孤飛去徒為百慮牽生涯已寥落國步尚迍邅衾枕成蕪沒池塘作棄捐别離憂怛怛伏臘涕漣漣露菊班豐鎬秋蔬影澗瀍共誰論昔事幾處有新阡富貴空回首喧爭懶著鞭兵戈塵漠漠江漢月娟娟局促看秋燕蕭疏聽脫蟬雕蟲蒙記憶烹鯉問沉綿卜羡君平杖偷存子敬氊囊虛把叉釧金盡拆花鈿甘子隂涼葉茅齋八九椽陳圖沙北岸市暨瀼西巔羇絆心嘗折棲遲病即痊紫收岷嶺芓白種陸家蓮色好梨勝頰穰多栗過拳敕厨唯一味求飽或三鱣兒去看魚笱人來坐馬韉縳柴門窄窄通竹溜涓涓塹抵公畦稜村依野廟壖缺籬將棘拒倒石賴藤纏借問頻朝謁何如穩晝眠誰云行不逮自覺坐能堅霧雨銀章澀馨香粉署妍紫鸞無近逺黃雀任翩翾困學違從衆明公各勉旃聲華夾宸極早晚到星躔懇諫留匡鼎諸儒引服虔不逢輸鯁直會是正陶甄宵旰憂虞軫黎元疾苦駢雲臺終日畫青簡為誰編行路難何有招尋興已専由來具飛楫暫擬控鳴弦身許雙峯寺門求七祖禪落帆追宿昔衣褐向真詮安石名髙晉昭王客赴燕途中非阮籍查上似張騫披拂雲寧在淹留景不延風期終破浪水怪莫飛涎他日辭神女傷春怯杜鵑淡交隨聚散澤國繞回旋本自依迦葉何曾籍偓佺爐峯生轉盻橘井尚髙褰東走窮歸鶴南征盡跕鳶晚聞多妙教卒踐塞前愆顧凱丹青列頭陀琬琰鐫衆香深黯黯幾地肅芊芊勇猛為心極清羸任體孱金箆空刮眼鏡象未離銓自京赴奉先縣詠懷五百字杜陵有布衣老大意轉拙許身一何愚竊比稷與契居然成濩落白首甘契闊蓋棺事則已此志常覬豁窮年憂黎元歎息腸內熱取笑同學翁浩歌彌激烈非無江海志蕭灑送日月生逢堯舜君不忍便永訣當今廊廟具構厦豈云缺葵藿傾太陽物性固莫奪顧惟螻蟻輩但自求其穴胡為慕大鯨輒擬偃溟渤以兹悟生理獨恥事干謁兀兀遂至今忍為塵埃沒終愧巢與由未能易其節沉飲聊自適放歌破愁絶歲暮百草零疾風髙岡裂天衢陰崢嶸客子中夜發霜嚴衣帶斷指直不得結凌晨過驪山御榻在嵽嵲蚩尤塞寒空蹴踏崖谷滑瑶池氣鬱律羽林相摩戞君臣留歡娛樂動殷樛嶱賜浴皆長纓與宴非短褐彤庭所分帛本自寒女出鞭撻其夫家聚斂貢城闕聖人筐篚恩實欲邦國活臣如忽至理君豈棄此物多士盈朝廷仁者宜戰栗況聞內金盤盡在衛霍室中堂舞神仙煙霧散玉質暖客貂鼠裘悲管逐清瑟勸客駝蹄羮霜橙壓香橘朱門酒肉臭路有凍死骨榮枯咫尺異惆悵難再述北轅就涇渭官渡又改轍羣水從西下極目髙崒几疑是崆洞來恐觸天柱折河梁幸未坼枝撑聲窸窣行旅相攀援川廣不可越老妻寄異縣十口隔風雪誰能久不顧庶往共飢渴入門聞號咷幼子飢巳卒吾寧舍一哀里巷亦嗚咽所愧為人父無食致夭折豈知秋未登貧窶有倉卒生常免租稅名不𨽻征伐撫迹猶酸辛平人固騷屑默思失業徒因念逺戍卒憂端齊終南澒洞不可掇竹莊詩話卷五
