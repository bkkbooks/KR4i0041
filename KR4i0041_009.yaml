body:
  text: 竹莊詩話巻九六一居士雪浪齋日記云或疑六一居士詩以為未盡妙以質於子和子和曰六一詩只欲平易耳荆公語録云或曰歐陽文忠公亦好竒巧公曰不然猶轉積水於千仞之溪其清快孰能禦之又曰歐陽公自韓吏部以來未有也辭如劉向詩如韓愈而功妙過之延漏録云予嘗以師禮見參政歐公修因論及唐詩謂杜子美才出人表不可學學必不至徒無所成故未始學之韓退之才可及而每學之故今歐詩多類韓體六月十四夜飛葢橋翫月漁隠叢話論此詩云歐公作詩葢欲自出胸臆不肯蹈襲前人亦其才高故不見牽强之迹耳天形積輕清水得本虚靜雲収風波止始見天水性澄光與粹容上下相涵映乃於其兩間皎皎掛寒鏡餘輝所照耀萬物皆鮮瑩矧夫人之靈豈不醒視聼而我於此時翛然發孤詠紛昏所洗滌俯仰恣涵泳人心曠而閒月色高逾逈惟恐清夜闌時時瞻斗柄盤車圖西清詩話云丹青吟詠妙處相資昔人謂詩中有畫畫中有詩者葢畫能狀而詩人能言之唐人有盤車圖畫重岡複嶺一夫馳車山谷間永叔賦詩坡長坂峻牛力疲天寒日暮人心速且畫工意初未必然而詩人廣大之乃知作詩者徒言其景不若盡其情此品題之津梁也王直方詩話云古畫畫意不畫形梅詩詠物無隠情忘形得意知者寡不若見詩如見畫余以為若論詩畫於此盡矣每誦過殆欲常以為法也淺山嶙嶙亂石矗矗山石磽聱車碌碌山勢盤斜隨澗谷側轍傾轅如欲覆出乎兩崕之隘口忽見百里之平陸坡長坂峻牛力疲天寒日暮人心速楊褎忍饑官太學得錢買此纔盈幅愛其樹老石硬山回路轉高下曲直横斜隠見妍媸嚮背各有態逺近分毫皆可辨自言昔有數家筆畵古傳多名姓失後來見者知為誰乞詩老聊稱古述古畵畵意不畵形梅詩詠物無隠情忘形得意知者寡不若見詩如見畵乃知楊生真好竒此畵此詩兼有之樂能自足乃為富豈必金玉名高貲朝看畵暮讀詩楊生得此可不饑半山老人後山詩話云荆公詩力去陳言夸末俗可憐無補費精神而公平生文體數變暮年詩益工用意益苦故言不可不謹也石林詩話云荆公詩用法甚嚴尤精於對偶嘗云用漢人語止可以漢人語對若參以異代語便不相類此格惟公用之不覺拘窘卑凡桃源行高齋詩話云荆公此詩追配古人望夷宫中鹿為馬秦人半死長城下避世不獨商山翁亦有桃源種桃者此來種桃經幾春採花食實枝為薪兒孫生長與世隔雖有父子無君臣漁郎泛舟迷逺近花間相見驚相問世上那知古有秦山中豈料今為晉聞道長安吹戰塵春風回首一霑巾重華一去寧復得天下紛紛經幾春嵗晩謾叟詩話云荆公定林後詩精深華妙非少作之比嘗作嵗晩詩自以比謝靈運議者亦以為然月映林塘靜風涵語笑凉俯窺憐淨渌小立佇幽香攜幼尋新的扶衰上野航延縁乆未已嵗晩惜流光絶句山谷云荆公暮年作小詩雅麗精絶脱去流俗每諷味之便覺沆瀣生牙頰間漁隠叢話云觀此數詩真可使人一唱而三嘆也數詩即巳下六首南浦隨花去回舟路已迷暗香無覓處日落畵橋西又染雲為柳葉剪水作梨花不是東風巧何緣見嵗華又簷日陰陰轉床風細細吹翛然殘午夣何許一黄鸝又蒲葉清淺水杏花和暖風地偏緣底緑人老為誰紅又禁臠云沙草則衆人所謂水邊林下之物所與之遊處者牛羊鷗鳥耳而荆公造而為語曰眠分黄犢草坐占白鷗沙其筆力高妙殆若天成愛此江邊好留連至日斜眠分黄犢草坐占白鷗沙又日淨山如染風暄草欲薰梅殘數㸃雪麥漲一川雲晴景漁隠叢話云王駕晴景云雨前初見花間葉雨後兼無葉裏花蛺蝶飛來過墻去應疑春色在隣家此唐百家詩選中詩也余因閲荆公臨川集亦有此詩百家詩選是荆公所選想愛此詩因為改正七字遂使一篇語工而意足了無鑱斧之迹真削鐻手也雨前初見花間葉雨後全無葉底花蜂蝶紛紛過墻去却疑春色在隣家嘲白髮苕溪漁隠公嘲白髪詩真佳句也久應飄轉作蓬飛養惜冠巾未忍違種種春風吹不長星星明月照還稀南浦石林詩話云荆公晩年詩律尤精嚴造語用字間不容髮然意與言㑹言隨意遣渾然天成殆不見有牽率排比處如含風鴨緑鱗鱗起弄日鵝黄裊裊埀讀之初不覺有對偶至細數落花因坐久緩尋芳草得歸遲但見舒閒容與之態耳而字字細考之皆經櫽括權衡者其用意亦深刻矣冷齋夜話云用事琢句貴在言其用而不言其名荆公云云末兩句此言水栁之名也南浦東崗二月時物華撩我有新詩含風鴨綠鱗鱗起弄日鵝黄裊裊埀北山北山輸緑漲横陂直塹回塘灔灔時細數落花因坐久緩尋芳草得歸遲遊石牛洞韻語陽秋云荆公倅舒與道人文鋭弟安國擁火遊石牛洞聼泉而歸有詩云云晁無咎讀楚詞載荆公詞以謂二十四字具六藝羣言之餘味故與經學典冊之文俱傳水冷冷而北出山靡靡而旁圍欲窮源而不得竟悵望而空歸用前韻戯贈葉致逺直講韻語陽秋云古今人賦碁詩多矣語意皆無足取獨愛荆公贈葉致逺之作其略云或撞闗以攻至悔悞乃摶頰可謂曲盡圍碁之態非筆力可以回萬鈞豈易至此取退之南山詩讀之殆可齊驅並駕也葉侯越著姓胄出實楚葉縉雲雖窮逺冠葢傳累葉心大有所潛肩高未嘗脅飄飄凌雲意强禦莫能懾辟雍海環流用汝作舟楫開胸出妙義可發䝉起魘詞如太阿鋒誰敢觸其鋏聼之心爽然難者口因嗋斜飛欲峩峩鎩墮今跕跕忘情塞上馬適志夣中蝶若金靜無求在冶誰可挾載醪但彼惑饋漿非我諜經綸安足施有寓聊自愜碁經看在手碁訣傳滿篋坐尋棊勢打側冩其圖貼攜持山林屐刺摘溝港艓一枰嘗自副當熱寧忘箑反嗤褦襶子但守一經笈亡羊等殘生朽筴何足摺歡然值手敵便與對七筴縱横子墮局腷膞聲出堞樵父弛逺擔牧奴停晏饁旁觀各技癢竊議兒女囁所務在得䘮聞此更心惵孰視籠兩手徐思撚長鬛㣲吟靜惜惜堅老高帖帖未快巖谷叟斧柯常爛浥趨邊恥局縮穿腹愁危嶪或撞闗以攻或覷眼而擪或嬴行伺擊或猛出追躡埀成或破壞中㫁俄連接或於予閒暇伐事先和燮或冐突超越皷行令震疊或粗見形勢驅除令逺蹀或開拓疆境欲并包總攝或僅殘尺寸如黑子著黶或横清解散如尺僵血喋或慚如告亡或喜如告㨗陷敵未甘虜執仇方借俠諱輸寜㫁頭悔悟乃摶頰終朝巳罷精既夜未交睫翻然語且歎此何冝刼刼孟軻惡妨行陶侃懲廢業揚雄有前言韋曜存往牒晉臣抑帝手捘侫何啻涉冶城子爭道拒父乃如輒爭也實逆徳豈如私闘怯藝成况窮苦此殆天所厭如今劉與李倫等安可躐試令取一毫亦乏寸金鑷以此待君子未與回參協操具投諸江道耕而徳懷鍾山王直方詩話云舒王詩云云下兩首又云客舍黄粱今始熟鳥殘紅柿昔分甘葢三用黄粱而意義皆妙投老歸來供奉班塵埃無復見鍾山何須更待黄梁熟始信人間是夣間夣黄梁欲熟且留連謾道春歸莫悵然蝴蝶豈能知夣事蘧蘧飛墮晩花前送人至清凉寺詩事云荆公送人至清凉寺題詩壁間云云看上征鞍立寺門之句為一篇警䇿尤盡别離情意之實古人未嘗道也若使置之斷句尤佳惜乎在第二語耳譬猶全玉天下貴寶製以為器須是安頓得宜尤増其光輝㫁蘆洲渚薺花繁看上征鞍立寺門投老難堪與公别倚崗從此望回轅月夕又云李義山襪詩云嘗聞宓妃襪渡水欲生塵好借姮娥著清秋蹋月輪荆公作月夕詩云云因舊而語意俱新矣蹋月看流水水明揺蕩月草朩已華滋山川復清發褰裳伏檻處緑淨數毛髮誰能挽姮娥俯濯凌波襪六言又云蘓子瞻作翰林日因休沐邀門下士西至太乙宫見王荆公舊題六言云云子瞻諷詠再三謂魯直曰座間惟魯直筆力可及此爾對曰庭堅極力為之或可追及但無荆公之自在耳楊柳名條綠暗荷花落日紅酣三十六陂流水白頭相見江南又三十年前此路父兄持我東西今日重來白首却尋陳迹都迷東坡居士上苕溪漁隠云吕丞相跋杜子美年譜云考其辭力少而鋭壯而肆老而嚴非妙於文章不足以至此余觀東坡自南遷以後詩全類子美䕫州以後詩至所謂老而嚴者也子由云東坡謫居儋耳獨喜為詩精神華妙不見老人衰憊之氣魯直亦云東坡嶺外文字讀之使人耳目聰明如清風自外來也蒼梧雜志云葛魯卿云東坡詩文直為破的它人只到得七暈八暈惟是東坡字字破的所以不可及也寓居定慧院之東雜花滿山有海棠一株土人不知貴也石林詩話云此詩此格超逸不復蹈襲前人漁隠叢話云元豐間東坡謫黄州寓居定恵院院之東小山上有海棠一株特繁茂每嵗盛開時必為携客置酒已五醉其下矣故作長篇生平喜為人寫盖人間刋石自有五六本云軾平生得意詩也江城地瘴蕃草朩只有名花苦幽獨嫣然一笑竹籬間桃李漫山總麄俗也知造物有深意故遣佳人在空谷自然富貴出天資不待金盤薦華屋朱唇得清暈生臉翠袖巻紗紅映肉林深霧暗曉光遲日煖風輕春睡足雨中有淚亦悽慘月下無人更清淑先生食飽無一事散步逍遥自捫腹不問人家與僧舍拄杖敲門看修竹忽逢絶艶照衰朽歎息無言揩病目陋邦何處得此花無乃好事移西蜀寸根千里不易到銜子飛來定鴻鵠天涯流落俱可念為飲一樽歌此曲明朝酒醒還獨來雪落紛紛那忍觸松風亭下梅花盛開漁隠叢話云遯齋閒覽云荆公在金陵有和徐仲文顰字韻詠梅詩二首東坡在嶺南有暾字韻咏梅詩三首皆韻險而語工非大手筆不能到也余以臨川集東坡後集細細味之顰字韻二聖亦未是荆公平日得意詩其一云額黄映日明飛燕肌粉含風冷太真其一云肌冰綽約如姑射膚雪參差是玉真其餘亦别無奇特向至如東坡暾字韻三首皆擺落陳言古今人未嘗經道者三首並妙絶第二首尤奇春風嶺上淮南村昔年梅花曽㫁魂豈知流落復相見蠻風蜑雨愁黄昏長條半落荔枝浦卧樹獨秀桄榔園豈惟幽光留夜色直恐冷艶排冬温松風亭下荆棘裏兩株玉蘂明朝暾海南仙雲嬌隨砌月下縞衣來扣門酒醒夣覺起繞樹妙意有在終無言先生獨飲勿歎息幸有落月窺清罇再用前韻羅浮山下梅花村玉雪為骨冰為魂紛紛初疑月挂樹耿耿獨與參黄昏先生素居江海上悄如病鶴栖荒園天香國艶肯相顧知我酒熟詩清温蓬萊宫中花鳥使綠衣倒挂扶桑暾自注嶺南真禽有倒挂子綠衣紅啄如鸚鵡而小自海東來非塵埃間物也抱叢窺我方醉卧故遣啄木先敲門麻姑過君急掃洒鳥能歌舞花能言酒醒人散山寂寂惟有落蘂粘空樽花落復次韻玉妃謫墮煙雨村先生作詩與招魂人間草木非我對奔月偶挂成幽魂暗香入户尋短夣青子綴枝留小園披衣連夜唤客飲雪膚滿地聊相温松明照坐愁不睡井花入腹清而暾先生年來六十化道眼已入不二門多晴好事餘習氣惜花未忍都無言留連一物無過矣笑領百罰空罍樽月夜與客對飲花下集註云此篇不使事語亦新造古所未有殆涪公所謂不食煙火食人之語也杏花飛簾散餘春明月入户尋幽人褰衣步月踏花影炯如流水涵清蘋花間置酒清香發爭挽長條落香雪山城薄酒不堪飲勸君且吸杯中月洞簫聲㫁月明中惟憂月落酒杯空明朝巻地春風惡但見綠葉栖殘紅贈東林總長老冷齋夜話云東坡遊廬山東林作二偈山谷云此老於般若横説竪説了無剩語非其筆端有口亦安能吐此不傳之妙溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉似人題西林壁横看成嶺側成峯逺近高低各不同不識廬山真面目只縁身在此山中寄呉徳仁兼簡陳季常苕溪漁隠云詩中所云龍邱居士即陳季常也濮陽公子即吳徳仁也又云我遊蘭溪訪清泉已辦布韈青行纒嵇山不是無賀老我自興盡回酒船葢欲徃訪徳仁未成也李白詩云嵇山無賀老却棹酒船回用此事也又云恨君不識顔平原東坡自謂也恨我不識元魯山謂徳仁也銅駝陌上會相見握手一笑三千年葢言終當相見如薊子訓之徒此一篇詩意本末次序有倫有理可謂精緻矣東坡先生無一錢十年家火燒凡鈆黄金可成河可塞只有霜鬢無由𤣥龍邱居士亦可憐談空説有夜不眠忽聞河東獅子吼拄杖落手心茫然誰似濮陽公子賢飲酒食肉自得仙平生寓物不留物在家學得忘家禪門前䆉稏十頃田清溪遶屋花連天溪堂醉卧呼不醒落花如雪春風顛我遊蘭溪訪清泉已辦布襪青行纒嵇山不是無賀老我自興盡回清船恨君不識顔平原恨我不識元魯山銅駝陌上㑹相見握手一笑三千年慶源宣義王丈人以累舉得官為洪雅主簿州戸掾遇吏如家人人安樂之既謝事居眉之青神瑞草橋放懐自得有書來求紅帶既以遺之且作詩為戯黄魯直學士秦少遊賢良各賦一首為老人光華王直方詩話云青衫半作霜葉枯至芋魁豆飯吾豈無山谷云庭堅最愛此韻青衫半作荷葉枯視民如兒吏如奴吏民莫作官長看我是識字耕田夫妻啼兒號刺史怒時有野人來挽鬚拂衣自注下下考芋魁飯豆吾豈無歸來瑞草橋邊路獨遊還佩平生壺慈姥巖前自喚渡青衣江畔人爭扶今年蠶市蘇州集中有遺民懷袴襦邑中之黔相指似白髯紅帶老不癯我欲西歸卜隣舍隔牆撫掌容歌呼不覺山王乘駟馬回頭空指黄公壚續麗人行苕溪漁隠云李仲謀家有周昉畫背面欠伸内人極精戯作此詩云云韓子蒼用此意題李伯時所畫宫女云睡起昭陽暗淡粧不知縁㡳背斜陽若教轉盼一回首三十六宫無粉光終不及坡之偉麗也深宫無人春日長沉香亭北百花香美人睡起薄梳洗燕舞鶯啼空㫁腸畵工欲畵無窮意背立東風初破睡若教回首却嫣然陽城下蔡俱風靡杜陵饑客眼長寒蹇驢破㡌隨金鞍隔花臨水時一見只許腰肢背後看心醉歸來茒屋㡳方信人間有西子君不見孟光舉案與眉齊何曽背面傷春啼種松得徠子吕居仁云詩欲波瀾之濶須放規模令大涵養吾氣而後可規模既大波瀾自濶少加持擇功巳倍於古矣試取東坡黄州以後詩如種松醫眼之類便可見東風吹榆林亂筴飛作堆荒園一雨過戢戢千萬栽青松種不生百株望一枚一枚巳有餘氣壓千畆槐野人易斗粟云自魯徂徠魯人不知貴萬竈飛青煤束縛同一車胡為乎來哉泫然解其縳青泉洗浮埃枝傷葉自困生意未肯回山僧老無子養䕶如嬰孩坐待走龍蛇清陰滿南臺孤根裂山石直幹排風雷我今百日客養此千嵗材茯苓無消息雙鬢日夜催古今一俯仰作詩寄餘哀戯作種松我昔少年日種松滿東崗初移一寸根瑣細如挿秧二年黄茒下一一攅麥芒三年出蓬艾滿山散牛羊不見十年餘想作龍蛇長夜風波浪碎朝露珠璣香我欲食其膏已伐百夲桑人事多乖迕神物竟渺茫朅來齊安野夾路鬚髯蒼㑹開龜蛇窟不惜斤斧創縱未得茯苓且當拾流肪釜盎百出入皎然散飛霜槁死三彭仇澡換五穀腸青骨凝緑髓丹田發幽光白髮何足道要使雙瞳方却後五百年騎鶴還故鄉贈眼醫王士針頭如麥芒氣出如車軸間闗絡脉中性命寄毛粟而况清淨眼内景含天燭琉璃貯沆瀣輕脆不任觸而子於其門來往施鋒鏃笑談紛自若觀者頸為縮運鍼如運斤去翳如拆屋常疑子善幻祀伎雜符祝子言吾有道此理君未瞩形骸一塵埃貴賤兩草木世人方重外妄見瓦與玉而我初不知刺眼如刺肉君看目與翳是翳要非目目翳茍二物易分如麥菽寧聞老農夫去草易傷穀鼻端有餘地肝膽分楚蜀吾於五輪間蕩蕩見空曲如行九軌道並驅無擊轂空花誰開落明月自朏朒請問藥全堂忘言老尊宿竹莊詩話巻九
