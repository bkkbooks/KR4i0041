body:
  text: 竹莊詩話卷六杜子美下十二月一日詩眼云古人律詩亦是一片文章語或似無倫次而意若貫珠十二月一日詩云今朝臘月春意動雲安縣前江可憐此詩立意念歲月之遷易感異鄉之飄泊其曰一聲何處送書鴈百丈誰家上水船則羇愁旅思皆在目前未將梅蘂驚愁眼要取楸花媚逺天梅望春而花楸將夏而繁乃言滯留之勢當自冬過春始終見梅楸則百花之開落皆在其中矣以此益念故國思朝廷故曰光明起草人所羡肺病幾時朝日邊聞官軍收河北詩云劍外忽傳收薊北初聞涕淚滿衣裳夫人感極則悲悲定而後喜忽聞大盜之平喜唐室復見太平顧視妻子知免流離故曰却看妻子愁何在其喜之至也不知手之舞之足之蹈之故曰漫展詩書喜欲狂從此有樂生之心故曰白日放歌須縱酒於是率中原流寓之人同歸以青春和暖之時節歸故曰青春作伴好還鄉言其道塗則曰欲從巴峽穿巫峽言其所歸則曰便下襄陽向洛陽此蓋曲盡一時之意愜當衆人之情通暢而有條理如辨士之語言也游子詩六巴蜀愁誰語吳門興杳然巴蜀既無可語言故欲逺之吳㑹九江春草外則想像將來吳門之景物三峽暮帆前則去路先涉三峽之風波厭就成都卜休為吏部眠君平之卜所以養生畢卓之酒所以忘憂今皆不能如意則犯三峽之險適九江之逺豈得巳也哉夫奔走萬里無所稅駕傷人世險隘不能容巳故曰蓬萊如可到衰白問羣仙終焉題桃樹詩云小徑升堂舊不斜五株桃樹亦從遮此詩意在第一句舊堂小徑從來不斜又五桃遮掩之巳若圖畫矣中間四句皆舊日方天下太平家給食足有桃實則餽貧人故曰髙秋總餽貧人實和氣應期而至人意閒而樂之故曰來歲還舒滿樹花家家有忠厚之風處處有魯恭之化故曰窗戶每宜通乳燕兒童莫信打慈鴉及題此詩時所向皆寡妻羣盜何暇如此故曰非今日乃往年天下車書正一家時也然所謂意若貫珠今人不求意思關紐但以相似語言為貫穿以停穩筆畫為端直豈不淺近也哉今朝臘月春意動雲安縣前江可憐一聲何處送書鴈百丈誰家上水船未將梅蘂驚愁眼更取楸花媚逺天明光起草人所羡肺病幾時朝日邊聞官軍收河南河北劍外忽傳收薊北初聞涕淚滿衣裳却看妻子愁何在漫卷詩書喜欲狂白日放歌須縱酒青春作伴好還鄉即從巴峽穿巫峽便下襄陽向洛陽遊子巴蜀愁誰語吳門興杳然九江春草外三峽暮帆前厭就成都卜休為吏部眠蓬萊如可到衰白問羣仙題桃樹小徑升堂舊不斜五株桃樹亦從遮髙秋總餽貧人實來歲還舒滿樹花簾户每宜通乳燕兒童莫信打慈鴉寡妻羣盜非今日天下車書正一家哀江頭蘇子由云大雅綿九章誦太王遷豳建都邑營宫室而巳至其八章乃曰肆不殄厥愠亦不隕厥問始及昆夷之怒上何也至其九章乃曰虞芮質厥成文王蹶厥生豫曰有疏附豫曰有先後豫曰有奔奏豫曰有禦侮事不接文不屬如連川斷嶺雖相去絶逺而氣象聯絡觀者知其脈理之為一也蓋附離不以鑿枘此最為文之髙致耳老杜陷賊時有哀江頭詩豫愛其詞氣如百金戰馬注坡驀澗如履平地得詩人之遺法如白樂天詩詞甚工然拙於紀事寸步不遺猶恐失之此所以望老杜之藩垣而不及也少陵野老吞聲哭春日潛行曲江曲江頭宫殿鎖千門細栁新蒲為誰緑憶昔霓旌下南苑苑中萬物生顔色昭陽殿裏第一人同輦隨君侍君側輦前才人帶弓箭白馬嚼齧黃金勒翻身向天仰射雲一箭正墜雙飛翼明眸皓齒今何在血汙遊魂歸不得清渭東流劍閣深去住彼此無消息人生有情淚沾臆江水江花豈終極黃昏胡騎塵滿城欲往城南忘南北兵車行蔡寬夫詩話云齊梁以來文士喜為樂府辭然沿襲之久往往失其命題本意烏將八九子但詠烏雉朝飛但詠雉難鳴髙樹顛但詠雞大抵類此而甚有併其題失之者如相府蓮訛為想夫憐如楊婆兒訛為楊叛兒之類是也蓋辭人例多事語言不復詳研考雖李白亦不免此惟老杜兵車行悲青坂無家别見前等數篇皆因事自出已意立題略不更蹈前人陳迹真豪傑也車轔轔馬蕭蕭行人弓箭各在腰爺娘妻子走相送塵埃不見咸陽橋牽衣頓足攔道哭哭聲直上千雲霄道旁過者問行人行人但云㸃行頻或從十五北防河便至四十西營田去時里正與裹頭歸來頭白還戍邊邊庭流血成海水武皇開邊意未已君不見漢家山東二百州千村萬落生荆杞縱有健婦把鋤犁禾生隴畝無東西況復秦兵耐苦戰被驅不異犬與雞長者雖有問役夫敢伸恨且如今年冬未休關西卒縣官急索租租稅從何出信知生男惡反是生女好生女猶是嫁比鄰生男埋沒隨百草君不見青海頭古來白骨無人收新鬼煩寃舊鬼哭天隂雨濕聲啾啾悲青坂我軍青坂在東門天寒飲馬太白窟黃頭奚兒日尚西數騎彎弓敢馳突山雪河冰野蕭瑟青是烽煙白人骨焉得附書與我軍忍待明年莫倉卒後出塞許彥周詩話云詩有力量如弓之斗力其未挽時不知其難也及其挽之力不及處分寸不可强若出塞曲落日照大旗馬鳴風蕭蕭悲笳數聲動壯士慘不驕又八哀詩汝陽讓太子眉宇真天人虬髯似太宗色映塞外春見後此等力量不容它人到朝進東門營暮上河陽橋落日照大旗馬鳴風蕭蕭平沙列萬幕部伍各見招中天懸明月令嚴夜寂寥悲笳數聲動壯士慘不驕借問大將誰恐是霍嫖姚八哀詩傷時盜賊未息興起王公李公歎舊懷賢終于張相國八公前後存沒遂不詮次焉少陵詩總目云八哀詩古風中最為大筆崔德符嘗論斯文可以表裏雅頌中古作者莫及也贈司空王公思禮司空出東夷童稚刷徑翮追隨燕薊兒穎鋭物不隔服事哥舒翰意無流沙磧未甚拔行間犬戎大充斥短小精捍姿屹然强冦敵貫穿百萬衆出入由咫尺馬鞍懸將首甲外控鳴鏑洗劍青海水刻銘天山石九曲非外蕃其王轉深壁飛兔不近駕鷙鳥資逺擊曉達兵家流飽聞春秋癖胸襟日沉靜肅肅自有適潼關初潰散萬乘猶辟易偏禆無所施元帥見手格太子入朔方至尊狩梁益胡馬纏伊落中原氣甚逆肅宗登寶位塞望勢敦迫公時徒步至請罪將厚責際會清河公間道傳玉冊天王拜跪畢讜議果氷釋翠華卷飛雪熊虎亘阡陌屯兵鳳凰山帳殿涇渭闢金城賊咽喉詔鎮雄所扼禁暴靖無雙爽氣春浙瀝巷有從公歌野多青青麥及夫哭廟後復領太原役恐懼祿位髙悵望王土窄不得見清時嗚呼就窀穸永繫五湖舟悲甚田橫客千秋汾晉間事與雲水白昔觀文苑傳豈述廉藺績嗟嗟鄧大夫士卒終倒㦸故司徒李公光弼司馬天寶末北收晉陽甲胡騎攻吾城愁寂意不愜人安若泰山薊北斷右脅朔方氣乃蘇黎首見帝業二宫泣四郊九廟起頽壓未散河陽卒思明僞臣妾復自碣石來火焚乾坤獵髙視笑祿山公又大獻捷異王冊崇勳小敵信所怯擁兵鎮河汴千里初妥帖青繩紛營營風雨秋一葉內省未入朝死淚終映睫大屋去髙棟長城掃遺堞平生白羽扇零落蛟龍匣雅望與英姿惻愴槐里接三軍晦光彩烈士痛稠叠直筆在史臣將來洗箱篋吾思哭孤冢南紀阻歸楫扶顛永蕭條未濟失利涉疲薾竟何人灑涕巴東峽贈左僕射鄭國公嚴公武鄭公瑚璉器華嶽金天晶昔在童子日已聞老成名嶷然大賢後復見秀骨清開口取將相小心事友生閲書百氏盡落筆四座驚厯職匪父任嫉邪常力爭漢儀尚整肅胡騎忽縱橫飛傳自河隴逢人問公卿不知萬乘出雪涕風悲鳴受詞劍閣道謁帝蕭關城寂寞雲臺仗飄颻沙塞旌江山少使者笳鼓凝皇情壯士血相視忠臣氣不平密論正觀體揮發岐陽征感激動四極聨翩收二京西郊牛酒再原廟丹青明匡汲俄寵辱衛霍竟哀榮四登會府地三掌華陽兵京兆空栁色尚書無履聲羣烏自朝夕白馬休橫行諸葛蜀人愛文翁儒化成公來雪山重公去雪山輕記室得何遜韜鈐延子荆四郊失壁壘虛館開逢迎堂上指圖畫軍中吹玉笙豈無成都酒憂國只細傾時觀錦水釣問俗終相並意待犬戎滅人藏紅粟盈以兹報主願庶或禆世程炯炯一心在沉沉二豎嬰顔回竟短折賈誼徒忠貞飛旐出江漢孤舟轉荆衡虛無馬融笛帳望龍驤塋空餘老賓客身上愧簪纓贈太子太師汝陽郡王璡汝陽讓太子眉宇真天人虬髯似太宗色映塞外春往者開元中主恩視遇頻出入獨非時禮異見羣臣愛其謹潔極倍此骨肉親從容聽朝後或在風雪晨忽思格猛獸苑囿騰清塵羽旗動若一萬馬肅侁侁詔王來射鴈拜命已挺身箭出飛鞚內上又回翠麟翻然紫塞翮下拂明月輪從人雖獲多天笑不為新王每中一物手自與金銀袖中諫獵書扣馬久上陳竟無銜橛虞聖聰矧多仁官免供給費水有在藻鱗匪唯帝老大皆是王中勤晚年務置醴門引申白賓道大容無能永懷侍芳茵好學尚真烈義形必霑巾揮翰綺繡揚篇什若有神川廣不可泝墓久狐兔鄰宛彼漢中郡文雅見天倫何以開我悲泛舟俱逺津溫溫昔風味少壯已書紳舊遊易磨滅衰謝多酸辛贈祕書監江夏李公雍長嘯宇宙間髙才日陵替古人不可見前輩復誰繼憶昔李公存詞林有根柢聲華當健筆灑落富清製風流散金石追琢山嶽鋭情窮造化理學貫天人際于謁走其門碑版照四裔各滿深望還森然起凡例蕭蕭白楊路洞徹寶珠惠龍宫塔廟湧浩劫浮雲衛宗儒俎豆事故吏去思計眄睞已皆虛跋踄曽不泥向來映當時豈獨勸後世豐屋珊瑚鈎麒麟織成罽紫騮隨劍几義取無虛嵗分宅脫驂間感激懷未濟衆歸賙給美擺落多藏穢獨步四十年風聽九臯唳嗚呼江夏姿竟掩宣尼袂往者武后朝引用多寵嬖否臧太常議面折二張勢衰俗凜生風排蕩秋旻霽忠貞負寃根宫闕深旒綴放逐早聨翩低垂困炎厲日斜鵩鳥入魂斷蒼梧帝榮枯走不暇星駕無安稅幾分漢庭竹夙擁文侯篲終悲洛陽獄事近小臣斃禍階初負謗易力何深嚌伊昔臨淄亭酒酣託末契重叙東都别朝隂改軒砌論文到崔蘇指盡流水逝近伏盈川雄未甘特進麗是非張相國相扼一危脆爭名豈古然關揵歘不閉例及吾家詩曠懷掃氛翳慷慨嗣真作咨嗟玉山桂鍾律儼髙懸鯤鯨噴迢遰坡陀青州血蕪沒汶陽瘞哀贈竟蕭條恩波延揭厲子孫存如線舊客舟凝滯君臣尚論兵將帥接燕薊朗詠六公篇憂來豁䝉蔽故祕書少監武功蘇公源明武功少也孤徒步客徐兖讀書東嶽中十載考墳典時下萊蕪郭忍饑浮雲巘負米晚為身每食臉必泫夜字照爇薪垢衣生碧蘚庶以勤苦志報兹劬勞願學蔚醇儒姿文包舊史善灑落辭幽人歸來潛京輦射策君東堂宗匠集精選制可題未乾乙科已大闡文章日自負掾吏亦纍踐晨趨閶闔內足踏宿昔趼一麾出守還黃屋朔風卷不暇陪八駿虜庭悲所遣平生滿樽酒斷此朋知展憂憤病二秋有恨石可轉肅宗復社稷得無逆順辨范曄顧其兒李斯憶黃犬祕書茂松色載從祠壇墠前後百卷文枕籍皆禁臠篆刻揚雄流溟漲本末淺青熒芙蓉劍犀兕豈獨剸反為後輩褻豫實苦懷緬煌煌齊房芝事絶萬手搴垂之俟來者正始徴勸勉不要懸黃金胡為投亂贙結交三十載吾與誰遊衍滎陽復冥漠罪罟已橫罥嗚呼子逝日始泰則終蹇長安米萬錢凋喪盡餘喘戰伐何當解歸帆阻清沔尚纏漳水疾永負蒿里餞故著作郎貶台州司户滎陽鄭公䖍鶢鶋至魯門不識鍾鼓響孔翠望赤霄愁思雕籠養滎陽冠衆儒早聞名公賞地崇士大夫況乃氣清爽天然生知姿學立游夏上神農或闕漏黃石愧師長藥纂西極名兵流指諸掌貫穿無遺恨薈蕞何技癢圭臬星經奧蟲篆丹青廣子雲窺未遍方朔諧太枉神翰顧不一體變鍾兼兩文傳天下口大字猶在榜昔獻書畫圖新詩亦俱往滄洲動玉陛寡鶴誤一響三絶自御題四方尤所仰嗜酒益疏放彈琴視天壤形骸實土朩親近惟几杖未曽寄官曹突兀倚書幌晚就藝香閣風塵昏坱莽反覆歸聖朝㸃染無滌蕩老䝉台州掾泛泛浙江槳履穿四明雪饑拾楢溪橡空聞紫芝歌不見杏壇丈天長眺東南秋色餘魍魎别離慘至今斑白徒懷曩春深秦山秀葉墜清渭朗劇談王侯門野稅林下鞅操紙終夕酣時物集遐想詞場竟疏濶平昔濫吹奬百年見存沒牢落吾安放蕭條阮咸在出處同世網他日訪江樓含凄述飄蕩故右僕射相國張公九齡相國生南紀金璞無留礦仙鶴下人間獨立霜毛整矯然江海思復與雲路永寂寞想土階未遑等箕潁上君白玉堂倚君金華省碣石嵗峥嶸天地日蛙黽退食吟大庭何心記榛梗骨驚畏曩哲鬒變負人境雖䝉換蟬冠右地恧多幸敢忘二疏歸痛迫蘇耽井紫綬映暮年荆州謝所領庾公興不淺黃霸鎮每靜賓客引調同諷詠在務屛詩罷地有餘篇終語清省一陽發隂管淑氣含公鼎乃知君子心用才文章境散帙起翠螭倚薄巫廬並綺麗𤣥暉擁箋誄任昉騁自我一家則未缺隻字警千秋滄海南名繫朱鳥影歸老守故林戀闕悄延頸波濤良史筆蕪絶大庾嶺向時禮數隔制作難上請再讀徐孺碑猶思理煙艇冬日洛城北謁𤣥元皇帝廟珊瑚鈎詩話云陳無已先生語豫曰今人愛杜甫詩一句之內至切取數字以髣像之非善學者學詩之要在乎立格命意用字而巳豫曰如何等是曰冬日謁𤣥元皇帝廟詩叙述功德反復外意事該而理長閬中歌辭致峭麗語脈新竒句清而體好兹非立格之妙乎江漢詩言乾坤之大腐儒無所寄其身縛雞行言雞蟲行失不如兩忘而寓於道兹非命意之深乎贈蔡希魯詩云身輕一鳥過力在一過字徐步詩云花蘂上蜂鬚功在一上字兹非用字之精乎學者體其格髙其意練其字則自然有合矣何必規規然髣像之乎配極𤣥都閟憑髙禁禦長宗祧嚴具禮掌節鎮非常碧瓦初寒外金莖一氣旁山河扶繡户日月近雕梁仙李盤根大猗蘭奕葉光世家遺舊史道德付今王畫手看前輩吳生逺擅場森羅移地軸妙絶動宫牆五聖聨龍衮千官列鴈行冕旒俱秀發旌斾盡飛揚翠柏深留景紅梨逈得霜風筝吹玉桂露井凍銀床身退卑周室經傳拱漢皇谷神如不死養拙更何鄉閬山歌閬州城東靈山白閬州城北玉臺碧松浮欲盡不盡雲山動將崩已崩石那知根無鬼神會已覺氣與嵩華敵中原格鬭且未歸應結茅齊看青壁閬水歌嘉陵江色何所似石黛碧玉相因依正憐日破浪花出更復春從沙際歸巴童蕩漿欹側過水雞銜魚來去飛閬中勝事可腸斷閬州城南天下稀江漢江漢思歸客乾坤一腐儒片雲天共逺永夜月同孤落日心猶壯秋風病欲蘇古來存老馬不必取長途縛雞行小奴縛雞向市賣雞被縛急相喧爭家中厭雞食蟲蟻不知雞賣還遭烹蟲雞於人何厚薄吾叱奴人解其縛雞蟲得失無了時注目寒江倚山閣登嶽陽樓唐子西語録云過嶽陽樓觀子美詩不過四十字耳氣象宏放涵蓄深逺殆與洞庭爭雄所謂富哉言乎者太白退之輩率為大篇極其筆力終不逮也杜詩雖小而大餘詩雖大而小西清詩話云洞庭天下壯觀自昔騷人墨客題之者衆矣如水涵天影濶山拔地形髙四顧疑無地中流忽有山鳥飛應畏墮帆逺却如閒皆見稱於世未若孟浩然氣蒸雲夢澤波撼嶽陽城則洞庭空曠無際氣象雄壯如在目前至子美詩則又不然吳楚東南坼乾坤日夜浮不知少陵胸中吞幾雲夢也昔聞洞庭水今上嶽陽樓吳楚東南坼乾坤日夜浮親朋無一字老病有孤舟戎馬關山北憑軒涕泗流野人送朱櫻詩眼云櫻桃詩云云前四句此詩如禪家所謂信手拈來頭頭是道者直書目前所見平易委曲得人心所同然但它人難難不能發爾至於云云後四句其感興皆出於自然故終篇遒健西蜀櫻桃也自紅野人相贈滿筠籠數回細寫愁仍破萬顆勻圓訝許同憶昨賜霑門下省退朝擎出大明宫金盤玉筯無消息此日嘗新任轉蓬秋雨歎苕溪漁隱云秋雨歎三篇一二篇尤感慨雨中百草皆爛死階下決明顔色鮮著葉滿枝翠羽蓋開花無數黃金錢涼風蕭蕭吹汝急恐汝後時難獨立堂上書生空白頭臨風三嗅馨香泣春望迂叟詩話云牂羊墳首三星在罶言不可久古人為詩貴於意在言外使人思而得之故言之者無罪聞之者足以戒也近世詩人惟杜子美最得詩人之體如山河在明無餘物矣草朩深明無人矣花鳥平時可娛之物見之而泣聞之而恐則時可知矣他皆類此不可遍舉國破山河在城春草朩深感時花濺淚恨别鳥驚心烽火連三月家書抵萬金白頭搔更短渾欲不勝簪壯遊䂬溪詩話云書史蓄胸中而氣味入於冠裾山川厯目前而英靈助於文字太史公南遊北涉信非徒然觀老杜壯遊云東下姑蘇臺至西歸到咸陽其豪氣逸韻可以想見序太白集者稱其隱岷山居襄漢南遊江淮觀雲夢去之齊魯之吳之梁北抵趙魏燕晉西徙邠岐金陵上潯陽流夜郎泛洞庭上巫峽白自序亦自偶乘舟一日千里或遇勝景終年不移其恣橫採覽非其狂也使二公穩坐中書何以垂不朽如此哉燕公助於江山鄭綮謂相府非灞橋那得詩思非虛語也往昔十四五出遊翰墨場斯文崔魏徒以我似班揚七齡思即壯開口詠鳳皇九齡書大字有作成一囊性豪業嗜酒嫉惡懷剛腸脫略小時輩結交皆老蒼飲酣嗜八極俗物都茫茫東下姑蘇臺已具浮海航到今有遺恨不得窮扶桑王謝風流逺闔廬邱墓荒劍池石壁仄長洲芰荷香嵯峨閶門北清廟映回塘每趨吳太伯撫事淚浪浪枕戈憶勾踐渡浙想秦皇蒸魚聞匕首除道哂要章越女天下白鏡湖五月涼剡溪藴秀異欲罷不能忘歸帆拂天姥中嵗貢舊鄉氣劘屈賈壘目短曹劉牆忤下考工第獨辭京尹堂放蕩齊趙間裘馬頗清狂春歌叢臺下冬獵青邱旁呼鷹皂櫪林逐獸雲雪岡射飛曾縱鞚引臂落􅒗鶬蘇俟據鞍喜忽如擕葛疆快意八九年西歸到咸陽許與必詞伯賞遊實賢王曳裙置醴地奏賦入明光天子廢食召羣公會軒裳脫身無所愛痛飲信行藏黑貂不免敝班鬢兀稱觴杜曲晚耆舊四郊多白楊坐深鄉黨敬日覺死生忙朱門任傾奪赤族迭罹殃國馬竭粟豆官雞輸稻梁舉隅見煩費引古惜興亡河朔風塵起岷山行幸長兩宫各警蹕萬里遙相望崆峒殺氣黑少海旌旗黃禹功亦命子涿鹿親戎行翠葉擁吳嶽螭虎噉豺狼爪牙一不中驕兵更陸梁大軍載草草凋瘵滿膏盲備員竊補衮憂憤心飛揚上感九廟焚下憫萬民瘡斯時伏青蒲廷諍守御床君辱敢愛死赫怒幸無傷聖哲體仁恕宇縣復小康哭廟灰燼中鼻酸朝未央小臣議論絶老病家殊方鬱鬱苦不展羽翮困低昂秋風動哀壑碧蕙捐微芳之推避賞從漁父濯滄浪榮華敵勳業嵗暮有嚴霜吾觀鴟夷子才格出尋常羣凶逆未定側佇英後翔玉華宫容齊隨筆云張文潛暮年在宛邱何大圭方弱冠住謁之凡三日見其吟哦此詩不絶口大圭請其故曰此章乃風雅鼓吹未易為子言大圭曰先生所賦何必減此曰平生極力模寫僅有一篇稍似之然未可同日語遂誦其離黃州詩偶同此韻曰扁舟發孤城揮手謝送者山回地勢卷天豁江面瀉中流望赤壁石腳插天下昏昏煙霧嶺厯厯渙樵舍居夷實三載鄰里通假借别之豈無情老淚為一灑篙工起鳴鼓輕櫓健於馬聊為過江宿寂寂樊山夜此其音響節奏固似之矣讀之可默喻也溪回松風長蒼鼠竄古瓦不知何王殿遺構絶壁下陰房鬼火青壞道哀湍瀉萬籟真笙竽秋色正瀟灑美人為黃土況乃粉黛假當時侍金輿故物獨石馬憂來藉草坐浩歌淚盈把冉冉征途間誰是長年者嚴鄭公宅詠竹王洙詩注云此詩公之措意極為深逺以意逆志觀者當自知之緑竹半含籜新梢才出牆色侵書帙晚陰過酒樽涼雨洗娟娟靜風吹細細香但令無翦伐㑹見拂雲長孤鴈師先生詩注云鮑當孤鴈詩云更無聲接續空有影相隨孤則孤矣豈若子美有飲啄念羣之語孤之中乃有不孤之意而誰憐一片影相失萬重雲又有不盡之意乎孤鴈不飲啄飛鳴聲念羣誰憐一片影相失萬重雲望盡似猶見哀多如更聞野鴉無意緒鳴噪自紛紛絶句謾興九首張文潛云以聲律作詩其末流也而自唐至今詩人謹守之獨魯直一掃古今出胸臆破棄聲律作五七言如金石未作鐘磬聲和渾然有律吕外意近來作詩者頗有此體然自吾魯直始也苕溪漁隱曰古詩不拘聲律自唐至今詩人皆然初不待破棄聲律詩破棄聲律老杜自有此體如絶句漫興黃河江畔獨步尋花䕫州歌春水生皆不拘聲律渾然成章新竒可愛眼見客愁愁不醒無賴春色到江亭即遣花開深造次便覺鶯語太丁寧手種桃李非無主野老牆低還是家恰似春風相欺得夜來吹折幾枝花孰知茅齊絶低小江上燕子故來頻銜泥㸃汙琴書內更接飛蟲把著人二月已破三月來漸老逢春能幾回莫思身外無窮事且盡生前有限杯腸斷春江欲盡頭杖藜徐步立芳洲顛狂栁絮隨風去輕薄桃花逐水流懶慢無堪不出村呼兒自在掩柴門蒼苔濁酒林中靜碧水春風野外昏糝徑楊花鋪白氊㸃溪荷葉叠青錢筍根稚子無人見沙上鳬雛旁母眠舍西柔桑葉可拈江上細麥復纎纎人生幾何春已夏不放香醪如密甜隔户楊栁弱嫋嫋恰似十五兒女腰誰謂朝來不作意狂風挽斷數長條黃河二首黃河北岸海西軍捶鼓鳴鐘天下聞鐵馬長鳴不知數羌人髙鼻動成羣黃河西岸是吾蜀欲須供給家無粟願驅衆庶戴君王混一車書棄金玉江畔獨步尋花七絶句禁臠云古詩有醇釅之氣江畔獨步尋花七絶句云云江上被花惱不徹無處告訴只顛狂走覓南鄰愛酒伴經旬出飲獨空牀稠花亂蘂畏江濱行步欹危實怕春詩酒尚堪驅使在未須料理白頭人江深竹靜兩三家多事紅花映白花報答春光知有處應須美酒送生涯東望少城花滿煙百花髙樓更可憐誰能載酒開金盞喚起佳人舞繡筵黃師塔前江水東春光懶困倚微風桃花一簇開無主可愛深紅愛淺紅黃四娘家花滿蹊千朵萬朵壓枝低留連戲蝶時時舞自在矯鶯恰恰啼不是愛花即欲死只恐花盡老相催繁枝容易紛紛落嫩葉商量細細開䕫州歌十絶句中巴之東巴東山江水開闢流其間白帝髙為三峽鎮䕫州險過百牢關白帝䕫州各異城蜀江楚峽混殊名英雄割據非天意霸王並吞在物情羣雄競起問前朝王者無外見今朝比訝漁陽結怨恨元聽舜日舊簫韶赤甲白鹽俱刺天閭閻繚繞接山巔楓林橘樹丹青合復道重樓錦繡懸瀼東瀼西一萬家江北江南春冬花背飛鶴子遺瓊蘂相趂鳬雛入蔣牙東屯稻畦一百頃北有澗水通青苗晴浴狎鷗分處處雨隨神女下朝朝蜀麻吳鹽自古通萬斛之舟行若風長年三老長歌裏白晝攤錢髙浪中憶昔咸陽都市合山水之圖張賣時巫峽曾經寶屛見楚宫猶對碧峯疑閬風𤣥圃與蓬壺中有髙堂天下無借問䕫州壓何處峽門江腹擁城隅武侯祠堂不可忘中有松柏參天長干戈滿地客愁破雲日如火炎天涼春水生二絶句二月六夜春水生門前小灘渾欲平鸕鷀鸂鶒莫漫喜吾與汝曹俱眼明一夜水髙二尺强數日不可更禁當南市津頭有船賣無錢即買繫籬傍竹莊詩話卷六
