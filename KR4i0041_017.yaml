body:
  text: 竹莊詩話卷十七雜編七上元觀燈夏竦韻語陽秋云應制詩非他詩比自是一家句法大抵不出于典實富艷爾夏英公于上元觀燈詩云云王岐公詩云云二公雖不同時而二詩如出一人之手蓋格律當如是也若作清癯平淡之語終不近爾魚龍曼衍六街呈金鎖通宵啓玉京冉冉遊塵生輦道遲遲春箭入歌聲寶坊月皎龍燈淡紫館風微鶴焰平宴罷南端天欲曉回瞻河漢尚盈盈上元觀燈王圭侯鯖録云元祐中元夕上御樓觀燈有御制詩時王禹玉蔡持正為左右相持正叩禹玉云應制上元詩如何使故事禹玉曰鼇山鳯輦外不可使章子厚笑曰此誰不知後兩日登對上獨賞禹玉詩云云妙于使事詩云云是夕以高麗進樂又添一杯雪消華月滿仙臺萬燭當樓寶扇開雙鳯雲中扶輦下六鼇海上駕山來鎬宫春酒霑周燕汾水秋風陋漢才一曲升平人共樂君王又進紫霞杯春帖子蘇頌又云翰苑春帖子往往秀麗可喜如蘇子容鄧溫伯蔣頴叔梁君貺詩皆佳作也余觀鄭毅夫新春詞四首與帖子格調何異豈久于翰苑而筆端自然習熟耶璇霄一夕斗杓東瀲灔晨曦照九重和氣薰風摩蓋壤競銷金甲事春農春帖子鄧潤甫晨曦瀲灔上簾櫳金屋熙熙歌吹中桃臉自知宫宴早百花頭上放輕紅前題蔣之竒未旦求衣向曉雞蓬萊仗下日將西花添漏鼓三聲逺栁映春旗一色齊前題梁君貺東方和氣斗回杓龍角中星轉紫霄聖主問安天未曉求衣親護玉宸朝新春詞鄭獬春色應隨步輦還珠旒玉几照龍顔紫雲殿下朝元罷便領東風到世間其二春風細拂緑波長初過層城渡建章草色未迎雕輦翠栁梢先學赭衣黃其三晴暉散入鳯凰樓一桁朱簾不下鈎漢殿鬭簮雙彩燕並和春色上叉頭其四小池春破玉玲瓏聲觸簾鈎漸好風間繞欄干掐花樹春䀶已著半梢紅不及陪東坡往金山作水陸米芾韻語陽秋云米元章賦詩絶人而人罕稱之者以書名掩之也如此二詩殆出翰墨畦徑之表蓋自邁往凌雲之氣流出非尋規索矩者之可到也久隂障奪佳山川長瀾四溢魚龍淵衆看李郭渡浮玉晴風掃出清明天頗聞妙力開大施足病不到諸方仙想應蒼壁有垂露照水百怪愁寒煙棲雲閣米芾雲出救世旱澤浹雲尋歸入石了不見豐功已如斯龍騫存復起抱石明幽姿雲乎無定所隱者何當棲淮之水徐積淮之水淮之水春風吹春風洗青于藍緑染指魚不來鷗不起瀲灔灔天盡頭祗見孤帆不見舟殘陽欲落未落處盡是人間今古愁今古愁可奈何莫使騷人聞棹歌我曹盡是浩歌客笑聲酒靣春風和詠蒲扇徐積妾有一匹絹以為身上衣自織青溪蒲圑團手中持朝擕麥隴去暮汲井泉歸無人不看妾不使見蛾眉和李上舍冬日詩韓駒復齋謾録云李彭商老有建除體贈子蒼云滿朝以詩鳴何獨遺大雅平生黃葉句摸索便知價蓋自時子蒼自館職斥宰分寧縣時也子蒼有和李上舍冬日詩最為世所推故商老有黃葉之句北風吹日盡多隂日暮擁階黃葉深倦鵲繞枝翻凍影飛鴻摩月墮孤音推愁不去如相覔與老無期稍見侵顧藉微官少年事病來那復一分心瑞香陳子高苕溪漁隱云瑞香陳子高有古詩一篇意含諷刺語加微婉得騷人之體佳人在空谷雙星思斜河契濶不有命盛時豈蹉跎娟娟匡廬秀如此粲者何香密綴紅糝寶薰幕宫羅幽窗小團圞微風自婆娑寂寥千年初戢戢逢文多何偕託方便百金䀻猗赤欄青蔑舫丁寧護根窠泥沙亦天幸板聨入宣和誰令蘭蕙徒憔悴守巖阿送董元達謝無逸謾叟詩話云謝無逸學古高潔文詞煆煉篇篇有古意尤工于詩豫嘗愛其送董元達云云又寄隱居士云云讀書不作儒生酸躍馬西入金城關塞垣苦寒風氣惡歸來靣皺鬢眉斑先皇召見延和殿議論慷慨天開顔謗書盈篋不復辨脫身來看江南山長江滾滾蛟龍怒扁舟此去何當還大梁城裏定相見玉川破屋應數間寄隱居士謝無逸處士滑相不封侯卜居但得林塘幽家藏玉唾幾千卷手校韋編三十秋相知四海孰青眼高卧一庵今白頭襄陽耆舊節獨苦只有龎公不入州李伯時畫太一真人卧一大蓮葉中手執書卷仰讀蕭然有物外思題其上云韓駒苕溪漁隱云韓子蒼此詩語意妙絶真能詠盡此畫也太一真人蓮葉舟脫巾露髮寒颼颼輕風為帆浪為楫卧看玉宇浮中流中流蕩漾翠綃舞穩如龍驤萬斛舉不是峰頭十丈花世間那得葉如許龍眠畫手老入神尺素幻出真天人恍然坐我水仙府蒼煙萬頃波粼粼玉堂學士今劉向禁直苕嶤九天上不須對此融心神會值青藜夜相訪清江曲蘇伯固東坡云此篇若置李太白集中誰疑其非者屬玉雙飛水滿塘菰蒲深處浴鴛鴦白蘋滿棹歸來晚秋著蘆花一岸霜扁舟繫岸依林樾蕭蕭兩鬢吹華髮萬事不理醉復醒長占煙波㺯明月後清江曲蘇伯固韻語陽秋云蘇養直清江曲見賞于東坡名已不沒而又作後清江曲一篇豈養直尚惡其少作云云前四句如此等句前清江曲似未到也層波渺渺山蒼蒼輕霜殞木蓮葉黃呼兒極浦下苓箵社甕欲熟浮蛆香輕蓑淅瀝鳴秋雨日暮乘流自相語一笛清風萬事休白鳥翩翩落煙渚觀臨淮雙頭白蓮圖周知微王直方詩話云周知微字明老為詩有可喜者如雙頭白蓮圖亦為可賞君不學叔隗季隗南歸晉又不學大喬小喬東入吳一種桃根與桃葉若為化作雙芙蕖臨淮政成有餘暇坐令華室生瀟灑鵝溪一幅萬里寬移得浙川入圖畫天空水濶江茫茫想見女英與娥皇九疑雲深蒼梧逺氷姿泣露不成粧苦心抱恨何時了香骨應甘沒秋草不如回首謝秋風分作尹邢來漢宫題關右寺壁東坡云余舊見此詩于關右壁上愛之不知何人作也䂬溪詩話云世傳一武人詩也不為勇退雅志為可喜而易道家所忌之業以示子孫尤可喜也欲挂衣冠神武門先尋水竹渭南村却將舊斬樓蘭劒買得黃牛教子孫晚春吳可苕溪漁隱云吳可晚春詩亦灑落可喜小醉初醒過别村數家殘雪擁籬根枝頭有恨梅千點溪上無人月一痕絶句談知柔又云余于一達官處見談知柔獻詩文一編小詩極有可喜者今舉其尤者二絶麥隴風來翠浪浮霏微小雨似深秋野亭終日捲簾坐清樾對啼黃栗留又漫郎無處覔歸田江北江南水拍天斗擻十年塵土夢秋風吹上釣魚船栁枝詞張耒復齋謾録云此張文潛詩也王平甫嘗愛而誦之詩事云古今栁詞惟鄭文寶一篇有餘意也云云終篇了不道著栁惟一繫字是工夫而學者思之亭亭畫軻繫春潭只向行人酒半酣不管煙波與風雨載將離恨過江南絶句朱松苕溪漁隱云朱喬年絶句云云蓋前人有詠筍云急忙且喫莫踟蹰一夜南風變成竹喬年點化乃爾精巧春風吹起籜龍兒戢戢滿山人未知急喚蒼頭斸煙雨明朝吹作碧參差與客夜坐王安石冷齊夜話云山谷嘗言天下清景初不擇貴賤賢愚而與之然吾特疑端為我輩設荆公在鍾山與客夜坐作詩云云東坡宿餘杭山寺詩云云人以山谷之言為確論殘生傷性老耽書年少東來復起豫各據稿梧同不寐偶然聞雨落階除宿餘杭山寺集中云書雙竹湛師房蘇軾暮鼓晨鐘自擊撞閉門欹枕對殘缸白灰旋撥通紅火卧聼蕭蕭雪打窗絶句劉季孫石林詩話云劉季孫能詩初監饒州酒稅王荆公為江東提刑巡歷至饒按酒務至廳事見屏間題小詩云云大稱賞之即召與語嘉嘆升車而去不復問務事遂知名呢喃燕子語梁間底事來驚夢裏間説與傍人應不解杖藜擕酒看支山老松王公韶復齋謾録云王公韶少日讀書于廬山東林裕老庵庵前有老松因賦詩云云王荆公為憲江東過而見之大加稱賞遂為知已緑皮皴剝玉嶙峋高節分明似古人解與乾坤生氣概幾回風雨長精神裝添景物年年别擺押窮愁日日新惟有碧霄雲裏月共君孤影最相親明妃引呻吟集公八歲作邢居實韻語陽秋云邢惇夫十四歲作明君引謂上天仙人骨法别人間畫工畫不得亦有思致王直方詩話云惇夫年少豪邁所與遊皆一時名士方十四五時嘗作明妃引末云安得壯士霍嫖姚縛取呼韓作編戶諸公多稱之漢宫有女顔如玉淺畫蛾眉逺山緑披香殿裏夜吹笙未央宫中朝理曲絳紗蒙籠雙蠟燭簫鼓聲傳春漏促玉輦三更别院歸夜深月照黃金屋莓苔滿院無行迹總為君王未相識上天仙人骨法别人間畫工畫不得嫣然一笑金輿側玉貌三千斂顔色羅幃繡户掩風香一朝返嫁單于國金鳯羅衣為誰縷長袖弓彎不堪舞一别昭陽舊院花淚灑胭脂作紅雨回頭不見雲間闕黃河半渡新冰骨馬蹄已踏遼碣塵天邊尚挂長門月黃沙不似長安道薄暮微雲映衰草羌人馬上鳴胡笳緑髮朱顔為君老西風蕭蕭郅水寒啼痕不斷幾闌干年年看盡南飛雁一去天涯竟不還少年將軍健如虎日夕撞鐘捶大鼓寶刀生澀旌旗捲漢宫嫁盡嬋娟女寂寞邊城日將暮三尺角弓調白羽安得猛士霍嫖姚縛取呼韓作編戶癭木壺吕公著南窗紀談云吕申公為潁州通判歐陽公為守歐陽公素不以文靖公為然及與其子為僚見其學識已改觀矣時劉厚甫王深甫皆寓居郡下四人日相從講學為事情好欵密一日分題賦詩申公得癭木壺其辭云云歐陽公見之益加稱賞以為有宰相器及還朝遂薦為諫官申公文章世不多見惟此詩見傳蓋由歐陽公數為人道之也天地産衆材創物謂之智梁棟與楹杙小大無有棄方者以矩度圓者中規制嗟爾木之癭何異內有贅生成臃腫姿賦象難取類櫽括所不施鈎繩為爾廢大匠睨而往惻然乃有意孰非造化功而終不朽器刳剔虛其中朱漆為之外􅝥漿挹酒醴施用惟其利犧象非不珍金罍豈不貴幸因左右容反見謂奇異人之于才性夫豈逺于是性雖有不善在教之操勵才無不可用在上所措置錯陋就其長皆得為良士執一以廢百衆功何由備是惟聖人心能通天下志秋聲關注又云關注子東喜為詩有唐人之風嘗記其秋聲一篇其工緻清婉多此類也夢破松聲枕上聞睡魔夜半戰吟魂初疑秋雨連江岸乍覺寒潮上海門招引好風來古寺追隨月色下前村晚行欲問聲來處鬱鬱蒼波漫不分望夫石賀鑄王直方詩話云賀方回作望夫石詩交遊間無不愛者亭亭望夫石下閲幾人代蕩子長不歸山椒久相待微雲蔭髮彩初月輝蛾黛秋雨疊苔衣春風舞蘿帶花然姑射子矯首塵宴外陳迹遂亡窮佳期從莫再脫如魯秋氏妄結桑下愛玉質委泥沙悠悠復安在題小寺冦國寶石林詩話云余居吳下一日出閶門至小寺中壁間有題詩一絶云云意極喜之寺僧云吳縣主簿所作今官滿去矣歸而問士大夫云姓冦名國寶久從陳無已學乃知文章淵源有所自來亦不難辨黃葉西陂水漫流籧篨風急送扁舟夕陽暝色來千里人語雞聲共一邱墨梅陳去非韻語陽秋云先文康公知汝州日以去非墨梅繳進於是除太學博士漁隱叢話云去非詩平淡有工墨梅絶句云云前首徽廟召對稱賞自此知名含章簾下春風靣造化功成秋兔毫意足不求顔色似前身相馬九方臯前題容齋續筆云簡齋墨梅一篇云云語意皆妙絶晉陸機為顧榮贈婦語云京洛多風塵素衣化為緇齊謝玄暉酬王晉安詩云誰能久京洛緇塵染素衣正用此也粲粲江南萬玉妃别來幾度見春歸相逢京洛渾依舊只恨緇塵染表衣應制科賦詩夏竦青箱雜記云夏文莊試制科廷對出殿門楊徽之見其年少遽邀與語曰老夫他則不知唯喜吟詩願丐賢良一篇以卜他日之志公欣然為書云云徽之曰真宰相器也真宰相器語見百家詩選殿上袞衣明日月硯中旗影動龍蛇縱橫禮樂三千字獨對丹墀日未斜題郵亭左鄯苕溪漁隱云余頃過湘中郵亭壁間有左鄯絶句云云又于苕溪道觀中壁間有鄭子覃絶句云云皆佳作也疊疊山腰繫冷雲疏疏雨腳㺯黃昏松聲更帶溪聲急不是行人也斷魂題苕溪道觀鄭子覃紛紛紅雨入蒼苔密蔭新成鶯友來擬逐幽人夢蓬島一聲裂竹故驚回懷荆南舊遊元厚之雲齋録云沙門文瑩嘗謂為文老而不衰者惟元厚之在禁林時有懷荆南舊遊云云其辭氣不少衰昔年曽醉海棠叢聞説新枝發舊紅昨夜夢回花下飲不知身在玉堂中竹莊詩話卷十七
