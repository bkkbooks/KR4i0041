body:
  text: 竹莊詩話卷四六代下三謝唐子西語録云三謝詩靈運為勝當就選中寫出熟讀自見其優劣也又云是三人者詩至玄暉語益工然蕭散自得之趣亦復少減於此可以觀世變也子西取靈運惠連玄暉詩合六十四篇為三謝詩今止録麗澤集詩所選及諸集評論所及者謝朝華之已披起夕秀於未振學詩者尤當領此陳腐之語固不必涉筆然求去其陳腐不可得而翻為怪怪竒竒不可致詰之語以欺人不獨欺人而且自欺誠學者之大病也詩人首二謝靈運在永嘉因夢惠連遂有池塘生春草之句玄暉在宣城因登三山遂有澄江靜如練之句二公妙處蓋在於鼻無堊目無膜爾鼻無堊斤將曷運目無膜箆將曷施所謂混然天成天球不琢者歟靈運詩如矜名道不足適巳物可忽清暉能娛人遊子淡忘歸玄暉詩如春草秋更緑公子未西歸大江流日夜客心悲未央等語皆得三百五篇之餘韻是以古今以為竒作又曷嘗以難解為工哉東坡跋李端叔詩卷云暫借好詩消永夜每逢佳處輒參禪蓋端叔作詩用意太過參禪之語所以警之云謝靈運登池上樓詩評云靈運詩其源出於陳思雜有景陽之體故尚巧似而逸蕩過之頗以繁蕪為纍嶸謂若人學多才薄遇物輒書內無乏思外無遺物其繁富宜哉然名章逈句處間起麗曲新聲駱驛奔發若青松之披灌朩白玉之映泥沙未足貶其高也謝氏家録云康樂每對惠連輒得佳語後在永嘉西堂思詩竟日不就寤寐間忽見惠連即得池塘生春草故嘗云此語有神非吾語也石林詩話云池塘生春草園栁變鳴禽世人多不解此語為工蓋欲以竒求之爾此語之工正在無所意猝然與景相遇備以成章不假繩削故非常情之所能到詩家妙處當須以此為根本而思苦言艱者往往不悟潛虬媚幽姿飛鴻響逺音薄霄愧雲浮栖川作淵沉進德智所拙退耕力不任徇祿反窮海臥痾對空林衾枕昧節候褰開暫窺臨傾耳聆波瀾舉目眺嶇􅋂初景革緒風新陽改故隂池塘生春草園栁變鳴禽祁祁傷豳歌萋萋感楚吟索居易永久離羣難處心持操豈獨古無悶徵在今遊赤石進帆海首夏猶清和芳草亦未歇水宿淹晨暮隂霞屢興沒周覽倦瀛壖況乃陵窮髮川后時安流天吳靜不發揚帆采石華桂席拾海月溟漲無端倪虛舟有超越仲連輕齊組子牟眷魏闕矜名道不足適已物可忽請附任公言終然謝夭伐石壁精舍還湖中昏旦變氣候山水含清暉清暉能娛人遊子淡忘歸出谷日尚早入舟陽已微林壑斂暝色雲霞收夕霏芰荷迭映蔚蒲稗相因依披拂趨南徑愈悅偃東扉慮淡物自輕意愜理無違寄言攝生客試用此道推於南山往北山經湖中瞻眺朝旦發陽崖景落憩隂峯舍舟眺逈渚停策倚茂松側徑既窈窕環洲亦玲瓏俯視喬朩杪仰聆大壑淙石橫水分流林密蹊絶蹤解作竟何感升長皆丰容初篁苞緑籜新蒲含紫茸海鷗戲春岸天雞弄和風撫化心無厭覽物春彌重不惜去人逺但恨莫與同孤遊非情歎賞廢理誰通從斤竹澗越嶺溪行猿鳴誠知曙谷幽光未顯巖下雲方合花上露猶泫逶迤傍隈隩迢遞陟陘峴過澗既厲急登棧亦凌緬川渚屢徑復乘流玩回轉蘋萍泛沉深菰蒲冒清淺金石挹飛泉攀林摘葉卷想見山阿人薜蘿若在眼握蘭勤徒結折麻心莫展情用賞為美事昧竟誰辨觀此遺物慮一悟得所遣廬陵王墓下作追崇侍中王如故曉月發雲陽落日吹朱方含棲泛廣川灑淚眺連岡眷言懷君子沉痛切中腸道消結憤悶運開申悲涼神期恆若存德音初不忘徂謝易永逺松柏森已行延州協心許楚老惜蘭芳解劍竟何及撫墳徒自傷平生疑若人通蔽互相妨理感深情慟定非識所將脆促良可哀夭枉特兼常一隨往化滅安用空名揚舉聲泣已灑長歎不成章富春渚宵濟漁浦潭旦及富春郭定山緬雲霧赤亭無淹薄遡流觸驚急臨圻阻參錯亮乏伯昏分險過吕梁壑洊至宜便習兼山貴止託平生協幽期淪躓困微弱久露干祿請始果逺遊諾宿心漸申寫萬事俱零落懷抱既昭曠外物徒龍蠖登江中孤嶼江南倦厯覽江北曠周旋懷新道轉迥尋異景不延亂流趨正絶孤嶼媚中川雲日相輝映空水共澄鮮表靈物莫賞藴真誰為傳想象崑山姿緬邈區中緣始信安期術得盡養生年初去郡彭薛裁知恥貢公未遺榮或可優貪競豈足稱達生伊豫秉微尚拙訥謝浮名廬園當栖巖卑位代躬耕顧已雖自許心迹猶未并無庸妨周任有疾象長卿畢娶類尚子薄遊似邴生恭承古人意俶裝返柴荆牽絲及元興解龜在景平負心二十載於今廢將迎理棹遄逺期遵渚騖修坰遡溪終水涉登嶺始山行野曠沙岸淨天髙秋月明憩石挹飛泉攀林搴落英戰勝臞者肥止鑒流歸停即是羲唐化獲我擊壤情初登石首城白圭尚可磨斯言易為緇雖抱中孚爻猶勞貝錦詩寸心若不亮微命察如絲日月垂光景成貸遂兼兹出宿薄京畿晨裝搏曽颸重經平生别再與朋知辭故山日已逺風波豈還時迢迢萬里帆茫茫終何之遊當羅浮行息必廬霍期越海凌三山遊湘厯九疑欽聖若旦暮懷賢亦悽其皎皎明發心不為嵗寒欺田南樹園激流植援樵隱俱在山由來事不同不同非一事養痾邱園中園中屏氛雜清曠招逺風卜室倚北阜啓扉面南江激澗代汲井插槿當列墉羣朩既羅戶衆山亦當窗靡迤趨下岫迢遞瞰髙峯寡欲不期勞即事罕人功唯開蔣生徑永懷求羊蹤賞心不可忘妙善異皆同擬魏太子鄴中集詩八首五言并序建安末余時在鄴宫朝遊夕宴究歡愈之極天下良辰美景賞心樂事四者難並今昆弟友朋二三諸彥備盡之矣古來此娛書籍未見何者楚襄王時有宋玉唐景梁孝王時有鄒枚嚴馬遊者美矣而其主不文漢武帝時徐樂諸才備應對之能而雄猜多忌豈獲晤言之適不誣方將庶必賢於今日耳嵗月如流零落將盡撰文懷人感往增愴其辭曰魏太子百川赴巨海衆星環北辰照灼爛霄漢遙裔起長津天地中橫潰家皇拯生民區宇既滌蕩羣英必來臻忝此欽賢性由來當懷仁況值衆君子傾心隆日新論物靡浮説析理實敷陳羅縷豈闕辭窈窕究天人澄觴滿金罍連榻設華茵急絃動飛聽清歌拂梁塵莫言相遇易此歡信可珍王粲家本秦川貴公子孫遭亂流寓自傷情多幽厲昔崩亂桓靈今板蕩伊洛既燎煙函崤沒無象整裝辭秦川秣馬赴楚壤沮漳自可美客心非外奬常歎詩人言式微何由往上宰秦皇靈侯伯咸宗長雲騎亂漢南宛郢皆掃蕩排霧屬盛明披雲對清朗慶泰欲重疊公子特先賞不謂息肩願一旦值明兩並載遊鄴京方舟泛河廣綢繆清宴娛寂寥梁棟響既作長夜飲豈顧乘日養陳琳袁本初書記之士故敘喪亂事多皇漢逢屯邅天下遭氛慝董氏淪關西袁家擁河北單民易周章窘身就羈勒豈意事乖已永懷戀故國相公實勤王信能定蝥賊復覩東都輝重見漢朝則餘生幸已多矧乃值明德愛客不告疲飲宴遺景刻夜聽極星闌朝遊窮曛黑哀哇動梁埃急觴蕩幽默且盡一日娛莫知古來惑徐幹少無宦情有箕潁之心事故仕世多素辭伊昔家臨淄提擕弄齊瑟置酒飲膠東淹留憩髙密此歡謂可終外物始難畢搖蕩箕濮情窮年迫憂栗末塗幸休明棲集建薄質已免負薪苦乃遊椒蘭室清論事究萬美話信非一行觴奏悲歌永夜繼白日華屋非蓬居時髦豈余匹中飲顧昔心悵焉若有失劉楨卓犖偏人而文最有氣所得頗經竒貧居晏里閈少小長東平河兖當衝要淪漂薄許京廣川無逆流招納厠羣英北渡黎陽津南登宛郢城既覽古今事頗識治亂情歡友相解達敷奏究平生矧荷明哲顧知深覺命輕朝遊牛羊下暮坐括揭鳴終嵗非一日傳巵弄新聲辰事既難諧歡願如今並唯羡肅肅翰繽紛戾髙冥應瑒汝潁之士流離世故頗有飄薄之歎嗷嗷雲中鴈舉翮自委羽永梁弱水湄違寒長沙渚顧我梁州時緩步集潁許一旦逢世難淪薄恆羈旅天下昔未定託身早得所官渡厠一卒烏林預艱阻晚節值衆賢會同庇天宇列坐蔭華榱金樽盈清醑始奏延露曲繼以闌夕語調笑輒酬答嘲謔非慙沮傾軀無遺慮在心良已敘阮瑀管書記之任故有優渥之言河洲多沙塵風悲黃雲起金羈相馳逐聨翩何窮已慶雲惠優渥微薄攀多士念昔渤海時南皮戲清沚今復河曲遊鳴葭泛蘭汜屣步陵丹梯並坐侍君子妍談既愈心哀音信睦耳傾酤係芳醑酌言豈終始自從食蘋來唯見今日美平原侯植公子不及世事但美遨遊然頗有憂生之嗟朝遊登鳳閣日暮集華沼傾柯引弱板攀條摘蕙草徙倚窮騁望目極盡所討西顧太行山北眺邯鄲道平衢修且直白楊信裊裊副君命飲宴歡娛寫懷抱良遊匪晝夜豈云晚與早衆賓悉精妙清辭麗蘭藻哀音下回鵠餘哇徹清昊中山不却醉飲德方覺飽願以黃髮期養生念將老謝惠連秋懷詩評云小謝才思富健恨其蘭玉夙雕故長轡未騁然秋懷搗衣之製雖復靈運鋭思亦何以加焉又巧為淫麗歌謡風人第一平生無志意少小嬰憂患如何乘苦心矧復值秋晏皎皎天月明奕奕河星爛蕭瑟含風蟬寥唳度雲鴈寒商動清閨孤燈曖幽幔耿介繁慮積展轉長宵半夷險難預謀倚伏昧前算雖好相如達不同長卿慢頗悅鄭生偃無取白衣宦未知古人心且從性所玩賓至可命觴朋來當染翰高臺驟登踐清淺時陵亂頽魄不再圓傾䂀無兩旦金石終銷毁丹青暫雕煥各勉玄髮歡無貽白首歎因歌遂成賦聊用布親串搗衣衡紀無淹度晷運倐如催白露滋園菊秋風落庭槐肅肅莎雞羽烈烈寒螿啼夕隂結空幕宵月皓中閨美人戒裳服端飾相招擕簪玉出北房鳴金步南階櫩髙砧響發楹長杵聲哀微芳起兩袖輕汗染雙題紈素既已成君子行未歸裁用笥中刀縫為萬里衣盈篋自余手幽緘俟君開腰帶準疇昔不知今是非謝玄暉晚登三山還望京邑詩評云玄暉詩其源出於謝琨微傷細密頗在不倫一章之中自有玉石然竒章秀句往往警遒足使叔源失步明逺變色目善發詩瑞而未篇詩躓此其意鋭而才弱也然至為後進士子之所嗟慕漁隱叢話云古今詩人以詩名世者或只一句如池塘生春草見前則謝康樂也澄江靜如練則謝宣城也夫豈在多哉灞涘望長安河陽視京縣白日麗飛甍參差皆可見餘霞散成綺澄江靜如練喧鳥覆春洲雜英滿芳甸去矣方滯淫懷哉罷歡宴佳期悵何許淚下如流霰有情知望鄉誰能鬒不變酬王晉安梢梢枝早徑塗塗露晚晞南中榮橘柚寧知鴻鴈飛拂露朝青閣日旰坐彤闈悵望一途阻參差百慮依春草秋更緑公子未西歸誰能久京邑緇塵染素衣暫使下都夜發新林至京邑贈西府同僚大江流日夜客心悲未央徒念關山近終知返路長秋河曙耿耿寒渚夜蒼蒼引領見京室宫雉正相望金波麗鳷鵲玉繩低建章驅車鼎門外思見昭邱陽馳暉不可接何况隔兩鄉風雲有鳥路江漢限無梁常恐鷹隼擊時菊委嚴霜寄言罻羅者寥廓已髙翔遊東田戚戚苦無蹤擕手共行樂尋雲陟纍榭隨山望菌閣逺樹曖芊芊生煙紛漠漠魚戲新荷動鳥散餘花落不對芳春酒還望青山郭之宣城出新林浦向板橋江路西南永歸流東北鶩天際識歸舟雲中辨江樹旅思倦搖搖孤遊昔已屢既歡懷祿情復協滄洲趣囂塵自兹隔賞心於此遇雖無玄豹姿終隱南山霧直中書省紫殿肅隂隂彤庭赫𢎞敞風動萬年枝日華承露掌玲瓏結綺錢深沈映朱網紅藥當階翻蒼苔依砌上兹言翔鳳池鳴珮多清響信美非吾室中園思偃仰朋情以鬱陶春物方駘蕩安得陵風翰聊恣山泉賞觀朝雨朔風吹飛雨蕭條江上來既灑百常觀復集九成臺空濛如薄霧散漫似輕埃平明振衣坐重門猶未開耳目暫無擾懷古信悠哉戢翼希驤首乘流畏曝鯉動息無兼遂岐路多徘徊方同戰勝者去剪北山萊和徐都曹宛洛佳遨遊春色滿皇州結軫青郊路回瞰蒼江流日華川上動風光草際浮桃李成蹊徑桑榆蔭道周東都已俶載言歸望緑疇陶淵明山谷云寧律不諧而不使句弱用字不工而不使語俗此庾開府之所長也然有意於為詩也至於淵明則所謂不煩繩削而自合者雖然巧於斧斤者多疑其拙窘於檢括者輒病其放孔子曰寧武子其智可及也其愚不可及也淵明之拙與放豈可為不知者道哉道人曰如我按指海印發光汝暫舉心塵勞先起説者曰若以法眼觀無俗不真若以世眼觀無真不俗淵明之詩要當與一邱一壑者共之耳東坡云淵明詩質而實綺癯而實腴自曹劉鮑謝李杜諸公皆莫及也龜山語録云淵明詩所不可及者沖淡深精出於自然若曾用力學然後知淵明詩非著力之所能成韻語陽秋云山谷嘗跋淵明詩卷云血氣方剛時讀此詩如嚼枯朩及綿厯世事知決定無所用智又嘗論云謝康樂庾蘭成之詩爐錘之功不遺餘力然未能窺彭澤數仞之牆者二子有意於俗人贊毁其功拙淵明直寄焉持是以論淵明詩亦可以知其關鍵也又論陶潛謝朓詩皆平淡有思致非後來詩人怵心劌目雕琢者所為也大抵欲造平淡當自組麗中來落其華紛然後可造平淡之境如此則陶謝不足進矣今之人作多拙易詩而自以為平淡識者未嘗不絶倒也梅聖俞和晏相詩云因令適性情稍欲到平淡若詞未圓熟刺口劇菱芡言到平淡處甚難也所以贈杜挺之詩有作詩無古今欲造平淡難之句李白云秋水出芙蓉天然去雕飾平淡而到天然處則善矣飲酒張文潛云讀飲酒詩竊愛其文詞而慕其放達遁齋間覽云荆公嘗言淵明詩有竒絶不可及之語如結廬在人境至心逺地自偏由詩人以來無此句也東坡云淵明意不在詩詩以寄其意耳採菊東籬下悠然見南山則本自採菊無意望山適舉首而見之故悠然忘情趣間而纍逺此未可於文字語句間求之今皆作望南山覺一篇神氣索然韻語陽秋云東坡拈出淵明談理之詩有三一曰採菊東籬下悠然見南山二曰笑傲東軒下聊復得此生三曰客養千金軀臨化消其寶皆以為知道之言蓋摛章繪句嘲風弄月雖工亦何補若覩道者出語自然超詣非常人能蹈其軌轍也結廬在人境而無車馬喧問君何能爾心逺地自偏採菊東籬下悠然見南山山氣日夕佳飛鳥相與還此中有真意欲辨巳忘言同前東坡云靖節以無事為得此生則見役於物者非失此生耶秋菊有佳色裛露掇其英泛此忘憂物逺我遺世情一觴雖獨進杯盡壺自傾日入羣動息歸鳥趨林鳴嘯傲東軒下聊復得此生同前東坡云飲酒詩客養千金軀臨化消其寶寶不過軀軀化則寶亦亡矣人言靖節不知道吾不信也顔生稱為仁榮公言有道屢空不獲年長飢至于老雖留身後名一生亦枯稿死去何所知稱心固為好客養千金軀臨化消其寶裸葬何必惡人當解其表讀山海經詩評云彭澤詩其源出於應璩又協左思風力文體省淨殆無長語篤意真古辭興婉愜每觀其文相為其德世歎其質真至如歡言酌春酒日暮天無雲風華清美豈直為田家語邪古人隱逸詩人之宗也孟夏草朩長繞屋樹扶疏衆鳥欣有託吾亦愛吾廬既耕亦已種且還讀我書窮巷隔深轍頗回故人車歡言酌春酒摘我園中蔬微雨從東來好風與之俱泛覽周王傳流觀山海圖俯仰終宇宙不樂復何如擬古日暮天無雲春風扇微和佳人美清夜達曙酬且歌歌竟長歎息持此感人多明明雲間月灼灼葉中花豈無一時好不久當如何問來使西清詩話云淵明意趣真古淡之宗詩家視淵明猶孔門視伯夷也其集屢經諸儒手校然有問來使二篇世蓋未見獨南唐與朝文元家二本之詩云云李白感秋詩陶令歸去來田家酒應熟其取諸此爾從山中來早晚發天目我屋南忩下今生幾叢菊薔薇葉巳抽秋蘭氣當馥歸去來山中山中酒應熟詠貧士蔡寬夫詩話云子厚之貶其憂悲憔悴之歎發於詩者詩為酸楚閔巳傷志固君子所不免然亦何至是卒以憤死未為達理也樂天既遇間放浪物外若真能脫屣軒冕者然榮辱得失之際銖銖校量而自矜其達每詩未嘗不著此意是豈真能忘之者哉亦力勝之耳惟淵明則不然觀其貧士責子與其他所作當憂則憂遇喜則喜忽然憂樂兩忘則隨所遇而皆適未嘗有擇於其間所謂超世遺物者要當如是而後可也觀三人之詩以意逆志人豈難見以是論賢不肖之實亦何可欺乎萬族各有託孤雲獨無依曖曖虛中滅何時見餘暉朝霞開宿霧衆鳥相與飛遲遲出林翮未夕復來歸量力守故轍豈不寒與飢知音茍不存已矣何所悲責子山谷云觀淵明此詩想見其人愷悌慈祥戲謔可觀也俗人便謂淵明諸子皆不肖而淵明愁歎見於詩所謂癡人前不得説夢也白髮被兩鬢肌膚不復實雖有五男兒總不好紙筆阿舒已二八懶惰故無匹阿宣行志學而不愛文術雍端年十三不識六與七通子垂九齡但覓宋本作念梨與栗天運茍如此且進杯中物飲酒山谷云淵明此詩乃知阮嗣宗當斂衽何況鮑謝諸子耶詩中不見斧斤而磊落清壯惟陶能之衰榮無定在彼此更共之邵生瓜田中寧似東陵時寒暑有代謝人道每如兹達人解其會逝將不復疑忽與一觴酒日夕歡相持擬挽詞韻語陽秋云不立文字見性成佛之家達磨西方來有淵明時未有也觀其擬挽詞形影神三篇皆寓意髙達蓋第一達磨也有生必有死早終非命促昨暮同為人今旦在鬼録魂氣散何之枯形寄空朩嬌兒索父啼良友撫我哭得失不復知是非安能覺千秋萬嵗後誰知榮與辱但恨在世時飲酒不得足形影神序云貴賤賢愚莫不營營以惜生斯甚惑焉故極陳形影之苦言神辨自然以釋之好事君子共取其心焉形贈影天城長不沒山川無改時草朩得常理霜露榮悴之謂人最靈智獨復不知兹適見在世中奄去靡歸期奚覺無一人親識豈相思但餘平生物舉目情悽洏我無騰化術必爾不復疑願君取吾言得酒莫茍辭影答形存生不可言衛生每苦拙誠願遊崑華邈然兹道絶與子相遇來未嘗異悲悅憩蔭若暫乖止日終不别此同既難常黯爾俱時滅身沒名亦盡念之五情熱立善有遺愛胡可不自竭酒云能消憂方此詎不劣神釋大鈞無私力萬物自森著人為三才中豈不以我故與君雖異物生而相依附結託善惡同安得不相與三皇大聖人今復在何處彭祖夀永年欲留不得住老少同一死賢愚無復數日醉或能忘將非促齡具言善常所欣誰當為汝譽甚念傷吾生正宜委運去縱浪大化中不善亦不懼應盡便須盡無復獨多慮下潠田舍穫蔡寬夫詩話云秦漢以前字書未備既多假借而音無反切平側皆通用如慶雲卿雲臯陶咎繇之類大率如此詩瞻彼日月悠悠我思道之云逺曷云能來燕燕于飛下上其音之子于歸逺送于南思與來音與南皆以為協聲魏晉間此體猶在劉越石握中有白璧本自荆山璆惟彼太公望共此渭濱叟潘安仁位同單父邑愧無子賤歌豈敢陋微官但恐忝所荷是也自齊梁後既拘以四聲又限以音韻故大率以偶儷聲病為工文氣安得不卑弱乎惟陶淵明韓退之時時擺脫俗拘忌故栖字與乖字陽字與清字皆取其傍韻用蓋筆力自足以勝之也陽與清字即韓退之此日足可惜詩見本門貧居依稼穡戮力東林隈不言春作苦常恐負所懷司田眷有秋寄聲與我諧飢者歡初飽束帶候雞鳴揚擑越平湖泛隨清壑回鬱鬱荒山裏猿聲間且悲哀風愛靜夜林鳥喜晨開曰余作此來三四星火頽姿年逝已老其事未云乖遙謝荷蓧翁聊得從君栖歸園田居冷齋夜話云東坡嘗云淵明詩初視若散緩熟視有竒趣如靄靄逺人村依依墟里煙狗吠深巷中雞鳴桑樹顛大率才髙意逺則所寓得其妙遂能如此少無適俗韻性本愛邱山誤落塵網中一去三十年羈鳥戀舊林池魚思故淵開荒南野際守拙歸園田方宅十餘畝草屋八九間榆栁蔭後園桃李羅堂前曖曖逺人村依依墟里煙狗吠深巷中雞鳴桑樹顛戶庭無塵雜虛室有餘間久座樊籠裏復得反自然竹莊詩話卷四
