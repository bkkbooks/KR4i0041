body:
  text: 竹莊詩話巻二十雜編十題孤山寺張祐西清詩話云百家詩選余讀之見其取張祐恵山寺詩泉聲到坡盡山色上樓多而不取孤山寺詩云云又賈島平生得意句獨行潭底影數息樹邉身復不取而載寫留行道影焚却坐禪身不知意果如何耳樓臺聳碧岑一徑入湖心不雨天長潤無雲水自沈斷橋荒蘚澁空院落花深猶憶西牕月鐘聲在北林自遣陸龜䝉漁隠叢話云天隨子有自遣云云又古意云云皆思心經竒不襲前人也數尺游絲墮碧空年年長是惹春風爭知天上無人住也有清愁白髮翁古意君心莫淺薄妾意正淒托願得車雙輪一夜坐四角解昭君怨王叡詩事云炙轂子王叡作解昭君怨殊有思能道人好處莫怨工人醜畫身莫嫌明主使和親當時若不嫁胡虜祇是宫中一舞人贈盧綸秋夜同宿李益容齋隨筆云李益盧綸皆唐大厯十才子傑者綸於益為内兄嘗秋夜同宿贈綸詩云云綸和云云二詩雖絶句讀之使人悽然皆竒作也世故中年别餘生此會同却將悲與病獨對朗陵翁和前篇盧綸戚戚一西東十年今始同可憐風雨夜相對兩衰翁漢宫曲徐凝又云徐凝以瀑布界破青山之句東坡指為惡詩故不為詩人所稱説予家有凝集觀其餘篇自有佳處今謾記數絶于此以下五首皆有情致宜其見知於微之樂天也但俗子妄作樂天詩繆為賞激以起東坡之誚耳月色簾前流玉霜趙家飛燕侍昭陽掌中舞罷簫聲絶三十六宫秋夜長憶揚州蕭娘臉下難勝淚桃葉眉頭易得愁天下三分明月夜二分無賴是揚州相思林逺客逺遊新過嶺每逢芳樹問芳名長林遍是相思樹爭遣愁人獨自存玩花一樹梨花春向暮雪枝殘處怨風來明朝漸校無多去看到黄昏不欲回將歸江外辭韓侍郎一生所遇惟元白天下無人重布衣欲别朱門淚先盡白頭游子白身歸惜花嚴惲又云温公詩話云唐之中葉文章特盛其姓名湮没不傳於世者甚衆予觀嚴惲惜花一絶云云前人多不知誰作乃見於皮陸唱和集中大率唐人多工詩雖小説劇戲鬼物假託莫不宛轉有思致不必專門名家而後可稱也春光冉冉歸何處更向花前把一盃盡日問花花不語為誰零落為誰開寄全椒山中道士韋應物又云韋應物在滁州以酒寄全椒山中道士作詩云云其為髙妙超詣固不容夸説而結尾兩句非復言語思索可到今朝郡齋冷忽念山中客澗底束荆薪歸來煮白石欲持一樽酒逺慰風雨夕落葉滿空山何處尋行迹絶句李頎又云歐陽公好稱誦唐嚴維詩栁塘春水漫花塢夕陽遲及常建竹逕通幽處禪房花木深之句以為不可及予絶喜李頎詩云云且作客涉逺適當窮秋暮投孤村古寺中夜不能寐起坐淒惻而聞簷外雨聲其為一時襟抱不言可知而此兩句十字中盡其意態海水喻愁非過語也逺客坐長夜雨聲孤寺秋請量東海水看取淺深愁栁枝詞劉長卿又云薛能者晚唐詩人格調不能髙而妄自尊大有柳枝詞五首最後一章曰劉白蘇臺總近時當初章句是誰推繊腰舞盡春楊柳未有儂家一首詩自注云劉白二尚書繼為蘇州刺史皆賦楊栁枝詞世多傳唱雖有才語但文字太僻宫商不髙耳能之大言如此但稍推杜陵視劉白以下蔑如也今讀其詩正堪一笑劉之詞云云白之詞云云其風流氣槩豈能所可髣髴哉城外春風吹酒旗行人揮袂日西時長安陌上無窮樹惟有垂楊管别離同前白居易紅板江橋青酒旗館娃宫暖日斜時可憐雨歇東風定萬樹千條各自垂三閣詞四首劉禹錫山谷云此四章可以配黍離之詩有國存亡之鑑也大槩劉長卿樂府小章優於大篇詩優於他文耳貴人三閣上日夕未梳頭不應有恨事嬌甚郤成愁珠箔曲瓊鈎子細見揚州北兵那得度浪語判悠悠沈香帖閣柱金縷畫門楣回首降幡下已見黍離離三人出眢井一身登檻車朱門漫臨水不可見鱸魚淮隂行五首劉禹錫山谷云淮隂行情調殊麗語氣尤穏切白樂天元微之為之皆不入此律也惟無奈脱萊時不可解當待博物洽聞者説也古有長干行言三江之事悉矣余嘗阻風淮隂作淮隂行以禆樂府簇簇淮隂市竹樓緣岸上好日起檣竿鳥飛驚五兩其二今日轉船頭金烏指西北烟波與春草千里同一色其三船頭大銅鐶摩挲光陳陳蚤晩使風來沙頭一眼認其四何物令儂羡羡郎船尾燕啣泥趂檣竿宿食長相見其五隔浦望行船頭昂尾幰幰無奈脱萊時清淮春浪軟竹枝詞劉禹錫山谷云劉夢得竹枝九章詞意髙妙元和間誠可以獨步道風俗而不俚追古昔而不愧比之杜子美夔州歌所謂同工而異曲也昔東坡嘗聞余詠第一篇歎曰此奔軼絶塵不可追也四方之歌異音而同樂嵗正月余來建平里中兒聨歌竹枝吹短笛擊鼓以赴節歌者揚袂雎舞以曲多為賢聆其音中黄鍾之羽卒章激許如吳聲雖傖儜不可分而含思宛轉有淇濮之豔昔屈原居沅湘間其民迎神詞多鄙陋乃為作九歌到于今荆楚鼓舞之故余亦作竹枝詞九篇俾善歌者颺之附于末後之聆巴歈知變風之自焉白帝城頭春草生白鹽山下蜀江清南人上來歌一曲北人莫上動鄉情山桃紅花滿上頭蜀江春水拍山流花紅易衰似郎意水流無限似儂愁江上朱樓新雨晴瀼西春水縠文生橋東橋西好楊栁人來人去唱歌行日出三竿春霧消江頭蜀客駐蘭橈憑寄狂夫書一紙住在城都萬里橋兩岸山花似雪開家家春酒滿銀杯昭君坊中多女伴永安宫外蹋青來城西門前灩澦堆年年波浪不能摧懊惱人心不如石少時東去復西來瞿塘嘈嘈十二灘此中道路古來難長恨人心不如水等閒平地起波瀾巫峽蒼蒼烟雨時清猿啼在最髙枝箇裏愁人腸自斷由來不是此聲悲山上層層桃李花雲間烟火是人家銀釧金釵來負水長刀短笠去燒畬武昌老人説笛歌劉禹錫謾齋語錄云劉禹錫長於歌行并絶句如武昌老人説笛歌山谷云使宋玉馬融復生亦當許之金陵懷古等五絶樂天云在在處處當有神物䕶持不虚語也詩史云蘇子羙言樂天琵琶行中云夜深忽夢少年事覺來粉淚濕闌干此聨有佳句今謂夢得説笛歌云如今老去語猶遲音韻髙低耳不知氣力已無心尚在時時一曲夢中吹不減樂天武昌老將七十餘手把庾令相問書自言少小學吹笛蚤事曹王曾賞激往年鎮戍到蘄州楚山蕭蕭笛竹秋當時買林恣搜索典却身上烏貂裘古苔蒼蒼封老節石上孤生飽風雪商聲五音隨指發水中龍應行雲絶曾將黄鶴樓上吹一聲占盡秋江月如今老去語猶遲音韻髙低耳不知氣力已無心尚在時時一曲夢中吹金陵五題劉禹錫序云余少為江南客而未遊秣陵嘗有遺恨後為歴陽守跂而望之適有客以金陵五題相示逌爾生思歘然有得他日友人白樂天掉頭苦吟歎賞良乆且曰石頭詩云潮打空城寂寞回吾知後之詩人不復措詞矣餘四詠雖不及此亦不孤樂天之言爾石頭城山圍故國周遭在潮打空城寂寞回淮水東邉舊時月夜深還過女墻來烏衣巷朱雀橋邉野草花烏衣巷口夕陽斜舊時王謝堂前燕飛入尋常百姓家臺城臺城六代競豪華結綺林春事最奢萬戸千門成野草只緣一曲後庭花生公講堂生公説法鬼神聽身後空堂夜不扃髙坐寂寥塵漠漠一方明月可中庭江令宅南朝詞臣北朝客歸來惟見秦淮碧池臺竹樹三畝餘至今人道江家宅滁州西澗韋應物本事詩云劉禹錫云白二十苦愛我石頭城詩云云我自知不及韋十九詩云云獨憐芳草澗邊生上有黄鸝深樹鳴春潮帶雨晩來急野渡無人舟自横聞歌杜牧抒情詩話云杜牧之綽有詩名縱情雅逸金陵艤舟聞倡樓歌聲有詩云云風雅編綴不可勝紀與杜甫齊名時人呼為大杜小杜烟籠寒水月籠沙夜泊秦淮寄酒家倡女不知亡國恨隔江猶唱後庭花中書即事裴度石林避暑錄云李文定公坐與丁晉公不相能中甞鬱鬱不樂舊中書省壁有手題詩一聨云灰心緣忍事霜鬢為論兵凡數十處此裴晉公詩也初不見全篇在許昌偶得其集云云晉公之言猶及此豈坐李逢吉元稹故耶集中又有在太原題㕔壁一絶句云云則此公胷中亦未得全為無事人綠野之遊豈易得哉裴公固不特以文字名世然詩辭皆整齊閑雅忠義端亮之氣凛然時見覽之每可喜也有意効承平無功荅聖明灰心緣忍事霜鬢為論兵道直身還在恩深命轉輕鹽梅非擬議葵藿是平生白日長懸照蒼蠅謾發聲嵩陽舊田里終使謝歸耕在太原題㕔壁危事經非一浮榮得是空白頭官舍裏今日又春風懷蕭山隠者劉禹昭郡閣雅談云劉禹昭字休明婺州人少師林寛為詩刻苦不憚風雪懷蕭山隠者云云嘗與人論詩曰五言如四十箇賢人亂著一箇屠沽不可覔句若掘得玉匣有底有盖但精求必謂得其實先生入太華杳杳絶良音秋夢有時見孤雲無處尋神清峰頂立衣冷瀑邉吟應笑干明者六街塵土深田家禁臠云詩分三種趣一曰竒趣二天趣三勝趣田家云云江淹效淵明體云日暮巾柴車路暗光已寂歸人望烟火稚子候簷隙全篇見六代門此二詩脱去翰墨痕迹令人想見其處此所謂竒趣也宫詞云云大林寺云云其詞終如水流花開不假工力此謂之天趣天趣者自然之趣耳長安道中云云東林寺云云吐詞氣宛在事物之外殆所謂勝趣也髙原耕種罷牽犢負薪歸深夜一爐火渾家身上衣宫詞杜牧白髪宫娥不解悲滿頭猶自揷花枝曾緣玉貌君王寵凖擬人看似舊時大林寺白居易人間四月芳菲盡山寺桃花始盛開長恨春歸無覔處不知轉入此中來長安道中杜牧鏡中白髪悲來慣衣上塵痕拂轉難惆悵江湖釣魚手却遮西日向長安東林寺白居易昔為東掖垣中客今日西方社裏人手把楊枝臨水坐閒思往事似前身富貴曲鄭徵君鑑誡錄云僖宗朝華山鄭徵君雲叟應百篇兩戰不勝遂掛羽服後唐三詔不起可謂髙尚隠逸之士也徵君為詩皆祛滌淫靡迥絶塵囂云云以下十一首羙人梳洗時滿頭間珠翠豈知兩片雲載却數鄉税詠西施素面已云妖更着花鈿飾臉横一寸波浸破吳王國傷時帆力劈開滄海浪馬蹄踏破亂山青浮名浮利過於酒醉得人心死不醒題霍山秦尊師老鶴𤣥猿伴採芝有時長歎獨移時翠娥紅粉嬋娟劍殺盡世人人不知偶題似鶴如雲一箇身不憂家國不憂貧擬將枕上日髙睡賣與世間榮貴人思山詠因賣丹砂下白雲鹿裘惟惹九衢塵不如將耳入山去萬是千非愁殺人景福中作悶見戈鋋匝四溟恨無竒䇿救生靈如何飲酒得長醉直到太平時節醒招友人遊春難把長繩繫日烏芳時偷取醉工夫任堆金壁摩星斗買得花枝不老無山居悶見有人尋移庵更入深落花流澗水明月照松林醉勸頭陀酒閒教孺子吟身同雲外鶴斷得世塵侵同前㝠心棲石室散髪枕流泉採柏時逢麝看雲忽見仙夏狂衝雨戲春醉載花眠絶頂登雲望東都一㸃烟同前不求朝野知卧看嵗華移採藥歸侵夜聽松飰過時荷竿尋水釣背局上嵓碁祭酒人來説中原正亂離擊甌方干又云方干為詩鍊句字字無失如寄友人云鶴盤逺勢投孤嶼蟬曳殘聲過别枝齊梁已來未有此句詠擊甌則體絶物理詩人罷唱白器敲來曲調成腕頭勻細自輕清隨風揺曳有餘韻測水淺深多泛聲春漏丁當相次發寒蟬計會一時鳴從今已得佳聲出衆樂無由更得名夜宴曲施肩吾又云方干與杭牧于郎中為硯席之知因夜宴與飛字韻請賦一章又李先軰宣古於澧陽陪杜悰司空宅宴席上賦得桃字詩又杜公鎮荆渚日夜宴出歌姬送酒李羣玉校書飛筆獻詩又盧延讓冬夜宴柳駙馬陟宅得更字詩章先軰孝標於李使君筵贈歌妓劉小小得娘字詩並詞多不錄已上五公之詩雖綺靡富艷皆不及施肩吾夜宴曲云云蘭缸如晝買不眠玉爐夜起沈香烟青娥一行十二仙欲笑不笑桃花燃碧忩弄嬌梳洗晚戸外不知銀漢轉被郎嗔罸琉璃盞酒入四肢紅玉軟題夫差廟陳羽又云陳羽秀才題破吳王夫差廟江遵先軰詠築萬里長城程賀員外因詠君山得名時人呼為程君山劉象郎中因詠仙掌得名時人呼為劉仙掌已上名公稱為卓絶千百集中無以如此姑蘇臺上千年朩刻作夫差廟裏神幡盖寂寥塵土滿不知簫鼓樂何人詠史江遵秦築長城比鐵牢蕃戎不敢過臨洮雖然萬里連雲際不及堯階三尺髙君山程賀曾遊方外見麻姑説道君山此本無云是崑崙山頂石海風飄落洞庭湖仙掌劉象萬古亭亭倚碧霄不成擎着不成招何如掬取天池水洒向人間救旱苗招晝公韋應物嬾真子云晝公即皎然也君於湖舊説皎然欲見蘇州恐詩體不合遂作古詩投之蘇州一見大不滿意繼而皎然復獻舊詩蘇州大稱賢曰幾誤失大名何不止以所長見示而輙希老夫之意且蘇州詩格如此髙古而皎然卒效之宜乎不建也士欲迎合者以此為戒吳興老釋子野雪盖精廬詩名徒自振道心常晏如想子棲禪夜見月東峯初清磬落巖谷焚香滿空虚叨慕端成舊未識豈為踈願以碧雲思方君怨别餘茂苑繁華地流水野僧居何當一遊覽倚閣吟躊躇樂遊原杜牧又云此牧之自尚書郎出郡守時作其意深矣盖樂遊原者漢宣帝寢廟在焉昭陵即唐太宗之陵也牧之之意盖自傷不遇宣帝太宗之時而逺為郡守也藉使意不出此以景趣為意亦自不凡况感寓之深乎此所以不可及也清時有味是無能閒愛孤雲静愛僧獨把一麾江海去樂遊原上望昭陵贈國手王逢杜牧又云此杜牧之贈國手王逢詩也或云此真贈國手詩也碁貪必敗怯又無功羸形暗去則不貪也猛勢横來則不怯也周伏柱以喻不貪漢嫖姚以喻不怯故曰髙碁詩也魏收嘗云棋於貪勇之際所得多矣七十更萬日者牧之是時年四十二三得至七十猶有萬日云王子文楸一路饒偏宜簷竹雨蕭蕭羸形暗去春泉長猛勢横來野火燒守道還如周伏柱鏖兵不愧漢嫖姚得年七十更萬日與子同於局上消寄璨師韋應物䂬溪詩話云蘇州寄璨師云云嘗謂暑月讀之亦有霜氣一作爽氣遥知尋齋夜凍雪封松竹時有山僧來懸燈獨自宿竹莊詩話巻二十
