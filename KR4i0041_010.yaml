body:
  text: 竹莊詩話卷十東坡居士下世傳王逈子髙與仙人周瑤英遊芙蓉城元豐元年三月余始識子髙問之信然乃作此詩苕溪漁隱云此詩最為流麗故秦太虛與東坡簡云素紙一軸敢冀醉後揮掃近文并芙蓉城詩時得把玩以慰馳情芙蓉城中花冥冥誰其主者石與丁珠簾玉按翡翠屏雲舒霞卷千俜停中有一人長眉青炯如微雲淡疏星往來三世空煉形竟坐誤讀黃庭經天門夜開飛爽靈無復白日乘雲軿俗緣千劫磨不盡翠被冷落凄餘馨因過緱山朝帝廷夜聞笙簫弭節聽飄然而來誰使令皎如明月入窗櫺忽然而去不可執寒衾虛幌風泠泠仙宫洞房本不扄夢中同躡鳯凰翎徑度萬里如奔霆玉樓浮宫聳亭亭天書雲篆誰所銘繞樓飛步髙竛竮仙風鏘然韻流鈴蘧蘧形開如酒醒芳卿寄謝空丁寧一朝覆水不反瓶羅巾别淚空熒熒春風花開秋葉零世間羅綺紛膻腥此生流浪隨滄溟偶然相值兩浮萍願君收視觀三庭勿與嘉穀生蝗螟從渠一念三千齡下作人間尹與邢遊博羅香積寺寺去縣七里三山犬牙夾道皆美田麥禾甚茂寺下溪水可作碓磨若築塘百步閘而落之可轉兩輪舉四杵也以屬縣令林抃使督成之苕溪漁隱云東坡在嶺外遊博羅香積寺同正輔遊白水山聞正輔將至以詩迎之皆古詩而終篇對屬精切語意貫穿二年流落蛙魚鄉朝來喜見麥吐芒東風搖波舞净緑初日泫露酣嬌黃汪汪春泥已沒膝剡剡秋榖初分秧誰言萬里出無友見此二美喜欲狂三山屏擁僧舍小一溪雷轉松隂涼要令水力供臼磨與相地脉增隄防霏霏落雪看收麵隱隱疊鼓聞舂糧散流一啜雲子白炊裂十字瓊肌香豈惟牢九薦古味要使真一流天漿詩成捧腹便絶倒書生說食真膏肓同正輔遊白水山偉哉造物真豪縱攫土摶沙為此弄擘開翠峽走雲雷截破奔流作潭洞因隨化人履巨迹得與仙兄躡飛鞚曵杖不知巖谷深穿雲但覺衣裘重坐看驚鳥救霜葉知有老蛟蟠石甕金沙玉礫粲可數古鏡寶奩寒不動念兄獨立與世疏絶境難到惟我共永辭角上兩蠻觸一洗胸中九雲夢浮來山髙回望失武陵路絶無人送筠籃擷翠瓜甲香素綆分碧銀瓶凍歸路霏霏湯谷暗野堂活活神泉湧解衣浴此無垢人身輕可試雲間鳯聞正輔將至以詩迎之生逢堯舜仁得作嶺海遊雖懷跫然喜豈免跕墮憂暮雨侵重膇曉煙騰鬱攸朝盤見蜜唧夜枕問鵂鶹幾欲烹鬱屈固常饌䬲輈舌音漸獠變面汗嘗騂羞賴我存黃庭有時仍丹邱目聽不任耳踵息殆廢喉稍欣素月夜遂度黃茆秋我兄清廟器持節瘴海頭蕭然三家步橫此萬斛舟人言能漢吏天遣活楚囚惠然再過我樂哉十日留但恨參語賢忽潛九原幽萬里儻同歸兩鰥當對耰强歌非真達何必師莊周和淵明歸田園六首三月四日遊白水佛迹巖沐浴於湯泉晞髮于懸瀑之下浩歌而歸肩輿却行以與客語不覺至水北荔枝浦上晚日葱籠竹隂蕭然時荔子纍纍如芡實矣有父老年八十餘指以告余曰及是可食公能擕酒來遊乎意欣然許之歸卧既覺聞兒子過誦淵明歸田園居詩六首乃悉次其韻始余在廣陵和淵明飲酒詩二十首今復為此要當盡和乃已又吾於詩人無所甚好而獨好淵明之詩前後和其詩凡百有九首至其得意自謂不甚愧淵明王直方詩話云東坡在揚州和飲酒詩只是如已所作至惠州和歸田園六首乃與淵明無異環州多白水際海皆蒼山以彼無盡景寓我有限年東家著孔丘西家著顔淵市為不二價農為不爭田周公與管蔡恨不茅三間我飽一飯足薇蕨補食前門生餽薪米救我厨無煙斗酒與隻雞酣歌餞華顛禽鳥豈知道我適物自間悠悠未必爾聊樂我自然窮猿既投林疲馬初解鞅心空飽新得境熟夢餘想江鷗漸馴集蛋叟已還往南池緑錢生北嶺紫筍長提壺豈解飲好語時見廣春江有佳句我醉墮渺莽新浴覺身輕新沐感髮稀風乎懸瀑下却行詠而歸仰見江搖山俯見月在衣步從父老語有約吾敢違老人八十餘不識城市娛造物偶遺漏同儕盡丘墟平生不渡江水北有幽居手插荔枝子合抱三百株莫言陳家紫甘冷恐不如君來坐樹下飽食擕其餘歸舍遺兒子懷抱不可虛有酒持飲我不問錢有無坐倚朱藤杖行歌紫芝曲不逢啇山公見此野老足願同荔枝社長作雞黍局教我同光塵月固不勝燭霜颷散氛祲廓然似朝旭昔我在廣陵悵望柴桑陌長吟飲酒詩頗獲一笑適當時已放浪朝坐苦不夕矧今長閒人一劫展過隙江山互隱見出沒為我役斜川追淵明東臯友王績詩成竟何用六博本無益和淵明貧士詩眼云此詩言夷齊自信其去雖武王周召不能挽之使留若四皓自信其進雖祿産之聘亦為之出如死灰之餘煙也後世君子既不能以道進退又不能忘世俗之毁譽多作文以自明其出處如答客難解嘲之類故曰朱墨手自研若淵明初亦仕絃歌本誠言蓋無心於名雖晉末亦仕合於綺園之出其去也亦不待以微罪行不樂乃徑歸合於夷齊之去其進退蓋相似坡作文工於命意必超然獨立於衆人之上非如昔人稱淵明以退為髙耳故又發明如此夷齊恥周粟髙歌誦虞軒産祿彼何人能致綺與園古來避世士死灰或餘煙末路益可羞朱墨手自研淵明初亦仕絃歌本誠言不樂乃徑歸視世差獨賢和淵明詠三良藝苑雌黃云秦穆以三良殉葬詩人刺之則穆公信有罪矣雖然臣之事君猶子之事父也以陳尊已魏顆之事觀之則三良亦不容無譏焉昔之詠三良者有王仲宣曹子建陶淵明桞子厚或曰心亦有所施或曰殺身成獨難或曰君命安可違或曰死沒寧分張曽無一語辨其非是者唯東坡一篇云云審如是則三良不能無罪東坡一篇獨冠絶於今古此生太山重忽作鴻毛遺三子死一言所死良巳微賢哉晏平仲事君不以私我豈犬馬哉從君求蓋帷殺身固有道大節要不虧君為社稷死我則同其歸顧命有治亂臣子得從違魏顆真孝愛三良安足稀仕宦豈不榮有時纒憂悲所以靖節翁服此黔婁衣秦穆公墓苕溪漁隱云余觀東坡秦穆公墓詩全與和三良詩意相反蓋是少年時議論如此至其晚年所見益髙超人意表揚雄所以悔少作也橐泉在城東墓在城中無百步乃知昔未有此城秦人以泉識公墓昔公生不誅孟明豈有死之日而忍用其良乃知三子殉公意亦如齊之二子從田橫古人感一飰尚能殺其身今人不復見此等乃以所見疑古人古人不可望今人益可傷蘆鴈禁臠云此東坡蘆雁詩欲叙雁閒暇之態故筆力頓挫如此又詩曰我生朩强鄙少以氣自擠孤舟到江海引手捫象犀邇來輒自悟留氣下暖臍亦頓挫也夫言頓挫者乃是覆却便文采粲然非如常格詩但排比句語而成熟讀之殊無氣味如少游詩曰松江浩無旁垂虹跨其上漫然䘖洞庭領略非一狀恍如陳平野萬馬攢穹帳離離雲抹山窅窅天粘浪煙中魚歌起鳥外征帆揚逾知宇宙寬斗覺天南壯云云此但排比好句耳非能使之頓挫也野鴈見人時未起意先改君從何處看得此無人態無乃枯朩行人禽兩自在北風振枯葦微雪落璀璨慘然雲水昏晶瑩沙礫碎弋人悵何暮一舉渺江海豆粥苕溪漁隱云東坡於飲食作詩以寫之往往皆臻其妙如豆粥詩是也禁臠云豆粥詩眉子石硯歌可謂分布用事法凡二事比類於前而後發其宏妙也君不見呼沱流澌車折軸公孫倉皇奉豆粥濕薪破竈自燎衣飢寒頓解劉文叔又不見金谷敲冰草朩春帳下烹煎多美人萍虀豆粥不傳法咄嗟而辦石季倫干戈未解身如寄聲色相纒心巳醉身心顛倒自不知更識人間有真味豈知江頭千頃雪色蘆茆簷出沒晨煙孤地碓舂粳光似玉沙瓶煮豆軟如酥我老此身無著處賣書來問東家住卧聽雞鳴粥熟時蓬頭曵履東家去眉子石硯歌君不見城都畫手開十眉橫雲却月爭新竒遊人指㸃小嚬處中有漁陽胡馬嘶又不見王孫青瑣橫雙碧腸斷浮空逺山色書生性命何足論坐費千金買消渴爾來喪亂愁天公謫向君家書硯中小窗虛幌相嫵媚令君曉夢生春紅毗耶居士談空處結昔巳空花不住試教天女問磨鉛千偈瀾翻無一語梨花容齊隨筆云張文潜好誦東坡梨花絶句云云每吟一過必擊節嘆賞不能已文潜蓋有省於此云梨花淡白柳深青柳絮飛時花滿城惆悵東欄一株雪人生看得幾清明山谷道人魯直傳贊云山谷自黔州以後句法尤髙筆勢放縱實天下之竒作自宋興以來一人而已矣江西宗𣲖圗序云國朝歌詩之作或傳者多依效舊文未盡所趣惟豫章始大出而力振之抑揚反覆盡兼衆體吕氏童䝉訓云作文要悟入處悟入必自工夫中來非僥幸可得也如老蘇之於文魯直之於詩蓋盡此理矣古詩二首上蘇子瞻集注東坡報山谷書云古風二首託物引類得古人詩之風其推重如此故置之篇首云江梅有佳實托根桃李場桃李終不言朝露借恩光孤芳忌皎潔氷雪空自香古來和鼎實此物升廟廊嵗月坐成晚煙雨青巳黃得升桃李盤以逺初見嘗終然不可口擲置官道傍但使本根在棄捐果何傷又青松出澗壑十里聞風聲上有百尺絲下有千嵗苓自性得久要為人制頽齡小草有逺志相依在平生醫和不並世深根且固蒂大言可醫國何用大早計小大材則殊氣味固相似秦和文潛贈無咎篇末多以見及以既見君子云胡不喜為韻集注山谷嘗寫答邢居實詩及此詩與徐師川曰後八詩頗為得意故漫録往或與潘洪諸友讀之龜以靈故焦雉以文故翳本心如日月利欲食之既後生玩華藻照影終末世安得八紘罝以道獵衆智談經用燕說束棄諸儒傳濫觴雖有罪末𣲖瀰九縣張侯真理窟堅壁物與戰難以口舌爭水清石自見野性友麋鹿君非我同羣文明近日月我亦不如君十載長相望逝川水沄沄何言談絶倒茗碗對爐薰北寺鎖齊房塵鑰一時啓朝朝跫然來連壁照書几庭柏鬱葱葱紅榴鏬多子時蒙吐佳句幽處萬籟起先皇元豐末極厭士淺聞只今舉秀孝天未喪斯文朝張班馬手崔蔡不足云當令橫筆陳一戰靜楚氛張侯窘炊玉僦屋得空壚但見索酒郎不見酒家胡雖肥如瓠壺胸中殊不粗何用知如此文采似於莬荆公六藝學妙處端不朽諸生用其短頗復鑿户牖譬如學捧心初不悟已醜玉石恐俱焚公為區别不吾友陳師道抱獨門掃軌朝張作薦書射雉用一矢吾聞舉逸民故得天下喜兩公陳堂堂此士可摩壘次韻答邢敦夫為山不能山過在一簣止渥窪騏驎兒墮地志千里岷江初濫觴入楚乃無底將升聖人堂道固有廉陛邢子好少年如世有源水方求無津涯不作蝸牛喜兒中兀老蒼趣造甚竒異過閲王公門袖中有漫刺别來阻河山望逺每障袂斯文向千載有志常寡遂後生文楚楚照影若孔翠不應太𤣥草睎價咸陽市雨作枕簟秋官閒省中睡夢不到漢東茗碗乃為祟聞君肺渴减頗復佳食寐讀書得新功來雁寄一字戲答俞清老人寒夜王立之詩話云山谷云金華俞清老字子中二十年前與余共學於淮南元豐甲子相見於廣陵自云荆公欲使之脫逢腋著僧伽黎奉香火於半山寺豫之僧名紫琳字清老無妻子之纍云去作半山道人似不為難事然生龜脫筒亦難堪忍後數年見之儒冠自若也因嘗戲和清老詩云云集注山谷跋此詩云東坡屢哦此詩以為妙也索索葉自雨月寒遙夜䦨馬嘶車鐸鳴羣動不遑安有人夢超俗去髮脫儒冠平明視清鏡政爾良獨難聞道一稊米出身縳簪纓懷我伐朩友寒衾夢丁丁冨貴但如此百年半曲肱早晚相隨去松根有茯苓牧羊金華山早通玉帝籍至今風低草􅋾􅋾見白石金華風煙下亦有君履迹何為紅塵裏頷鬚欲雪白謫居黔南十首摘樂天句集注云近世曽慥端伯作詩選載潘邠老事云張文潛晚喜樂天詩邠老聞其稱美輒不樂嘗誦山谷十絶句以為不可跂及其一云老色日上面歡悰日去心今既不如昔後當不如今潜一日召邠老飯預設樂天詩一帙置書室牀枕間邠老少焉假榻翻閲良久才悟山谷十絶詩盡用樂天大篇裁為絶句蓋樂天長於敷衍而山谷巧於剪裁自是不敢復言端伯所載如此必有所依據然敷衍剪裁之說非是蓋山谷謫居黔南時取樂天江州等詩偶有㑹於心者摘其數語寫置齊閣或嘗為人書世因傳以為山谷自作然亦非有意與樂天較工拙也詩中改易數字可為作詩之法故因附見於此韻語陽秋云黔南十絶七篇全用樂天花下對酒渭川舊居東城尋春西樓委順竹窗等詩餘三篇用其詩略㸃化而已葉少蘊云詩人㸃化前作正如李光弼將郭子儀之軍重經號令精彩數倍此語誠然相望六千里天地隔江山十書九不到何用一開顔寄行簡詩元作相去六千里地絶天邈然十書九不達何以聞憂顔霜降水反壑風落朩歸山冉冉嵗華晚昆蟲皆閉關嵗晚詩元作冉冉嵗將晏物皆復本原冷淡病心情暄和好時節故園音信斷逺郡親賔絶花下對酒山郭燈火稀峽天星漢少年光東流水生計南枝鳥西樓冥懷齊逺近委順隨南北歸去誠可憐天涯住亦得委順老色日上面歡悰日去心今既不如昔後當不如今東城嘖嘖雀引雛稍稍筍成竹時物感人情憶我故鄉曲渭川舊居苦雨初入梅瘴雲稍含毒泥秧水畦稻灰種畬田粟同上輕紗一幅巾小簟六尺床無客盡日靜有風終日涼竹窗病人多夢醫囚人多夢赦如何春來夢合眼在鄉社寄行簡詩元作渴人多夢飲饑人多夢餐春來夢何處合眼到東川題孟浩然畫像苕溪漁隱云題浩然畫像詩浩然平生出處事跡悉能道盡乃詩中傳也先生少也隱鹿門爽氣洗盡塵埃昏賦詩真可凌鮑謝短褐豈愧公卿尊故人私邀伴禁直誦詩不顧龍鱗逆風雲感㑹雖有時顧此定知毋枉尺襄江渺渺泛清流梅殘臘月年年愁先生一往今幾秋後來誰復釣槎頭次韻廖明略陪吳明府白雲亭燕集西清詩話云魯直自黔南歸詩變前體且云要須唐律中作活計乃可言詩如少陵淵畜雲萃變態百出雖數十百韻格律益嚴謹蓋操制詩家法度如此余觀魯直和白雲亭燕集詩云云直可拍肩挽袂矣江淨明花竹山空響管絃風生學士麈雲繞令君筵百越餘生聚三吳逺接連庖霜刀落鱠執玉酒明船葉縣飛來舄壺公謫處天酌多時暴謔舞短更成妍唯我孤登覽觀詩未䆒宣空餘五字賞又似兩京然醫是肱三折官當嵗九遷老夫看鏡罷衰白敢爭先畫睡鴨容齊隨筆云徐陵鴛鴦賦云山雞映水那相得孤鸞照鏡不成雙天下真成長㑹合無勝比翼兩鴛鴦黃魯直題畫睡鴨云云全用徐語㸃化之末句尤精工山雞照影空自愛孤鸞舞鏡不成雙天下真成長㑹合兩鳬相倚睡秋江乞猫後山詩話云魯直乞猫詩云云雖滑稽而可喜千嵗而下讀者如新秋來鼠輩欺猫死揭瓮掀盆攪夜眠聞道狸奴將數子買魚穿栁聘銜蟬題蘆鴈圗禁臠云若不得流水還應過别山者題野燒也嚴霜百草白深院一株青題小松也前人以為工是題其意耳非能狀其體態也如子美題雨則曰紫崖奔處黑白鳥去邊明樂天題琵琶曰銀瓶忽破水漿迸鐵騎突出刀鎗鳴又曰四絃一聲如裂帛此皆曲盡萬物之情狀若音聲不可把玩如石火雷光而人之才力能攬取之然此但得其情狀非能寫其不傳之妙如山谷題蘆鴈圗則妙絶矣惠崇煙雨蘆鴈坐我瀟湘洞庭欲喚扁舟歸去傍人謂是丹青過百里奚大夫塜呂氏童䝉訓云或稱魯直桃李春風一杯酒江湖夜雨十年燈以為極至魯直自以此猶砌合須石吾甚愛之勿使牛礪角牛礪角尚可牛鬭殺我竹此乃可言至耳然如魯直百里大夫冢詩與快閣詩已自見成就處也行客抱憂端況復思古人何年一丘土不見石騏驎斷碑略可讀大夫身霸秦虞公納埀棘將軍西問津安知五羊皮自鬻千金身末俗工媒孽浮言妬道真幸逢孟軻賞不愧微子魂登快閣癡兒了却公家事快閣東西倚晚晴落朩千山天逺大澄江一道月分明朱絃巳為佳人絶青眼聊因美酒橫萬里歸船動長笛此心吾與白鷗盟和答錢穆父詠猩猩毛筆王直方詩話云東坡寫金帶鞍馬乃表四六中送窮文山谷猩猩毛筆詩乃篇章中毛頴傳類苑云魯直善用事若正爾填塞故實舊謂之㸃鬼簿今謂之堆垜死尸如詠猩猩毛筆詩云平生幾兩屐身後五車書又云管城子無食肉相孔方兄有絶交書精妙隱密不可加矣當以此語反三隅也吕氏童䝉訓云東坡詩云賦詩必此詩定知非詩人此或一道也魯直作詠物詩曲當其理如猩猩毛筆詩云平生幾兩屐身後五車書其必此詩哉愛酒醉魂在能言幾事疏平生幾兩屐身後五車書物色看王㑹勳勞在石渠拔毛能濟世端為謝楊朱竹莊詩話卷十
