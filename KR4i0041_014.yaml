body:
  text: 竹莊詩話卷十四雜編四古意陳羽詩史云陳羽有詩百餘首古意一篇集中所無十三學繡羅衣裳自憐紅袖聞馨香人言此是嫁時服含笑不刺雙鴛鴦郎年十九髭未生拜官天下聞郎名車馬駢闐賀門館自然不失為公卿是時妾家猶未貧兄弟出入雙車輪繁華全盛兩相敵與郎年少為婚姻郎家居近御溝水豪門客盡躡珠履雕盤酒器常不乾曉入中厨妾先起姑嫜嚴肅有規矩小娘嬌多意難取朝參暮拜白玉堂繡衣著盡黃金縷妾貌漸衰郎漸薄時時强笑意索寞知郎本來無嵗寒幾回掩淚看花落妾年四十絲滿頭郎未五十封公侯男兒全盛日忘舊銀床羽帳空颼飀庭花紅遍蝴蝶飛看郎玉佩下朝時歸來略略不相顧却令侍婢生光輝郎恨婦人易衰老妾亦恨深不忍道看郎壯健能幾時知過六十還枯槁遊道林嶽麓寺沈傳師六一居士云沈傳師道林嶽麓寺詩題云酬唐侍御姚員外而二人之詩不見不知何人也獨此詩以字畫傳於世而詩亦自佳詩事云黃魯直尤喜沈傳師嶽麓寺詩碑嘗為之說曰沈傳師字畫皆遒徑真楷筆勢可學唯道林嶽麓詩殊不相類似有神助其間架縱奪偏正肥瘦長短各有體忽若龍起滄溟鳳翔青漢又如花開秀谷松偃幽岑或似枯朩倒懸怪石髙墜千變萬態冥發天機與其詩之氣焰往往勍敵不問阿買之徒即韓擇朩蔡有鄰不是過也此魯直不特愛其書又愛其詩如此僕於宋次道家見所謂唐侍御首唱詩尤豪壯乃儒林郎監察御史唐扶也承明年老輒自論乞得湘守東南奔為聞楚國富山水青嶂邐迤僧家園含香珥筆皆眷舊謙抑自忘臺省尊不令執簡候亭館直許携手遊山樊忽驚列岫曉來逼朔雪洗盡烟嵐昏碧波回嶼三山轉丹艦繚郭千艘屯華鑣躞蹀絢砂步大斾錯綵輝松門樛枝競騖龍蛇勢折幹不滅風霆痕相重古殿倚岩腹别引新徑縈雲根生乎傷楚虞帝魂情多思逸聊開樽危弦細管逐歌揚畫鼓繡靴隨節翻鏘金七言凌老杜入朩八法墦髙軒嗟余絶倒久不知忍復感激論元元嶽麓山道林二寺行杜甫蔡寬夫詩話云子美題道林嶽麓寺詩云宋公放逐登臨後物色分留與老夫宋公之問也此語句法清新故為傑出其後唐扶題詩復云兩祠物色收拾盡壁間杜甫真少恩意雖相反而語亦秀拔乃知文章變態初無窮盡惟能者得之扶即沈傳師所謂唐侍御者其詩他語亦稱如泉清或戲蛟龍窟殿豁數盡髙帆掀即令異鳥聲不斷聞道看花春更繁之類與子美寺門髙開洞庭野殿腳插入赤沙湖五月寒風冷佛骨六時天樂朝香爐之句幾不相上下玉泉之南麓山殊道林林壑爭盤紆寺門髙開洞庭野殿腳插入赤沙湖五月寒風冷佛骨六時天樂朝香爐地靈步步雪山草僧寶人人滄海珠塔劫宫牆壯麗敵香厨松道清凉俱蓮花交響共命鳥金榜雙回三足烏方丈涉海費時節元圃尋河知有無暮年且喜經行近春日兼䝉暄暖扶飄然斑白身奚適旁此煙霞茅可誅桃源人家易制度橘州田土仍膏腴潭府邑中甚淳古太守庭內不喧呼昔遭衰世皆晦迹今幸樂國養微軀依止老宿亦未晚富貴功名焉足圖久為野客尋幽慣細學何顒逸興孤一重一掩吾肺腑山鳥山花吾友于宋公放逐曽題壁物色分留與老夫遊道林嶽麓二寺唐扶道林嶽麓仲與昆卓犖請從先後論松根踏雪二千步始見大屋開三門泉清或戲蛟龍窟殿豁數盡髙帆掀即今異鳥聲不斷聞道看花春更繁從容一衲分若有蕭瑟兩鬢吾能髠逢迎侯伯轉覺貴膜拜佛像心加尊梢揖皇英頮濃淚試與屈賈招清魂荒唐大樹悉柟桂細碎枯草多蘭蓀沙彌去學五印字靜女來懸千尺幡主人念我塵眼昏夜半號令期至暾遲回雖得上白舫羈紲不敢言緑樽兩祠物色收拾盡壁間杜甫真少恩晚來光彩又騰射筆鋒正健如可吞感懷韋莊鑑誡録云詩之作也窮通之分可觀王建詩寒碎故仕終不顯李洞詩窮悴竟不仕韋莊詩壯故仕至台輔何瓉詩愁未幾而卒王建寄賈島曰盡日吟詩坐忍飢萬人中覓似公稀僮眠冷榻朝猶卧驢放秋田夜不歸傍暖旋收紅落葉覺寒猶著舊生衣曲江池畔時時到為愛鸕鷀雨裏飛李洞上曹郎中曰間坊宅枕穿官水聽水分衾蓋蜀僧藥杵聲中搗殘夢茶鐺影裏煮孤燈刑曹樹䕃千年井華嶽樓開萬里冰詩句變風官漸緊夜濤舂盡海邊藤韋莊感懷云云何瓉書事云果决生涯向洛中西投知已語從容雲遮劍閣三千里水隔瞿塘十二峯濶步文翁坊裏月閒尋杜甫宅邊松到頭須卜林泉隱自愧無能繼卧龍蜀檮杌云韋莊字端已乾寧中舉進士有詩云云末兩句時人以其有宰相器長年方悟少年非人道新詩勝舊詩十畝野塘留客釣一軒春雨對僧棊花間醉任黃鸝語池上吟從白鷺窺大道不將爐冶用有心重立太平基陪王郎中尋孔徴君韋應物復齊謾録云尋孔徴君早春逰望二篇皆佳作而韋集逸去余家有顧陶所編唐詩有云俗吏閒居少同人㑹面難偶隨香署客來訪竹林歡暮館花微落春城雨暫寒甕間聊共酌莫使宦情䦨和晉陵陸丞相早春逰望杜審言獨有宦逰人偏驚物候新雲霞出海曙梅栁渡江春淑氣催黃鳥晴光照緑蘋忽聞歌古調歸思欲沾巾髙軒過李賀托言云李賀年七嵗以長短之製名動京華時韓文公與皇甫湜覽賀所作竒之因連騎造門求見賀總角荷衣而出二公不之信因令面賦一篇賀承命欣然操觚染翰傍若無人仍名曰髙軒過二公大驚遂以所乘馬命聯鑣而還所居親為束髮華裾織翠青如葱金環壓轡搖玲瓏馬蹄隱耳聲隆隆入門下馬氣如虹云是東京才子文章巨公二十八宿羅心胸元精照耀貫當中殿前作賦聲摩空筆補造化天無功龎眉書客感秋蓬誰知死草生華風我今垂翅附冥鴻他日不羞蛇作龍金銅仙人辭漢歌李賀杜牧之序云賀探尋前事所以深歎恨古今未嘗經道者如金銅仙人辭漢歌補梁庾肩吾宫體謡求取情狀離絶逺去筆墨畦徑間亦殊不能知之梁魏録云李賀歌造語竒特首云茂陵劉郎秋風客指漢武帝言也又云魏官牽車指千里此言魏明遣人遷金銅仙人於鄴也又云空將漢月出宫門憶君清淚如鉛水此語尤警拔非撥去筆墨畦徑安能及此序云魏明帝青龍元年八月詔宫官牽車西取漢孝武捧露盤仙人欲立置前殿宫官既拆盤仙人臨載乃澘然淚下遂作歌茂陵劉郎秋風客夜聞馬嘶曉無迹畫欄桂樹懸秋香三十六宫土花碧魏官牽車指千里東關酸風射眸子空將漢月出宫門憶君清淚如鉛水衰蘭送客咸陽道天若有情天亦老擕盤獨出月荒凉渭城已逺波聲小還自㑹稽歌李賀序云庾肩吾於梁時嘗作宫體謡引以應和皇子及國世淪敗肩吾先潜難㑹稽後始還家僕意其必有遺文今無得焉故作還自㑹稽歌以補其悲野粉椒壁黃濕螢滿梁殿臺城應教人秋衾夢銅輦吳霜㸃歸鬢身與塘蒲晚脈脈辭金魚羈人守迍賤題金山寺張祐南唐書云金山寺號為勝景先張祐吟詩有僧歸夜船月龍出曉堂雲之句自後詩人閣筆一宿金山頂微茫水國濵僧歸夜船月龍出曉堂雲樹影中流見鐘聲兩岸聞因悲在朝市終日醉醺醺題華清宫杜裳西清詩話云世有才藻擅名而辭間不工者有不以文藝稱而詩或驚人者近傳留題華清宫一絶云云乃杜裳也武昌阻風一絶云云乃方澤也此殆不可知已行盡江東數十程曉乘殘月入華清朝元閣上西風急都入長楊作雨聲武昌阻風方澤江上春風留客舟無窮歸思滿江流與君盡日閒臨水貪看飛花忘却愁晚泊潯陽望廬峯作孟浩然呂氏童䝉訓云孟浩然詩云云前四句但詳看此等詩自然髙逺挂席幾千里名山都未逢泊舟潯陽郭始見香爐峯常讀逺公傳永懷塵外蹤東林精舍在日暮空聞鐘南州有贈二首賈至蔡寬夫詩話云王摩詰世固知之矣獨賈至未見深稱者豫觀其南州有贈二首云云如此等類使置老杜集中雖明眼人恐未易辨極浦三春草高樓萬里心楚山晴靄碧湘水暮流深忽與朝中舊同為澤畔吟停杯試北望還欲淚沾襟又越井人南去湘川水不流江邊數杯酒海內一孤舟嶺嶠同遷客京華即舊遊春心將别恨萬里共悠悠錦瑟李商隱箱素雜記云義山錦瑟詩云云山谷道人讀此詩殊不曉其意後以問東坡東坡云此出古今樂志云錦瑟之為器也其絃五十其柱如之其聲也適怨清和按李詩莊生曉夢迷蝴蝶適也望帝春心託杜鵑怨也滄海月明珠有淚清也藍田日暖玉生煙和也一篇之中曲盡其意史稱其瑰竒雄邁信然錦瑟無端五十絃一絃一柱思華年莊生曉夢迷蝴蝶望帝春心託杜鵑滄海月明珠有淚藍田日暖玉生煙此情可待成追憶只是當時已惘然中秋月廖凝雅言雜載云廖凝字熙績善吟諷有集行於世詠中秋月與聞蟬最為絶唱江左學詩者競造其門九十日秋色今朝已中分孤光吞列宿四面絶微雲衆朩排踈影寒流叠細紋遙遙望丹桂心緒正紛紛聞蟬一聲初應候萬朩已西風偏感異鄉客先於離塞鴻日斜金谷靜雨過石城空此處不堪聽蕭條千古同金陵懷古劉夢得鑑誡録云元微之劉夢得韋楚客㑹於樂天之居因論南朝興廢事各賦金陵懷古詩夢得方在郎省元公已居北門夢得騁其才略無遜意滿引一觴請為首唱一揮而成白公覽詩曰四人探驪龍吾子先得其珠其餘鱗甲將何為三公於是罷吟珊瑚鈎詩話云千尋鐡鎖沉江底一片降旗出石頭當時號為絶唱王濬樓船下益州金陵王氣黯然收千尋鐡鎖沉江底一片降旗出石頭荒苑至今生茂草古城依舊枕寒流而今四海歸皇化兩岸蕭蕭蘆荻秋寄南遊兄弟竇鞏苕溪漁隱云丙戌之冬余初病起深居簡出終日曝背晴簷萬事不到因以荆公所選唐百家詩反復熟味之見其格律辭句列皆相似雖無豪放之氣而有秀整之功髙為不及卑復有餘適中而已荆公為欲觀唐人詩觀此足矣詎不然乎集中佳句世所稱道者不復録出惟余别有喜者命兒輩筆之以備遺云四絶云云書成未報幾時還知在三湖五嶺間獨立衡門秋水濶寒鴉飛去日銜山南逰感興竇鞏傷心欲問前朝事惟見江流去不回日暮東風春草緑鷓鴣飛上越王臺移家别湖上亭戎昱好是春風湖上亭桞條藤蔓繫離情黃鶯久住渾相識欲别頻啼四五聲宿建德江孟浩然移舟泊滄渚日暮客愁新野濶天低樹江清月近人别輞川别業王縉苕溪漁隱云余舊見郵亭壁間題云云亦有佳思後讀王維集乃王縉詩附在集中山月曉仍在林風凉不絶殷勤如有情惆悵令人别麗人行杜甫瑶溪集云詩之景不一而足今隨詩出之觀作者之梗槩云瑶溪集多立體式品題諸詩强為分别初無確論今並不取獨所論詩之景者為說雖泛然其間編類多前輩所稱美而後人所膾炙故頗加刪録得五十九篇若他有評論已見别卷者兹不復載一首說帝都遊春之盛三月三日天氣新長安水邊多麗人態濃意逺淑且真肌理細膩骨肉勻繡羅衣裳照暮春蹙金孔雀銀麒麟頭上何所有翠微㔩葉垂鬢脣背後何所見珠壓腰衱穩稱身就中雲幕椒房親賜名大國虢與秦紫駝之峰出翠釡水精之盤行素鱗犀筯厭飫久未下鑾刀縷切何紛綸黃門飛鞚不動塵御厨絡繹送八珍簫鼓哀吟感鬼神賔從雜遝實要津後來鞍馬何逡巡當軒下馬立錦茵楊花雪落覆白蘋青鳥飛去銜紅巾炙手可熱勢絶倫慎莫近前丞相嗔樂逰園一首知貴逰燕㑹之適樂逰古園崒森爽煙綿碧草萋萋長公子華筵勢最强秦川對酒平如掌長生朩瓢示真率更調鞍馬狂歡賞青春波浪芙蓉園白日雷霆夾城仗閶闔晴開詄蕩蕩曲江翠幕排銀榜拂水低徊舞袖翻緣雲清切歌聲上却憶年年人醉時只今未醉已先悲數莖白髮那拋得百罰深杯亦不辭聖朝亦知賤士醜一物自荷皇天慈此身飲罷無歸處獨立蒼茫自詠詩飲中八仙歌一首見開元太平人物之盛知章騎馬似乘船眼花落井水底眠汝陽三斗始朝天道逢麴車口流涎恨不移封向酒泉左相日興費萬錢飲如長鯨翕百川銜杯樂聖稱避賢宗之瀟灑美少年舉觴白眼望青天皎如玉樹臨風前蘇晉長齊繡佛前醉中往往愛逃禪李白一斗詩百篇長安市上酒家眠天子呼來不上船自稱臣是酒中仙張旭三杯草聖傳脫帽露頂王公前揮毫落紙如雲烟焦遂五斗方卓然髙談雄辨驚四筵今夕行一首見旅館博戲豪放之快今夕何夕嵗云徂更長燭明不可孤咸陽客舍一事無相與博塞為歡娛馮陵大叫呼五白袒跣不肻成梟盧英雄有時亦如此邂逅豈即非良圗君莫笑劉毅從來布衣願家無儋石輸百萬髙都護驄馬行三首詠駿馬見寫貌駿物可喜之狀安西都護胡青驄聲價歘然來向東此馬臨陳久無敵與人一心成大功功成惠養隨所致飄飄逺自流沙至雄姿未受伏櫪恩猛氣猶思戰場利腕促蹄髙如踣鐵交河幾蹴曾氷裂五花散作雲滿身萬里方看汗流血長安壯兒不敢騎走過掣電傾城知青絲絡頭為君老何由却出橫門道天育驃騎歌吾聞天子之馬走千里今之畫圖無乃是是何意態雄且傑駿尾蕭梢朔風起毛為緑縹兩耳黃眼有紫焰雙瞳光矯矯龍性合變化卓立天骨森開張伊昔太僕張景順監牧攻駒閲清峻遂令大奴守天肓别養驥子憐神俊當時四十萬匹馬張公歎其材盡下故獨寫真傳世人見之座右久更新年多物化空形影嗚呼健步何由騁如今豈無騕裊與驊騮時無王良伯樂死即休驄馬行鄧公馬癖人共知初得花驄大苑種夙昔傳聞思一見牽來左右神皆竦雄姿逸態何崷崒顧影驕嘶自矜寵隅目青熒夾鏡懸肉騣碨礧連錢動朝來久試華軒下未覺千金滿髙價赤汗微生白雪毛銀鞍却覆香羅帕卿家舊賜公取之天廄真龍此其亞晝洗須騰涇渭深朝趨可刷幽并夜吾聞良驥老始成此馬數年人更驚豈有四蹄疾於鳥不與八駿俱先鳴時俗造次那得致雲霧晦冥方降精近聞下詔喧都邑肻使騏驎地上行醉為馬墜諸公携酒相看一首見俊快奔突之勝甫也諸侯老賔客罷酒酣歌拓金㦸騎馬忽憶少年時散蹄迸落瞿塘石白帝城門水雲外低身直下八千尺粉堞電轉紫逰韁東得平岡出天壁江樹野堂爭入眼垂鞭嚲鞚凌紫陌向來皓首驚萬人自倚紅顔能騎射安知决臆追風足朱汗驂驔猶噴玉不虞一蹶終損傷人生快意多所辱職當憂戚伏衾枕况乃遲暮加煩促朋知來問腆我顔杖藜强起依僮僕語盡還成開口笑提㩦别掃清溪曲酒肉如山又一時初筵哀絲動豪竹共指西日不相貨喧呼且覆杯中淥何必走馬來為問君不見嵇康養生被殺戮竹莊詩話卷十四
