body:
  text: 竹莊詩話卷十九雜編九江陵病中聞白樂天左降江州元稹容齊隨筆云嬉笑之怒甚於裂眦長歌之哀過於慟哭此語誠然元微之在江陵病中聞白樂天左降江州作絶句云云樂天以為此句他人尚不可聞况僕心哉微之集作垂死病中仍悵望此三字既不佳又不題為病中作失其意矣東坡守彭城子由來訪之留百餘日而去作二小詩云云東坡云以為讀之殆不可為懷乃和其詩以自解至今讀之尚能使人悽然也殘燈無熖影幢幢此夕聞君謫九江垂死病中驚起坐暗風吹雨入寒窗與子瞻會宿逍遙堂二絶蘇轍逍遙堂後千尋木長送中宵風雨聲誤喜對牀尋舊約不知漂泊在彭城又秋來東閣涼如水客去山公醉似泥困卧北忩呼不醒風吹松竹雨淒淒書事王維禁臠云王維舒王兩詩皆有不盡之意蘇子由謂之不帶聲色也輕隂閣小雨深院閉慵開坐看蒼苔色欲上人衣來同前王安石若邪溪上踏莓苔興罷張帆載酒回汀草岸花渾不見青山無數逐人來題省中院壁杜甫禁臠云前二詩杜子美作後一詩嚴武作皆於引韻便失拈則若不拘律然其對偶特精到如此謂之骨含蘇李體魯直作落星詩乃其法也掖垣竹埤梧千尋洞門對雪常隂隂飛花游絲白日靜鳴鳩乳燕青春深腐儒寒晚謬通籍退食遲回違寸心衮職曾無公家補許身愧比雙南金卜居浣花流水水西頭主人為卜林塘幽已知出郭少塵事更有澄江銷客愁無數蜻蜓齊上下一雙鸂䳵對沈浮東行萬里堪乘興須向山隂上小舟巴嶺答杜二見憶嚴武卧向巴山月落時兩鄉千里夢相思可但步兵兼好酒也知光祿最能詩江頭赤葉楓愁客籬外黃花菊對誰跋馬望君非一度冷猿秋鴈不勝悲落星寺黃庭堅王直方詩話云山谷謂洪駒父云甥最愛老舅詩中何語駒父舉蜂房各自開戶牖蟻穴或夢封侯王以為深類工部山谷云得之矣落星游空何時落著地便化為寶坊詩人晝吟山入座醉客夜愕江撼牀蜂房各自開戶牖蟻穴或夢封侯王不知青雲梯幾級更借瘦藤遊上方嚴中丞携酒過草堂杜甫漁隱叢話云律詩之作用字平側世固有定體衆共守之然不若時用變體如兵之出竒變化無窮以驚世駭目如老杜云云此絶句律詩之變體也東坡嘗用此變體作詩云云又有七言律詩至第三句便失拈落平側亦别是一體唐人用此甚多但今人少用耳如老杜云云嚴武云云韋應物云云此三詩起頭用側聲老杜云云韋應物云云此二詩起韻用平聲故第三句亦用平聲凡此皆律詩之變體學者不可不知竹裏行厨洗玉盤花邉立馬簇金鞍非關使者徵求急自識將軍禮數寬百年地僻柴門迥五月江深草閣寒看弄漁舟移白日老農何有罄交歡絶句韋應物南望青山滿禁闈曉陪鴛鷺正差池共愛朝來何處雪蓬萊宫裏拂松枝又杜甫山瓶乳酒下青雲氣味濃香幸見分鳴鞭走送憐漁父洗盞開嘗對馬軍又蘇軾華髮蕭蕭老遂良一身萍挂海中央無錢種菜為家業有病安心是藥方儋耳總角黎家三小童口吹葱葉送迎翁莫作天涯萬里意溪邉自有舞雩風又半醒半醉問諸黎竹刺藤梢步步迷但尋牛跡覔歸路家在牛欄西復西詠懷杜甫搖落深知宋玉悲風流儒雅亦吾師悵望千秋一灑淚蕭條異代不同時江山故宅空文藻雲雨荒臺豈夢思最是楚宫俱泯滅舟人指㸃到今疑又嚴武漫向江頭把釣竿懶眠沙草愛風湍莫倚善題鸚鵡賦何須不著鵕䴊冠腹中書籍幽時曬肘後醫方靜處看興發會能馳駿馬終須重到史君灘自鞏洛舟行入黃河即事韋應物夾水蒼山路向東東南山豁大河通寒樹依微逺天外夕陽明滅亂流中孤村幾嵗臨伊岸一鴈初晴下朔風為報洛橋遊宦侣扁舟不繫與心同即事杜甫暮春三月巫峽長晶晶行雲浮日光雷聲忽送千山雨花氣渾如百和香黃鶯過水翻回去燕子銜泥濕不妨飛閣卷簾圖畫裏虛無只少對瀟湘燕李録事韋應物與君十五侍皇闈曉拂爐烟上玉墀花開漢苑經過處雪下驪山沐浴時近臣零落今猶在仙駕飄颻不可期此日相逢非舊日一杯成喜亦成悲石鼓歌韓愈筆墨間録云此歌全仰止杜子美李朝八分小篆歌杜歌見本門邵氏聞見録亦云退之石鼓詩體子美八分歌也張生手持石鼓文勸我試作石鼓歌少陵無人謫仙死才薄將奈石鼓何周綱陵遲四海沸宣王憤起揮天戈大開明堂受朝賀諸侯劍佩鳴相磨搜于岐陽騁雄俊萬里禽獸皆遮羅鐫㓛勒成告萬世鑿石作鼓隳嵯峨從臣才藝咸第一簡選撰刻留山河雨淋日炙野火燎鬼物守護煩撝呵公從何處得紙本毫髮盡備無差訛辭嚴義密讀難曉字體不類隸與蝌年深豈免有缺畫快劍斫斷生蛟鼉鸞翔鳳翥衆仙下珊瑚碧樹交枝柯金繩鐵索鎖紐壯古鼎躍水龍騰梭陋儒編詩不收入二雅褊迫無委蛇孔子西行不到秦掎托星宿遺羲娥嗟余好古生苦晚對此涕淚雙滂沱憶昔初䝉博士徵其年始改稱元和故人從軍在右輔為我量度掘臼科濯冠沐浴告祭酒如此至寶存豈多氊苞席裹可立致十鼓只載數駱駝薦諸太廟比郜鼎光價豈止百倍過聖恩若許留太學諸生講解得切磋觀經洪都尚填咽坐見舉國來奔波剜苔剔蘚露節角安置妥帖平不頗大厦深簷與蓋覆經歷久逺期無他中朝大官老於事詎肯感激徒媕婀牧童敲火牛礪角誰復著手為摩挲日銷月鑠就埋沒六年西顧空吟哦羲之俗書趂姿媚數紙尚可博白鵝繼周八代爭戰罷無人收拾理則那方今太平日無事柄用儒雅崇丘軻安能以此上論列願借辨口如懸河石鼓之歌止於此嗚呼吾意其蹉跎同前蘇軾趙次公詩注云石鼓周宣王時物在鳳翔府孔子廟中石鼓之字蓋蝌蚪之變者韓退之有蝌蚪書後記一篇云李陽冰之子服之授余以其家蝌蚪孝經漢衛宏官書兩部合一卷且曰古書得其依據如是則退之宜稍識蝌蚪書矣而退之石鼓歌乃云辭嚴義密讀難曉字體不類隸與蝌而東坡乃云強尋偏旁推㸃畫時得一二遺八九我車既攻馬亦同其魚維鱮實之栁東坡記石鼓文云我車既攻我馬既同又云其魚維何維鱮及鯉何以貫之維楊與栁惟此六句可讀餘不可通曉則東坡精於書學矣歐陽公集古跋尾謂韋應物以為文王之鼓韓退之以為宣王之鼓不知何所據而然卒取退之好古不妄者為可信冬十二月嵗辛丑我初從政見魯叟舊聞石鼓今見之文字鬱律蛟蛇走細觀初以指畫肚欲讀嗟如箝在口韓公好古生已遲我今况又百年後強尋偏旁推㸃畫時得一二遺八九我車既攻馬亦同其魚維鱮貫之栁古器縱橫猶識鼎衆星錯落僅名斗糢糊半已似瘢胝詰曲猶能辨跟肘娟娟缺月隱雲霧濯濯嘉禾秀稂莠漂流百戰偶然存獨立千載誰與友上追軒頡相唯諾下挹冰斯同鷇㝅憶昔周宣歌鴻鴈當時籀史變蝌蚪厭亂人方思聖賢中興天為生耆耉東征徐虜闞虓虎北伐犬戎隨指嗾象胥雜沓貢狼鹿方邵聨翩賜圭卣遂因鼙鼓思將帥豈為考擊煩矇瞍何人作頌比嵩髙萬古斯文齊􅒖嶁勳勞至大不矜伐文武未逺猶忠厚欲尋年嵗無甲乙豈有文字記誰某自從周衰更七國竟使秦人有九有掃除詩書誦法律投棄俎豆陳鞭杻當年何人佐祖龍上蔡公子牽黃狗登山刻石頌功烈後者無維前無偶皆云皇帝巡四國烹滅彊暴救黔首六經既已委灰塵此鼓亦當隨擊掊傳聞九鼎淪泗上欲使萬夫沈水取暴君縱欲窮人力神物義不汚秦垢是時石鼓何處避無乃天工令鬼守興亡百變物自閒富貴一朝名不朽細思物理坐歎息人生安得如汝夀籌筆驛石延年綿州有籌筆驛石曼卿嘗遊焉作詩以紀其迹寶元二年大書以遺朱君復之後二年朱為四明節度推官刻石于㕔事又十有九年胡宗愈全夫至作亭于後圃以貯之中更兵火亭壞碑仆又八十有三年豫交代劉偉子才至得斷碑于榛莽間乃建南堂亟置壁間且因以名其堂然驛在西蜀而碑見于此觀者多疑之故叙其始末庶幾來者有考云鄱陽王剛中時亨題昔范文正公談石學士云曼卿之詩氣雄而竒大愛杜甫酷能似之曼卿之筆顔筋栁骨散落人間寶為神物今觀此詩此字則所謂寶為神物非虛語也豫至鄞之明年乃得此書及李陽冰篆額數字皆斷碑糞壤中取而滌之缺裂之餘遒徑如新視其生意凛然使工摹之以貽好事其必不以豫為愛竒之過者天下之目舉相似也詩缺十五字得曼卿集補之臣字下與逆子搖嶽坰下虎奔咸逐乃下不經惟關下徐駭蠻下土長樂林栗識隱君詩話云石延年長韻律詩善叙事其他無大好處籌筆驛銅雀臺留侯廟詩為一集之冠歐公詩話云曼卿自少以詩酒豪放自得其氣貌偉然詩格竒峭又工於書筆畫遒健體兼顔栁為世所好余家嘗得南唐後主澄心堂紙曼卿為余草書其籌筆驛詩曼卿平生所自愛者至今藏之號為三絶漢室虧皇象乾坤未即寧姦臣與逆子搖嶽復翻溟權表分江域曹袁鬪夏坰虎奔咸逐逐龍卧獨冥冥從衆非無術欺孤乃不經惟思恢正道直起復炎靈管樂韜方略關徐駭視聽一言俄逆主三顧巳忘形南既清蠻土東期赤魏庭出師功自著治國志誰銘歷劍兵如水臨秦策若瓴舉聲收潰虜橫勢欲逾涇仲達恥巾幗辛毗發辟扃可煩親細務遽見墮長星戰地悲陵谷來賢賞德刑意中流水逺愁外舊山青想像風徽在侵尋毛骨醒遲留慕英氣沈歎撫青萍竹莊詩話卷十九
