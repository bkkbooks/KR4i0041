body:
  text: 竹莊詩話卷二十一方外上升歌吳含靈郡閣雅談云吳含靈江西人也為道士居南嶽六七年俗呼為吳猱好睡經旬不飲食常言曰人若要閒即須懶如勤則不閒也素不攻文偶作上升歌甚竒絶云云清泰年羽化後有客人乾祐中在嵩山見之玉皇有詔登仙職龍吐雲兮鳳著力眼前驀地見樓臺異草竒花不可識我向大羅觀世界世界只如指掌大當時不為上升忙一時持向瀛洲賣題鄭處士隱居唐求古今詩話云唐末蜀州有唐求放曠疏逸方外人也吟詩有所得即將藁撚為丸投大瓢中後卧病投瓢於江曰兹文茍不沈沒得之者方知吾苦心耳瓢至新渠江有識者曰此唐山人詩瓢也接得十才二三題鄭處士隱居云云贈如上人云云不信最清曠及來愁已空數㸃石泉雨一溪霜葉風業在有山處道成無事中酌盡一杯酒老夫顔亦紅贈如上人不知名利苦念佛老岷峨補衲雲千片焚香篆一窠戀山人事少憐客道心多日日齊鐘罷髙懸濾水羅題范賢觀茅亭客話云求性至純慤篤雅好道放曠疏逸幾乎方外之士也每入市騎一青牛至暮醺酣而歸非其類不與之交或吟或詠其贈寄别之詩布於人口又題青城山范賢觀云云贈僧云云數里緣山不厭難為尋真訣問黃冠苔鋪翠㸃仙橋滑松織香梢古道寒晝傍緑畦鋤嫩玉夜開紅竈撚新丹鐘聲已斷泉聲在風動瑶花月滿壇贈僧曾聞半偈雪山中具葉翻時理盡通般若常添持戒力藥義誰算念經功雲開曉月應難染海上孤舟自任風長說滿庭花色好一枝紅是一枝空許真君詩續仙傳云許宣平新安歙人自唐景雲中隱於城陽山南塢結庵以居不知其餌但見不食顔若四十許人行如奔馬時或負薪以賣薪檐嘗掛一枝花瓠及曲竹枝每醉騰騰以歸獨吟云云爾來三十餘年或施人財物或救人疾苦城市多訪之不見但覺其庵殿題詩云云好事者多詠其詩有抵長安者於驛路洛陽同華間傳舍是處題之天寶中李白自翰林出東遊傳舍覽詩吟之嗟嘆曰此仙中詩人也負薪朝出賣沽酒日西歸若問家何處穿雲入翠微題庵殿隱居三十載築室南山顛靜夜玩明月閒朝飲碧泉樵人歌壠上谷鳥戲巖前樂矣不知老都忘甲子年絶句西清詩話云近有人遊羅浮越大小石樓將歸迫暮留宿巖谷間中夜風薄月素見一人身無衣而紺毛覆體因念山空夜寂此必仙也乃再拜問道異人了不顧長嘯數聲聲振林谷又歌一詩而去云云讀之使人翛然有絶俗念不知身在塵壒中雲來萬嶺動雲去天一色長嘯兩三聲空山秋月白絶句玉堂閒話云秦川城北絶頂之上有隗囂宫宫頗宏敞壯麗今為夀山寺寺有三門門限琢青石為之瑩徹如琉璃色余嘗待月納涼夕處朝遊不離於是爾後入蜀蜀有道士謂余曰隗宫石門限下詩記之乎余曰余為孩童逮乎壯年遊處於此未嘗見有詩道士微哂曰子若復遊但於石門限下土際求之丙戌嵗蜀破還秦至則訪求之果得一絶云云詳觀此篇飄飄然有神仙體裁逺近詞人競來諷味那知道士非控鯉駕鶴之流乎竒哉竒哉清溪道士人不識上天下天鶴一隻洞門深鎖玉忩閒滴露研朱㸃周易空門臨平道中作道潜冷齊夜話云吳僧道潛有標置常自姑蘇歸西湖臨平道中作詩云云東坡赴官錢塘過而見之大稱賞風蒲獵獵弄輕柔欲立蜻蜓不自由五月臨平山下路藕花無數滿汀洲題寺壁惠詮冷齊夜話云東吳僧惠詮佯狂垢汚而詩語清婉嘗書湖上一山寺壁云云東坡一見為和其後竟以此詩知名竹坡詩話云余觀東坡和詮詩所謂但聞烟外鐘不見烟中寺幽人行未已草露濕芒屨惟應山頭月夜夜照來去未嘗不喜其清絶過人逺甚晚遊錢塘始得詮詩云云乃知其幽深清逺自有林下一種風流東坡老人雖欲回三峽倒流之瀾與溪壑爭流終不近也落日寒蟬鳴獨歸林下寺柴扉夜未掩片月隨行屨惟聞犬吠聲更入青蘿去十竹詩清順冷齊夜話云西湖僧清順頤然清淡嘗賦十竹詩云云林下云云荆公遊湖上愛之乃稱其名坡晚年亦與遊甚多酬唱城中寸土如寸金幽軒種竹只十箇春風慎勿長兒孫穿我階前緑苔破林下久服林下遊頗識林下趣從渠緑隂繁不礙清風度閒行石上眠落葉不知數一鳥忽飛來啼破幽絶處送僧可士西清詩話云東坡言僧詩要無蔬筍氣固詩人龜鑑今時誤解便作世網中語殊不知本分家風水邉林下氣象蓋不可無若盡洗去清拔之韻使與俗同科又何足尚齊已云春深遊寺客花落閉門僧惠崇云曉風飄磬逺暮雪入廊深之句華實相副顧非佳句耶天聖間閩僧可士有送僧詩云云亦非食肉者能到也一鉢即生涯隨緣度嵗華是山皆有寺何處不為家笠重吳天雪鞋香楚地花他年訪禪室寧憚路岐賒竹裏顯忠洪駒父詩話云王荆公書一絶句於壁間云云蓋詩僧顯忠詩也竹裏編茅倚石根竹莖疏處見前村閒眠盡日無人到自有清風為掃門絶句竇黁東坡云余謫黃州休馬于逆旅祈宗祥家見壁上有幅紙題詩云云其後題云滏水僧竇黁宗祥謂余此光黃間狂僧也年百三十死於熙寧十年既死人有見之者滿院秋光濃欲滴老僧倚杖青松側只怪髙聲問不應嗔余踏破蒼苔色獨行溪上洪覺範冷齊夜話云余自并州還故里館延福寺寺前有小溪風物類斜川余兒童時戲劇之地也嘗春深獨行溪上作小詩云云魯直曰觀君詩說烟波漂渺處如陸忠州論國政字字坦夷前身非篙師沙户種類耶小溪倚春漲攘我夜月灣新晴為不平約束晚見還銀梭時撥剌破碎波中山整釣背落日一葉嫩紅間初退黃龍院心禪師許彥周詩話云晦堂心禪師初退黃龍院詩云云此詩深靜平實道眼所了非世間文士詩僧所能髣佛也不住唐朝寺閒為宋地僧生涯三事衲故舊一枝藤乞食隨緣過逢山任意登相逢莫相笑不是嶺南能呈江都令史宗冷齊夜話云有僧史宗著麻衣加衲其上號麻衣道士坐廣陵白士埭謳歌自適江都令檀祇與語多無畔岸索紙賦詩云云檀祗異之陶淵明記白土埭逢三異比丘此其一也觀其詩句脫去畛封有超然自得之氣非尋常介夫所能作有欲苦不足無欲即無憂未若清虛者帶索披𤣥裘浮游一州間泛若不繫舟要當畢塵慮棲息老山丘西湖僧舍清順竹坡詩話云東坡遊西湖僧舍壁間見小詩云云問誰所作或告以錢塘僧清順者即日求得之一見甚喜自是而順之名出矣余留錢塘七八年間有能誦清順詩者往往不逮前篇政以所見之未多耳然而使其止於此亦足傳也竹暗不通日泉聲落如雨春風自有期桃李亂深塢題烟蓬法具夷堅巳志云吳中僧多有能詩者法具字圓復題人烟蓬云云又絶句云云二首藴常字不輕詠石菖蒲云云詠蘭云云法平字元衡登北固樓云云絶句云云三人皆勝流甚有唐人風致也曹植波瀾濶曾為若士遊江湖流滿眼天地入扁舟散髮邀明月停杯問白鷗他年歸紫禁夢亦繞滄洲絶句鶴鳴九皋秋夜永紙帳芙蕖卧燈影九州之外更九州誰解摩心發深省又看了青燈夢不成東風捲雪落寒聲半生客裏無窮恨告訴梅花說到明石菖蒲藴常細水圍蒼石纖纖手自移幾年離鴈蕩萬里到天池浮玉春風後小姑煙雨時他年懷勝絶魂夢亦清竒蘭目斷山河恨莫裁拆芳猶記小徘徊細看葉底春風面疑自幽篁影下來登北固樓法平不負南徐眼來看北固雲金焦兩山小吳楚一江分雨氣生蒼壁秋聲起夕曛半生流落恨此日重殷勤絶句春風吹枕小屏寒客舍無聊夢不安花葉暗時人已去夕陽光滿舊欄干絶句有規却掃編云往嵗吳中多詩僧其名往往見於前輩文集中豫渡江之初猶見有規者頗以詩知名時年七十餘談論瀟灑可喜臨終前數日有詩云云葉左丞大愛之讀書已覺眉稜重就枕方欣骨節和睡起不知天早晚西忩殘日已無多竹莊詩話卷二十一
