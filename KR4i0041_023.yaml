body:
  text: 竹莊詩話卷二十三警句上五言勳業頻看鏡行藏獨倚樓後山詩話云裕陵嘗言子美詩云云謂甫他詩皆不逮此捲簾殘月影欹枕逺江聲謾齋語録云不言見聞兩字此便是字中無斧鑿痕也細雨魚兒出微風燕子斜石林詩話云詩語圓已用巧太過然緣情體物自有天然工巧况不見刻削之痕老杜云云此十字殆無一字虛設細雨著水面為漚魚常上浮而淰若大雨則伏而不出燕體輕弱風猛則不能勝惟微風則受以為勢故有輕燕受風斜之語粉墻猶竹色虛閣自松聲石林詩話云滕王亭子云云若不用猶與自兩字則餘八字凡亭子皆可用不必滕王也緑垂風折笋紅綻雨肥梅岸花飛送客檣燕語留人詩眼云文章茍當於理則綺麗風花同入于妙老杜云云亦甚綺麗其摩寫景物之意自親切所以妙絶古今圓荷浮小葉細麥落輕花潘邠老云五言詩第三字要響云云浮字落字是響字也日月籠中鳥乾坤水上萍王直方詩話云山谷云凡作詩須要開廣如老杜云云之類野日荒荒白江流泯泯清雪浪齋日記云古人下連綿字不虛發如老杜云云退之云月吐忩炯炯皆造微入妙緑樹連村暗黃花入麥稀棋聲花院靜幡影石壇髙並司空圗暗飛螢自照水宿鳥相呼四更山吐月殘夜水明樓並杜甫東坡云司空表聖自論其詩以為有意外味云云此句最善又云云吾嘗獨遊五老峯入白鶴觀松隂滿地不見一人惟聞棊聲然後知此句之工也但恨其寒儉有僧態若杜子美云云則才力富健去表聖之流已逺矣雨微吟足思花落夢無憀川明虹照雨樹密鳥衝人容齋隨筆云表聖五言云云皆可稱也流水間過院春風與閉門上簾宜晚景卧簟覺新涼礙冠門栁長驚夢院鶯啼遊魚牽荇沒戲鳥踏花摧漁隱叢話云秦系有詩如云云皆間逺有味漠漠帆來重冥冥鳥去遲後湖集云每讀韋蘇州云云之語未嘗不茫然而思喟然而嘆嗟乎此會晚泊江西十年夢耳吾且老壯懷銷落塵土坌設無少日煙霞之想也緑隂生晝寂孤花表餘春石林詩話云此蘇州集中最為警䇿暖風抽宿麥清雨卷歸旗韓愈壁空殘月曙門掩候蟲秋栁宗元又云張文潛論韓栁五字警句退之云云子厚云云皆集中第一柳塘春水漫花塢夕陽遲嚴維深山催短景喬木易髙風杜甫歐公詩話云聖俞語豫曰嚴維詩云云則天晴時態融和駘蕩如在目前劉貢父詩話云此一聨細細較之夕陽遲則繫花春水漫不須柳也如老杜云云則了無瑕纇楓林社日鼓茅屋午時雞雪浪齋日記云荆公喜唐人云云書於劉楚公茅亭池光不受月暮氣欲沈山蔡寬夫詩話云王荆公晚年亦喜李義山詩話誦其云云雖老杜無以過也雞聲茅店月人迹板橋霜三山老人語録云六一居士喜溫庭筠詩云云嘗作詩云鳥聲梅店雨野色栁橋春效其體也兵衛森畫戟燕寢凝清香韋應物鳥宿池邉樹僧敲月下門賈島雨勢宫城濶秋聲禁樹多劉筠剛腸欺竹葉衰鬢怯菱花楊億野水無人渡孤舟盡日橫冦準麥天晨氣潤槐夏午隂清趙師民數聲離岸櫓幾點别州山魏野鳥歸花影動魚沒浪痕圓悟清河分岡勢斷春入燒痕青惠崇爐煙添栁重宫漏出花遲楊巨源漁隱叢話云古今詩人以詩名世者或只一聨如云云韋應物而下十聨凡此皆以一聨名世者曉來山鳥閙雨過杏花稀歐公詩話云唐之晚年詩人無復李杜豪放之格然亦務以精意相髙周朴有云云誠佳句也浮聲長在耳山色不離門掃地樹留影拂牀琴有聲托言云李濤篇詠甚著如云云皆膾炙人口露滋寒塘草月缺清淮栁夜雨滴空階曉燈照離室幽檻弄晚花清池映踈竹疏樹翻髙葉寒流聚細紋東觀餘論云古人論詩但愛遜云云前兩聨為佳殊不知遜秀句若此者多如云云後兩聨庾子山輩有所不及微雲淡河漢疏雨滴梧桐漁隱叢話云詩句以一字為工自然竒異浩然云云上句之工在一淡字下句之工在一滴字若非此兩字亦烏得為佳句燕靜銜泥起蜂喧抱蘂回李郢林殘數枝月髮冷一梳風曹松又云荆公所選唐宋百家集中佳句世所稱道者不復録出會所喜者命兒輩筆之以備遺忘李郢春晚云云曹松晨起云云山勢蜂腰斷溪流燕尾分東軒筆録云夏英公竦工為詩李文靖讀云云之句深愛之青煙人幾家緑野山四抱王直方詩話云持國嘗有詩云云當時無不傳之井泉分地脈砧杵共秋聲隱居詩話云徐鉉有喜李少保卜鄰云云此句尤間逺也海雲含雨重江樹帶蟬疏平蕪逺更緑斜日寒無暉隱居詩話云延年詩集如云云者幾希矣鈎簾宿鷺起丸藥流鶯囀杜甫青山捫虱坐黃鳥挾書眠王安石石林詩話云蔡天啓云荆公每稱老杜云云之句以為髙妙五字之模他日公作詩云云自謂不減老杜風定花猶落鳥鳴山更幽海日生殘夜江春入暮年驚蟬移别樹鬭雀墮間庭冷齋夜話云荆公言前輩詩風定花猶落靜中見動意鳥鳴山更幽動中見靜意唐人詩云云第二聨置早意於殘晚中又云云第三聨置靜意於喧動中城響濤頭入江昏雨腳斜栁間黃鳥路波底白鷗天雪浪齋日記云蔡天啓詩云云皆佳句雨腳墮危芳風軒納飛絮童蒙訓云秦少遊詩云云李公擇以為謝家兄弟得意不能過也髮短愁催白顔衰借酒紅王直方詩話云陳無已詩云云大為當時諸公所稱賞白日行空濶青燈耿夜闌雪浪齋日記云崔子方云云真佳句也水裁偏岸直雲截亂山平漁隱叢話云子西多佳句有造語極工者如云云皆清竒可愛疏疏一簾雨淡淡滿枝花漁隱叢話云去非詩云云平淡有工春深遊寺客花落閉門僧齊己曉風飄磬逺暮雪入廊深惠崇西清詩話云東坡言僧詩要無蔬筍氣固詩人龜鑑今時誤解便作世網中語殊不知本分家風水邉林下氣象蓋不可無若盡洗去清拔之韻使與俗同科又何足尚齊已云云惠崇云云華實相副顧非佳句耶虹收千嶂雨潮展半江天古今詩話云福州僧有詩百餘篇其中佳句如云云不減古人也疏花持晚日瘦竹倚髙秋謾齋語録云余云云頗為人所稱道牛羊上山小煙火隔林深鳥道挂疏雨人家殘夕陽夷田堂小集云錢起考功詩云云此等句皆當時相傳為絶唱一鳩鳴午寂雙燕語春愁西清詩話云陳傳道嘗於彭城壁間見書一聨云云後以語東坡世謂公作然否坡笑曰此唐人得意句僕安能此笙歌歸院落燈火下樓臺歸田録云晏元獻公喜評詩嘗曰老覺腰金重慵便枕玉涼未是富貴語不如云云此善言富貴者也人皆以為知言長廊風度磬深院雨留香蒼梧雜志云李邴漢老詩云云有幽逺意竹莊詩話卷二十三
