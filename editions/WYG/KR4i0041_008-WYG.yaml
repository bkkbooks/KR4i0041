body:
  text: 竹莊詩話巻八韓退之下城南聨句劉貢父云東野與退之聨句宏壯辨博似出一手竹影金鎖碎郊泉音玉淙琤瑠璃剪朩葉愈翡翠開園英流滑隨仄步郊搜尋得深行遥岑出寸碧愈逺日増雙明乾穗紛拄地郊化蟲枯挶莖朩腐或垂耳愈草珠兢駢晴浮虛有新斸郊摧杌饒孤撐蟲飛粘網動愈雀啅接彈驚脱實自開坼郊牽柔誰繞縈禮鼠拱而立愈騃牛躅且鳴蔬甲喜臨社郊田毛樂寛征露螢不自暖愈凍蝶尚思輕宿羽有先曉郊食鱗時半横菱翻紫角利愈荷折碧圓傾楚膩鱣鮪亂郊獠羞螺蠏并桑蠖見虛指愈穴狸聞鬭獰逗翳翅相築郊擺幽尾交搒蔓涎角出縮愈樹啄頭敲鏗脩箭裊金餌郊羣鮮沸池羮岸殻拆𤣥兆愈野麰漸豐萌窰烟冪疏島郊沙篆印回平瘁肌遭眊刺愈啾耳間雞生奇慮恣迴轉郊遐睎縱逢迎巔林戢逺睫愈縹氣夷空情歸迹歸不得郊捨心捨還爭靈麻撮狗蝨愈村雉啼禽猩紅皺曬簷瓦郊黄團繫門衡得雋蠅虎健愈相殘雀豹趂束枯樵指秃郊刈熟擔肩頳澁旋皮巻臠愈苦開腹膨脝機舂潺湲力郊吹簸飄颻精賽饌朩盤簇愈靸妖藤索絣荒學五六巻郊古藏三四塋里儒拳足拜愈土怪閃眸偵蹄道補復破郊絲窠掃還成暮堂蝙蝠沸愈破竈伊威盈追此訊前主郊答云皆冢卿敗壁剥寒月愈折篁嘯遺笙袿熏霏霏在郊綦迹微微呈劒石猶竦檻愈獸材尚拏楹寶唾拾未盡郊玉啼墮猶鎗牕綃疑閟艷愈粧燭巳銷檠緑髮抽珉甃郊青膚聳瑶楨白蛾飛舞地愈幽蠧落書棚惟昔集嘉詠郊吐芳類鳴鸎窺奇摘海異愈恣韻激天鯨腸胃繞萬象郊精神驅五兵蜀雄李杜拔愈嶽力雷車轟大句幹𤣥造郊高言軋霄崢芒端轉寒燠愈神助溢杯觥巨細各乗運郊湍潿亦騰聲凌花咀粉蘂愈削縷穿珠櫻綺語洗晴雪郊婚辭哢雛鶯酣歡雜弁珥愈繁價流金瓊菡萏冩紅調郊萎蕤綴藍瑛庖霜膾𤣥鯽愈淅玉炊香粳朝饌巳百態郊春醪又千名哀匏蹙駛景愈冽唱凝餘晶解魄不自主郊痺肌坐空瞠扳援賤蹊絶愈炫曜仙選更叢巧競採笑郊駢鮮互探嬰桑變忽蕪蔓愈樟裁浪登丁霞鬭詎能極郊風期復誰賡臯區扶帝壤愈瓌藴郁天京祥色被文彦郊良材插杉檉隠伏饒氣象愈興潛示堆坑擘華露神物郊擁終儲地禎訏謨壯締始愈輔弼登階清坌秀恣填塞郊呀靈滀停澄益大聨漢魏愈肇初邁周嬴積照涵徳鏡郊傳經儷金籯食家行鼎鼐愈寵族飫弓旌弈制盡從賜郊殊私得逾程非橋上架漢愈繚岸俯窺瀛瀟碧逺逾委郊湖嵌費攜擎萄苜從大漠愈楓櫧至南荆嘉植鮮危朽郊膏理易滋榮懸長巧紐翠愈象曲善攢珩魚口星浮没郊馬毛錦班騂五方亂風土愈百種分鋤耕葩孽相妬出郊菲茸共舒情類招臻倜詭愈翼萃伏衿纓危望跨飛動郊㝠升躡登閎春游轢霍靡愈彩伴䬃嫈嫇遺粲飄的皪郊淑顔洞精誠嬌應如在寤愈頽意若含酲鵷毳翔衣帶郊鵝肪截珮璜文升相照灼愈武勝屠攙搶割錦不酬價郊構雲有高營通波牣鱗介愈疏畹富蕭蘅買養訓孔翠郊逺苞樹蕉栟鴻頭排刺芡愈鵠殻攢瓌橙鶩廣雜良牧郊䝉休賴先盟罷旄奉環衞愈守封踐忠貞戰服脱明介郊朝冠飄彩紘爵勲逮僮𨽻愈簪笏自懐繃乳下秀嶷嶷郊椒蕃泣喤喤貌鑑清溢匣愈眸光寒發硎館儒養經史郊綴戚觴孫甥考鐘饋肴核愈戛鼓侑牢牲飛膳自北下郊函珍極東烹如瓜煮大卵愈比線茹芳菁海嶽錯口腹郊趙燕錫媌娙一笑釋仇恨愈百金交弟兄貨至貊戎市郊呼轉鸜鵒令順居無鬼瞰愈抑横免官評殺候肆凌翦郊籠原帀罝紭羽空顛雉鷃愈血路迸狐麖折足去踸踔郊蹙鬐怒䰃鬤躍犬疾翥鬤愈呀鷹甚饑䖟算蹄記功賞郊裂腦擒摚掁猛斃牛馬樂愈妖殘梟鴿惸窟窮尚嗔視郊箭出方驚抨連箱載巳實愈礙轍棄仍贏喘覷鋒刃㸃郊困衝株枿盲掃淨豁曠曠愈騁遥畧苹苹饞扠飽活臠郊惡嚼㗘腥鯖嵗律及郊至愈古音命韶韺旗斾流日月郊帳廬扶棟甍磊落奠鴻壁愈參差席香藑𤣥祗祉兆姓郊黒秬饛豐盛慶流蠲瘥癘愈威暢捐䡴輣靈燔高望同郊龍駕聞敲䬝是惟禮之盛愈永用表其宏徳孕厚生植郊恩熙完刖剠宅土盡華族愈連田間强甿䕃庾森嶺檜郊啄場翽祥鵬畦肥剪韭薤愈陶固收盆罌利養積餘健郊孝思事嚴祊掘雲破嵽嵲愈采月漉㘭泓寺砌上明鏡郊僧盂敲曉鉦泥像對騁怪愈鐵鐘孤舂鐄癭頸閙鳩鴿郊蜿亂蛷蠑葚黒老蠶蠋愈麥黄韻鸝鶊韶曙遲勝賞郊賢明戒先庚馳門填偪仄愈鏡墅輾砯砰醉結紅滿杏郊稠凝碧浮餳䠞繩覲娥婺愈鬭草擷璣珵粉汗澤廣額郊金星墮連瓔鼻偷困淑郁愈眼剽强盯􅟑是節飽顔色郊兹疆稱都城書饒罄魚繭愈紀盛播琴箏奚必事逺覿郊無端逐羇傖將身親魍魅愈浮迹侣鷗鶄腥味空奠屈郊天年徒羨彭驚魂見蛇蚓愈觸齅值蝦蟛幸得履中氣郊忝從拂天棖歸私暫休暇愈驅明出庠黌鮮意竦輕暢郊連輝照瓊瑩陶暄逐風乙愈躍視舞晴蜻足勝自多詣郊心貪敵無勍始知樂名教愈何用苦拘儜畢景任詩趣郊焉能守䃘䃘愈㑹合聯句黄魯直云會合聨句四君子皆佳士意氣相入雜然成文章世之文章之士少聨句蓋筆不能相追或成四公子棊耳離別言無期㑹合意彌重籍病添兒女戀老喪丈夫勇愈劒心知未死詩思猶孤聳郊愁去劇箭飛歡來若泉涌徹析言多新貫攄抱無昔壅籍念難須勤追悔易勿輕踵愈吟巴山犖嶨説楚波堆壟郊馬辭虎豹怒舟出蛟鼉恐徹狂鯨時孤軒幽狖雜百種愈瘴衣常腥膩蠻器多疎冗籍剥苔弔斑林角飯餌沈冢愈忽爾銜逺命歸歟舞新寵郊鬼窟脱幽妖天居覿青栱愈京遊步方振讁夢意猶恟籍詩書誇舊知酒食接新奉愈嘉言冩清越瘉病失肬腫郊夏隂偶高庇宵魄接虛擁愈雪絃寂寂聽茗盌纎纎捧郊馳輝燭浮螢幽響泄潛蛬愈詩老獨何心江疾有餘尰郊我家本瀍穀有地介臯鞏休迹憶沈㝠峨冠慙闟􅀈愈升朝高轡逸振物羣聽悚徒言濯幽泌誰與薙荒茸籍朝紳鬱青綠馬飾曜珪珙國讎未銷鑠我志蕩邛隴郊君才誠倜儻時論方洶溶格言多彪蔚懸解無梏拲張生得淵源寒色拔山冢堅如撞羣金𦕈若抽獨蛹愈伊余何所擬跛鼈詎能踊塊然墮岳石飄爾罥巢氄郊龍斾垂天衞雲韶凝禁甬君胡眠宴然朝鼓聲洶洶愈鬬雞聯句集注云公與東野聨句詞意雄渾極其情態間以人才為喻兩皆傑作真歐陽文忠所謂韓孟於文詞兩雄力相當者也至若爭觀雲填道助呌波翻海則公詩之豪而一噴一醒然再接再礪乃則東野工處大雞昂然來小雞竦而待愈崢嶸顛盛氣洗刷凝鮮彩郊高行若矜豪側睨如伺殆愈精光目相射劒㦸心獨在郊既取冠為胄復以距為鐓天時得清寒地利挾爽塏愈磔毛各噤瘁怒癭爭碨磊俄膺忽爾低植立瞥而改郊腷膞戰聲喧繽翻落羽皠中休事未決小挫勢益倍愈妬腸務生敵賊性專相醢裂血失鳴聲啄殷甚饑餒郊對起何急驚隨旋誠巧紿毒手飽李陽神槌困朱亥愈惻心我以仁碎首爾何罪獨勝事有然旁驚汗流浼郊知雄欣動顔怯負愁看賄爭觀雲填道助呌波翻海愈爭爪深難解嗔睛時未怠一噴一醒然再接再礪乃郊頭垂碎丹砂翼搨拖錦綵連軒尚賈餘清厲比歸凱愈選俊感收毛受恩慙始隗英心甘鬭死義肉恥庖宰君看鬭雞篇短韻亦可採郊和虢州劉給事君三堂二十一詠虢州刺史宅連水池竹林往往為亭臺島渚目其處為三堂劉君自給事中出刺此州在任逾嵗職修人治州中稱無事頗復増飾從子弟而遊其間又作二十一詩以詠其事流行京師文士爭和之予與劉善故亦同作筆墨間錄云三堂二十一詠取韻精切非復縱肆而作隨其題觀之其工可知也新亭湖上新亭好公來日出初水紋浮枕簟瓦影䕃龜魚流水汩汩幾時休從春復到秋祗言池未滿池滿强交流竹洞竹洞何年有公初斫竹開洞門無鎖鑰俗客不曽來月臺南館城隂濶東湖水氣多直須臺上看始奈月明何渚亭自有人知處那無步往蹤莫教安四壁面面看芙蓉竹溪藹藹溪流漫梢梢岸篠長穿沙碧簳淨落水紫袍香北湖聞説遊湖棹尋常到此迴應留醒心處準擬醉時來花島蜂蝶去紛紛香風隔岸聞欲知花島處水上覔紅雲柳溪柳樹誰人種行行夾岸高莫將條繫纜著處有蟬號西山新月迎宵掛晴雲到晩留為遮西望眼終是懶回頭竹逕無塵從不掃有鳥莫令彈若要添風月應除數百竿荷池風雨秋池上高荷蓋水繁未諳鳴摵摵那似巻翻翻稻畦罫布畦堪數枝分水莫尋魚肥知巳秀鶴没覺初深柳巷柳巷還飛絮春餘幾許時吏人休報事公作送春詩花源源上花初發公應日日來丁寧紅與紫慎勿一時開北樓郡樓乗曉上盡日不能迴晩色將秋至長風送月來鏡潭非鑄復非鎔泓澄忽此逢魚蝦不用避秪是照蛟龍孤嶼朝遊孤嶼南暮戲孤嶼北所以孤嶼鳥與君盡相識方橋非閣復非船可居兼可過君欲問方橋方橋如此作梯橋乍似上青㝠初疑躡菡蓞自無飛仙骨欲度何由敢月池寒池月下明新月池邊曲若不妬清妍却成相映燭栁子厚東坡云蘇李之天成曹劉之自得陶謝之超然固已至矣而杜子美李太白以英偉絶世之資凌跨百代古之詩人盡廢然魏晉以來高風絶塵亦少衰矣李杜之後詩人繼出雖有逺韻而才不逮意獨韋應物栁子厚發纎濃于簡古寄至味于淡泊非餘子所及也唐末司空圖崎嶇兵亂之間而得詩人高雅猶有承平之遺風其論詩曰梅止于酸鹽止于鹹飲食不可無鹽梅而其美常在于鹹酸之外可以一唱而三嘆也子厚詩在陶淵明下韋蘇州上退之豪放奇險則過之而温麗靖深不可及也所貴于枯淡者謂外枯而中膏似淡而實美淵明子厚之流是也若中外皆枯亦何足道佛言譬如食蜜中邊皆甜人食五味知其甘苦者皆自能分别其中邊者百無一矣詩眼云子厚詩尤深逺難識前賢亦未推重自老坡發明其妙學者方漸知之余嘗問人栁詩何好答云大體皆好又問君愛何處答云無不愛者便知不曉矣識文章者當如禪家有悟門夫法門百千差别要須自一轉語悟入如古人文章直須先悟得一處乃可通其他妙處韓子蒼云淵明詩惟韋蘇州得其清閒尚不得其枯淡栁州獨得之但恨其少遒爾栁詩不多體亦備衆家惟效陶詩是其性所好獨不可及也酬韶州裴長使二十韻韶州幸以詩見及往復奇麗邈不可慕用韻尤為高絶余因拾其餘韻酬焉凡為韶州所用者置不取其聲律言數如之筆墨間錄云韶州裴使君二十韻尤見奇險之功蓋山字不比遐字之多也遐字乃増至八十韻詩金馬嘗齊入銅魚亦共頒疑山看積翠湞水想澄灣標牓同驚俗清明兩照姦乗軺參孔僅按節服侯㹪賈傅辭寧切虞童髮未䰉秉心方的的騰口任㘖㘖聖理高懸象爰書降罰鍰徳風流海外和氣滿人寰禦魅恩猶貸思賢淚自􅏰存亡均寂寞零落間惸鰥夙志隨憂盡殘肌觸瘴􅍙月光揺淺瀨風韻碎枯菅海俗衣猶卉山夷髻不鬟泥沙潛虺蜮榛莽鬭豺獌循省誠知懼安排只自憪食貧甘莽鹵被褐謝斕斒逺物裁青罽時珍饌白鷴長捐楚客珮未賜大夫環異政徒云仰高蹤不可攀空勞慰顦顇妍唱劇妖嫺晨詣超師院讀禪經詩眼云子厚晨詣超師院讀禪經詩一段至誠潔清之意參然在前真源了無取妄迹世所逐遺言冀可冥繕性何由熟真妄以喻佛理言行以盡薰修外此亦無詞矣道人庭宇静苔色連深竹葢逺勝竹逕通幽處禪房花木深日出霧露餘青松如膏沐予家舊有大松偶見露洗而霧披真如洗沐未乾染以翠色然後知此語能傳造化之妙澹然離言説悟悦心自足蓋言因指而見月遺經而得道於是終焉其本末立意遣詞可謂曲盡其妙無毫髪遺恨耳汲井潄寒齒清心拂塵服閒持貝葉書步出東齋讀真源了無取妄迹世所逐遺言冀可冥繕性何由熟道人庭宇靜苔色連深竹日出霧露餘青松如膏沐澹然離言説悟悦心自足南澗中題東坡嘗題此詩後云子厚南遷後詩清勁紆徐大率類此又云南澗詩憂中有樂樂中有憂葢絶妙古今筆墨間録云南澗詩平淡有天工在與崔策登西山詩上語奇故也秋氣集南澗獨遊亭午時迴風一蕭瑟林影久參差始至若有得稍深遂忘疲羈禽嚮幽谷寒藻舞淪漪去國魂巳逺懐人淚空垂孤生易為感失路少所宜索寞競何事徘徊只自知誰謂後來者當與此心期巽公院五詠筆墨間録云巽公院五詠取韻精切非復縱肆而作隨其題觀之其工可知也淨土堂結習自無始淪溺窮苦源流形及兹世始悟三空門華堂開淨域圖像煥且繁清泠焚衆香微妙歌法言稽首愧導師超遥謝塵昏曲講堂寂滅本非㫁文字安可離曲堂何為設高士方在斯聖黙寄言宣分別乃無知趣中即空假名相與誰期願言絶聞得忘意聊思惟禪室發地結菁茆團團抱虛白山花落幽戸中有忘機客涉有本非取照空不徒析萬籟俱緣生窅然喧中寂心境本同如飛鳥無遺迹芙蓉亭新亭俯朱檻嘉朩開芙蓉清香晨風逺溽彩寒露濃瀟灑出人世低昂多異容嘗聞色空喻造物誰為工留連秋月晏迢遞來山鍾苦竹橋危橋屬幽徑繚繞穿疎林迸籜分苦節輕筠抱虛心俯瞰涓涓流仰聆蕭蕭吟差池下烟日嘲􅑜鳥山禽諒無要津用棲息有餘音田家筆墨閒録云田家詩雞鳴村巷白云云又里胥夜經過云云絶有淵明風味蓐食徇所務驅牛向東阡雞鳴村巷白夜色歸暮田札札耒耜聲飛飛來鳥鳶竭兹筋力事持用窮嵗年盡輸助徭役聊就空自眠子孫日巳長世世還復然籬落隔烟火農談四隣夕庭際秋蟲鳴疎麻方寂歴蠶絲盡輸税機杼空倚壁里胥夜經過雞黍事筵席各言官長峻文字多督責東鄉後租期車轂陷泥澤公家少推恕鞭扑恣狼籍努力慎經營肌膚真可惜迎新在此嵗唯恐踵前迹梅雨筆墨間錄云此詩不減老杜梅實迎時雨蒼茫值晩春愁深楚猿夜夢㫁越雞晨海霧連南極江雲暗北津素衣今盡化非為帝京塵楊花白許彦周詩話云子厚樂府楊花白言婉而情深古今絶唱也楊花白風吹度江水坐令宫樹無顔色摇蕩春光千萬里茫茫曉日下長秋哀歌未㫁城鵶起漁翁冷齋夜話云東坡云詩以奇趣為宗反常合道為趣熟味此詩有竒趣漁翁夜傍西巖宿曉汲清湘燃楚竹烟銷日出不見人款乃一聲山水渌回看天際下中流嵓上無心雲相逐飲酒筆墨間録云飲酒詩絶似淵明今旦少愉樂起坐開清樽舉觴酹先酒始為酒者也為我驅憂煩須臾心自殊頓覺天地暄連山變幽晦渌水涵晏温藹藹南郭門樹木一何繁清隂可自庇竟夕聞嘉言盡醉無復辭偃臥有芳蓀彼哉晉楚富此道未必存江雪洪駒父詩話云東坡言鄭谷詩江上晩來堪畫處漁人披得一蓑歸此村學中詩也子厚云云信有格也哉殆天所賦不可及也千山鳥飛絶萬逕人蹤滅孤舟蓑笠翁獨釣寒江雪同劉二十八哭吕衡州兼寄江陵李元二侍御詩眼云哭吕衡州詩足以發明呂溫之俊偉哭凌員外詩書盡準平生掩役夫張進骸既盡役夫之事又反覆自明其意此一篇筆力規模不减莊周左丘明也衡嶽新摧天柱峯士林憔悴泣相逢祗今文字傳青簡不使功名上景鐘三畝空留懸罄室九原猶寄若堂封遥想荆州人物論幾回中夜惜元龍哭連州凌員外司馬廢逐人所弃遂為鬼神欺才難不其然卒與大患期凌人古受氏吳世夸雄姿寂寞富春水英氣方在斯六學誠一貫精義窮發揮著書逾十年幽賾靡不推天庭掞高文萬字若波馳記室征西府宏謀耀其奇輶軒下東越列郡蘇疲羸宛宛凌江羽來棲翰林枝孝文留弓劒中外方危疑抗聲促遺詔定命由陳辭徒𨽻肅曹官征賦參有司出守烏江滸左遷湟水湄高堂傾故國葬際限囚羈仲叔繼幽淪狂呌唯童兒一門既無主焉用徒生為舉聲但呼天孰知神者誰泣盡目無見腎傷足不持溘死委炎荒臧獲守靈帷平生負國譴骸骨非敢私蓋棺未塞責孤旐凝寒颸念昔始相遇腑臟為君知進身齊選擇失路同瑕疵本朝濟仁義今為衆所嗤滅名竟不試世義安可知恬死百憂盡茍生萬慮滋顧余九逝魂與子各何之我歌誠自慟非獨為君悲掩役夫張進骸生死悠悠爾一氣聚散之偶來紛喜怒奄忽巳復辭為役孰賤辱為貴非神奇一朝纊息定枯朽無妍媸生平勤皂櫪剉秣不告疲既死給轊櫝葬之東山基奈何值崩湍當析臨路陲髐然暴百骸散亂不復支從者幸告余睠之涓然悲猫虎獲迎祭犬馬有蓋帷佇立唁爾魂豈復識此為畚插載埋瘞溝瀆䕶其危我心得所安不謂爾有知掩骼著春令兹焉適其時及物非吾輩聊且顧爾私竹莊詩話巻八
