body:
  text: 竹莊詩話巻三六代上詩評云漢魏後凌遲衰微訖于有晉太康中二張二陸兩潘一左勃然復興踵武前王流風末派亦有文章之中興也永嘉時貴黄老而尚虚𤣥于時篇什理過其辭淡然寡欲爰及江表微波尚傳孫綽諶詢桓庾諸公詩皆平典以道徳論建安風力盡矣由是郭景純用俊上之才變創其體劉越石仗清剛之氣贊成厥美然彼衆我寡亦未動俗逮義熈中謝益夀斐然之作永嘉有謝靈運才髙辭盛富豔難蹤固以含劉􅀈郭凌轢潘左故知陳思為建安之傑公幹仲宣陸機為輔此皆五言之冠冕文辭之命世也許彦周詩話云六朝諸人之詩不可不熟讀退之云齊梁及陳隋衆作等蟬噪此語吾不敢議亦不敢從阮嗣宗詠懐十七首鍾嶸詩評云阮籍詠懐子卿雙鳬嵇康雙鸞茂先寒食平叔單衣安仁倦暑景陽苦雨靈運鄴中士衡擬古越石感亂景純遊仙王微風月謝客山水叔元離燕明逺戍邊太沖詠史顔延入洛陶公詠貧之製惠連擣衣之作斯皆五言之警䇿者也所謂篇章之珠澤文彩之鄧林乎子卿雙鳬嵇康雙鸞茂先寒食平叔單衣王微風月謝客山水叔元離燕諸詩文選並闕靈運鄴中淵明詠貧並各見本門又云嗣宗詩其源出於小雅無彫蟲之巧而詠物詠懐可以陶性靈發幽思言猶耳目之内情寄八荒之外洋洋乎㑹於風雅使人忘其鄙近自致逺大詠物詩文選闕文選注云阮籍屬文初不苦思率爾便成作陳留八十餘篇此獨取十七首詠懐者謂人情懐籍於魏末晉文之代常慮禍患及已故有此詩多刺時人無故舊之情逐勢利而巳觀其體趣實謂幽深非大作者不能探測之夜中不能寐起坐彈鳴琴薄帷鑑明月清風吹我衿孤鴻號外野翔鳥鳴北林徘徊将何見憂思獨傷心二妃遊江濱逍遥順風翔交甫懐環珮婉孌有芬芳猗靡情歡愛千載不相忘傾城迷下蔡容好結中腸感激生憂思萱草樹蘭房膏沐為誰施其雨怨朝陽如何金石交一旦更離傷嘉樹下成蹊東園桃與李秋風吹飛藿零落從此始繁華有憔悴堂下生荆杞驅馬捨之去去上西山趾一身不自保何況戀妻子凝霜被野草嵗暮亦云已昔日繁華子安陵與龍陽夭夭桃李花灼灼有輝光悦懌若九春磬折似秋霜流盻發姿媚言笑吐芬芳擕手等歡愛夙昔同衣裳願為雙飛鳥比翼共翺翔丹青著明誓永世不相忘天馬出西北由來從東道春秋非有託富貴焉常保清露被臯蘭凝霜沾野草朝為媚少年夕暮成醜老自非王子晉誰能常美好登髙臨四野北望青山阿松栢翳岡岑飛鳥鳴相過感慨懐辛酸怨毒常苦多李公悲東門蘇子俠三河求仁自得仁豈復嘆咨嗟開秋兆涼氣蟋蟀鳴牀帷感物懐殷憂悄悄令心悲多言焉所告繁辭将訴誰微風吹羅袂明月曜清暉晨雞鳴髙樹命駕起旋歸平生少年時輕薄好絃歌西游咸陽中趙李相經過娛樂未終極白日忽蹉跎驅馬復來歸反顧望三河黄金百鎰盡資用常苦多北臨太行道失路将如何昔聞東陵𤓰近在青門外連畛距阡陌子母相鈎帶五色曜朝日嘉賓四面會膏火自煎熬多財為患害布衣可終身寵祿豈足賴步出上東門北望首陽岑下有采薇士上有嘉樹林良辰在何許凝霜沾衣襟寒風振山岡𤣥雲起重隂鳴鴈飛南征鶗鴂發哀音素質游商聲悽愴傷我心昔年十四五志尚好詩書被褐懐珠玉顔閔相與期開軒臨四野登髙有所思丘墓蔽山岡萬代同一時千秋百嵗後榮名安所之乃悟羡門子噭噭今自嗤徘徊蓬池上還顧望大梁緑水揚洪波曠野奔茫茫走獸交横馳飛鳥相隨翔是時鶉火中日月正相望朔風厲嚴寒隂氣下微霜羈旅無儔匹俛仰懐哀傷小人計其功君子道其常豈惜終憔悴詠言著文章炎暑惟兹夏三旬將欲移芳樹垂緑葉青雲自逶迤四時更代謝日月遞差馳徘徊空堂上㣼怛莫我知願覩卒歡好不見悲别離灼灼西頽日餘光照我衣迴風吹四壁寒鳥相因依周周尚銜羽蛩蛩亦念饑如何當路子磬折忘所歸豈為夸譽名憔悴使心悲寧與燕雀翔不隨黄鵠飛黄鵠游四海中路将安歸獨坐空堂上誰可與歡者出門臨永路不見行車馬登髙望九州悠悠分曠野孤鳥西北飛離獸東南下日暮思親友晤言用自寫北里多竒舞濮上有微音輕薄閒游子俯仰乍浮沉捷徑從狹路僶俛趣荒淫焉為王子喬乘雲翔鄧林獨有延年術可以慰我心湛湛長江水上有楓樹林臯蘭被徑路青驪逝駸駸逺望令人悲春氣感我心三楚多秀士朝雲進荒淫朱華振芬芳髙蔡相追尋一為黄雀哀涕下誰能禁張茂先雜詩即寒食詩詩評云茂先詩其源出於王粲其體浮豔興託多竒巧用文字務其妍冶雖名髙曩代而敦亮之士猶恨兒女情多風雲氣少謝康樂云張公雖復千篇猶一體爾今置之甲科疑弱抑之中品恨少在季孟之間耳晷度隨天運四時互相承東壁正昏中沍隂寒節升繁霜降當夕悲風中夜興朱火青無光蘭膏坐自凝重衾無煖氣挾纊如懐氷伏枕終遥昔寤言莫予應永思慮崇替慨然獨撫膺潘安仁在懷縣作二首即倦暑詩詩評云安仁詩其源出於仲宣翰林歎其翩翩奕奕如翔禽之羽毛衣被之綃縠猶尚淺於陸機則機為深矣謝琨云潘詩爛若舒錦無處不佳陸文如披沙揀金往往見寳嶸謂益壽輕華故以潘為勝翰林篤論故歎陸為深余嘗言陸才若海潘才若江南陸迎修景朱明送末垂初伏啟新節隆暑方赫曦朝想慶雲興夕遲白日移揮汗辭中宇登城臨清池涼飈自逺集輕襟隨風吹靈圃輝華果通衢列髙椅𤓰瓞蔓長苞薑芋紛廣畦稻栽肅芊芊黍苗何離離虚薄乏時用位微名日卑馳役宰兩邑政績竟無施自我違京輦四載迄于斯器非廊廟姿屢出固其宜徒懐越鳥志眷戀相南枝春秋代遷逝四運紛可憙寵辱易不驚戀本難為思我來氷未冸時暑忽隆熾感此還期淹歎彼年往駛登城望郊甸游目厯朝寺小國寡民務終日寂無事白水過庭激綠槐夾門植信美非吾土祗攪懐歸志眷然顧鞏洛山川邈離異願言旋舊鄉畏此簡書忌祗奉社稷守恪居處職位張景陽雜詩即苦雨詩詩評云景陽詩其源出於王粲文體華浄少病累有巧構形似之言雄於潘岳靡於太沖風流調達實曠代之髙才其辭葱蒨音韻鏗鏘使人味之亹亹不絶黒蜧躍重淵商羊舞野庭飛廉應南箕豐隆迎號屛雲根臨八極雨足灑四溟霖瀝過二旬散漫亞九齡階下伏泉湧堂上水衣生洪潦浩方割人懐昏墊情沉液漱陳根綠葉腐秋莖里無曲突煙路無行輪聲環堵自頽毁垣閭不隠形尺燼重尋桂紅粒貴瑶瓊君子守固窮在約不爽貞雖榮田方贈慙為溝壑名取志於陵子比之黔婁生陸士衡擬古詩十二首詩評云士衡詩其源出於陳思才髙辭贍舉體華宻氣少於公幹文劣於仲宣但尚規矩不貴綺錯有傷直寄乏竒然其咀嚼英華厭飫膏澤故文章之源泉也張歎其大才信矣又云古詩其源出於國風陸機所擬十二首文温以麗意悲而切驚心動魂幾於一字千金擬行行重行行悠悠行邁逺戚戚憂思深此思亦何思思君徽與音音徽日夜離緬邈若飛沉王鮪懷河岫晨風思北林遊子𦕈天末還期不可尋驚颷褰反信歸雲難寄音佇立想萬里沉憂萃我心攬衣有餘帶循形不盈衿去去遺情累安處撫清琴擬今日良宴㑹閑夜命懽友置酒迎風館齊僮梁甫吟秦娥張女彈哀音繞棟宇遺響入雲漢四坐咸同志羽觴不可算髙談一何綺蔚若朝霞爛人生無幾何為樂常苦晏譬彼伺晨鳥揚聲當及旦曷為恒憂苦守此貧與賤擬迢迢牽牛星昭昭清漢暉粲粲光天步牽牛西北迴織女東南顧華容一何冶揮手如振素怨彼河無梁悲此年嵗暮跂彼無良緣睆焉不得度引領望大川雙涕如霑露擬涉江採芙蓉上山采瓊蘂穹谷饒芳蘭采采不盈掬悠悠懐所歡故鄉一何曠山川阻且難沉思鍾萬里躑躅獨吟歎擬青青河畔草靡靡江蘺草熠燿生河側皎皎彼姝女阿那當軒織粲粲妖容姿灼灼美顔色良人遊不歸偏棲獨隻翼空房來悲風中夜起歎息擬明月何皎皎安寢北堂上明月入我牖照之有餘暉攬之不盈手涼風繞曲房寒蟬鳴髙栁踟蹰感節物我行永已久遊宦會無成離思難常守擬蘭谷生朝陽嘉樹生朝陽凝霜封其條執心守時信嵗寒終不彫美人何其曠灼灼在雲霄隆想彌年月長嘯入飛飈引領望天末譬彼向陽翹擬青青陵上柏冉冉髙陵蘋習習隨風翰人生當幾時譬彼濁水瀾戚戚多滯念置酒宴所懽方駕振飛轡逺遊入長安名都一何綺城闕鬱盤桓飛閣纓虹帶層臺冒雲冠髙門羅北闕甲第椒與蘭俠客控絶景都人驂玉軒遨遊放情願慷慨為誰歡擬東城一何高西山何其峻層曲鬱崔嵬零露彌天墜蕙葉憑林衰寒暑相因襲時逝忽如頽三閭結飛轡大耋嗟落暉曷為牽世務中心若有違京洛多妖麗玉顔侔瓊㽔閒夜撫鳴琴惠音清且悲長歌赴促節哀響逐髙徽一唱萬夫歎再唱梁塵飛思為河曲鳥雙遊澧水湄擬西北有髙樓髙樓一何峻迢迢峻而安綺窓出塵冥飛陛躡雲端佳人撫琴瑟纎手清且閒芳氣隨風結哀響馥若蘭玉容誰能顧傾城在一彈佇立望日昃躑躅再三歎不怨佇立久但願歌者歡思駕歸鴻羽比翼雙飛翰擬庭中有竒樹歡友蘭時往迢迢匿音徽虞淵引絶景四節逝若飛芳草久已茂佳人竟不歸躑躅遵林渚惠風入我懐感物戀所歡采此欲貽誰擬明月皎夜光嵗暮涼風發昊天肅明明招摇西北指天漢東南傾朗月照閒房蟋蟋吟户庭翻翻歸鴈集嘒嘒寒蟬鳴疇昔同宴友翰飛戾髙冥服美改聲聴居愉遺舊情織女無機杼大梁不駕楹劉越石重贈盧諶即感亂詩越石有書與諶其辭可見詩評謂其善叙世亂越石又有扶風歌亦皆此意今併録之詩評云越石詩其源出於王粲善為悽唳之辭自有清拔之氣琨既體良才又離厄運故善叙喪亂多感恨之言握中有懸璧本自荆山璆惟彼太公望昔在渭濱叟鄧生何感激千里來相求白登幸曲逆鴻門頼留侯重耳任五賢小白相射鉤茍能隆二伯安問黨與讎中夜撫枕歎想與數子游吾衰久矣夫何其不夢周誰云聖達節知命故不憂宣尼悲獲麟西狩涕孔丘功業未及建夕陽忽西流時哉不我與去乎若雲浮朱實隕勁風繁英落素秋狹路傾華蓋駭駟摧雙輈何意百鍊剛化為繞指柔扶風歌朝發廣莫門暮宿丹水山左手彎繁弱右手揮龍淵顧瞻望宫闕俯仰御飛軒據鞍長歎息淚下如流泉繫馬長松下發鞍髙岳頭烈烈悲風起泠泠澗水流揮手長相謝哽咽不能言浮雲為我結飛鳥為我旋去家日已逺安知存與亡慷慨窮林中抱膝獨摧蔵麋鹿游我前猨猴戲我側資糧既乏盡薇蕨安可食攬轡命徒侣吟嘯絶巖中君子道微矣夫子故有窮惟昔李愆期寄在匈奴庭忠信反獲罪漢武不見明我欲竟此曲此曲悲且長棄置勿重陳重陳令心傷郭景純遊仙詩七首詩評云景純詩憲潘岳文質相輝彪炳可翫變中原平淡之體故稱中興第一翰林以為詩首遊仙之作辭多慷慨垂𤣥逺之宗文選注云遊仙之制文多自叙志狹中區而辭無俗累京華游俠窟山林隠遁棲朱門何足榮未若託蓬萊臨源挹清波陵岡掇丹荑靈谿可潛盤安事登雲梯漆園有傲吏萊氏有逸妻進則保龍見退則觸藩羝髙蹈風塵外長揖謝夷齊青谿千餘仞中有一道士雲生梁棟間風出窓户裏借問此何誰云是鬼谷子翹跡企潁陽臨河思洗耳閶闔西南來潛波渙鱗起靈妃顧我笑粲然啟玉齒蹇修時不存要之将誰使翡翠戲蘭苕容色更相鮮綠蘿結髙林䝉籠蓋一山中有冥寂士静嘯撫清絃放情凌霄外嚼蘂挹林泉赤松臨上游駕鴻乘紫煙左挹浮邱袖右拍洪崖肩借問蜉蝣輩寧知龜鶴年六龍安可頓運流有代謝時變感人思已秋復願夏淮海變微禽吾生獨不化雖欲騰丹谿雲螭非我駕愧無魯陽徳迴日向三舍臨川哀年邁撫心獨悲吒逸翮思拂霄迅足羡逺游清源無増瀾安得運吞舟珪璋雖特達明月難闇投潛潁怨青陽陵苕哀素秋悲來惻丹心零淚緣纓流雜縣寓魯門風煖将為災吞舟涌海底髙浪駕蓬萊神仙排雲出但見金銀臺陵陽挹丹溜容成揮玉盃姮娥揚妙音洪崖頷其頥升降隨長煙飄颻戲九垓竒齡邁五龍千嵗方嬰孩燕昭無靈氣漢武非仙才晦朔如循環月盈已復魄蓐收清西陸朱羲将由白寒露拂陵苕女蘿辭松栢蕣榮不終朝蜉蝣豈見夕圓邱有竒草鍾山出靈液王孫列八珍安期鍊五石長揖當途人去來山林客鮑明逺出自薊北門行即戍邊詩詩評云明逺詩其源出於張協善製形状物寫之辭得景陽之俶詭含茂先之靡漫骨節强於謝琨驅汎邁於顔延總四家而擅美跨兩代而孤出嗟其才秀人微故取湮於當世然貴尚巧似不避危戹頗傷清雅之語故言嶮俗者多以附益云羽檄起邊亭烽火入咸陽徴騎屯廣武分兵救朔方嚴冬筋竿勁虜陣精且彊天子按劍怒使者遥相望鴈行緣石徑魚貫度飛梁簫皷流漢思旌甲被胡霜疾風衝塞起沙礫自飄揚馬毛縮如蝟角弓不可張時危見臣節世亂識忠良投軀報明主身死為國殤左太沖詠史詩八首詩評云太沖詩其源出於公幹文典以怨頗為清切得諷諭之致雖淺野於陸機而深勁於潘岳謝康樂嘗言左太沖詩潘安仁詩古今獨絶宋子京筆記云太沖詩振衣千仞岡濯足萬里流使人飄飄有世表意弱冠弄柔翰卓犖觀羣書著論凖過秦作賦擬子虚邊城苦鳴鏑羽檄飛京都雖非甲胄士疇昔覽穰苴長嘯激清風志若無東吳鈆刀貴一割夢想騁良圖左盻澄江湘右盻定羌胡功成不受爵長揖歸田廬鬱鬱澗底松離離山上苖以彼徑寸莖䕃此百尺條世冑躡髙位英俊沉下僚地勢使之然由來非一朝金張籍舊業七葉珥漢貂馮公豈不偉白首不見招吾希段千朩偃息藩魏君吾慕魯仲連談笑却秦軍當世貴不羈遭難能解紛功成恥受賞髙節卓不羣臨組不肯􅔗對珪寧肯分連璽燿前庭比之猶浮雲濟濟京城内赫赫王侯居冠蓋䕃四術朱輪竟長衢朝集金張館暮宿許史廬南隣擊鍾磬北里吹笙竽寂寂楊子宅門無卿相輿寥寥空宇内所講在𤣥虚言論凖宣尼辭賦擬相如悠悠百世後英名擅八區皓天舒白日靈景耀神州列宅紫宫裏飛宇若雲浮峨峨髙門内藹藹皆王侯自非攀龍客何為歘來游被褐出閶闔髙步追許由振衣千仞岡濯足萬里流荆軻飲燕市酒酣氣益震哀歌和漸離謂若傍無人雖無壯士節與世亦殊倫髙盻邈四海豪右何足陳貴者雖自貴視之若埃塵賤者雖自賤重之若千鈞主父宦不達骨肉還相薄買臣困樵采伉儷不安宅陳平無産業歸來翳負郭長卿還城都壁立何寥廓四賢豈不偉遺烈光篇籍當其未遇時憂在填溝壑英雄有迍邅由來自古昔何世無竒才遺之在草澤習習籠中鳥舉翮觸四隅落落窮巷士抱影守空廬出門無通路枳棘塞中塗計策棄不收塊若枯池魚外望無寸祿内顧無斗儲親戚還相蔑朋友日夜疎蘇秦北游說李斯西上書俛仰生榮華咄嗟復彫枯飲河期滿腹貴足不願餘巢林栖一枝可為達士模顔延年北使洛詩評云延年詩其源出於陸機故體裁貴綺宻然情論淵深動無虚發一句一字皆致意焉又善用事彌見拘束雖乖秀逸故是經綸文雅才減若人則陷於困躓矣陽云謝詩如芙蓉照水顔詩如錯綵縷金顔深病之沈約宋書云延年至洛陽道中作詩一首文辭藻麗為謝晦傅亮所賞改服飭徒旅首路跼險艱振楫發吳洲秣馬陵楚山塗出梁宋郊道由周鄭間前登陽城路日夕望三川在昔輟期運經始闊聖賢伊榖絶津濟臺館無尺椽宫陛多巢穴城闕生雲煙王尤升八表嗟行方暮年隂風振涼野飛雲瞀窮天臨塗未及引置酒慘無言隠憫徒御悲威遲良馬煩游役去芳時歸來屢阻諐蓬心既已矣飛薄殊亦然孫子荆征西官屬送於陟陽候作即零雨詩詩評云子荆零雨之外正長朔風以後雖有異札良亦無聞季鷹黄花之唱正叔緑繁之章雖不且美文㫖髙麗並得虬龍片甲鳯凰一毛事同駮聖宜居中品晨風飄岐路零雨被秋草傾城逺追送餞我千里道三命皆有極咄嗟安可保莫大於殤子彭􅆅猶為夭吉凶如糾纆憂喜相紛擾天地為我鑪萬物一何小達人垂大觀誡此苦不早乖離即長衢惆悵盈懐抱孰能察其心鑒之以蒼昊齊契在今朝守之與偕老王正長雜詩即朔風詩朔風動秋草邊馬有歸心胡寧久分析靡靡忽至今王事離我志殊隔遇商參昔往鶬鶊鳴今來蟋蟀吟人情懐舊鄉客鳥思故林師涓久不奏誰能宣我心張季鷹雜詩即黄花詩暮春和氣應白日照園林青條若總翠黄華如散金嘉卉亮有觀顧此難久躭延頸無良塗頓足託幽深榮與壯俱去賤與老相尋歡樂不照顔慘愴發謳吟謳吟何嗟及古人可慰心潘正叔迎大駕即緑蘩詩南山鬱岑崟洛川迅且急青松䕃修嶺綠蘩被廣隰朝日順長塗夕暮無所集歸雲乘幰浮淒風尋帷入道逢深識士舉手對吾揖世故尚未夷崤函方嶮澁狐狸夾兩轅豺狼當路立翔鳳嬰籠檻騏驥見維縶俎豆昔常聞軍旅素未習且少停君駕徐待干戈戢江文通擬陶徵君田居詩評云文通能體物善摹擬筋力於王微成就於謝朓韓子蒼云淵明田居江淹雜擬詩亦頗似之但擬開徑望三益一句為不類種苗在東臯苗生滿阡陌雖有荷鉏倦濁酒聊自適日暮巾柴車路闇光已夕歸人望煙火稚子候檐隙問君亦何為百年㑹有役但願桑麻成蠶月得紡績素心正如此開徑望三益擬休上人怨别石林詩話云淹擬湯恵休詩日暮碧雲合佳人殊未來古今以為佳句西北秋風至楚客心悠哉日暮碧雲合佳人殊未來露彩方泛豔月華始徘徊寳書為君掩瑶琴詎能開相思巫山渚悵望陽雲臺膏鑪絶沉燎綺席生浮埃桂水日千里因之平生懐石季倫昭君詞樂府題解云石崇奴緑珠自製王昭君歌其文悲雅我本漢家子是也王明君者本為王昭君以觸文帝諱改之匈奴盛請婚於漢元帝以後宫良家子明君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明君亦必爾也其造新之曲多哀怨之聲故叙之於紙云爾我本漢家子将適單于庭辭訣未及終前驅已抗旌僕御涕流離轅馬悲且鳴哀鬱傷五内泣淚霑珠纓行行日已逺遂造匈奴城延我於穹廬加我閼氏名殊類非所安雖貴非所榮父子見陵辱對之慙且驚殺身良不易黙黙以茍生茍生亦何聊積思常憤盈願假飛鴻翼乘之以遐征飛鴻不我顧佇立以屏營昔為匣中玉今為糞上英朝華不足歡甘與秋草并傳語後世人逺嫁難為情左太沖招隠樂府錄云招隠本淮安小山之所作也淮南王招俊偉之士著作篇章辭賦以類相從稱大小山猶詩有小雅大雅也後人因小山詞更為五言若左思杖䇿招隠士最為首出杖䇿招隠士荒塗横古今巖穴無結搆丘中有鳴琴白雪停陰岡丹葩曜陽林石泉潄瓊瑶纎鱗或浮沉非必絲與竹山水有清音何事待嘯歌灌朩自悲吟秋菊兼餱糧幽蘭間重襟躊躇足力煩聊欲投吾簮王筠雜曲樂府録云此篇叙景不言意而意自彰耳鳥還夜已逼蟲飛曉尚賒柱月徒留影蘭燈空結花同前可憐洛城東芳樹摇春風丹霞迎白日細問帶輕紅竹莊詩話巻三
