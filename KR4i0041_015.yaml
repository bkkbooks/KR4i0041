body:
  text: 竹莊詩話巻十五雜編五隴頭吟王維一首狀邊情以下並瑶溪集云長城少年逰侠客夜上戍樓看太白隴頭明月逈臨闗隴上行人夜吹笛闗西老將不勝愁駐馬聽之雙涙流身經大小百餘戰麾下偏禆萬戸侯蘇武纔為典屬國節旄空盡海南頭鴈門太守行李賀一首狀邊塞黒雲壓城城欲摧甲光向日金鱗開角聲滿天秋色裏塞上燕脂凝夜紫半捲紅旗臨易水霜重鼔聲寒不起報君黄金臺上意提㩦玉龍為君死風雨看舟前落花戯為新句杜甫一首見江上春色佳麗之致江上人家桃樹枝春寒細雨出踈籬影遭碧水潜勾引風妬紅花卻倒吹吹花困癲傍舟楫水光風力俱相怯赤憎輕薄遮入懐珍重分明不来接濕久飛遲半欲髙縈沙惹草細於毛蜜蜂蝴蝶生情性偷眼蜻蜓避伯勞古柏行一首見覩物懐人氣勢之大䂬溪詩話云古柏云大厦如傾要梁棟萬牛回首丘山重此言難進而易退非其招不往者也不露文章世已驚未辭剪伐誰能送先器識後文藝與浮躁衒露者有異也孔明廟前有老柏柯如青銅根如石霜皮溜雨四十圍黛色參天二千尺君臣已與時際㑹樹朩猶為人愛惜雲来氣接巫峽長月出寒通雪山白憶昨路繞錦城東先主武侯同閟宫崔嵬枝幹郊原古窈窕丹青戸牖空落落盤踞雖得地冥冥孤髙多冽風扶持自是神明力正直元因造化功大厦如傾要梁棟萬牛回首丘山重不露文章世已驚未辭剪伐誰能送苦心豈免容螻蟻香葉終經宿鸞鳳志士幽人莫怨嗟古来材大難為用茅屋為秋風所破歌一首見側陋窮愁極甚之態䂬溪詩話云自經䘮亂少睡眠至吾廬獨破受凍死亦足伊尹自任一夫不獲之辜也八月秋髙風怒號巻我屋上三重茅茅飛渡江灑江郊髙者挂罥長林梢下者飄轉沉塘㘭南村羣童欺我老無力忍能對面為盗賊公然抱茅入竹去唇焦口燥呼不得歸来倚杖自歎息俄頃風定雲墨色秋天漠漠向昏黒布衾多年冷似鐡嬌兒惡卧踏裏裂床床屋漏無乾處雨脚如麻未斷絶自經䘮亂少睡眠長夜沾濕何由徹安得廣厦千萬間大庇天下寒士俱歡顔風雨不動安如山嗚呼何時眼前突兀見此屋吾廬獨破受凍死亦足白頭吟李白一首詠相如文君終始之情摭言云白頭吟相如將聘茂陵女為妻文君作白頭吟以自絶相如乃止故李白辭云頭上玉燕釵至還有夢来時此最為警䇿韻語陽秋云白頭吟者疾人以新間舊不能至白首故以為名余觀李白白頭吟云妾有秦樓鏡至雙對可憐影其語感人深矣錦水東北流波蕩雙鴛鴦雄巢漢宫樹雌弄秦草芳相如去蜀謁武帝赤車駟馬生輝光一朝再覧大人作萬乗忽欲凌雲翔聞道阿嬌失恩寵千金買賦要君王相如不憶貧賤日官髙金多聘私室茂陵姝子皆見求文君歡笑從此畢涙如雙泉水行墮紫羅襟五更雞三唱清晨白頭吟長吁不整綠雲鬢仰訴青天哀怨深城崩杞梁妻誰道士無心東流不作西歸水落花辭枝羞故林頭上玉燕釵是妾嫁時物贈君表相思羅袖幸時拂莫捲龍鬚席從他生網絲且留琥珀枕還有夢来時鷫鸘裘在錦屏上自君一挂無由披妾有秦樓鏡照心勝照井願持照新人雙對可憐影覆水却收不滿盃相如還謝文君囬古来得意不相負祇今唯有青陵臺怨情新人如花雖可寵故人似玉猶来重花性飄揚不自持玉心皎潔終不移故人昔新今向故還見新人有故時請看陳后黄金屋寂寂珠簾生網絲採蓮曲一首見後世㳺冶鮮禮教之實若耶溪傍採蓮女笑隔荷花共人語日照新妝水底明風飄香袖空中舉岸上誰家遊冶郎三三五五映垂楊紫騮嘶入落花去見此踟蹰空斷腸初日王昌齡一首見婦人所以為情初日浄金閨先照床前暖斜光入羅幕稍稍親絲管雲髪不能梳楊花更吹滿和練師索秀才楊栁竇鞏一首見人之有情思水邊楊柳綠煙絲立馬煩君折一枝唯有春風最相惜殷勤更向手中吹古寺花司空曙一首見愛慕佳景之情共愛芳菲此樹中千跗萬萼裹枝紅遲遲欲去猶回望覆地無人滿寺風江漢一首有悠然之思溶溶漾漾白鷗飛淥净春深好染衣南去北来人自老夕陽長送釣船歸明珠亭長安女子一首是一長安士族女子遭亂失身牢落之思乃節度楊守亮敗軍之年興元城西明珠亭上自題落花滿地寂寥紅獨有離人萬恨中囬首池塘總無語手彈珠涙與東風湘妃怨陳羽八首見覩物傷弔之事二妃怨處雲沉沉二妃泣盡湘江深商人酒滴廟前草蕭颯風生斑竹林黄陵廟詞李逺黄陵廟前莎草春黄陵女兒倩裙新輕舟小楫唱歌去水逺山長愁殺人天津橋春望李逺津橋春水浸紅霞煙柳風絲拂岸斜翠輦不來金殿閉宫鶯銜出上楊花金陵懐古許渾玉樹歌殘王氣終景陽兵合戍樓空松楸逺近千官塜禾黍髙低六代宫石鷰拂雲晴亦雨江豚吹浪夜還風英雄一去豪華盡唯有青山似洛中長安秋望趙嘏韻語陽秋云趙嘏長安秋望云云當時人詠誦以為佳作遂有趙倚樓之目雲物凄凉拂曙流漢家宫闕動髙秋殘星㡬㸃雁横塞長笛一聲人倚樓紫艶半開籬菊静紅衣落盡渚蓮愁鱸魚正美不歸去空戴南冠學楚囚華清宫崔櫓草遮回磴絶鳴鸞雲樹深深碧殿寒明月自來還自去更無人倚玉䦨干山頂翠微寺武元衡翠微寺本翠微宫樓閣亭亭㡬十重天子不來僧又老樵夫時倒一株松武陵過侯王故第過此一酸辛行人淚有痕獨憐新碧樹猶擁舊朱門歌歇雲初散簷空鷰尚存不知彈鋏客何處感新恩長安秋夕戎昱一首見客中思八月更漏長愁人起常早閉門寂無事滿院生秋草昨夜西窓夢夢行荆南道逺客歸去來在家貧亦好四皓廟許渾一首見舊山不歸可思避秦安漢出藍闗松桂花隂滿舊山自是無人有歸意白雲常在水潺潺短歌行張籍一首以流年迅疾可嘆青天蕩蕩髙且虚上有白日無根株流光暫出還入地使我少年不須臾與君相逄勿寂寞衰老不復如今樂玉巵盛酒置君前再拜願君千萬年秋霖夜憶家薛能一首薛能随駕在鳳翔府見悲寂之思垂老何時見弟兄背燈悲泣到天明不知短髪能多少一滴秋霖白一莖聴琴薛能一首懷歸之情十指宫商膝上秋七絃絲動雨翛翛空堂半夜孤燈冷彈盡鄉心欲白頭擬古詠河邊枯樹長孫佐輔此詩哀怨而不傷有風人之梗槩野火燒枝水洗根數圍枯樹半心存應是無機承雨露却將春色寄苔痕枯樹一作枯朽嵗暮歸南山孟浩然一首有哀怨幽寂之况北闕休上書南山歸舊廬不才明主棄多病故人踈白髪催人老青陽逼嵗除永懷愁不寐松月夜窓虛送王永歸東郭劉商一首送人有依依之戀君去春山誰共逰鳥啼花落水空流如今送别臨溪水他日相思來水頭夜與故人惜别于武陵一首見惜别拳拳之情白日去難駐故人非舊容今宵一别後何處更相逢過楚水千里到秦山㡬重語來天又曉月落滿城中盧十五竹亭送姪偁歸山楊衡一首送人有懷歸之思落葉寒擁壁青霜夜沾石正是憶山時復送歸山客殷勤一樽酒曉月當窓白懷鄭泊孟遲一首見渇企望來之思風蘭舞幽香雨葉墮寒滴美人來不來前山看向夕春夢懐人岑參一首見夢成之思洞房昨夜春風起遥憶美人隔江水枕上片時春夢中行盡江南數千里社日村居張濵二首見村人豐年快樂之事鵝湖山下稻梁肥㹠穽雞棲對掩扉桑柘影斜春社散家家扶得醉人歸代隣叟竇鞏年來七十罷耕桑就暖支羸强下床滿眼兒孫身外事閒梳白髪向殘陽觀祈雨李約一首見傷時之意桑條無葉土生煙簫管迎龍水廟前朱門㡬處看歌舞猶怨春隂咽管絃北固晚眺竇常一首見登髙感嘆之意水國芒種後梅天風雨凉露蠶開晚簇江燕繞危檣山趾北來固潮頭西去長年年此登眺人事㡬銷亡秋日耿湋二首狀野思返照入閭巷憂來與誰語古道少人行秋風動禾黍過故人庄故人具雞黍邀我至田家緑樹村邊合青山郭外斜開筵面場圃把酒話桑麻待到重陽日還來就菊花老圃堂即事耿湋一首狀幽逸邵平成地接吾廬榖雨晴時偶自鋤昨日春風欺不在就床吹落讀殘書寄鄰在道閭二首狀幽居聞說經旬不啓闗藥窓誰伴醉開顔夜來雪壓村前竹剰看溪南㡬尺山夏日東山三庚到秋伏偶來松檻立熱少清風多開門放山入出山作盧仝一首狀野逸出山望掩山門路釣竿揷在枯桑樹當時只有鳥窺窬更亦無人得知處家僮若失釣魚竿定是猿猴把將去題隣舎于鵠一首狀閒居僻巷隣家少茅簷喜並居蒸梨常共竈澆薤亦同渠傳屐朝尋藥分燈夜讀書雖然在城市還得似樵漁歸鹿門寺作孟浩然二首狀逈閴山寺鳴鐘晝已昏漢梁渡頭争渡喧人随沙路向江村予亦乘舟歸鹿門鹿門月照開煙樹忽到龎公棲隠處巖扉松徑長寂寥唯有幽人夜來去江村亂後顧况江村日暮尋遺老江水東流流浩浩竹裏閒窓不見人門前舊路生秋草自遣吳融一首狀幽僻㡬年曽見舊江村樹有交柯犢有孫深感下峯顔色好晚雲纔散又當門寄衣曲張籍二首念邊逺情織素縫衣獨苦辛逺因回使寄征人官家亦自寄衣去貴從妾手着君身高堂姑老無侍子不得自到邊城裏殷勤為看初着時征夫身上宜不宜古意王駕夫戍蕭闗妾在吳西風吹妾妾憂夫一行書信千行淚寒到君邊衣到無雨過蘓端杜甫一首見朋友相聚之樂雞鳴風雨交久旱雲亦好杖藜入春泥無食起我早諸家憶所歴一飯跡便埽蘓侯得數過歡喜每傾倒也復可憐人呼兒具棃棗濁醪必在眼盡醉攄懐抱紅稠屋角花碧委牆隅草親賓縱談謔喧閙畏衰老况䝉沛澤垂糧粒或自保妻孥隔軍壘撥棄不擬道遣懷白居易法藏碎金云白氏集中頗有遣懷之作故達之人率多愛之余友李公維錄出其詩名曰養浩集余亦如之名曰助道其詞語盖於經教法門用此彌縫其闕而直截曉悟於人也余愛其詩云云羲和走馭趂年光不許人間日月長遂使四時都似電争教兩鬢不成霜榮銷枯至非闗命壯盡衰來亦是常已共身心要約定窮通生死不驚忙昭君怨白居易王直方詩話云古今作昭君詞多矣余獨愛白樂天一絶云云葢其意優㳺而不廹切故也然樂天賦此時年甚少漢使却回憑寄語黄金何日贖蛾眉君王若問妾顔色莫道不如宫裏時望洞庭劉禹錫鑑誡錄云劉夢得有望洞庭詩雍陶有詠君山詩作者才力伯仲往往暗合李山甫有詠貧女天下稱竒秦韜玉之詩意轉殊妙李山甫又有石頭城故事韋莊有詠南國英雄較量其才意同語異王摩詰有題雲母障子胡令能題繡障子異代殊名而才調相繼李紳鄭雲叟有傷農詩當時名公不敢議其優劣湖光秋月兩相和潭面無風鏡未磨遥望洞庭山水翠白銀盤裏一青螺詠君山雍陶煙波不動影沈沈碧色全無翠色深疑是水仙梳洗罷一螺青黛鏡中心貧女吟李山甫平生不識繡衣裳閒把金針亦自傷鏡裏秪應諳素貎人間多是重紅妝當年未嫁還愛老終日求媒即道狂兩意定知無說處暗垂珠淚滴蠶筐同前秦韜玉蓬門未識綺羅香擬託良媒益自傷誰愛風流髙格調共憐時世儉梳妝敢將十指誇纎巧不把雙眉闘畫長最恨年年握針線為他人作嫁衣裳石頭城故事李山甫南朝諸國愛風流盡守江山不到頭總是戰爭收拾得却因歌舞破除休堯將道德終無敵秦把金湯可自由試問繁華何處有雨莎煙草石城秋詠南國英雄韋莊南朝三十六英雄各遂興亡自此中有國有家皆是夢為龍為虎亦成空殘花舊宅悲江令落日青山弔謝公畢竟霸圖何物在石麒麟没卧秋風雲母障子王維君家雲母障持向野庭開自有山泉入非関彩畫來繡障胡令能日暮堂前花蘂嬌爭拈小筆上床描繡成掛向春園裏引得黄鶯下桞條傷農李紳䥥禾日當午汗滴田中土誰知盤中飱粒粒皆辛苦同前一粒紅稻飯㡬㸃牛頷血珊瑚枝上人銜盃吐不歇同前白居易春耕夏耘秋成苖六月田中似火燒堪嘆農家辛苦事一匙淡飯也難消竹莊詩話巻十五
