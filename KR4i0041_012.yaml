body:
  text: 竹莊詩話巻十二雜編二北征杜甫詩眼云孫莘老嘗謂老杜北征詩勝退之南山詩王平甫以為南山勝北征終不能相服時山谷尚少乃曰若論工巧則北征不及南山若書一代之事以與國風雅頌相為表裏則北征不可無而南山雖不作未害也二公之論遂定石林詩話云北征窮極筆力如太史公紀傳此古今絶唱嬾真子云唐外戚傳云外家之成敗視主徳之如何至哉此言也明皇之於太真極矣故有馬嵬之事惟老杜叙此事殊為得體云不聞夏殷衰中自誅褒妲若謂此事自出於明皇之意與君王掩面救不得相去遠矣皇帝二載秋閏八月初吉杜子將北征蒼忙問家室維時遭艱虞朝野少暇日顧慚恩私被詔許歸蓬蓽拜辭詣闕下怵惕久未出雖乏諫諍姿恐君有遺失君誠中興主經緯固宻勿東胡反未已臣甫憤所切揮涕戀行在道途猶恍惚乾坤含瘡痍憂虞何時畢靡靡踰阡陌人煙眇蕭瑟所遇多被傷呻吟更流血迴首鳳翔縣旌旗晚明㓕前登寒山重屢得飲馬窟邠郊入地底涇水中蕩潏猛虎立我前蒼崖吼時裂菊垂今秋花石戴古車轍青雲動髙興幽事亦可恱山果多𤨏細羅生雜橡栗或紅如丹砂或黑如㸃漆雨露之所濡甘苦齊結實緬思桃源内益歎身世拙坡陀望鄜畤巖谷互出没我行已水濱我僕猶朩末䲭梟鳴黄桑野䑕拱亂穴夜深經戰場寒月照白骨潼闗百萬師往者散何卒遂令半秦民殘害為異物况我墮胡塵及歸盡華髪經年至茆屋妻子衣百結慟哭松聲迴悲泉共幽咽平生所嬌兒顔色白勝雪見爺背面啼垢膩腳不韤牀前兩小女補綻纔過膝海圖拆波濤舊繡移曲折天吳及紫鳳顛倒在短褐老夫情懐惡嘔泄卧數日那無囊中帛救汝寒凛慄粉黛亦解苞衾裯稍羅列瘦妻面復光癡女頭自櫛學母無不為曉妝随手抹移時施朱鉛狼籍畫眉濶生還對童稚似欲㤀饑渇問事競挽鬚誰能即嗔喝翻思在賊愁甘受雜亂聒新婦且慰意生理焉得說至尊尚䝉塵幾日休練卒仰觀天色改坐覺妖氛豁陰風西北来慘澹随回紇其王願助順其俗善馳突送兵五千人驅馬一萬匹此輩少為貴四方服勇决所用皆鷹騰破敵過箭疾聖心頗虛佇時議氣欲奪伊洛指掌收西京不足㧞官軍請深入蓄銳伺俱發此舉開青徐旋瞻略恒碣昊天積霜露正氣有肅殺禍轉亡虜嵗勢成擒胡月胡命其能久皇綱未宜絶憶昨狼狽初事與古先别姦臣竟葅醢同惡随蕩析不聞夏殷衰中自誅褒妲周漢獲再興宣光果明哲桓桓陳將軍仗鉞奮忠烈㣲爾人盡非於今國猶活凄凉大同殿寂寞白獸闥都人望翠華佳氣向金闕園陵固有神灑掃數不缺煌煌太宗業樹立甚宏達南山詩韓愈集注云是詩凡百有二韻始總叙四時之變次叙南山連亘之所止其末則叙其經歴之所見焉雪浪齋日記云讀退之南山詩頗覺似上林子虛賦才力小者不能到吾聞京城南兹維羣山囿東西兩際海巨細難悉究山經及地志茫昧非受授團辭試提挈挂一念萬漏欲休諒不能粗叙所經覯嘗昇崇邱望戢戢見相凑晴明出稜角縷脈碎分繡蒸嵐相澒洞表裏忽通透無風自飄簸融液煦柔茂横雲時平凝㸃㸃露數岫天空浮修眉濃綠畫新就孤橕有巉絶海浴褰鵬噣春陽潛沮洳濯濯吐深秀巖巒雖嵂崒輭弱類含酎夏炎百朩盛蔭鬱增埋覆神靈日歊歔雲氣爭結構秋霜喜刻轢磔卓立癯瘦叅差相叠重剛耿陵宇宙冬行雖幽墨氷雪工琢鏤新曦照危峨億丈恒高袤明昏無停態頃刻異狀候西南雄太白突起莫間簉藩都配德運分宅占丁戊逍遙越坤位詆訐陷乾竇空虛寒兢兢風氣較搜潄朱維方燒日陰霰縱騰糅昆明大池北去覿偶晴晝緜聯窮俯視倒側困清漚微瀾動水面踊躍躁猱狖驚呼惜破碎仰喜呀不仆前尋徑杜墅坌蔽畢原陋崎嶇上軒昻始得觀覽富行行將遂窮嶺陸煩互走勃然思坼裂擁掩難恕宥巨靈與夸蛾逺賈期必售還疑造物意固䕶蓄精祐力雖能排幹雷電怯呵詬攀緣脫手足蹭蹬抵積甃茫如試矯首堛塞生怐愗威容䘮蕭爽近新迷逺舊拘官計日月欲進不可又因緣窺其湫凝湛閟陰嘼魚鰕可俯掇神物安敢冦林柯有脫葉欲墮鳥驚救爭銜彎環飛投棄急哺鷇旋歸道迴睨達枿壯復奏吁嗟信奇恠峙質能化貿前年遭譴謫探歷得邂逅初從藍田入顧眄勞頸脰時天晦大雪淚目苦矇瞀峻塗拖長氷直上若懸溜褰衣步推馬顛蹶退且復蒼黄㤀遐睎所矚纔左右杉篁咤滿蘓杲耀攅介胄專心憶平道脫險逾避臭昨來逢清霽宿願欣所一作始副崢嶸躋冡頂倐閃雜鼯鼬前低劃開濶爛漫堆衆皺或連若相從或蹙若相鬭或妥若弭伏或竦若驚雊或散若瓦解或赴若輻一作輪輳或翩若船遊或決若馬驟或背若相惡或向若相佑或亂若抽筍或嵲若注灸或錯若繪畫或繚若篆籕或羅若星離或蓊若雲逗或浮若波濤或碎若鋤耨或如賁育倫睹勝勇前購先强勢已出後鈍嗔䛠譳上鬭下耨或如帝王尊叢集朝賤幼雖親不褻狎雖逺不悖謬或如臨食案肴核紛飣餖又如遊九原墳墓包椁柩或纍若盆甖或掲若㽅梪或覆若曝鼈或頽若寢獸或蜿若藏龍或翼若摶鷲或齊若友朋一作随迎或差若先後或迸若流落或顧若宿留或戾若仇讐或密若婚媾或儼若峨冠或翻若舞袖或屹若戰陣或圍若蒐狩或靡然東注或偃然北首或如火熺焰或若氣饙餾或行而不輟或遺而不收或斜而不倚或弛而不彀或赤若秃鬝或燻若柴槱或如龜坼兆或若卦分繇或前横若剝或後斷若姤延延離又屬夬夬叛還遘喁喁魚闖萍落落月經宿誾誾樹牆垣巘巘架庫廐參參削劍㦸煥煥銜瑩琇敷敷花披萼闟闟屋摧霤悠悠舒而安兀兀狂以狃超超出猶奔蠢蠢駭不懋大哉立天地經紀肖營腠厥初孰開張僶俛誰勸侑創兹朴而巧戮力忍勞疚得非施斧斤無乃假詛咒鴻荒竟無傳功大莫酬僦嘗聞於祠官芬苾降歆嗅斐然作歌詩惟用贊報酭月蝕詩盧仝唐書云仝嘗為月蝕詩以譏切元和逆黨韓愈稱其工新天子即位五年嵗次庚寅斗柄揷子律調黄鍾森森萬朩夜殭立寒氣贔屓頑無風爛銀盤從海底出出来照我茅屋東天色紺滑凝不流氷光交貫寒膧朧初疑白蓮花浮出龍王宫八月十五夜比並不可雙此時怪事發有物吞食来輪如壯士斧斫壞桂似雪山風拉摧百鍊鏡照見膽平地埋寒灰火龍珠飛出腦却入蚌蛤胎摧壊破璧眼看盡當天一搭如煤炲磨踪滅跡須㬰間便似萬古不可開不料至神物有此大狼狽星如撒沙出爭頭事光大奴婢炷暗燈揜菼如玳瑁今夜吐燄長如虹孔隙千道射户外玉川子涕泗下中庭獨自行念此日月者太隂太陽精皇天要識物日月乃化生走天汲汲勞四體與天作眼行光明此眼不自保天公行道何由行吾見隂陽家有說朢日蝕月月光滅朔月掩日日光缺兩眼不相攻此說吾不容又孔子師老子云五色令人目盲吾恐天似人好色即喪明幸且非春時萬物不嬌榮青山破瓦色緑水氷崢嶸花枯無女艶鳥死沉歌聲頑冬何所好偏使一目盲傳聞古老說蝕月蝦蟇精徑圎千里入汝腹如此癡骸阿誰生可從海窟來便解緣青冥恐是眶睫間揜塞所化成黄帝有四目帝舜重瞳明二帝懸四目四海生光輝吾不遇二帝滉漭不可知何故瞳子上坐受蟲豸欺長嗟白搗靈藥恰似有意防姦非藥成滿臼不中度委任白夫何為憶昔堯為天十日燒九州金爍水銀流玉煼丹砂焦六合烘為窯堯心增百憂帝見堯心憂勃然發怒決洪流立擬沃殺九日妖天髙日走沃不及但見萬國赤子􅋾􅋾生魚頭此時九御導九日爭持節幡麾幢旒駕車六九五十四頭蛟螭虬掣電九火輈汝若蝕開齱齵輪銜轡執索相爬鉤推蕩轟訇入汝喉紅鱗燄鳥燒口快翎鬛倒側聲醆鄒撑腸拄肚礧磈如山丘自可飽死更不偷不獨填饑坑亦解堯心憂恨汝時當食藏頭㩎腦不肯食不當食張脣哆觜食不休食天之眼養逆命安得上帝請汝劉嗚呼人養虎被虎齧天媚蟇被蟇瞎乃知恩非類一一自作孽吾見患眼人必索良工訣想天不異人愛眼固應一安得嫦娥氏來習扁鵲術手操舂喉戈去此睛上物其初猶朦朧既久如抺漆但恐功業成便此不吐出玉川子又涕泗下心禱再拜額榻砂土中地上蟣虱臣仝告愬帝天皇臣心有鐡一寸可刳妖蟇癡腸上天不為臣立梯蹬臣血肉身無由飛上天揚天光封詞付與小心風颰排閶闔入紫宫密邇玉几前擘坼奏上臣仝頑愚胷敢死横干天代天謀其長東方蒼龍角插㦸尾捭風當心開明堂統領三百六十鱗蟲坐理東方宫月蝕不救援安用東方龍南方火鳥赤潑血項長尾短飛跋躠頭戴丹冠髙逵枿月蝕鳥宫十三度鳥為居停主人不覺察貪向何人家行赤口毒舌毒蟲頭上喫却月不啄殺虚貶鬼眼明􅀢䆷鳥罪不可雪西方攫虎立踦踦斧為牙鑿為齒偷犧牲食封豕大蟇一臠固當軟美見似不見是何道理爪牙根天不念天天若准擬錯准擬北方寒龜被蛇縛藏頭入殻如入獄蛇筋束𦂳束破殻寒龜夏鼈一種味且當以其肉充臛死殻没信處唯堪支牀脚不中鑚灼與天下卜嵗星主福德官爵奉董秦忍使黔婁生覆尸無衣巾天失眼不吊嵗星胡其仁熒惑矍鑠翁執法大不中月明無罪過不糾蝕月蟲年年十月朝太㣲支盧謫罰何災凶土星與土性相背反養福德生禍害到人頭上死破敗今夜月蝕安可㑹太白真將軍怒激鋒鋩生恒州陣斬酈定進項骨脆甚春蔓菁天唯兩眼失一眼將軍何處行天兵星辰任廷尉天律自主持人命在盆底固應樂見天盲時天若不肯信試喚臯陶鬼一問一如今日三台文昌宫作上天紀綱環天二十八磊磊尚書郎整頓排班行劍握他人將一肆太陽側一肆天市傍操斧代大匠兩手不怕傷弧矢引滿反射人天狼呀啄明煌煌癡牛與騃女不肯勤農桑徒勞含滛思旦夕遥相望蚩尤簸旗弄旬朔始搥天鼓鳴璫琅枉矢能蛇行眉目森森張天狗下䑛地流血何滂滂譎險萬萬黨構架何可當眯目釁成就害我光明王請留北斗一星相北極指揮萬國懸中央此外盡掃除堆積如山岡贖我父母光當時恒星没殞雨如迸漿似天㑹事發叱喝誅姦强何故中道廢自遺今日殃善善又惡惡郭公所以亡願天神聖心無信他人忠玉川子詞訖風色𦂳格格近月黒暗邊有似動劍㦸須臾癡蟇精兩吻自决坼初露半箇璧漸吐滿輪魄衆星盡原赦一蟇獨誅磔腹肚忽脫落依舊掛穹碧光彩未蘓来慘淡一片白奈何萬里光受此吞吐厄再得見天眼感荷天地力或問玉川子孔子脩春秋二百四十年月蝕盡不收今子咄咄詞頗合孔意不玉川子笑答或請聴逗遛孔子父母魯諱魯不諱周書外書大惡故月蝕不見收予命唐天口食唐土唐禮過三唐樂過五小猶不說大不可數災沴無有小大瘉安得引衰周研覈其可否日分晝月分夜辨寒暑一主刑一主德政乃舉孰為人面上一目偏可去願天完兩目照下萬方土萬古更不瞽萬萬古更不瞽照萬古月蝕詩效玉川子作韓愈學林新編云玉川子詩雖豪放然太險怪而不循詩家法度退之乃摘其句而約之以禮陳齊之云退之效玉川子月蝕詩乃刪盧仝冗語耳非效玉川也韓雖法度森嚴便無盧仝豪放之氣元和庚寅斗挿子月十四日三更中森森萬朩夜僵立寒氣贔屭頑無風月形如白盤完完上天東忽然有物来噉之不知是何蟲如何至神物遭此狼狽㓙星如撒沙出攅集争强雄油燈不照席是夕吐燄如長虹玉川子涕泗下中庭獨立念此日月者為天地之眼睛此猶不自保吾道何由行嘗聞古老言疑是蝦蟇精經圎千里納汝腹何處養汝百醜形爬沙脚手鈍誰使汝解縁青冥黄帝有四目帝舜重其明今天祇兩目何故許食使偏盲堯呼大水浸十日不惜萬國赤子魚頭生汝於此時若食日雖食八九無嚵名赤龍黒鳥燒口熱翎鬛倒側相搪撑婪酣大肚遭一飽飢腸徹死無由鳴後時食月罪當死天羅磕帀何處逃汝形玉川子立於庭而言曰地行賤臣仝再拜敢告上天公臣有一寸刃可刳凶蟇腸無梯可上天天階無由有臣蹤寄牋東南風天門西北祈風通丁寧附耳莫漏洩薄命正值飛亷慵東方青色龍牙角何呀呀從官百餘座嚼啜煩官家月蝕汝不知安用為龍窟天河赤鳥司南方尾禿趐觰沙月蝕於汝頭汝口開呀呀蝦蟇掠汝兩吻過忍學省事不以汝觜啄蝦蟇於莬蹲於西旗旄衛毿㲚既從白帝祠又食於蜡禮有加忍令月被惡物食枉於汝口插齒牙烏龜怯姦怕寒縮頸以殻自遮終令夸娥抉汝出卜師燒錐鑚灼滿板如星羅此外内外官𤨏細不足科臣請悉掃除慎勿許語令啾譁併光全耀歸我月盲眼鏡净無纎瑕弊蛙拘送主府官帝箸下腹甞其皤依前使免操杵臼玉階桂樹閒婆娑姮娥還宫室太陽有室家天雖髙耳屬地感臣赤心使知臣意雖無口言潜喻厥㫖有氣有形皆吾赤子雖忿天傷忍殺孩稚還女月明安行于次盡釋衆罪以蛙磔死氷柱劉义劉义傳云义能為歌詩作氷柱雪車二詩出盧仝孟郊右樊宗師見為獨拜韻語陽秋云劉义詩酷似玉川子而傳於世者二十七篇而已氷柱雪車二詩雖作語竒怪然議論亦皆出於正也氷柱詩云不為四時雨徒於道路成泥柤不為九江浪徒能汩没天之涯雪車詩謂官家不知民餒寒盡驅牛車盈道載玉屑載載欲何之秘藏深宮以禦炎酷如此等句亦有補於時與玉川子月蝕詩稍相類師干乆不息農為兵兮民重嗟騷然縣宇土崩水潰畹中無熟榖壠上無桑麻王春判序百卉茁甲含葩有客避兵犇㳺僻跋履險阨至自三巴貂裘蒙茸己敝縷鬢髪蓬舥雀驚䑕伏寧遑安處獨卧旅舎無好夢更堪走風沙天人一夜剪瑛琭詰旦都成六出花南畝未盈尺纎片亂舞空自紛拏旋落旋逐朝暾化簷間氷柱如削出交加或低或昻小大瑩潔随勢無等差始疑玉龍下界来人世齊向茅簷布爪牙又疑漢髙帝西方未斬蛇人不識誰為當風仗莫邪鏗鏜氷有韻的皪玉無瑕不為四時雨徒於道路成泥柤不為九江浪徒能汩没天之涯不為雙井水滿甌泛泛烹春茶不為中山漿清新馥鼻盈百車不為池與沼養魚種芰成霪霔不為醴泉與甘露使名異瑞世俗誇特禀朝澈氣潔然自許靡間其邇遐森然氣結數千里滴瀝聲沉十萬家明也雖小暗之大不可遮勿被曲瓦直下不能抑羣邪奈何時逼不得時在我目中倐然漂去無餘些自是成毁任天理天於此物豈宜有忒賖反令井蛙壁蟲變空易背人縮首競呀呀我願天工迴造化藏之韞櫝翫之生光華雪車臘令凝綈三十日繽紛密雪一復一孰云潤澤在枯荄闤闠餓民凍欲死死中猶被豺狼食官軍初還城壘未完備人家千里無煙火雞犬何太怨天不䘏吾甿如何連夜瑶花亂皎潔既同君子節沾濡多着小人面寒鏁侯門見客稀色迷塞路行商㫁小小細細如塵間輕輕緩緩成樸簌官家不知民餒寒盡驅牛車盈道載屑玉載載欲何之秘藏深宮以禦炎酷徒能自衛九重間豈信車轍血㸃㸃盡是農夫哭兵刃殘䘮後滿野誰為載白骨逺戍乆乏糧太倉誰為運紅粟戎夫尚逆命偏箱鹿角誰為敵士夫困征討買花載酒誰為適天子端然少旁求股肱耳目皆姦慝依違用事佞上方猶驅餓民運造化防暑阨吾聞躬耕南畆舜之聖為民呑蝗唐之德未聞壚孽苦蒼生相羣相黨上下為蟊賊廟堂食祿不自慙我為斯民歎息還歎息黄鶴樓崔灝該聞錄云唐崔顥題武昌黄鶴樓詩云云李白負大名尚曰眼前有景道不得崔顥題詩在上頭欲擬之較勝負乃作鳳凰臺詩昔人已乘黄鶴去此地空餘黄鶴樓黄鶴一去不復返白雲千載空悠悠晴川歴歴漢楊樹芳草凄凄鸚鵡洲日暮家山何處是煙波江上使人愁登鳳凰臺李白珊瑚鈎詩話云金陵鳳凰臺在城之東南四顧江山下窺井邑古題詠惟謫仙為絶唱鳳凰臺上鳳凰逰鳳去臺空江自流吳宫花草埋幽徑晉國衣冠成古丘三山半落青天外二水中分白鷺洲捴為浮雲能蔽日長安不見使人愁古劍歌郭元振廣卓異記云郭元振為通泉尉前後掠所部千餘人遺賔客百姓苦之武右使籍其家有書數百卷令問其資財所在知皆已濟人於是竒而免之召見大稱㫖令口占古劍歌進天后竒之命繕冩賜諸學士君不見昆吾鐡冶飛炎煙紅光紫霧俱赫然良工鍜煉凡㡬年鑄得寳劍名龍泉龍泉顔色如霜雪良工咨嗟嘆竒絶琉璃玉匣吐蓮花錯鏤金環生明月正逢天下無風塵幸得周防君子身精光黯黯青蛇色文章片片綠龜鱗非直結交㳺俠子亦嘗親近英雄人何言中路遭棄捐零落飄淪古獄邊雖復沉埋無所用猶能夜夜氣衝天逰龍門應制作宋之問隋唐佳話云武后逰龍門命羣臣賦詩先成者賜錦袍左史東方虬詩成設燕賜坐未安宋之問詩後成文理兼美左右莫不稱善乃就奪錦袍衣之宿雨霽氛埃流雲度城闕河堤栁新翠苑樹花先發洛陽花柳此時濃山水樓臺應㡬重羣公拂霧朝翔鳳天子乘春幸鑿龍鑿龍近出王城外羽從琳琅擁軒盖雲䍐纔臨御水橋天衣已入香山㑹山壁嶄巖㫁復連清流澄澈俯伊川塔影遙遙綠波上星龕奕奕翠㣲邊層巒舊長千尋木逺壑初飛百丈泉綵仗蜺旌遶香閣下輦登髙望河洛東城宫闕擬昭回南陌溝塍殊綺錯林下天香七寳臺山中春酒萬年杯㣲風一起祥花落仙樂初鳴瑞鳥来鳥来花落紛無已稱觴獻壽煙霞裏歌舞淹留景欲斜石闗猶駐五雲車鳥旗翼翼留芳草龍騎駸駸映晚花千乘萬騎鑾輿出水静山空嚴警蹕郊外喧喧引看人傾都南望屬車塵囂聲引颺聞黄道佳氣周迴入紫宸先王定鼎山河固寳命乘周萬物新吾君不事瑶池樂時雨来觀農扈春修貢顧渚茶山漁隠叢話云此詩古雅得詩人諷諫之體誠可尚也禹貢通逺俗始圖在安人後王失其本職吏不敢陳亦有姦侫者因兹欲求伸動生千金費日使萬姓貧我来顧渚源得與茶事親黎甿輟耕農採掇實苦辛一夫且當役盡室皆同臻捫葛上歌壁蓬頭入荒榛終朝不盈掬手足皆皴鱗悲嗟徧空山草朩為不春隂嶺牙未吐使曺牒已頻心争造化先走挺麋鹿均選納無日夜擣聲昏繫晨衆工何枯櫨俯視彌傷神皇帝尚廵狩東郊路多堙周迴繞天涯所獻惟艱勤况减兵革用兼兹困疲民未知供億餘誰合分此珍顧省忝邦守有慚復因循茫茫滄海間丹憤何由申題破山寺後禪院常建洪駒甫詩話云丹陽殷播撰河嶽英靈集首列常建詩愛其山光悅鳥性潭影空人心之句以為警䇿歐公又愛建竹徑通幽處禪房花朩深欲效建作數語竟不能得以為恨予謂此詩全篇皆工不獨此兩聯而已清晨入古寺初日照髙林竹徑通幽處禪房花朩深山光悅鳥性潭影空人心萬籟此都寂但餘鐘磬音竹莊詩話巻十二
