body:
  text: 竹莊詩話卷二十二閨秀宫詞花蘂夫人王平甫云熙寧間奉詔定蜀楚秦民三家所獻書籍得一弊紙所書花蘂夫人詩三十二首乃夫人親筆而詞甚竒與王建宫詞無異謹繕寫入三館而歸口誦數篇於丞相安石明日與中書語及之而王圭馮京願傳其本於是盛行於世苕溪漁隱云余閲此詞如云云以下五首皆清婉可喜龍池九曲逺相通楊栁絲牽兩岸風長似江南好風景畫船來往碧波中又黎園弟子簇池頭小樂携來候宴遊試拭銀笙先按拍海棠花下合梁州又韻語陽秋云花蘂宫詞如云云之類亦可喜也月頭支給買花錢滿殿宫人近數千遇著唱名多不應含羞走過御牀前又內人追逐採蓮時驚起沙鷗兩岸飛蘭棹把來齊拍水並船相鬭濕羅衣又厨船進食簇時新侍座無非列近臣日午殿頭宣索膾隔花催喚打魚人早梅金華瀛州集又托遣記梅花詩是女仙題蜀州江梅閣劉元載妻倦遊録云天聖中禮部郎中孫晃記三英詩劉元載妻詹茂光妻趙晟之母早梅寄逺惜别三詩劉妻哀子無立詹妻留夫侍母病趙母懼子逺遊孫公愛其才以取之南枚向暖北枝寒一種春風有兩般憑仗髙樓莫吹笛大家留取倚欄杆寄逺詹茂光妻錦江江上探春回消盡寒冰落盡梅爭得兒夫似春色一年一度一歸來惜别趙晟之母暖有花枝冷有冰佳人後㑹却無憑預愁離别苦相對挑盡漁陽一夜燈絶句蓬萊縣君隱居詩話云近世婦人多能詩往往有臻古人者王荆公家能詩者最衆吳安持妻蓬萊縣君荆公之女也有句云云脫灑可喜西風不入小忩紗秋意應憐我憶家極目江山千萬恨依前和淚看黃花寄夫丘舜中女西清詩話云朝奉郎丘舜中諸女皆能文詞每兄弟內集必聨珠為樂其仲嘗作寄夫詩云云此亦不減班謝簾裏孤燈覺曉遲獨眠留得宿粧眉珊瑚枕上驚殘夢認得蕭郎馬過時絶句趙德麟妻王直方詩話云此趙德麟細君王氏所作也德麟既鰥居因見此篇遂與之為親余以為乃二十八字媒也白藕作花風巳秋不堪殘睡更回頭晚雲帶雨歸飛急去作西忩一夜愁絶句胡楚後山詩話云杭妓胡楚龍靚皆有詩名胡云張子野老於杭多為官妓作詞而不及靚靚獻詩云云子野於是為作詩不見當時丁令威年來處處是相思若將此恨同芳草却恐青青有盡時上張子野龍靚天與羣芳十樣葩獨分顔色不堪誇牡丹芍藥人題遍自分身如鼓子花贈陳夢和周氏夷堅志云陳筑字夢和莆田人崇寧初登第為福州古田尉既至官惑一娼周氏周能詩嘗有詩贈筑云云首句蓋寓筑字也又有春晴詩云云夢和殘月過樓西月過樓西夢已迷喚起一聲腸斷處落花枝上鷓鴣啼春晴瞥然飛過誰家燕驀地香來甚處花深院日長無箇事一瓶春水自煎茶絶句杜羔妻蒼梧雜志云云詩杜羔妻所作羔不第而歸作前詩勉之羔既登第復作後詩戒之可謂賢婦人矣良人的的是竒才何事年年被放回如今妾面羞君面君到來時近夜來絶句長安此去無多地鬱鬱葱葱佳氣浮良人得意正年少今夜醉眠何處樓讀朝錯傳許氏青瑣集云方勉字及甫娶許虞部女好學能詩勉嘗同妻夜看朝錯傳許氏有詩云云勉後與故人飲於市醉犯夜禁囚於府庭時鄭毅夫作尹許氏獻書授其夫并投詩云云遂釋其夫勉死許氏居陋巷教子為學登科賢哉匣劍未磨朝錯血已聞刺客殺袁絲到頭昧却人心處便是欺他天道時痛矣一言偷害正戮之萬段始為宜鄧公墳墓知何處空對斯文有淚垂上鄭毅夫明時樂事輸詩酒帝里風光剩占春况是白衣重得侣不堪青斾自招人早知玉漏催三鼓肯把金貂換百巡大抵仁人憐氣類不教孤客作囚身絶句蒨桃翰府名談云冦萊公有妾曰蒨桃公因會贈歌者以束綾蒨桃作二詩呈公云云一曲清歌一束綾美人猶自意嫌輕不知織女螢忩下幾度拋梭織得成同前風徑衣單手屢呵幽忩軋軋度寒梭臘天日短不盈尺何似妖姬一曲歌送别謝氏青瑣集云謝郎中女能詩長嫁王元甫元甫調官京師送别云云此去惟宜早早還休教重起望夫山君看湘水祠前竹豈是男兒淚染班絶句髙氏雲齊廣録云淮南有一士人妻髙氏嘗作一絶云楊花日日常無定海燕年年却有歸一瞬青春疾如電等閒寬盡縷金衣秋扇歌潘氏詩事云陳大節才妻潘氏善吟詩嘗作秋扇歌云云頗有情致亦婦人女子所難者可憐架上團圓扇一日秋來人勿戀為爾因思婦妾身不堪華落君心變君心變兮奈若何舊恩都棄新讐多勸君莫恃少年色聽我微吟秋扇歌左玉環詩詩事云太中大夫韓宗武字文若丞相玉汝之子嘉祐中侍玉汝守洋州有神降其室乃女子也云唐興元節度使李以妾左玉環也既死魂遊江上見惡鬼十數同謀溺渡江船數百人知其謀以告主者會上帝出遊録其功以為洋州境內牢山神冥數當與文若合因留不去玉汝兄職方員外郎繹強明士也為永興倅聞之以書責玉汝言吾家有此妖事因奏韋訴天文若明日見空中黑雲表至告此女子而去仰視之灑淚落淺色襖子上視之皆血耳自是遂絶時誦詩句令文若書紙上王荆公見之曰東晉倅作也日月經天回俯仰如車轂悲歡世上事一往如轉燭人生茍可懷百嵗詎為足奈何舍此去一旦慎鬼籙悠悠百年內愚知更相哭又大水不可哭浩浩東南流微風從空來化作波上漚一起復一滅各願須臾留自性本澄寂強此懷百憂又支脊為柱梁兩脅為榱桷上穴藏膻腥下穴藏穢濁百蟲煽惡熖晝夜爍靈藥中有丹府君氣象頗超邈玉女衛𤣥關蒼童侍青幄黃鵠護芝田白虹起天角吾方從伎兒以幻從衆樂寄語世上人此還有真覺又衆隂以為輿狂陽為行舟大小煽烈熖旦暮無時休夜夢逢故姬歎哉懷百憂手為布香荃寶琴弄成柔一為雲和奏能寫萬古愁又氣守不自衛百邪不時泄在隂為中寒輔陽作狂熱忽悟昔所遊冷然覺超越甘露如黃芝丹砂飛絳雪一飲百疾消再飲聰明徹逍遙無一事俯身弄明月又金鼎燒成五色丹便揮儒服掛仙冠五雲夜送飛鳬舄欲到天宫却避寒拋毬曲劉貢甫詩話云海州士人李慎言嘗夢至一處水殿中觀宫女戲毬山陽蔡繩為之傳叙其事甚詳有拋毬曲十餘闋詞皆清麗今獨記二闋云云前兩首侯鯖録云李慎言字希古嘗夢至一宫殿有數百妓拋毬人唱十詩覺而記三首云添後一首今古詩話中只有二首不及此詳備故盡録云侍宴黃昏未肯休玉階夜色月如流朝來自覺承恩重笑倩旁人認繡毬又隋家宫殿鎖清秋曾見嬋娟揚繡毬金殿玉簫俱寂寂一天明月照髙樓又堪恨隋家幾帝王舞腰挼盡繡鴛鴦如今重到拋毬處不是金爐舊日香絶句洪駒父詩話云酉陽雜俎載鬼詩兩篇山谷喜道長安女兒踏春陽無處春陽不斷腸學舞弓彎渾忘却娥眉空帶九秋霜又流水涓涓芹水芽野鳥雙飛客還家荒村無處作寒食殯宫空對棠梨花絶句許彥周詩話云長安慈恩寺有數女仙夜遊題詩云云化為白鶴飛去明夜又題一首云云亦婉約可愛黃子陂頭好明月強踏華筵到曉行煙波山色翠黛橫折得落花逺恨生又湖水團團夜如鏡碧樹紅花相掩映北斗欄干移曉柄有似佳期常不定和游東園詩周源述曼卿事云曼卿死世以為仙錢沔今年春正月二日出中庭若疾發狀已而仆地寐語家人環聽覺其語異遂記于紙皆成對偶句格不常不若沔平生之為者纍月而蘇問之悉已遺忘但記夢與曼卿並行於清溪之側休于盤石之上飲酒起舞聨句作詩豫與王學士勝之分題作游東園詩有傳於沔者即應聲次韻云云沔為人倜儻疏逸喜酒倚才而惰于學平時所作無是語豫與勝之駭其異遂記其實歐公詩話云曼卿卒後降於亳州一舉子家因留詩一篇與之余記舉子一聨云鶯聲不逐春光老花影長隨日腳斜神仙事怪不可知其詩頗類曼卿平生語舉子不能道也官豪朝駕玉驄虬盡是蓬萊島上洲千日酒磨千古恨一聲鶯送一敏愁春絲任逐風梭度花影相隨日腳流坐上少年簡居士不知清世有巢由古樂府行路難夷堅庚志云龔􅀢子冶居秀州所邀紫姑神作詩詞至於數百篇語言字畫皆髙妙所居之地曰電梁自稱雲洞君名綺其文曰霓裳集嘗自寫其狀今僧梵隆圖之風骨秀灑眉宇娟麗神仙中人也古樂府行路難云云俠客行云云擬李太白冬夜寒歌云云此文至今藏于龔氏又曹掄者以戊子嵗旦集會親友先夕雪作至旦尤甚掄詩神乞詩即援筆不可遏書云云併賦燭詩云云其清警如此洞庭波瀟湘浦帝子靈妃愁不吐舜不歸兮蒼梧空淚血竹漬森如雨巫山髙陽臺深暮雨朝雲難重尋楚襄私夢傾天地佳人寧有一分心海風掀波雲漠漠霜殺飛蓬寒更惡帆撑何處送歸艎溜溜輕沙夜潮落參懸碧兮夜漫漫鴈呌羣兮獨聲乾百憂集兮腸九折可見人生行路難俠客行撩虎頭批龍鱗璧歸趙圖欺秦男兒尚意氣眼髙天下人此身許死當許國五侯門戶誰能賔朝過陳孟公暮來魯朱家入門氣吐虹索酒一咄嗟捲簾出娉婷墮髻烏盤鴉不敢問姓名但願客醉腮紅霞門前馬嘶天欲曉青鐵為鞭金絡腦吳鈎如雪神中藏千里殺人成草草郭解不惜交壯士輕袁絲人言俠客不自治平我重俠客仍歌之擬李太白冬夜朔風吹雲凍不醒瓊林琪樹垂珠瓔佳人獨立炯玉雪翠袖倚竹嬌娉婷碧袖薄生暮寒呈素齒歌南山山光明溪光清光錯落月頽烟此曲入吾耳江流直下波連天嵗旦雪作朝元初退紫宸班花落東風響珮環瑞雪再飛天有意好詩未就我何顔青羅帶露中流水白玉屏開四面山鶴駕欲歸歸未得水晶宫殿在人間賦燭詩密房春老不禁融香滿華筵四坐風但得寸心明似月從他清淚與人同黃鶴樓絶句夷堅已志云鄂州黃鶴樓有詩云云長沙石壁上亦有詩云云余謂後詩似李太白墻角隂隂老薺肥竹間滑滑乳雞飛家園千里望不斷芳草一川生晚暉又孤村日晚煙樹迷㸃㸃飛螢映水低荷葉暗香秋露滴月明行過石橋西長沙石壁絶句玉皇殿上誤稱名欲脫凡肌骨未清謫向人間且沈醉三年重學步虛聲同前東去流沙西上船尋思此事巳千年長春殿掩無人鎖滿目梨花哭杜鵑竹莊詩話卷二十二
