body:
  text: 竹莊詩話巻二十四警句下七言穿花蛺蝶深深見㸃水蜻蜓欵欵飛落花游絲白日静鳴鳩乳燕青春深藍水逺從千澗落玉山髙並兩峯寒無邉落木蕭蕭下不盡長江滚滚來香飄合殿春風轉花覆千官淑景移麒麟不動爐烟上孔雀徐開扇影還映堦碧草自春色隔葉黄鸝空好音絶壁過雲開錦繡疎松夾水奏笙簧詩眼云文章茍當於理則綺麗風花同入于妙老杜言春容閒適則有云云第一二聨言秋景悲壯則有云云第三四聨其富貴之辭則有云云第五六聨其弔古則有云云第七聨皆出於風花然窮理盡性移奪造化又云云第八聨自古詩人巧即不壯壯即不巧巧而能壯乃如是也石林詩話云深深若無穿字欵欵若無㸃字皆無以見其精微旌旗日暖龍蛇動宫殿風微燕雀髙五更鼓角聲悲壯三峽星河影動揺並杜甫洪波萬古流不盡白鳥雙飛意自閒萬馬不嘶聽號令諸畨無事看耕耘並歐陽修令嚴鐘鼓三更月野宿貔貅萬竈煙露布朝馳玉闗塞捷書夜到甘泉宫並蘇軾東坡云七言之偉麗者子美云云以後寂寥無聞焉直至永叔云云可以並驅爭先矣小生云云亦庶㡬焉錦江春色來天地玉壘浮雲變古今杜甫天子旌旗分一半八方風雨會中州劉禹錫石林詩話云七言難於氣象雄渾自老杜云云五更三峽及錦江玉壘兩聨等句之後常恨無繼者劉禹錫賀晉公留守東都云云逺而大壯也紅稻啄餘鸚鵡粒碧梧棲老鳳凰枝暫上飛烏將數子頻來語燕定新巢禁臠云錯綜句法不錯綜則不成文章平直叙之則曰鸚鵡啄餘紅稻粒鳳凰棲老碧梧枝而用紅稻碧梧於上者錯綜之也蔡寛夫詩話云詩語大忌用工太過盖練句勝則意必不足云云前一聨可謂精切而在其集中本非佳處不若云云後一聨為天然自在返照入江翻石壁歸雲擁樹失江村潘邠老云七言詩第五字要響如云云翻字失字是響字也晁氏客語云杜甫云云腰中一字最工孤嶼池痕春長滿小欄花韻午晴天容齋隨筆云表聖七言云云皆可稱也漠漠水田飛白鷺隂隂夏木囀黄鸝王維無邉落木蕭蕭下不盡長江滾滾來杜甫江天漠漠鳥飛去風雨時時龍一吟杜甫新霜浦漵綿綿白薄晩林巒往往青王安石浥浥爐香初泛夜離離花影欲揺春蘇軾石林詩話云詩下雙字極難須是七言五言之間除去五字三字外精神不改全見於兩言方為工妙唐人記水田飛白鷺夏木囀黄鸝為李嘉祐詩摩詰竊取之非也此兩句好處正在添漠漠隂隂四字此乃摩詰為嘉祐㸃化以自見其妙如李光弼將郭子儀軍一號令之精彩數倍不然嘉祐本句但詠景耳人皆易到要之當今如老杜云云等乃為超絶王荆公云蘇子瞻云云此可以追配前人也峭帆横度官橋栁叠旦鼓驚飛海岸鷗隠居詩話云西崑體識者病之大年有詩云云此何害為佳句江月轉空為白晝嶺雲分暝作黄昏一水䕶田將綠繞兩山排闥送青來冷齋夜話云王半山此詩謂之句中眼學者不知此妙韻終不勝有時俗事不稱意無限好山都上心潘子真詩話云俞秀老喜作詩人未知之荆公愛焉手冩其一聨云云於所持扇衆始異焉龍帶晚烟歸洞府鴈拖秋色入衡陽西清詩話云王文穆未第時寒窘依幕府家時章聖以夀王尹開封一日晚過其舍左右不虞王至亟取紙屏障風王顧屏間一聨云云大加賞愛曰此語落落有貴氣草解忘憂憂底事花名含笑笑何人丁謂花曾識面香仍在鳥不知名聲自呼蘇軾冷齋夜話云韓子蒼曰丁晉公海外詩云云世以為工及讀東坡詩云云便覺才力相去逺矣樓臺側畔楊花過簾幕中間燕子飛梨花院落溶溶月栁絮池塘淡淡風漁隠叢話云青箱雜記載元獻每言富貴不及珠玉錦繡惟説氣象若云云之類是也公自以此句語人曰窮人家有此景否珠簾繡户遲遲月栁絮梨花寂寂春又云雲齋廣錄載近時人詩一聨云云雖用珠繡其氣象豈不富貴不害為佳句也鑿開魚鳥忘情地展盡江湖極目天宋庠鑿開青帝春風圃移下姮娥夜月樓徐仲雅西清詩話云許昌西湖展江亭成宋文憲留題有云云之句皆以謂曠古未有此語然本於五代馬殿據潭州詩建明月圃命幕客徐仲雅賦詩云云用古人句摹擬詞人類如此但有勝與否耳魚寒不食清池釣鷺靜頻驚小閣棋西清詩話云王君玉詩字字清詩如云云讀之如咀冰嚼雪鴈飛南浦砧初斷月滿西樓酒半醒南唐書云夏寶松與詩人劉洞俱顯名寶松有宿江城詩云云疎影横斜水清淺暗香浮動月黄昏雪後園林纔半樹水邉籬落忽横枝池水倒窺疎影動屋簷斜入一枝低山谷云歐陽公極賞林和靖云云之句而不知别有詠梅一聨云云似勝前句不知文忠何緣棄此而賞彼王直方詩話云林和靖詩云云後聨此句於前所稱真處伯仲之間橋横野水已秋色寺倚雲峯却晚晴烟含逺樹人家暗雨濕春蒲燕子低蔡寛夫詩話云和靖長句如云云何害為工夫太過數畝家園荒杞菊一池秋水沸龜魚韓維倒着衣裳迎戸外盡呼兒女拜燈前謝景温千里暮山横紫翠一鈎新月破黄昏孫覺雪浪齋日記云韓持國謝師厚詩絶妙莘老亦亹亹逼人韓云云前人評此詩云沸字直錢謝詩云云孫云云樂意相闗禽對語生香不斷樹交花雞肋集云曼卿題張氏園亭詩云云尤為佳句浮萍破處見山影野艇歸時聞水聲東坡云子野詩筆老健云云若此語可以追配古人葉隨流水歸何處牛載寒鴉過别邨東坡云兒子過有詩云云此句亦可喜拂石坐來衫袖冷踏花歸去馬蹄香古詩水光照坐杯盤潔花氣侵人笑語香秦觀漫齋語錄云少游善取古人意語云古詩云云少游乃有云云之句水光漾碧摶新浪花信傳紅到舊枝又云七字句不要有閒字若減兩字成五言而意思足便是有閒字也如古詩云云如此等語了無閒字欄干梅子青隂合宫殿楸花白晝長風廊雞唱含青漏水殿鴉飛過緑隂詩事云張文潛極喜王平甫詩每摘句誦之云云且曰此説宫殿富貴氣象也人得交遊是風月天開圖畫即江山山圍燕坐畫圖出水作夜忩風雨來石林詩話云魯直於詩一聨云云以為晚年最得意每舉以教人而終不能成篇盖不欲以常語雜之然魯直自有云云余以為氣格當勝前聨也桃李春風一盃酒江湖夜雨十年燈黄庭堅千里江山漁笛晩十年燈火客氊寒汪彦章王直方詩話云張文潛嘗謂余曰黄山谷云云真是竒語苕溪漁隠曰汪彦章有云云之句效山谷體也斜日半竿眠犢晩春波一眼去鳬寒石林詩話云須見晁無咎舉文潛云云自以為莫能及蒼龍掛斗寒垂地翡翠浮花暖作春漁隠叢話云文潛夜直館中詩云云亦佳句也白頭青髮隔存沒落日斷霞無古今張耒千山送客東西路一樹照人南北枝王康功王直方詩話云文潛過宋都詩云云氣格似不減老杜王康詩云云語意新竒辭源江海浩奔忙句法風騷森出入趙鼎臣沙軟綠頭相並鴨水深紅尾自跳魚髙子勉雪浪齋日記云趙鼎臣詩云云極為雄嚴髙子勉詩云云怪麗之甚愁從竹葉杯中去老向菱花鏡裏來青銅不覽一兩日白髮又添三四莖髙齋詩話云趙企循道以長短句得名所為詩亦工嘗記其警句云云青燈影冷碁三戰紅火爐温酒一盃漁隠叢話云循道得文章體格全學樂天故句語皆平易如云云餘不及此者亦多天連逺水三吳濶人倚危樓萬象低雪浪齋日記云無盡居士會稽樓詩云云語甚竒怪隔浦魚龍驚燭影近人鷗鷺慣歌聲雪浪齋日記云予先人儀真府君嘗於無盡席上賦詩云云時置席近水無盡得之大驚激賞不已客子光隂詩巻裏杏花消息雨聲中漁隠叢話云陳去非詩平淡有工如云云樹移午影重簾静門閉春風十日閒往事髙低半枕夢故人南北數行書殘雨入簾收薄暑破忩留月縷微明又云吕居仁詩清新可愛如云云萬壑松聲山雨過一川花氣水風生雪浪齋日記云予家翰林公詩云云極為作者歎服淺水短蕪調馬地淡雲微雨養花天迂叟詩話云大名進士耿仙芝以詩著其一聯云云為人所稱竹莊詩話巻二十四
