body:
  text: 竹莊詩話卷一講論漫齋語録云學詩須是熟看古人詩求其用心處蓋一語一句不茍作也如此看了須是自家下筆要追及之不問追及與不及但只是當如此學久之自有箇道理若今人不學不看古人做詩樣子便要與古人齊名恐無此道理陳無已云學詩如學仙將至骨自換此語得之又云詩涵咏得到自有得處如化工生物千花萬草不名一物一態若模勒前人而無自得只如世間剪裁諸花見一件樣只做得一件也又云詩文皆要含蓄不露便是好處古人説雄深雅健此便是含蓄不露也用意十分下語三分可幾風雅下語六分可追李杜下語十分晚唐之作也用意要精深下語要平易此詩人之難又云有意中無斧鑿痕有句中無斧鑿痕有字中無斧鑿痕須要體認得陳后山詩話云寧拙毋巧寧朴毋華寧粗毋弱寧僻毋俗詩文皆然詩眼云世俗喜綺麗知文者能輕之後生好風花老大即厭之然文章論當理與不當理耳茍當於理則綺麗風花同入於妙茍不當理則一切皆為長語上自齊梁諸公下至劉夢得溫飛卿輩往往以綺麗風花纍其正氣其過在於理不勝而詞有餘王直方詩話云方回言學詩於前輩得八句平淡不流於淺俗竒古不鄰於怪僻題詠不窘於物象敘事不病於聲律比興深者通物理用事工者如已出格見于篇成渾然不可鐫氣出於言外浩然不可屈盡心於詩守此勿失又云謝朓嘗語沈約曰好詩圓美流轉如彈丸蓋詩貴於圓熟也余以謂圓熟多失之平易老硬多失之乾枯能不失於二者之間則可與古之作者並驅耳珊瑚鈎詩話云篇章以含蓄天成為上破碎雕鎪為下如楊大年西崑體非不佳也而弄斤操斧太甚所謂七日而混沌死也以平夷恬淡為上怪險蹶趍為下如李長吉錦囊句非不竒也而牛鬼蛇神太甚所謂施諸廊廟則駭矣韻語陽秋云作詩貴雕琢又畏有斧鑿痕貴破的又畏粘皮帶骨此所以為難李商隱栁詩云動春何限葉撼曉幾多枝恨其粘皮骨也能脫此二病始可以言詩矣劉夢得稱白樂天詩云郢人斤斫無痕迹仙人衣裳棄刀尺世人方內欲相從行盡四維無處覓若能如是雖終日斫而鼻不傷終日射而鵠必中終日行於規矩之中而其迹未嘗滯也山谷嘗與楊明叔論詩謂以俗為雅以故為新百戰百勝如孫吳之兵棘端可以破鏃如甘蠅飛衛之射揑聚放開在我掌握與劉所論殆一轍矣吕居仁與曾吉甫論詩帖云寵諭作詩次第此道不講久矣如本中何足以知之或勵精潛思不便下筆或遇事因感時時舉揚工夫一也古之作者正如是也惟不可鑿空強作出於牽強如小兒就學俯就課程耳楚詞杜黃固法度所在然不若遍考精取悉為吾用則姿態橫出不窘一律矣如東坡太白詩雖規摹廣大學者難依然讀之使人敢道澡雪滯思無窮苦艱難之狀亦一助也要之此事須令有所悟入則自然超越諸子悟入之理正在工夫勤惰間耳如張長史見公孫大娘舞劍頓悟筆法如張者専意此事未嘗少忘胸中故能遇事有得遂造神妙使它人觀舞劍有何干涉非獨作文學書而然也和章固佳然本中猶竊以為少新意也近世次韻之妙無出蘇黃雖失古人唱酬之本意然用韻之工使事之精有不可及者鄭文寶答友人潘子喬論詩書云唐僧著詩式三篇如云四深二要之門四離六迷之道誠關研究實可師承四深者謂氣象氤氲由深於體勢意度盤礴由深於作用用律不滯由深於聲對用事不直由深於義類是也二要者謂要力全而不苦澀要氣足而不怒張四離者謂雖有道情而離深僻雖用經史而離書生雖尚髙逸而離迂逺雖欲飛動而離輕浮是也六迷者謂以虛誕為髙古以緩慢為淡泊以詭怪為新竒以錯用意為獨善以爛熟為穩約以氣少力弱為容易是也漫齋語録云大率詩語出入經史自然有力然須是看多做多使自家機杼風骨先立然後使得經史中全語作一體也如是自出語弱却使經史中語則頭尾不相勾副如兩村夫舁一枝畫梁自覺經史語在人眼中不入看也東坡答王鞏云新詩如彈丸又送歐陽叔弼云中有清圓句銅丸飛柘彈蓋詩貴於圓熟也余以謂圓熟多失之平易老硬多失之枯乾能不失於二者之間則可與古之作者並驅耳石林詩話云古人論詩多矣吾獨愛湯惠休稱謝靈運為初日芙蕖沈約稱王筠為彈丸脫手兩語最當人意初日芙蕖非人力所能為而精彩華妙之意自然見於造化之外然靈運諸詩可以當此者亦無幾彈丸脫手雖是輸寫便利動無違礙然其精圓快速發之在手筠亦未能盡東坡云頃嵗孫莘老識文忠公乘間以文字問之云無他術唯勤讀書而多為之自工世人患作文字少又懶讀書每一篇出即求過人如此少有至者疵病不必待人指摘多作自能見之此公以其嘗試者告人故尤有味苕溪漁隱曰舊説梅聖俞日課一詩寒暑未嘗易也聖俞詩名滿世蓋身試此説之效耳唐子西語録云詩在與人商論深求其疵而去之等間一字放過則不可殆近法家難以言恕矣故謂之詩律東坡云敢將詩律鬭深嚴豫亦云詩律傷嚴近寡恩大凡立意之初必有難易二塗學者不能強所劣往往捨難趨易文章罕工每坐此也作詩自有穩當字第思之未到耳吕氏童蒙訓云老杜云新詩改罷自長吟文字頻改工夫自出近世歐公作文先貼於壁時加竄定有終篇不留一字者魯直長年多改定前作此可見大略如宗室挽詩云天網恢中夏賓筵禁列侯後乃改云屬舉左官律不通宗室侯此工夫自不同韻語陽秋云陳去非嘗謂余言唐人皆苦思作詩所謂吟安一箇字撚斷數莖鬚句向夜深得心從天外歸吟成五字句用破一生心蟾蜍影裏清吟苦舴艋舟中白髮生之類者是也故造語皆工得句皆竒但韻格不髙故不能參少陵之逸步後之學詩者倘能取唐人語而掇入少陵繩墨步驟中此速肖之術也余嘗以此語似葉少藴云李益詩云開門風動竹疑是故人來沈亞之詩云徘徊花上月虛度可憐宵皆佳句也鄭谷掇取而用之乃云睡輕可忍風敲竹飲散那堪月在花真可與李沈作僕奴由是論之作詩者興致先自髙逺則去非之言可用倘不然便與鄭都官無異唐子西語録云詩最難事也吾於他文不至蹇澀惟作詩甚苦悲吟纍日僅能成篇初讀時未見可羞處姑置之明日取讀瑕疵百出輒復悲吟纍日反復改正比之前時稍稍有加焉復數日取出讀之疵病復出凡如此數四方敢示人然後乃能竒李賀母責賀曰是兒必欲嘔出心乃已非過論也今之君子動輒千百言略不經意真可貴哉王直方詩話云朱景文云詩人必自成一家然後傳不朽若體規畫圓準矩作方終為人臣僕故山谷詩云文章最忌隨人後又云自成一家始逼真真不易之論吕氏童蒙訓云老杜云新詩改罷自長吟文字頻改工夫自出近世歐公作文先貼於壁時加竄定有終篇不留一字者蔡寬夫詩話云荆公嘗云詩家病使事太多蓋皆取其與題合者類之如此乃是編事雖工何益若能自出已意借事以相發明變態錯出則用事雖多亦何所妨石林詩話云詩之用事不可牽強必至於不得已而後用之則事辭為一莫見其安排鬭湊之迹却掃編云陳參政去非少學詩於崔鶠德符嘗問作詩之要崔曰凡作詩工拙所未論大要忌俗而已天下書雖不可不讀然謹不可有意於用事許彥周詩話云季父仲山在揚州時事東坡先生聞其教人作詩曰熟讀毛詩國風與離騷曲折盡在是矣僕嘗以謂此語太髙後年齒益長乃知東坡之善誘人也雪浪齋日記云昔人有言文選爛秀才半正為文選中事多可作本領爾余謂欲知文章之要當熟看文選蓋選中自三代涉戰國秦漢晉魏六朝以來文字皆有在古則渾厚在近則華麗也瑶溪集云有説杜子美教其子曰熟精文選理文選之尚不愛竒乎今人不為詩則已茍為詩則文選不可不熟也文選是文章家祖自兩漢而下至魏晉宋齊精者採萃成編則為文者烏得不尚文選也老杜大率宗法文選旁羅曲探咀嚼為我語蒼梧雜志云東坡嘗謂錢濟明云凡讀書可為詩材者但置一册録之亦詩家一助唐子西語録云凡作詩平居須收拾詩材以備用退之作范陽盧殷墓志云於書無所不讀然止用以資為詩是也詩疏不可不閲詩材最多其載諺語如絡緯鳴懶婦驚之類尤宜入詩用樂府解題須熟讀大有詩材余詩云時難將進酒家逺莫登樓用古樂府名作對也山谷云詩詞高勝要從學問中來學詩者雖時有妙句譬如合眼摸象隨觸體得處非不即似要且不是若開眼全體見之合古人處不待取證也後山詩話云魏文帝曰文以意為主以氣為輔以詞為衛魏文帝不足以及此其有所傳乎劉貢父詩話云詩以意義為主文詞次之意深義髙雖文詞平易自是竒作世人見古人語句平易倣之而不得其意義便入鄙野可笑蒼梧雜志云葛魯卿有姪名延之嘗自言在儋耳從東坡遊甚熟坡嘗教之作詩文云譬是市上店肆諸物無種不有却有一物可以攝得錢而已莫易得者是物莫難得者是錢今文章詞藻事實乃市肆諸物也意者錢也為文若能立意則古今並有翕然起為吾用若曉得此便會做文字也山谷云詩文不可鑿空強作待境而生便自工爾每作一篇定立大意長篇須曲折三致意乃可成章僧皎然詩式云詩有三偷偷語最是鈍賊如傅長虞日月光太清陳後主日月光天德是也偷意事雖可罔情不可原如栁惲太液滄波起長楊髙樹秋沈佺期小池殘暑退髙樹早涼歸是也偷勢才巧意精若無形迹蓋詩人偷狐白裘手也如嵇康目送歸鴻手揮五絃王昌齡手擕雙鯉魚目送千里鴈是也漫齋語録云五字詩以第三字為句眼七字詩以第五字為句眼古人鍊字只於句眼上鍊又云凡鍊句眼只以尋常慣熟字使之便似不覺者為勝也詩眼云世俗所謂樂天金針集殊鄙淺然其中亦有可取者鍊句不如鍊意非老於文學不能道此又云鍊字不如鍊句則未安也好句要須好字吕氏童蒙訓云潘邠老言七言詩第五字要響如返照入江翻石壁歸雲擁樹失山村翻字失字是響字也五言詩第三字要響如圓荷浮小葉細麥落輕花浮字落字是響字也所謂響者致力處也豫竊以為字字當活活則字字自響珊瑚鈎詩話云詩以意為主又須篇中鍊句句中鍊字乃得工耳以氣韻清髙深妙者絶以格力雅健雄豪者勝元輕白俗郊寒島瘦皆其病也復齋漫録云韓子蒼言作語不可太熟亦須令生近人論文一味忌語生往往不佳東坡作聚逺樓詩本合用青山緑水對野草間花此二字太熟故易以雲山煙水此深知詩病者豫然後知陳無已所謂寧拙毋巧寧朴毋華寧粗毋弱寧僻毋俗之語為可信吕氏童蒙訓云陸士衡文賦云立片言以居要乃一篇之警策此要論也文章無警策則不足以傳世蓋不能竦動世人如老杜及唐人諸詩無不如此但晉宋間人専致力於此故失於綺靡而無髙古氣味老杜詩云語不驚人死不休所謂驚人語即警策也竹坡詩話云作詩到平淡處要似非力所能東坡嘗有書與姪云大凡為文當使氣象峥嶸五色絢爛漸老漸熟乃造平淡余以謂不但為文作詩者尤當取法於此品題雪浪齋日記云為詩欲詞格清美當看鮑照謝靈運欲渾成而有正始以來風氣當看淵明欲清深間淡當看韋蘇州栁子厚孟浩然王摩詰賈長江欲氣格豪逸當看退之李白欲法度備足當看杜子美欲知詩之源流當看三百篇及楚詞漢魏等詩前輩云建安才六七子開元數兩三人前輩所取其難如此豫嘗與能詩者論書止於晉而詩止於唐蓋唐自大厯以來詩人無不可觀者特晚唐氣象衰􅒒耳吕氏童蒙訓云讀莊子令人意寬思大敢作讀左傳便使人入法度不敢容易二書不可偏廢也近世讀東坡魯直詩亦此類後山詩話云學詩當以子美為師有規矩故可學退之於詩本無解處以才髙而好耳淵明不為詩寫其胸中之妙耳學杜無成不失為工無韓之才與陶之妙而學其詩終為樂天耳雪浪齋日記云王逸少於書知變猶退之於詩知變則一洗萬古凡馬空也陶謝詩所以妙者由其人品髙王楊盧駱呌呼衒鬻以為文耳蔡百衲詩評云栁子厚詩雄深簡淡逈拔流俗至味自髙直揖陶謝然似入武庫但覺森嚴王摩詰詩渾厚一段覆蓋古今但如久隱山林之人徒成曠淡杜少陵詩自與造化同流孰可擬議至若君子髙處廊廟動成法言恨終欠風韻黃太史詩妙脫蹊徑言謀鬼神唯胸中無一點塵故能吐出世間語所恨務髙一似參曹洞下禪尚墮在玄妙窟裏東坡公詩天才宏放宜與日月爭光凡古人所不到處發明殆盡萬斛泉源未為過也然頗恨似方朔極諫時雜滑稽故罕逢藴藉韋蘇州詩如渾金璞玉不假雕琢成妍唐人有不能到至其過處大似村寺髙僧奈時有野態劉夢得詩典則既髙滋味亦厚但正若巧匠矜能不見少拙白樂天詩自擅天然貴在近俗恨如蘇小雖美終帶風塵李太白詩逸態凌雲照映千載然時作齊梁間人體段略不近渾厚韓退之詩山立霆碎自成一法然譬之樊侯冠佩微露粗疏與栁栁州詩若捕龍蛇搏虎豹急與之角而力不敢暇非輕蕩也薛許昌詩天分有限不逮諸公逺矣至合人意處正若芻豢悅口咀嚼自佳王介甫詩雖乏風骨一畨清新方似學語小兒酷令人愛歐陽公詩溫麗深穩自是學者所宗然似三館畫手未免多與古人傳神杜牧之詩風調髙華片言不俗有類新及第少年略無少退藏處固難求一唱而三歎也復齋漫録云杜老歌行與長韻律詩後人莫及而蘇黃用韻下字用故事處亦古所未到又云學退之不至李翺皇甫湜然翺湜之文足以窺測作文用力處近世欲學詩則莫若先考江西諸派矣隱居詩話云韋應物古詩勝律詩李德裕武元衡律詩勝古詩五言句又勝七字張籍王建詩格極相似李益古律相稱然皆非應物之比永叔餘話云學者品藻當今名賢詩方之唐人皆云王元之似樂天歐陽永叔似退之梅聖俞似孟東野蘇子美似李正封王禹玉似元微之石曼卿似杜牧之或以斯言為中的僧皎然詩式云蘇李之制意深體間詞多怨思音韻激切其象瑟也曹王之制思逸義婉詞多頓挫音韻低昻其象鼓也嗣宗孟陽太沖之制興殊增麗風骨雅淡音韻間暢其象箎也宋齊吳楚之制務精尚巧氣質華美音韻鏗鏘其象筝也唯古詩之制麗而不華直而不野如諷刺之作雅得和平之資深逺精密音律和緩其象琴也竹莊詩話卷一
